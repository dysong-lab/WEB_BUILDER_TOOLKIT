// ═══════════════════════════════════════════════════════════════
// 최소 런타임 시뮬레이션
// ═══════════════════════════════════════════════════════════════

const _datasetRegistry = {
    dashboard_systemInfo: '/api/system-info',
    dashboard_stats:      '/api/stats',
    dashboard_events:     '/api/events'
};

const fx = {
    go: (...args) => args.reduce((a, f) => typeof f === 'function' ? f(a) : a),
    each: (fn) => (iter) => { for (const v of iter) fn(v); return iter; },
    filter: (fn) => (iter) => [...iter].filter(fn)
};

const _mappings = new Map();
const _subscribers = new Map();

const GlobalDataPublisher = {
    registerMapping: ({ topic, datasetInfo }) => { _mappings.set(topic, datasetInfo); },
    unregisterMapping: (topic) => { _mappings.delete(topic); _subscribers.delete(topic); },
    subscribe: (topic, instance, handler) => {
        if (!_subscribers.has(topic)) _subscribers.set(topic, new Set());
        _subscribers.get(topic).add({ instance, handler });
    },
    unsubscribe: (topic, instance) => {
        const subs = _subscribers.get(topic);
        if (subs) { for (const sub of subs) { if (sub.instance === instance) subs.delete(sub); } }
    },
    fetchAndPublish: async (topic, page, params) => {
        const info = _mappings.get(topic);
        if (!info) return;
        const endpoint = _datasetRegistry[info.datasetName];
        const baseUrl = info.param.baseUrl || 'localhost:4010';
        const url = `http://${baseUrl}${endpoint}`;
        const res = await fetch(url);
        const data = await res.json();
        const payload = { response: { data } };
        const subs = _subscribers.get(topic) || new Set();
        for (const { instance, handler } of subs) { handler.call(instance, payload); }
    }
};

const _eventHandlers = {};
const Weventbus = { emit: (name, payload) => { if (_eventHandlers[name]) _eventHandlers[name](payload); } };
const Wkit = {
    bindEvents: (instance, customEvents) => {
        const listener = (e) => {
            Object.entries(customEvents).forEach(([eventName, selectorMap]) => {
                if (eventName !== e.type) return;
                Object.entries(selectorMap).forEach(([selector, emitName]) => {
                    if (e.target.closest(selector)) Weventbus.emit(emitName, { event: e, targetInstance: instance });
                });
            });
        };
        instance._listener = listener;
        Object.keys(customEvents).forEach(eventName => {
            instance.appendElement.addEventListener(eventName, listener);
        });
    },
    removeCustomEvents: (instance) => {
        if (instance._listener) {
            ['click', 'change'].forEach(e => instance.appendElement.removeEventListener(e, instance._listener));
        }
    },
    onEventBusHandlers: (handlers) => { Object.assign(_eventHandlers, handlers); },
    offEventBusHandlers: (handlers) => { Object.keys(handlers).forEach(k => delete _eventHandlers[k]); }
};


// ═══════════════════════════════════════════════════════════════
// Mixin 정의
// ═══════════════════════════════════════════════════════════════

function applyFieldRenderMixin(instance, options) {
    const { cssSelectors = {}, datasetSelectors = {}, dataFormat } = options;
    const ns = {};
    instance.fieldRender = ns;
    ns.cssSelectors = { ...cssSelectors };
    ns.datasetSelectors = { ...datasetSelectors };

    ns.renderData = function({ response }) {
        const { data } = response;
        if (!data) throw new Error('[FieldRenderMixin] data is null');
        const fields = dataFormat ? dataFormat(data) : data;
        Object.entries(fields).forEach(([key, value]) => {
            if (value === undefined || value === null) return;
            if (datasetSelectors[key]) {
                const dataEl = instance.appendElement.querySelector(datasetSelectors[key]);
                if (dataEl) dataEl.dataset[key] = value;
            }
            if (cssSelectors[key]) {
                const el = instance.appendElement.querySelector(cssSelectors[key]);
                if (el) el.textContent = value;
            }
        });
    };

    ns.destroy = function() {
        ns.renderData = null;
        ns.cssSelectors = null;
        ns.datasetSelectors = null;
        instance.fieldRender = null;
    };
}

function applyListRenderMixin(instance, options) {
    const { container, item, template, cssSelectors = {}, datasetSelectors = {}, dataFormat } = options;
    const ns = {};
    instance.listRender = ns;
    ns.container = container;
    ns.item = item;
    ns.cssSelectors = { ...cssSelectors };
    ns.datasetSelectors = { ...datasetSelectors };

    ns.renderData = function({ response }) {
        const { data } = response;
        if (!data) throw new Error('[ListRenderMixin] data is null');
        const formatted = dataFormat ? dataFormat(data) : { items: data };
        const containerEl = instance.appendElement.querySelector(container);
        const templateEl = instance.appendElement.querySelector(template);
        if (!containerEl || !templateEl) return;
        containerEl.innerHTML = '';
        formatted.items.forEach(item => {
            const clone = templateEl.content.cloneNode(true);
            Object.entries(datasetSelectors).forEach(([key, selector]) => {
                const el = clone.querySelector(selector);
                if (el && item[key] != null) el.dataset[key] = item[key];
            });
            Object.entries(cssSelectors).forEach(([key, selector]) => {
                const el = clone.querySelector(selector);
                if (el && item[key] != null) el.textContent = item[key];
            });
            containerEl.appendChild(clone);
        });
    };

    ns.clear = function() {
        const containerEl = instance.appendElement.querySelector(container);
        if (containerEl) containerEl.innerHTML = '';
    };

    ns.destroy = function() {
        ns.renderData = null; ns.clear = null;
        ns.container = null; ns.item = null;
        ns.cssSelectors = null; ns.datasetSelectors = null;
        instance.listRender = null;
    };
}


// ═══════════════════════════════════════════════════════════════
// 컴포넌트 등록 (Mixin 적용 — register.js와 동일)
// 디자인이 바뀌어도 이 코드는 변하지 않는다
// ═══════════════════════════════════════════════════════════════

const instances = {};
let pageIntervals = {};

function registerSystemInfo() {
    const instance = { id: 'system-info', appendElement: document.getElementById('system-info-container') };
    instances.systemInfo = instance;

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            name:        '.system-info__name',
            statusLabel: '.system-info__status',
            version:     '.system-info__version',
            uptime:      '.system-info__uptime'
        },
        datasetSelectors: {
            status: '[data-status]'
        },
        dataFormat: (data) => ({
            name:        data.hostname,
            status:      data.status,
            statusLabel: data.statusLabel,
            version:     data.version,
            uptime:      data.uptime
        })
    });

    instance.subscriptions = { systemInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {};
    Wkit.bindEvents(instance, instance.customEvents);
}

function registerStatusCards() {
    const instance = { id: 'status-cards', appendElement: document.getElementById('status-cards-container') };
    instances.statusCards = instance;

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            cpuValue:     '.status-card[data-metric="cpu"] .status-card__value',
            memoryValue:  '.status-card[data-metric="memory"] .status-card__value',
            diskValue:    '.status-card[data-metric="disk"] .status-card__value',
            networkValue: '.status-card[data-metric="network"] .status-card__value'
        },
        dataFormat: (data) => ({
            cpuValue:     data.cpu.value,
            memoryValue:  data.memory.value,
            diskValue:    data.disk.value,
            networkValue: String(data.network.value)
        })
    });

    instance.subscriptions = { stats: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = { click: { '.status-card': '@cardClicked' } };
    Wkit.bindEvents(instance, instance.customEvents);
}

function registerEventLog() {
    const instance = { id: 'event-log', appendElement: document.getElementById('event-log-container') };
    instances.eventLog = instance;

    applyListRenderMixin(instance, {
        container: '.event-log__list',
        item: '.event-log__item',
        template: '#event-log-item-template',
        cssSelectors: {
            level:   '.event-log__level',
            time:    '.event-log__time',
            message: '.event-log__message'
        },
        datasetSelectors: {
            level: '[data-level]'
        },
        dataFormat: (data) => ({
            items: data.events.map(event => ({
                level:   event.level,
                time:    new Date(event.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                message: event.message
            }))
        })
    });

    instance.subscriptions = { events: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.item]: '@eventClicked',
            '.event-log__clear-btn': '@clearClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);
}

function destroyAll() {
    Object.values(pageIntervals).forEach(clearInterval);
    pageIntervals = {};

    Object.values(instances).forEach(inst => {
        if (inst.customEvents) Wkit.removeCustomEvents(inst);
        if (inst.subscriptions) {
            Object.entries(inst.subscriptions).forEach(([topic]) =>
                GlobalDataPublisher.unsubscribe(topic, inst)
            );
        }
        if (inst.fieldRender) inst.fieldRender.destroy();
        if (inst.listRender) inst.listRender.destroy();
    });

    Object.keys(instances).forEach(k => delete instances[k]);
}


// ═══════════════════════════════════════════════════════════════
// 디자인 전환 + 부팅
// ═══════════════════════════════════════════════════════════════

function applyDesign(component, version) {
    const design = DESIGNS[component][version];
    const containerMap = {
        SystemInfo: 'system-info-container',
        StatusCards: 'status-cards-container',
        EventLog: 'event-log-container'
    };
    const cssMap = {
        SystemInfo: 'dynamic-system-info-css',
        StatusCards: 'dynamic-status-cards-css',
        EventLog: 'dynamic-event-log-css'
    };

    document.getElementById(containerMap[component]).innerHTML = design.html;
    document.getElementById(cssMap[component]).textContent = design.css;
}

function boot() {
    // 디자인 적용
    applyDesign('SystemInfo', document.getElementById('select-system-info').value);
    applyDesign('StatusCards', document.getElementById('select-status-cards').value);
    applyDesign('EventLog', document.getElementById('select-event-log').value);

    // 컴포넌트 등록 (register.js — Mixin 조립)
    registerSystemInfo();
    registerStatusCards();
    registerEventLog();

    // 페이지 이벤트 핸들러
    Wkit.onEventBusHandlers({
        '@cardClicked': ({ event }) => {
            const card = event.target.closest('.status-card');
            console.log('[Page] Card clicked:', card?.dataset.metric);
        },
        '@eventClicked': ({ event }) => {
            const item = event.target.closest('.event-log__item');
            console.log('[Page] Event clicked:', item?.querySelector('.event-log__message')?.textContent);
        },
        '@clearClicked': ({ targetInstance }) => {
            targetInstance.listRender.clear();
        }
    });

    // 데이터 매핑 + 발행
    const mappings = [
        { topic: 'systemInfo', datasetInfo: { datasetName: 'dashboard_systemInfo', param: { baseUrl: 'localhost:4010' } } },
        { topic: 'stats', datasetInfo: { datasetName: 'dashboard_stats', param: { baseUrl: 'localhost:4010' } }, refreshInterval: 5000 },
        { topic: 'events', datasetInfo: { datasetName: 'dashboard_events', param: { baseUrl: 'localhost:4010' } }, refreshInterval: 10000 }
    ];

    mappings.forEach(GlobalDataPublisher.registerMapping);
    mappings.forEach(({ topic }) =>
        GlobalDataPublisher.fetchAndPublish(topic, {}).catch(err => console.error(`[Page] ${topic}:`, err))
    );

    mappings.filter(m => m.refreshInterval).forEach(({ topic, refreshInterval }) => {
        pageIntervals[topic] = setInterval(() => {
            GlobalDataPublisher.fetchAndPublish(topic, {}).catch(err => console.error(`[Page] ${topic}:`, err));
        }, refreshInterval);
    });

    console.log('[Boot] SimpleDashboard started');
}

function reboot() {
    destroyAll();
    _mappings.clear();
    _subscribers.clear();
    boot();
}

// 디자인 선택 시 재부팅
document.getElementById('select-system-info').addEventListener('change', reboot);
document.getElementById('select-status-cards').addEventListener('change', reboot);
document.getElementById('select-event-log').addEventListener('change', reboot);

// 초기 부팅
boot();
</script>
