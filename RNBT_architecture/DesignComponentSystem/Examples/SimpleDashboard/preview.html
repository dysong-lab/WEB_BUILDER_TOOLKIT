<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DesignComponentSystem - SimpleDashboard Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f1f5f9; }

        /* ─────────────────────────────────────────
           Page Layout
           ───────────────────────────────────────── */
        .page-root {
            width: 960px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ─────────────────────────────────────────
           SystemInfo Container
           ───────────────────────────────────────── */
        #system-info-container {
            .system-info {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 0 24px;
                height: 56px;
                background: #1e293b;
                color: #f8fafc;
            }
            .system-info__label { font-size: 12px; color: #94a3b8; text-dataFormat: uppercase; letter-spacing: 1px; }
            .system-info__name { font-size: 16px; font-weight: 600; }
            .system-info__meta { display: flex; gap: 12px; margin-left: auto; font-size: 13px; }
            .system-info__status { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
            .system-info__status[data-status="RUNNING"] { background: #065f46; color: #6ee7b7; }
            .system-info__status[data-status="unknown"] { background: #374151; color: #9ca3af; }
            .system-info__version { color: #94a3b8; }
            .system-info__uptime { color: #94a3b8; }
        }

        /* ─────────────────────────────────────────
           StatusCards Container
           ───────────────────────────────────────── */
        #status-cards-container {
            padding: 0 24px;
            .status-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
            .status-card {
                background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px;
                padding: 20px; display: flex; flex-direction: column; gap: 8px;
                cursor: pointer; transition: box-shadow 0.15s;
            }
            .status-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
            .status-card__label { font-size: 13px; color: #64748b; font-weight: 500; }
            .status-card__value { font-size: 32px; font-weight: 700; color: #0f172a; line-height: 1; }
            .status-card__unit { font-size: 13px; color: #94a3b8; }
        }

        /* ─────────────────────────────────────────
           EventLog Container
           ───────────────────────────────────────── */
        #event-log-container {
            padding: 0 24px 24px;
            .event-log {
                background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px;
                display: flex; flex-direction: column; height: 360px; overflow: hidden;
            }
            .event-log__header {
                display: flex; justify-content: space-between; align-items: center;
                padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
            }
            .event-log__title { font-size: 15px; font-weight: 600; color: #0f172a; }
            .event-log__clear-btn {
                padding: 4px 12px; font-size: 12px; border: 1px solid #e2e8f0;
                border-radius: 4px; background: #ffffff; color: #64748b; cursor: pointer;
            }
            .event-log__clear-btn:hover { background: #f8fafc; }
            .event-log__list { flex: 1; overflow-y: auto; padding: 8px 0; }
            .event-log__item {
                display: flex; align-items: flex-start; gap: 12px;
                padding: 8px 20px; font-size: 13px; cursor: pointer;
            }
            .event-log__item:hover { background: #f8fafc; }
            .event-log__level {
                padding: 1px 6px; border-radius: 3px; font-size: 11px;
                font-weight: 500; text-dataFormat: uppercase; flex-shrink: 0;
            }
            .event-log__level[data-level="info"]  { background: #dbeafe; color: #1e40af; }
            .event-log__level[data-level="warn"]  { background: #fef3c7; color: #92400e; }
            .event-log__level[data-level="error"] { background: #fee2e2; color: #991b1b; }
            .event-log__time { color: #94a3b8; flex-shrink: 0; font-size: 12px; min-width: 50px; }
            .event-log__message { color: #334155; flex: 1; }
        }
    </style>
</head>
<body>

<div class="page-root">
    <!-- SystemInfo: FieldRenderMixin -->
    <div id="system-info-container">
        <div class="system-info">
            <div class="system-info__label">System</div>
            <div class="system-info__name">-</div>
            <div class="system-info__meta">
                <span class="system-info__status" data-status="unknown">-</span>
                <span class="system-info__version">-</span>
                <span class="system-info__uptime">-</span>
            </div>
        </div>
    </div>

    <!-- StatusCards: FieldRenderMixin (같은 Mixin, 다른 껍데기) -->
    <div id="status-cards-container">
        <div class="status-cards">
            <div class="status-card" data-metric="cpu">
                <div class="status-card__label">CPU</div>
                <div class="status-card__value">-</div>
                <div class="status-card__unit">%</div>
            </div>
            <div class="status-card" data-metric="memory">
                <div class="status-card__label">Memory</div>
                <div class="status-card__value">-</div>
                <div class="status-card__unit">%</div>
            </div>
            <div class="status-card" data-metric="disk">
                <div class="status-card__label">Disk</div>
                <div class="status-card__value">-</div>
                <div class="status-card__unit">%</div>
            </div>
            <div class="status-card" data-metric="network">
                <div class="status-card__label">Network</div>
                <div class="status-card__value">-</div>
                <div class="status-card__unit">Mbps</div>
            </div>
        </div>
    </div>

    <!-- EventLog: ListRenderMixin -->
    <div id="event-log-container">
        <div class="event-log">
            <div class="event-log__header">
                <span class="event-log__title">Event Log</span>
                <button class="event-log__clear-btn">Clear</button>
            </div>
            <div class="event-log__list"></div>

            <template id="event-log-item-template">
                <div class="event-log__item">
                    <span class="event-log__level" data-level=""></span>
                    <span class="event-log__time"></span>
                    <span class="event-log__message"></span>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 최소 런타임 시뮬레이션
// preview.html에서 Mixin 시스템이 실제 동작하는 것을 확인하기 위함
// ═══════════════════════════════════════════════════════════════

// datasetList.json의 rest_api URL 템플릿을 시뮬레이션
// 실제 런타임에서는 Wkit.fetchData가 처리
const _datasetRegistry = {
    dashboard_systemInfo: '/api/system-info',
    dashboard_stats:      '/api/stats',
    dashboard_events:     '/api/events'
};

// ── fx 최소 구현 ──
const fx = {
    go: (...args) => args.reduce((a, f) => typeof f === 'function' ? f(a) : a),
    each: (fn) => (iter) => { for (const v of iter) fn(v); return iter; },
    map: (fn) => (iter) => [...iter].map(fn),
    filter: (fn) => (iter) => [...iter].filter(fn)
};

// ── GlobalDataPublisher 최소 구현 ──
const _mappings = new Map();
const _subscribers = new Map();

const GlobalDataPublisher = {
    registerMapping: ({ topic, datasetInfo }) => {
        _mappings.set(topic, datasetInfo);
    },
    unregisterMapping: (topic) => {
        _mappings.delete(topic);
        _subscribers.delete(topic);
    },
    subscribe: (topic, instance, handler) => {
        if (!_subscribers.has(topic)) _subscribers.set(topic, new Set());
        _subscribers.get(topic).add({ instance, handler });
    },
    unsubscribe: (topic, instance) => {
        const subs = _subscribers.get(topic);
        if (subs) {
            for (const sub of subs) {
                if (sub.instance === instance) subs.delete(sub);
            }
        }
    },
    fetchAndPublish: async (topic, page, params) => {
        const info = _mappings.get(topic);
        if (!info) return;

        // datasetList.json의 rest_api에서 URL을 가져오고, param의 baseUrl로 조립
        const endpoint = _datasetRegistry[info.datasetName];
        const baseUrl = info.param.baseUrl || 'localhost:4010';
        const url = `http://${baseUrl}${endpoint}`;

        const res = await fetch(url);
        const data = await res.json();
        const payload = { response: { data } };

        const subs = _subscribers.get(topic) || new Set();
        for (const { instance, handler } of subs) {
            handler.call(instance, payload);
        }
    }
};

// ── Weventbus 최소 구현 ──
const _eventHandlers = {};
const Weventbus = {
    emit: (name, payload) => {
        if (_eventHandlers[name]) _eventHandlers[name](payload);
    }
};

// ── Wkit 최소 구현 ──
const Wkit = {
    bindEvents: (instance, customEvents) => {
        Object.entries(customEvents).forEach(([eventName, selectorMap]) => {
            instance.appendElement.addEventListener(eventName, (e) => {
                Object.entries(selectorMap).forEach(([selector, emitName]) => {
                    if (e.target.closest(selector)) {
                        Weventbus.emit(emitName, { event: e, targetInstance: instance });
                    }
                });
            });
        });
    },
    removeCustomEvents: () => {},
    onEventBusHandlers: (handlers) => {
        Object.assign(_eventHandlers, handlers);
    },
    offEventBusHandlers: (handlers) => {
        Object.keys(handlers).forEach(k => delete _eventHandlers[k]);
    }
};


// ═══════════════════════════════════════════════════════════════
// Mixin 정의
// ═══════════════════════════════════════════════════════════════

// ── FieldRenderMixin ──
// cssSelectors  → textContent 반영
// datasetSelectors → dataset 반영
function applyFieldRenderMixin(instance, options) {
    const { cssSelectors = {}, datasetSelectors = {}, dataFormat } = options;
    const ns = {};
    instance.fieldRender = ns;
    ns.cssSelectors = { ...cssSelectors };
    ns.datasetSelectors = { ...datasetSelectors };

    ns.renderData = function({ response }) {
        const { data } = response;
        if (!data) throw new Error('[FieldRenderMixin] data is null');
        const fields = dataFormat ? dataFormat(data) : data;
        Object.entries(fields).forEach(([key, value]) => {
            if (value === undefined || value === null) return;

            // datasetSelectors에 키가 있으면 → dataset 반영
            if (datasetSelectors[key]) {
                const dataEl = instance.appendElement.querySelector(datasetSelectors[key]);
                if (dataEl) dataEl.dataset[key] = value;
            }

            // cssSelectors에 키가 있으면 → textContent 반영
            if (cssSelectors[key]) {
                const el = instance.appendElement.querySelector(cssSelectors[key]);
                if (el) el.textContent = value;
            }
        });
    };

    ns.destroy = function() {
        ns.renderData = null;
        ns.cssSelectors = null;
        ns.datasetSelectors = null;
        instance.fieldRender = null;
    };
}

// ── ListRenderMixin ──
// template 기반 반복 렌더링
// cssSelectors → 항목 내 textContent, datasetSelectors → 항목 내 dataset
function applyListRenderMixin(instance, options) {
    const { container, item, template, cssSelectors = {}, datasetSelectors = {}, dataFormat } = options;
    const ns = {};
    instance.listRender = ns;
    ns.container = container;
    ns.item = item;
    ns.cssSelectors = { ...cssSelectors };
    ns.datasetSelectors = { ...datasetSelectors };

    ns.renderData = function({ response }) {
        const { data } = response;
        if (!data) throw new Error('[ListRenderMixin] data is null');
        const formatted = dataFormat ? dataFormat(data) : { items: data };

        const containerEl = instance.appendElement.querySelector(container);
        if (!containerEl) return;
        const templateEl = instance.appendElement.querySelector(template);
        if (!templateEl) return;

        containerEl.innerHTML = '';
        formatted.items.forEach(item => {
            const clone = templateEl.content.cloneNode(true);

            Object.entries(datasetSelectors).forEach(([key, selector]) => {
                const el = clone.querySelector(selector);
                if (el && item[key] !== undefined && item[key] !== null) {
                    el.dataset[key] = item[key];
                }
            });

            Object.entries(cssSelectors).forEach(([key, selector]) => {
                const el = clone.querySelector(selector);
                if (el && item[key] !== undefined && item[key] !== null) {
                    el.textContent = item[key];
                }
            });

            containerEl.appendChild(clone);
        });
    };

    ns.clear = function() {
        const containerEl = instance.appendElement.querySelector(container);
        if (containerEl) containerEl.innerHTML = '';
    };

    ns.destroy = function() {
        ns.renderData = null;
        ns.clear = null;
        ns.container = null;
        ns.item = null;
        ns.cssSelectors = null;
        ns.datasetSelectors = null;
        instance.listRender = null;
    };
}


// ═══════════════════════════════════════════════════════════════
// 컴포넌트 인스턴스 시뮬레이션
// ═══════════════════════════════════════════════════════════════

function createInstance(containerId) {
    return {
        id: containerId,
        appendElement: document.getElementById(containerId),
        page: {}
    };
}


// ═══════════════════════════════════════════════════════════════
// 부팅 시퀀스 (RNBT 라이프사이클 시뮬레이션)
// ═══════════════════════════════════════════════════════════════

(async function boot() {
    const page = { appendElement: document.querySelector('.page-root') };

    // ──────────────────────────────
    // 1. Page before_load
    // ──────────────────────────────
    (function pageBeforeLoad() {
        const ctx = page;

        ctx.pageEventBusHandlers = {
            '@cardClicked': ({ event }) => {
                const card = event.target.closest('.status-card');
                console.log('[Page] Card clicked:', card?.dataset.metric);
            },
            '@eventClicked': ({ event }) => {
                const item = event.target.closest('.event-log__item');
                console.log('[Page] Event clicked:', item?.querySelector('.event-log__message')?.textContent);
            },
            '@clearClicked': ({ targetInstance }) => {
                targetInstance.listRender.clear();
            }
        };

        Wkit.onEventBusHandlers(ctx.pageEventBusHandlers);
    })();

    // ──────────────────────────────
    // 2. Component register
    // ──────────────────────────────

    // SystemInfo — FieldRenderMixin
    const systemInfo = createInstance('system-info-container');
    (function register() {
        const instance = systemInfo;

        applyFieldRenderMixin(instance, {
            cssSelectors: {
                name:        '.system-info__name',
                statusLabel: '.system-info__status',
                version:     '.system-info__version',
                uptime:      '.system-info__uptime'
            },
            datasetSelectors: {
                status:      '[data-status]'
            },
            dataFormat: (data) => ({
                name:        data.hostname,
                status:      data.status,           // → datasetSelectors → dataset
                statusLabel: data.statusLabel,      // → cssSelectors → textContent
                version:     data.version,
                uptime:      data.uptime
            })
        });

        instance.subscriptions = {
            systemInfo: [instance.fieldRender.renderData]
        };
        Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
            handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
        );

        instance.customEvents = {};
        Wkit.bindEvents(instance, instance.customEvents);
    })();

    // StatusCards — FieldRenderMixin (같은 Mixin, 다른 껍데기)
    const statusCards = createInstance('status-cards-container');
    (function register() {
        const instance = statusCards;

        applyFieldRenderMixin(instance, {
            cssSelectors: {
                cpuValue:     '.status-card[data-metric="cpu"] .status-card__value',
                memoryValue:  '.status-card[data-metric="memory"] .status-card__value',
                diskValue:    '.status-card[data-metric="disk"] .status-card__value',
                networkValue: '.status-card[data-metric="network"] .status-card__value'
            },
            dataFormat: (data) => ({
                cpuValue:     data.cpu.value,
                memoryValue:  data.memory.value,
                diskValue:    data.disk.value,
                networkValue: String(data.network.value)
            })
        });

        instance.subscriptions = {
            stats: [instance.fieldRender.renderData]
        };
        Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
            handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
        );

        instance.customEvents = { click: { '.status-card': '@cardClicked' } };
        Wkit.bindEvents(instance, instance.customEvents);
    })();

    // EventLog — ListRenderMixin
    const eventLog = createInstance('event-log-container');
    (function register() {
        const instance = eventLog;

        applyListRenderMixin(instance, {
            container: '.event-log__list',
            item:      '.event-log__item',
            template:  '#event-log-item-template',
            cssSelectors: {
                level:   '.event-log__level',
                time:    '.event-log__time',
                message: '.event-log__message'
            },
            datasetSelectors: {
                level:   '[data-level]'
            },
            dataFormat: (data) => ({
                items: data.events.map(event => ({
                    level:   event.level,
                    time:    new Date(event.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }),
                    message: event.message
                }))
            })
        });

        instance.subscriptions = {
            events: [instance.listRender.renderData]
        };
        Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
            handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
        );

        instance.customEvents = {
            click: {
                [instance.listRender.item]: '@eventClicked',
                '.event-log__clear-btn': '@clearClicked'
            }
        };
        Wkit.bindEvents(instance, instance.customEvents);
    })();

    // ──────────────────────────────
    // 3. Page loaded
    // ──────────────────────────────
    (function pageLoaded() {
        const ctx = page;

        ctx.pageDataMappings = [
            { topic: 'systemInfo', datasetInfo: { datasetName: 'dashboard_systemInfo', param: { baseUrl: 'localhost:4010' } } },
            { topic: 'stats', datasetInfo: { datasetName: 'dashboard_stats', param: { baseUrl: 'localhost:4010' } }, refreshInterval: 5000 },
            { topic: 'events', datasetInfo: { datasetName: 'dashboard_events', param: { baseUrl: 'localhost:4010' } }, refreshInterval: 10000 }
        ];

        ctx.pageParams = {};

        fx.go(
            ctx.pageDataMappings,
            fx.each(GlobalDataPublisher.registerMapping),
            fx.each(({ topic }) => ctx.pageParams[topic] = {}),
            fx.each(({ topic }) =>
                GlobalDataPublisher.fetchAndPublish(topic, ctx)
                    .catch(err => console.error(`[Page] ${topic}:`, err))
            )
        );

        ctx.pageIntervals = {};
        fx.go(
            ctx.pageDataMappings,
            fx.filter(m => m.refreshInterval),
            fx.each(({ topic, refreshInterval }) => {
                ctx.pageIntervals[topic] = setInterval(() => {
                    GlobalDataPublisher.fetchAndPublish(topic, ctx)
                        .catch(err => console.error(`[Page] ${topic}:`, err));
                }, refreshInterval);
            })
        );
    })();

    console.log('[Boot] SimpleDashboard started — mock server: localhost:4010');
    console.log('[Boot] SystemInfo: FieldRenderMixin');
    console.log('[Boot] StatusCards: FieldRenderMixin (같은 Mixin, 다른 껍데기)');
    console.log('[Boot] EventLog:   ListRenderMixin');
})();
</script>

</body>
</html>
