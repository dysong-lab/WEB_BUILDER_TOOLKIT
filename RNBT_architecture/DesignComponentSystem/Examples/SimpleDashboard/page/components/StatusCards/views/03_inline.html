<!-- 03_inline: 한 줄 뱃지 -->
<div class="status-cards">
    <div class="status-card" data-metric="cpu">
        <span class="status-card__label">CPU</span>
        <span class="status-card__value">-</span><span class="status-card__unit">%</span>
    </div>
    <div class="status-card" data-metric="memory">
        <span class="status-card__label">MEM</span>
        <span class="status-card__value">-</span><span class="status-card__unit">%</span>
    </div>
    <div class="status-card" data-metric="disk">
        <span class="status-card__label">DISK</span>
        <span class="status-card__value">-</span><span class="status-card__unit">%</span>
    </div>
    <div class="status-card" data-metric="network">
        <span class="status-card__label">NET</span>
        <span class="status-card__value">-</span><span class="status-card__unit">Mbps</span>
    </div>
</div>
