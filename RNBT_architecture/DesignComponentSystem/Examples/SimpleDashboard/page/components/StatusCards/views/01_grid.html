<!-- 01_grid: 4열 그리드 카드 -->
<div class="status-cards">
    <div class="status-card" data-metric="cpu">
        <div class="status-card__label">CPU</div>
        <div class="status-card__value">-</div>
        <div class="status-card__unit">%</div>
    </div>
    <div class="status-card" data-metric="memory">
        <div class="status-card__label">Memory</div>
        <div class="status-card__value">-</div>
        <div class="status-card__unit">%</div>
    </div>
    <div class="status-card" data-metric="disk">
        <div class="status-card__label">Disk</div>
        <div class="status-card__value">-</div>
        <div class="status-card__unit">%</div>
    </div>
    <div class="status-card" data-metric="network">
        <div class="status-card__label">Network</div>
        <div class="status-card__value">-</div>
        <div class="status-card__unit">Mbps</div>
    </div>
</div>
