<!-- 02_list: 세로 리스트 + 좌측 컬러 보더 -->
<div class="status-cards">
    <div class="status-card" data-metric="cpu">
        <div class="status-card__left">
            <div class="status-card__label">CPU Usage</div>
            <div class="status-card__desc">Processor utilization</div>
        </div>
        <div class="status-card__right">
            <span class="status-card__value">-</span>
            <span class="status-card__unit">%</span>
        </div>
    </div>
    <div class="status-card" data-metric="memory">
        <div class="status-card__left">
            <div class="status-card__label">Memory Usage</div>
            <div class="status-card__desc">RAM utilization</div>
        </div>
        <div class="status-card__right">
            <span class="status-card__value">-</span>
            <span class="status-card__unit">%</span>
        </div>
    </div>
    <div class="status-card" data-metric="disk">
        <div class="status-card__left">
            <div class="status-card__label">Disk Usage</div>
            <div class="status-card__desc">Storage utilization</div>
        </div>
        <div class="status-card__right">
            <span class="status-card__value">-</span>
            <span class="status-card__unit">%</span>
        </div>
    </div>
    <div class="status-card" data-metric="network">
        <div class="status-card__left">
            <div class="status-card__label">Network</div>
            <div class="status-card__desc">Throughput</div>
        </div>
        <div class="status-card__right">
            <span class="status-card__value">-</span>
            <span class="status-card__unit">Mbps</span>
        </div>
    </div>
</div>
