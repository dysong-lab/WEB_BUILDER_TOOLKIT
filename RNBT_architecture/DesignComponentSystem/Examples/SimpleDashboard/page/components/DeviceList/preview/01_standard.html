<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DeviceList — 01_standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f1f5f9; padding: 40px; }
        #device-list-container { width: 600px; height: 500px; margin: 0 auto; }
    </style>
</head>
<body>

<div id="device-list-container"></div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../../../Mixins/ListRenderMixin.js"></script>
<script src="../../../../../../Mixins/PopupMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('device-list-container', '../views/01_standard.html', '../styles/01_standard.css');

    const instance = { id: 'device-list', appendElement: document.getElementById('device-list-container') };

    // 장치 목록 (일반 DOM)
    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.device-list__body',
            item:      '.device-list__item',
            template:  '#device-list-item-template',
            name:      '.device-list__name',
            type:      '.device-list__type',
            status:    '.device-list__status'
        },
        datasetAttrs: {
            status: 'status'
        }
    });

    // 상세 팝업 (Shadow DOM) + 내부 ListRenderMixin
    instance._popupScope = null;

    applyPopupMixin(instance, {
        cssSelectors: {
            template: '#device-detail-popup-template',
            closeBtn: '.popup-close-btn',
            title:    '.popup-title'
        },
        onCreated: (shadowRoot) => {
            instance._popupScope = { appendElement: shadowRoot };
            applyListRenderMixin(instance._popupScope, {
                cssSelectors: {
                    container: '.popup-detail-list',
                    template:  '#popup-detail-item-template',
                    label:     '.popup-field__label',
                    value:     '.popup-field__value'
                }
            });
        }
    });

    instance.subscriptions = { devices: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.item]: '@deviceClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    instance.popup.bindPopupEvents({
        click: {
            [instance.popup.cssSelectors.closeBtn]: '@devicePopupClose'
        }
    });

    Wkit.onEventBusHandlers({
        '@devicePopupClose': ({ targetInstance }) => {
            targetInstance.popup.hide();
        },
        '@deviceClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.item);
            if (!item) return;

            targetInstance.popup.show();

            // 팝업 제목
            const titleEl = targetInstance.popup.query(targetInstance.popup.cssSelectors.title);
            if (titleEl) titleEl.textContent = item.querySelector(targetInstance.listRender.cssSelectors.name)?.textContent || '';

            // API fetch → 데이터 변환 → 팝업 내부 ListRenderMixin
            const deviceName = item.querySelector(targetInstance.listRender.cssSelectors.name)?.textContent;
            fetch('http://localhost:4010/api/device-detail?name=' + encodeURIComponent(deviceName))
                .then(r => r.json())
                .then(detail => {
                    const data = [
                        { label: 'Type',      value: detail.type },
                        { label: 'Status',    value: detail.status },
                        { label: 'Location',  value: detail.location },
                        { label: 'Last Seen', value: detail.lastSeen },
                        { label: 'IP',        value: detail.ip }
                    ];
                    targetInstance._popupScope.listRender.renderData({ response: { data } });
                })
                .catch(console.error);
        }
    });

    GlobalDataPublisher.registerMapping({
        topic: 'devices',
        datasetInfo: { datasetName: 'dashboard_devices', param: { baseUrl: 'localhost:4010' } }
    });
    GlobalDataPublisher.fetchAndPublish('devices').catch(console.error);
})();
</script>
</body>
</html>
