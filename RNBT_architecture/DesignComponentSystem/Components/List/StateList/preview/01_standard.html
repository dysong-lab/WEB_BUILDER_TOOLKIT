<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>StateList — 01_standard</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #0f1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .rnbt-container {
            width: 520px;
            height: 300px;
            overflow: auto;
        }
    </style>
    <link rel="stylesheet" href="../styles/01_standard.css">
</head>
<body>
    <div class="rnbt-container">
        <div class="state-list__container">
            <div class="state-list__item" data-id="1" data-severity="critical" data-ack="false">
                <div class="state-list__severity-bar"></div>
                <div class="state-list__content">
                    <div class="state-list__row">
                        <span class="state-list__title">CPU temperature critical</span>
                        <span class="state-list__time">14:32:05</span>
                    </div>
                    <span class="state-list__desc">Core temp exceeded 95°C on node-03</span>
                </div>
                <button class="state-list__action-btn">ACK</button>
            </div>

            <div class="state-list__item" data-id="2" data-severity="warning" data-ack="false">
                <div class="state-list__severity-bar"></div>
                <div class="state-list__content">
                    <div class="state-list__row">
                        <span class="state-list__title">Disk usage high</span>
                        <span class="state-list__time">14:30:12</span>
                    </div>
                    <span class="state-list__desc">Volume /data reached 90% capacity</span>
                </div>
                <button class="state-list__action-btn">ACK</button>
            </div>

            <div class="state-list__item" data-id="3" data-severity="info" data-ack="true">
                <div class="state-list__severity-bar"></div>
                <div class="state-list__content">
                    <div class="state-list__row">
                        <span class="state-list__title">Backup completed</span>
                        <span class="state-list__time">14:28:44</span>
                    </div>
                    <span class="state-list__desc">Full backup of database cluster finished</span>
                </div>
                <button class="state-list__action-btn">ACK</button>
            </div>

            <div class="state-list__item" data-id="4" data-severity="critical" data-ack="true">
                <div class="state-list__severity-bar"></div>
                <div class="state-list__content">
                    <div class="state-list__row">
                        <span class="state-list__title">Network partition</span>
                        <span class="state-list__time">14:25:30</span>
                    </div>
                    <span class="state-list__desc">Split-brain detected between zone-a and zone-b</span>
                </div>
                <button class="state-list__action-btn">ACK</button>
            </div>
        </div>
    </div>
</body>
</html>
