<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Tables/Standard — 04_operational</title>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/TabulatorMixin.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px; background: #090d11; }
    </style>
  </head>
  <body>
    <div id="table-operational"></div>
    <script>
      class Tabulator { constructor(c,o){ this.container=c; this.options=o; this.handlers={}; this.data=o.data||[]; this.render(); setTimeout(()=>this.emit("tableBuilt"),0);} on(n,h){ this.handlers[n]=h; return this;} emit(n,...a){ if(this.handlers[n]) this.handlers[n](...a);} setData(d){ this.data=d; this.render();} clearData(){ this.data=[]; this.render();} destroy(){ this.container.innerHTML=""; this.handlers={};} render(){ const h=this.options.columns.map(col=>`<th>${col.title}</th>`).join(""); const r=this.data.map((row,i)=>`<tr data-index="${i}">${this.options.columns.map(col=>`<td>${row[col.field] ?? ""}</td>`).join("")}</tr>`).join(""); this.container.innerHTML=`<table class="table-mock"><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table>`; this.container.querySelectorAll("tbody tr").forEach((tr)=>tr.addEventListener("click",(event)=>this.emit("rowClick",event,{getData:()=>this.data[Number(tr.dataset.index)]}))); } }
      (async () => {
        await loadComponentAssets("table-operational", "../views/04_operational.html", "../styles/04_operational.css");
        const instance = { id: "table-operational", appendElement: document.getElementById("table-operational") };
        applyTabulatorMixin(instance, { cssSelectors: { container: ".data-table__container" }, columns: [{ title: "ID", field: "id" }, { title: "Name", field: "name" }, { title: "Type", field: "type" }, { title: "Status", field: "status" }, { title: "Value", field: "value" }, { title: "Updated", field: "updated" }] });
        instance.tabulator.init().on("rowClick", (event, row) => Weventbus.emit("@tableRowClicked", { event, targetInstance: instance, response: row.getData() }));
        instance.appendElement.querySelector(".data-table__count").textContent = "4 rows";
        instance.tabulator.renderData({ response: [{ id: "PWR-09", name: "Bus A Input", type: "Power", status: "Normal", value: "228V", updated: "09:58:33" }, { id: "PWR-10", name: "Bus B Input", type: "Power", status: "Warning", value: "214V", updated: "09:58:11" }, { id: "CLG-04", name: "Coolant Loop", type: "HVAC", status: "Critical", value: "Stopped", updated: "09:57:44" }, { id: "NET-02", name: "Edge Link", type: "Network", status: "Normal", value: "12ms", updated: "09:57:22" }] });
      })();
    </script>
  </body>
</html>
