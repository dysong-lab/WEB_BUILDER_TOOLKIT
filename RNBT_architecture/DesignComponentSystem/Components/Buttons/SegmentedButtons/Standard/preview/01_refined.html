<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SegmentedButtons/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="segmented-button-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('segmented-button-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'segmented-buttons', appendElement: document.getElementById('segmented-button-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.segmented-button__list',
            template:  '#segmented-button-item-template',
            segmentid: '.segmented-button__item',
            selected:  '.segmented-button__item',
            label:     '.segmented-button__label',
            icon:      '.segmented-button__icon'
        },
        itemKey: 'segmentid',
        datasetAttrs: {
            segmentid: 'segmentid',
            selected:  'selected'
        }
    });

    instance.subscriptions = { segmentedButtonItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.segmentid]: '@segmentClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { segmentid: 'day',   icon: 'today',           label: 'Day',   selected: 'true' },
        { segmentid: 'week',  icon: 'date_range',      label: 'Week',  selected: 'false' },
        { segmentid: 'month', icon: 'calendar_month',  label: 'Month', selected: 'false' }
    ];

    Wkit.onEventBusHandlers({
        '@segmentClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.segmentid);
            const segmentid = item?.getAttribute('data-segmentid');
            if (!segmentid) return;
            itemsData.forEach(it => {
                targetInstance.listRender.updateItemState(it.segmentid, { selected: it.segmentid === segmentid ? 'true' : 'false' });
            });
            log(`segmentClicked "${segmentid}" → selected`);
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
