<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SegmentedButtons/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A1214;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #1f3a4a;
            border-radius: 2px;
            color: #7dc7d9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #22d3ee;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div id="segmented-button-container"></div>
<div class="demo-log" id="demo-log"><strong>event log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('segmented-button-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'segmented-buttons', appendElement: document.getElementById('segmented-button-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.segmented-button__list',
            template:  '#segmented-button-item-template',
            segmentid: '.segmented-button__item',
            selected:  '.segmented-button__item',
            label:     '.segmented-button__label',
            icon:      '.segmented-button__icon'
        },
        itemKey: 'segmentid',
        datasetAttrs: {
            segmentid: 'segmentid',
            selected:  'selected'
        }
    });

    instance.subscriptions = { segmentedButtonItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.segmentid]: '@segmentClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { segmentid: 'rt',  icon: '', label: 'RT',  selected: 'true' },
        { segmentid: '1h',  icon: '', label: '1H',  selected: 'false' },
        { segmentid: '24h', icon: '', label: '24H', selected: 'false' },
        { segmentid: '7d',  icon: '', label: '7D',  selected: 'false' }
    ];

    Wkit.onEventBusHandlers({
        '@segmentClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.segmentid);
            const segmentid = item?.getAttribute('data-segmentid');
            if (!segmentid) return;
            itemsData.forEach(it => {
                targetInstance.listRender.updateItemState(it.segmentid, { selected: it.segmentid === segmentid ? 'true' : 'false' });
            });
            log(`segmentClicked "${segmentid}" → selected`);
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
