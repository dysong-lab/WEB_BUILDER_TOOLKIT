<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons/Advanced/confirmation — 01_refined</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #09111b; color: #e8efff; font-family: "Pretendard", sans-serif; padding: 36px; }
      .preview-shell { display: flex; flex-direction: column; gap: 18px; max-width: 940px; margin: 0 auto; }
      .preview-copy { color: #9fb0d1; line-height: 1.6; }
      .preview-log { min-height: 132px; padding: 16px 18px; border-radius: 18px; background: rgba(255,255,255,0.04); color: #b9caec; font-family: "IBM Plex Mono", monospace; font-size: 12px; white-space: pre-line; }
      .button-shell { display: inline-flex; flex-direction: column; align-items: stretch; gap: 14px; min-width: 280px; min-height: 154px; padding: 24px; border-radius: 28px; background: radial-gradient(circle at top left, rgba(154, 203, 255, 0.3), transparent 42%), linear-gradient(180deg, #0d1d31 0%, #08111d 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); }
      .md-button { min-width: 134px; min-height: 46px; padding: 0 22px; border: 0; border-radius: 999px; background: linear-gradient(180deg, #edf6ff 0%, #d6e7ff 100%); color: #0c3972; cursor: pointer; }
      .md-button__label { font-family: "Tomorrow", "Pretendard", sans-serif; font-size: 14px; font-weight: 600; }
      .button-feedback { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .button-feedback__hint { color: #a5b8dd; font-size: 12px; line-height: 1.45; }
      .button-feedback__cancel { display: none; border: 0; background: transparent; color: #89a8ff; cursor: pointer; }
      .button-shell[data-phase="confirm"] .md-button { background: linear-gradient(180deg, #ffd4dd 0%, #ff9bb0 100%); color: #5e1023; }
      .button-shell[data-phase="confirm"] .button-feedback__cancel { display: inline-flex; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div>
        <h1>Confirmation button requires a second click</h1>
        <p class="preview-copy">첫 클릭은 실행이 아니라 확인 상태 전환이다. 이때 `@confirmationNeeded`가 먼저 발생하고, 제한 시간 안에 다시 클릭해야 실제 `@buttonClicked`가 실행된다.</p>
      </div>
      <div id="button-demo"></div>
      <div class="preview-log" id="preview-log">Click the button once, then click again to confirm.</div>
    </div>
    <script src="../../../../../../preview_runtime.js"></script>
    <script>
      (() => {
        const payload = { label: "Delete report", confirmLabel: "Confirm delete", helperText: "Click once to arm confirmation", confirmHelperText: "Click again within 3s to execute" };
        document.getElementById("button-demo").innerHTML = `
          <div class="button-shell" data-phase="idle">
            <button class="md-button" type="button" aria-label="${payload.label}" data-phase="idle"><span class="md-button__label">${payload.label}</span></button>
            <div class="button-feedback">
              <span class="button-feedback__hint">${payload.helperText}</span>
              <button class="button-feedback__cancel" type="button">Cancel</button>
            </div>
          </div>
        `;
        const log = document.getElementById("preview-log");
        const instance = { id: "button-demo", appendElement: document.getElementById("button-demo"), confirmationTimeout: 3000, _confirmTimer: null, _confirmationState: false, _buttonMeta: payload };
        instance.cssSelectors = { shell: ".button-shell", button: ".md-button", label: ".md-button__label", helper: ".button-feedback__hint", cancel: ".button-feedback__cancel" };
        instance.applyConfirmationState = function () { const shell = this.appendElement.querySelector(this.cssSelectors.shell); const button = this.appendElement.querySelector(this.cssSelectors.button); const label = this.appendElement.querySelector(this.cssSelectors.label); const helper = this.appendElement.querySelector(this.cssSelectors.helper); shell.dataset.phase = "confirm"; button.dataset.phase = "confirm"; label.textContent = this._buttonMeta.confirmLabel; helper.textContent = this._buttonMeta.confirmHelperText; button.setAttribute("aria-label", this._buttonMeta.confirmLabel); };
        instance.resetConfirmationState = function () { if (this._confirmTimer) clearTimeout(this._confirmTimer); this._confirmTimer = null; this._confirmationState = false; const shell = this.appendElement.querySelector(this.cssSelectors.shell); const button = this.appendElement.querySelector(this.cssSelectors.button); const label = this.appendElement.querySelector(this.cssSelectors.label); const helper = this.appendElement.querySelector(this.cssSelectors.helper); shell.dataset.phase = "idle"; button.dataset.phase = "idle"; label.textContent = this._buttonMeta.label; helper.textContent = this._buttonMeta.helperText; button.setAttribute("aria-label", this._buttonMeta.label); };
        instance.enterConfirmationState = function (event) { this._confirmationState = true; this.applyConfirmationState(); this._confirmTimer = setTimeout(() => this.resetConfirmationState(), this.confirmationTimeout); Weventbus.emit("@confirmationNeeded", { event, targetInstance: this, response: { label: this._buttonMeta.label, timeout: this.confirmationTimeout } }); };
        instance.confirmAction = function (event) { Weventbus.emit("@buttonClicked", { event, targetInstance: this, response: { label: this._buttonMeta.label, confirmed: true } }); this.resetConfirmationState(); };
        const button = instance.appendElement.querySelector(instance.cssSelectors.button);
        const cancel = instance.appendElement.querySelector(instance.cssSelectors.cancel);
        button.addEventListener("click", (event) => { event.preventDefault(); if (instance._confirmationState) instance.confirmAction(event); else instance.enterConfirmationState(event); });
        cancel.addEventListener("click", (event) => { event.preventDefault(); instance.resetConfirmationState(); log.textContent = "event: cancel\nmeaning: confirmation state reset."; });
        Wkit.onEventBusHandlers({
          "@confirmationNeeded": ({ response }) => { log.textContent = `event: @confirmationNeeded\nlabel: ${response?.label || ""}\ntimeout: ${response?.timeout || 0}ms\nmeaning: waiting for second click.`; },
          "@buttonClicked": ({ response }) => { log.textContent = `event: @buttonClicked\nlabel: ${response?.label || ""}\nconfirmed: ${String(response?.confirmed)}\nmeaning: second click executed the action.`; },
        });
        instance.resetConfirmationState();
      })();
    </script>
  </body>
</html>
