<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><title>Buttons/Advanced/confirmation — 03_editorial</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6efe4;color:#4a3b2c;font-family:Georgia,serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(255,251,244,.8);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#6a5741}</style></head><body><div class="preview-shell"><h1>confirmation Button</h1><div id="demo"></div><div class="preview-log" id="log">Publish swaps the copy inline before commit.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/03_editorial.html","../styles/03_editorial.css");const button=document.querySelector("#demo .button");const label=button.querySelector(".button__label");const log=document.getElementById("log");let state="idle";let timer=null;button.addEventListener("click",()=>{if(state==="idle"){state="confirming";button.dataset.confirmationState="confirming";label.textContent="Confirm publish?";const start=performance.now();const tick=()=>{if(state!=="confirming")return;button.style.setProperty("--confirmation-progress",String(Math.min(1,(performance.now()-start)/4000)));requestAnimationFrame(tick)};requestAnimationFrame(tick);timer=setTimeout(()=>{state="idle";button.dataset.confirmationState="idle";label.textContent="Publish";button.style.setProperty("--confirmation-progress","0");log.textContent="event: @confirmationCancelled\nreason: timeout"},4000);log.textContent="event: @confirmationNeeded\ntimeoutMs: 4000";return}clearTimeout(timer);state="idle";button.dataset.confirmationState="idle";label.textContent="Publish";button.style.setProperty("--confirmation-progress","0");log.textContent="event: @buttonClicked\naction: publish story"});})();</script></body></html>
