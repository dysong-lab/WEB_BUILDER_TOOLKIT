<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons/Advanced/confirmation — 02_material</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #eef3f8; color: #203247; font-family: "Roboto", sans-serif; padding: 36px; }
      .preview-shell { display: flex; flex-direction: column; gap: 18px; max-width: 940px; margin: 0 auto; }
      .preview-copy { color: #516478; line-height: 1.6; }
      .preview-log { min-height: 132px; padding: 16px 18px; border-radius: 18px; background: rgba(255,255,255,0.9); color: #445a72; font-family: "Roboto Mono", monospace; font-size: 12px; white-space: pre-line; border: 1px solid rgba(0,90,193,0.08); }
      .button-shell { display: inline-flex; flex-direction: column; align-items: stretch; gap: 14px; min-width: 280px; min-height: 154px; padding: 24px; border-radius: 28px; background: linear-gradient(180deg, #f7fbff 0%, #eef3f9 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 30px rgba(98,121,145,0.16); }
      .md-button { min-width: 134px; min-height: 42px; padding: 0 22px; border: 0; border-radius: 18px; background: #005ac1; color: #fff; cursor: pointer; }
      .button-feedback { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .button-feedback__hint { color: #506176; font-size: 12px; line-height: 1.45; }
      .button-feedback__cancel { display: none; border: 0; background: transparent; color: #005ac1; cursor: pointer; }
      .button-shell[data-phase="confirm"] .md-button { background: #bf123b; }
      .button-shell[data-phase="confirm"] .button-feedback__cancel { display: inline-flex; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div>
        <h1>Material confirmation button</h1>
        <p class="preview-copy">첫 클릭은 confirm state, 두 번째 클릭은 실제 실행이다. modal 없이 가벼운 확인 UX가 필요한 버튼 예시다.</p>
      </div>
      <div id="button-demo"></div>
      <div class="preview-log" id="preview-log">Click the button once, then click again to confirm.</div>
    </div>
    <script src="../../../../../../preview_runtime.js"></script>
    <script>
      (() => {
        const payload = { label: "Create backup", confirmLabel: "Confirm backup", helperText: "Click once to arm confirmation", confirmHelperText: "Click again within 3s to execute" };
        document.getElementById("button-demo").innerHTML = `<div class="button-shell" data-phase="idle"><button class="md-button" type="button" aria-label="${payload.label}" data-phase="idle"><span class="md-button__label">${payload.label}</span></button><div class="button-feedback"><span class="button-feedback__hint">${payload.helperText}</span><button class="button-feedback__cancel" type="button">Cancel</button></div></div>`;
        const log = document.getElementById("preview-log");
        const instance = { id: "button-demo", appendElement: document.getElementById("button-demo"), confirmationTimeout: 3000, _confirmTimer: null, _confirmationState: false, _buttonMeta: payload };
        instance.cssSelectors = { shell: ".button-shell", button: ".md-button", label: ".md-button__label", helper: ".button-feedback__hint", cancel: ".button-feedback__cancel" };
        instance.applyConfirmationState = function () { const shell=this.appendElement.querySelector(this.cssSelectors.shell); const button=this.appendElement.querySelector(this.cssSelectors.button); const label=this.appendElement.querySelector(this.cssSelectors.label); const helper=this.appendElement.querySelector(this.cssSelectors.helper); shell.dataset.phase="confirm"; button.dataset.phase="confirm"; label.textContent=this._buttonMeta.confirmLabel; helper.textContent=this._buttonMeta.confirmHelperText; };
        instance.resetConfirmationState = function () { if (this._confirmTimer) clearTimeout(this._confirmTimer); this._confirmTimer=null; this._confirmationState=false; const shell=this.appendElement.querySelector(this.cssSelectors.shell); const button=this.appendElement.querySelector(this.cssSelectors.button); const label=this.appendElement.querySelector(this.cssSelectors.label); const helper=this.appendElement.querySelector(this.cssSelectors.helper); shell.dataset.phase="idle"; button.dataset.phase="idle"; label.textContent=this._buttonMeta.label; helper.textContent=this._buttonMeta.helperText; };
        instance.enterConfirmationState = function (event) { this._confirmationState=true; this.applyConfirmationState(); this._confirmTimer=setTimeout(()=>this.resetConfirmationState(), this.confirmationTimeout); Weventbus.emit("@confirmationNeeded", { event, targetInstance:this, response:{ label:this._buttonMeta.label, timeout:this.confirmationTimeout } }); };
        instance.confirmAction = function (event) { Weventbus.emit("@buttonClicked", { event, targetInstance:this, response:{ label:this._buttonMeta.label, confirmed:true } }); this.resetConfirmationState(); };
        const button = instance.appendElement.querySelector(instance.cssSelectors.button);
        const cancel = instance.appendElement.querySelector(instance.cssSelectors.cancel);
        button.addEventListener("click", (event) => { event.preventDefault(); if (instance._confirmationState) instance.confirmAction(event); else instance.enterConfirmationState(event); });
        cancel.addEventListener("click", (event) => { event.preventDefault(); instance.resetConfirmationState(); log.textContent = "event: cancel\nmeaning: confirmation state reset."; });
        Wkit.onEventBusHandlers({ "@confirmationNeeded": ({ response }) => { log.textContent = `event: @confirmationNeeded\nlabel: ${response?.label || ""}\ntimeout: ${response?.timeout || 0}ms\nmeaning: waiting for second click.`; }, "@buttonClicked": ({ response }) => { log.textContent = `event: @buttonClicked\nlabel: ${response?.label || ""}\nconfirmed: ${String(response?.confirmed)}\nmeaning: second click executed the action.`; } });
        instance.resetConfirmationState();
      })();
    </script>
  </body>
</html>
