<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><title>Buttons/Advanced/longPress — 02_material</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f3eee7;color:#312719;font-family:"Roboto",sans-serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(255,255,255,.72);box-shadow:0 12px 28px rgba(117,95,67,.08);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#5f4c35}</style></head><body><div class="preview-shell"><h1>longPress Button</h1><div id="demo"></div><div class="preview-log" id="log">Hold reveals the long-press path without firing the click.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/02_material.html","../styles/02_material.css");const button=document.querySelector("#demo .button");const log=document.getElementById("log");let timer=null,start=0,suppress=false;const tick=()=>{if(!button.classList.contains("button--pressing"))return;button.style.setProperty("--longpress-progress",String(Math.min(1,(performance.now()-start)/500)));requestAnimationFrame(tick)};button.addEventListener("pointerdown",()=>{button.classList.add("button--pressing");start=performance.now();requestAnimationFrame(tick);timer=setTimeout(()=>{suppress=true;button.classList.add("button--longpressed");button.classList.remove("button--pressing");button.style.setProperty("--longpress-progress","0");log.textContent="event: @buttonLongPressed\ndurationMs: 500";setTimeout(()=>button.classList.remove("button--longpressed"),180)},500)});["pointerup","pointerleave","pointercancel"].forEach((type)=>button.addEventListener(type,()=>{clearTimeout(timer);if(button.classList.contains("button--pressing")){button.classList.remove("button--pressing");button.style.setProperty("--longpress-progress","0")}}));button.addEventListener("click",(e)=>{if(suppress){e.preventDefault();e.stopImmediatePropagation();suppress=false;return}log.textContent="event: @buttonClicked\nmeaning: short press"} ,true)})();</script></body></html>
