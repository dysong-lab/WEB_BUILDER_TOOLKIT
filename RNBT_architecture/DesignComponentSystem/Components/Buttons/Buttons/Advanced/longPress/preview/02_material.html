<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons/Advanced/longPress — 02_material</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #eef3f8;
        color: #203247;
        font-family: "Roboto", sans-serif;
        padding: 36px;
      }
      .preview-shell { display: flex; flex-direction: column; gap: 18px; max-width: 940px; margin: 0 auto; }
      .preview-copy { color: #516478; line-height: 1.6; }
      .preview-grid { display: flex; gap: 18px; flex-wrap: wrap; }
      .preview-log {
        min-height: 132px; padding: 16px 18px; border-radius: 18px;
        background: rgba(255, 255, 255, 0.9); color: #445a72;
        font-family: "Roboto Mono", monospace; font-size: 12px; white-space: pre-line;
        border: 1px solid rgba(0, 90, 193, 0.08);
      }
      .button-shell {
        display: inline-flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 14px;
        min-width: 260px;
        min-height: 150px;
        padding: 24px;
        border-radius: 28px;
        background: linear-gradient(180deg, #f7fbff 0%, #eef3f9 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 10px 30px rgba(98, 121, 145, 0.16);
      }
      .md-button {
        min-width: 124px;
        min-height: 42px;
        padding: 0 22px;
        border: 0;
        border-radius: 18px;
        background: #005ac1;
        color: #fff;
        box-shadow: 0 6px 16px rgba(0, 90, 193, 0.24);
        cursor: pointer;
      }
      .md-button__label {
        display: inline-block;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "Roboto", sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.1px;
      }
      .button-feedback { display: flex; flex-direction: column; gap: 7px; }
      .button-feedback__track {
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(0, 55, 111, 0.12);
      }
      .button-feedback__progress {
        display: block;
        width: 100%;
        height: 100%;
        transform-origin: left center;
        transform: scaleX(0);
        background: linear-gradient(90deg, #4ea3ff 0%, #005ac1 100%);
        transition: transform 80ms linear;
      }
      .button-feedback__hint {
        color: #506176;
        font-family: "Roboto", sans-serif;
        font-size: 12px;
        line-height: 1.4;
      }
      .button-shell[data-phase="completed"] .md-button { background: #18764a; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div>
        <h1>Material long press button</h1>
        <p class="preview-copy">500ms hold가 완료되면 클릭과 분리된 long press 이벤트를 발행한다. quick tap은 일반 액션, deliberate hold는 보호된 액션으로 분리하는 예시다.</p>
      </div>
      <div class="preview-grid">
        <div id="button-demo"></div>
      </div>
      <div class="preview-log" id="preview-log">Hold one of the buttons for 500ms.</div>
    </div>
    <script src="../../../../../../preview_runtime.js"></script>
    <script>
      (async () => {
        const createComponentHtml = (label) => `
          <div class="button-shell" data-phase="idle">
            <button class="md-button" type="button" aria-label="${label}" data-phase="idle">
              <span class="md-button__label">${label}</span>
            </button>
            <div class="button-feedback">
              <div class="button-feedback__track">
                <span class="button-feedback__progress"></span>
              </div>
              <span class="button-feedback__hint">Hold for 500ms</span>
            </div>
          </div>
        `;
        const payload = { label: "Create backup" };
        document.getElementById("button-demo").innerHTML = createComponentHtml(payload.label);
        const createInstance = (id) => {
          const instance = { id, appendElement: document.getElementById(id), longPressDuration: 500, _longPressTimer: null, _progressRaf: null, _pressStartAt: 0, _longPressTriggered: false };
          instance.cssSelectors = { shell: ".button-shell", button: ".md-button", label: ".md-button__label", progress: ".button-feedback__progress", hint: ".button-feedback__hint" };
          instance.renderButtonInfo = function (data = {}) { const button = this.appendElement.querySelector(this.cssSelectors.button); const label = this.appendElement.querySelector(this.cssSelectors.label); if (!button || !label) return; const nextLabel = data?.label == null ? "" : String(data.label); label.textContent = nextLabel; button.setAttribute("aria-label", nextLabel); };
          instance.setProgressState = function (progress = 0, phase = "idle") { const shell = this.appendElement.querySelector(this.cssSelectors.shell); const button = this.appendElement.querySelector(this.cssSelectors.button); const bar = this.appendElement.querySelector(this.cssSelectors.progress); const hint = this.appendElement.querySelector(this.cssSelectors.hint); if (!shell || !button || !bar || !hint) return; const clamped = Math.max(0, Math.min(1, progress)); shell.dataset.phase = phase; button.dataset.phase = phase; bar.style.transform = `scaleX(${clamped})`; hint.textContent = phase === "holding" ? `Hold ${Math.round(clamped * this.longPressDuration)} / ${this.longPressDuration}ms` : phase === "completed" ? "Long press complete" : `Hold for ${this.longPressDuration}ms`; };
          instance.cancelLongPress = function () { if (this._longPressTimer) clearTimeout(this._longPressTimer); if (this._progressRaf) cancelAnimationFrame(this._progressRaf); this._longPressTimer = null; this._progressRaf = null; this._pressStartAt = 0; this._longPressTriggered = false; this.setProgressState(0, "idle"); };
          instance.completeLongPress = function (event) { if (this._longPressTriggered) return; this._longPressTriggered = true; this.setProgressState(1, "completed"); Weventbus.emit("@buttonLongPressed", { event, targetInstance: this, response: { holdDuration: this.longPressDuration, label: this.appendElement.querySelector(this.cssSelectors.label)?.textContent?.trim() || "" } }); };
          instance.startLongPress = function (event) { this.cancelLongPress(); this._pressStartAt = performance.now(); this.setProgressState(0, "holding"); const tick = () => { const elapsed = performance.now() - this._pressStartAt; this.setProgressState(elapsed / this.longPressDuration, "holding"); if (!this._longPressTriggered && elapsed < this.longPressDuration) this._progressRaf = requestAnimationFrame(tick); }; this._progressRaf = requestAnimationFrame(tick); this._longPressTimer = setTimeout(() => { this.completeLongPress(event); this._longPressTimer = null; }, this.longPressDuration); };
          const button = instance.appendElement.querySelector(instance.cssSelectors.button);
          button.addEventListener("pointerdown", (event) => instance.startLongPress(event));
          ["pointerup", "pointerleave", "pointercancel"].forEach((name) => button.addEventListener(name, () => { if (!instance._longPressTriggered) instance.cancelLongPress(); }));
          button.addEventListener("click", (event) => { if (instance._longPressTriggered) { event.preventDefault(); event.stopImmediatePropagation(); instance.cancelLongPress(); } }, true);
          instance.customEvents = { click: { [instance.cssSelectors.button]: "@buttonClicked" } };
          Wkit.bindEvents(instance, instance.customEvents);
          instance.setProgressState(0, "idle");
          return instance;
        };
        const instance = createInstance("button-demo");
        const log = document.getElementById("preview-log");
        instance.renderButtonInfo(payload);
        Wkit.onEventBusHandlers({
          "@buttonClicked": ({ targetInstance }) => { log.textContent = `event: @buttonClicked\nbutton: ${targetInstance.id}\nmeaning: quick tap kept the primary action.`; },
          "@buttonLongPressed": ({ targetInstance, response }) => { log.textContent = `event: @buttonLongPressed\nbutton: ${targetInstance.id}\nlabel: ${response?.label || ""}\nhold: ${response?.holdDuration || 0}ms\nmeaning: protected hold action fired.`; setTimeout(() => targetInstance?.setProgressState?.(0, "idle"), 700); },
        });
      })();
    </script>
  </body>
</html>
