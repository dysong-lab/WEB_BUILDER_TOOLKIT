<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons/Advanced/holdToConfirm — 04_operational</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #03090d;
        color: #b9ffff;
        font-family: "IBM Plex Mono", monospace;
        padding: 32px;
      }
      .preview-shell { max-width: 940px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }
      .preview-head { display: flex; flex-direction: column; gap: 10px; }
      .preview-kicker { font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase; color: #60dfe5; }
      .preview-copy { color: #7ec7cc; line-height: 1.7; max-width: 760px; }
      .ops-panel {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 18px;
        padding: 20px;
        border: 1px solid rgba(0, 229, 255, 0.16);
        background: linear-gradient(180deg, rgba(8, 16, 20, 0.96) 0%, rgba(4, 9, 11, 0.96) 100%);
      }
      .button-shell {
        display: inline-flex; flex-direction: column; align-items: stretch; justify-content: center;
        gap: 12px; min-width: 260px; min-height: 150px; padding: 24px; border-radius: 24px;
        background:
          radial-gradient(circle at top, rgba(0, 229, 255, 0.16), transparent 38%),
          linear-gradient(180deg, #081014 0%, #04090b 100%);
        box-shadow: inset 0 1px 0 rgba(120, 244, 255, 0.08);
      }
      .md-button {
        min-width: 124px; min-height: 42px; padding: 0 20px; border: 1px solid rgba(0, 229, 255, 0.38);
        border-radius: 10px; background: linear-gradient(180deg, rgba(5, 35, 40, 0.94) 0%, rgba(4, 21, 24, 0.94) 100%);
        color: #bfffff; cursor: pointer;
      }
      .md-button__label {
        font-size: 13px; font-weight: 600; letter-spacing: 0.45px; text-transform: uppercase;
      }
      .button-feedback { display: flex; flex-direction: column; gap: 6px; }
      .button-feedback__track { height: 7px; border-radius: 999px; overflow: hidden; background: rgba(0, 229, 255, 0.12); }
      .button-feedback__progress {
        display: block; width: 100%; height: 100%; transform-origin: left center; transform: scaleX(0);
        background: linear-gradient(90deg, #00d5ff 0%, #7ffff3 100%); transition: transform 80ms linear;
      }
      .button-feedback__hint { color: #7cd8dd; font-size: 11px; line-height: 1.4; text-transform: uppercase; }
      .button-shell[data-phase="completed"] .md-button {
        border-color: rgba(127, 255, 243, 0.85);
        color: #041215;
        background: linear-gradient(180deg, #7fffd8 0%, #58d9be 100%);
      }
      .ops-log {
        display: flex; flex-direction: column; gap: 14px; padding: 14px 16px;
        border: 1px solid rgba(0, 229, 255, 0.16); background: rgba(2, 16, 20, 0.82);
      }
      .ops-line { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; }
      .ops-line span { color: #6ab9bf; }
      .ops-line strong { color: #d3ffff; font-weight: 600; }
      .preview-log { min-height: 110px; color: #d3ffff; white-space: pre-line; }
      @media (max-width: 760px) { .ops-panel { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div class="preview-head">
        <span class="preview-kicker">Persona D / Operational Dark</span>
        <h1>Command stays inert until the full hold completes</h1>
        <p class="preview-copy">운영 콘솔에서는 짧은 클릭을 완전히 버리고, 완료된 hold만 명령으로 인정한다. 누르는 동안 진행률이 쌓이고, 조기 해제 시 즉시 폐기된다.</p>
      </div>
      <div class="ops-panel">
        <div class="button-shell" data-phase="idle">
          <button class="md-button" type="button" aria-label="Shutdown line" data-phase="idle">
            <span class="md-button__label">Shutdown line</span>
          </button>
          <div class="button-feedback">
            <div class="button-feedback__track"><span class="button-feedback__progress"></span></div>
            <span class="button-feedback__hint">Hold for 1500ms to confirm</span>
          </div>
        </div>
        <div class="ops-log">
          <div class="ops-line"><span>COMMAND</span><strong>SHUTDOWN LINE</strong></div>
          <div class="ops-line"><span>TAP</span><strong>IGNORED</strong></div>
          <div class="ops-line"><span>HOLD COMPLETE</span><strong>@HOLDCONFIRMED</strong></div>
          <div class="preview-log" id="preview-log">Press and keep holding the button for 1500ms.</div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const holdDuration = 1500;
        const shell = document.querySelector(".button-shell");
        const button = document.querySelector(".md-button");
        const progress = document.querySelector(".button-feedback__progress");
        const hint = document.querySelector(".button-feedback__hint");
        const log = document.getElementById("preview-log");
        let pressStartAt = 0;
        let holdTimer = null;
        let progressRaf = null;
        let resetTimer = null;
        let holdLatched = false;

        const setPhase = (phase, amount = 0) => {
          const clamped = Math.max(0, Math.min(1, amount));
          shell.dataset.phase = phase;
          button.dataset.phase = phase;
          progress.style.transform = `scaleX(${clamped})`;
          hint.textContent =
            phase === "holding"
              ? `Hold ${Math.round(clamped * holdDuration)} / ${holdDuration}ms`
              : phase === "completed"
                ? "Confirmed"
                : `Hold for ${holdDuration}ms to confirm`;
        };

        const resetHold = () => {
          clearTimeout(holdTimer);
          clearTimeout(resetTimer);
          cancelAnimationFrame(progressRaf);
          holdTimer = null;
          resetTimer = null;
          progressRaf = null;
          pressStartAt = 0;
          holdLatched = false;
          setPhase("idle", 0);
        };

        const tick = () => {
          if (!pressStartAt || holdLatched) return;
          const elapsed = performance.now() - pressStartAt;
          setPhase("holding", elapsed / holdDuration);
          if (elapsed < holdDuration) progressRaf = requestAnimationFrame(tick);
        };

        button.addEventListener("pointerdown", () => {
          resetHold();
          pressStartAt = performance.now();
          setPhase("holding", 0);
          progressRaf = requestAnimationFrame(tick);
          holdTimer = window.setTimeout(() => {
            holdLatched = true;
            setPhase("completed", 1);
            log.textContent = "event: @holdConfirmed\ncommand: SHUTDOWN LINE\nholdMs: 1500\nmeaning: operator held long enough to arm the command.";
          }, holdDuration);
        });

        ["pointerleave", "pointercancel"].forEach((name) =>
          button.addEventListener(name, resetHold),
        );
        button.addEventListener("pointerup", () => {
          if (holdLatched) {
            resetTimer = window.setTimeout(resetHold, 220);
            return;
          }
          log.textContent = "event: none\nmeaning: incomplete hold was discarded.";
          resetHold();
        });
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopImmediatePropagation();
        }, true);
      })();
    </script>
  </body>
</html>
