<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><title>Buttons/Advanced/holdToConfirm — 04_operational</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#030910;color:#d9faff;font-family:"IBM Plex Mono",monospace;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);white-space:pre-line;font-size:12px;line-height:1.6;color:#92b8c2}</style></head><body><div class="preview-shell"><h1>holdToConfirm Button</h1><div id="demo"></div><div class="preview-log" id="log">Execution only occurs after the cyan fill completes.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/04_operational.html","../styles/04_operational.css");const button=document.querySelector("#demo .button");const log=document.getElementById("log");let timer=null,start=0;const tick=()=>{if(button.dataset.holdState!=="holding")return;button.style.setProperty("--hold-progress",String(Math.min(1,(performance.now()-start)/1500)));requestAnimationFrame(tick)};button.addEventListener("pointerdown",()=>{button.dataset.holdState="holding";start=performance.now();requestAnimationFrame(tick);timer=setTimeout(()=>{button.dataset.holdState="confirmed";log.textContent="event: @holdConfirmed\nholdMs: 1500";setTimeout(()=>{button.dataset.holdState="idle";button.style.setProperty("--hold-progress","0")},200)},1500)});["pointerup","pointerleave","pointercancel"].forEach((type)=>button.addEventListener(type,()=>{clearTimeout(timer);if(button.dataset.holdState!=="confirmed"){button.dataset.holdState="idle";button.style.setProperty("--hold-progress","0")}}));button.addEventListener("click",(e)=>{e.preventDefault();e.stopImmediatePropagation()},true)})();</script></body></html>
