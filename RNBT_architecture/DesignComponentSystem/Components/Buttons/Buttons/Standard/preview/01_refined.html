<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons/Standard — 01_refined (Persona A)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #09111b;
        display: flex;
        justify-content: center;
        padding: 40px;
      }
      .preview-grid {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="preview-grid">
      <div id="button-primary"></div>
      <div id="button-secondary"></div>
      <div id="button-long"></div>
    </div>

    <script src="../../../../../preview_runtime.js"></script>
    <script>
      (async () => {
        const previewIds = [
          "button-primary",
          "button-secondary",
          "button-long",
        ];
        await Promise.all(
          previewIds.map((id) =>
            loadComponentAssets(
              id,
              "../views/01_refined.html",
              "../styles/01_refined.css",
            ),
          ),
        );

        const createButtonInstance = (id) => {
          const instance = { id, appendElement: document.getElementById(id) };

          instance.cssSelectors = {
            button: ".md-button",
            label: ".md-button__label",
          };

          instance.renderButtonInfo = function (data = {}) {
            const button = this.appendElement.querySelector(
              this.cssSelectors.button,
            );
            const label = this.appendElement.querySelector(
              this.cssSelectors.label,
            );
            if (!button || !label) return;

            const nextLabel =
              data?.label === null || data?.label === undefined
                ? ""
                : String(data.label);

            label.textContent = nextLabel;
            button.setAttribute("aria-label", nextLabel);
          };

          instance.customEvents = {
            click: {
              [instance.cssSelectors.button]: "@buttonClicked",
            },
          };
          Wkit.bindEvents(instance, instance.customEvents);

          return instance;
        };

        const primary = createButtonInstance("button-primary");
        const secondary = createButtonInstance("button-secondary");
        const long = createButtonInstance("button-long");

        Wkit.onEventBusHandlers({
          "@buttonClicked": ({ targetInstance }) => {
            const label =
              targetInstance?.appendElement?.querySelector(
                ".md-button__label",
              )?.textContent;
            console.log("[Preview] Button clicked:", targetInstance?.id, label);
          },
        });

        primary.renderButtonInfo({ label: "Save" });
        secondary.renderButtonInfo({ label: "Create report" });
        long.renderButtonInfo({ label: "Open monitoring workspace" });
      })();
    </script>
  </body>
</html>
