<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FABMenu/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="fab-menu-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('fab-menu-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'fab-menu', appendElement: document.getElementById('fab-menu-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            menu:      '.fab-menu',
            trigger:   '.fab-menu__trigger',
            container: '.fab-menu__list',
            template:  '#fab-menu-item-template',
            item:      '.fab-menu__item',
            id:        '.fab-menu__item',
            icon:      '.fab-menu__item-icon',
            label:     '.fab-menu__item-label'
        },
        datasetAttrs: { id: 'id' }
    });

    instance.toggleMenu = function() {
        const menu = instance.appendElement.querySelector(instance.listRender.cssSelectors.menu);
        if (menu) menu.classList.toggle('is-open');
    };

    instance.subscriptions = { fabMenuItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.trigger]: 'toggleMenu',
            [instance.listRender.cssSelectors.item]:    '@fabMenuItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@fabMenuItemClicked': ({ event }) => {
            const item = event.target.closest('.fab-menu__item');
            const id = item?.getAttribute('data-id') || '?';
            const label = item?.querySelector('.fab-menu__item-label')?.textContent || '?';
            log(`fabMenuItemClicked "${id}" — ${label}`);
        }
    });

    instance.listRender.renderData({ response: [
        { id: 'share',    icon: 'share',    label: 'Share' },
        { id: 'download', icon: 'download', label: 'Download' },
        { id: 'edit',     icon: 'edit',     label: 'Edit' },
        { id: 'print',    icon: 'print',    label: 'Print' }
    ]});
})();
</script>
</body>
</html>
