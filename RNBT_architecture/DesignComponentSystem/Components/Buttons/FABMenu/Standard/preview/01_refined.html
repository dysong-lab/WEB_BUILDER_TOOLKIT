<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>FABMenu/Standard — 01_refined</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"><script src="../../../../../preview_runtime.js"></script><script src="../../../../../Mixins/ListRenderMixin.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#09111b;display:flex;justify-content:center;padding:40px}.preview-grid{display:flex;gap:24px;flex-wrap:wrap}</style></head><body><div class="preview-grid"><div id="menu-1"></div><div id="menu-2"></div><div id="menu-3"></div></div><script>(async()=>{const ids=['menu-1','menu-2','menu-3'];await Promise.all(ids.map(id=>loadComponentAssets(id,'../views/01_refined.html','../styles/01_refined.css')));const createInstance=id=>{const instance={id,appendElement:document.getElementById(id)};applyListRenderMixin(instance,{cssSelectors:{root:'.fab-menu',trigger:'.fab-menu__trigger',triggerIcon:'.fab-menu__trigger-icon',triggerLabel:'.fab-menu__trigger-label',container:'.fab-menu__list',template:'#fab-menu-item-template',item:'.fab-menu__item',id:'.fab-menu__item',icon:'.fab-menu__item-icon',label:'.fab-menu__item-label'},itemKey:'id',datasetAttrs:{id:'id'}});instance.renderFabMenu=function(data={}){const root=this.appendElement.querySelector(this.listRender.cssSelectors.root);const trigger=this.appendElement.querySelector(this.listRender.cssSelectors.trigger);const triggerIcon=this.appendElement.querySelector(this.listRender.cssSelectors.triggerIcon);const triggerLabel=this.appendElement.querySelector(this.listRender.cssSelectors.triggerLabel);if(!root||!trigger||!triggerIcon||!triggerLabel)return;triggerIcon.textContent=data?.triggerIcon||'add';triggerLabel.textContent=data?.triggerLabel||'Create';trigger.setAttribute('aria-label',data?.triggerLabel||'Create');root.dataset.open='false';this.listRender.renderData({response:Array.isArray(data?.items)?data.items:[]});};instance.toggleMenu=function(force){const root=this.appendElement.querySelector(this.listRender.cssSelectors.root);const nextOpen=typeof force==='boolean'?force:root.dataset.open!=='true';root.dataset.open=nextOpen?'true':'false';};instance.customEvents={click:{[instance.listRender.cssSelectors.trigger]:'@fabMenuToggled',[instance.listRender.cssSelectors.item]:'@fabMenuItemClicked'}};Wkit.bindEvents(instance,instance.customEvents);return instance;};const a=createInstance('menu-1');const b=createInstance('menu-2');const c=createInstance('menu-3');Wkit.onEventBusHandlers({'@fabMenuToggled':({targetInstance})=>{targetInstance?.toggleMenu();console.log('[Preview] FABMenu toggled:',targetInstance?.id);},'@fabMenuItemClicked':({targetInstance,event})=>{const el=event.target.closest('.fab-menu__item');targetInstance?.toggleMenu(false);console.log('[Preview] FABMenu item clicked:',targetInstance?.id,el?.dataset.id);}});a.renderFabMenu({triggerIcon:'add',triggerLabel:'Create',items:[{id:'draft',icon:'edit_note',label:'Draft'},{id:'scene',icon:'animation',label:'Scene'}]});b.renderFabMenu({triggerIcon:'bolt',triggerLabel:'Sequence',items:[{id:'run',icon:'play_arrow',label:'Run'},{id:'queue',icon:'dynamic_feed',label:'Queue'}]});c.renderFabMenu({triggerIcon:'hub',triggerLabel:'Network',items:[{id:'edge',icon:'lan',label:'Edge'},{id:'sync',icon:'sync',label:'Sync'},{id:'link',icon:'link',label:'Link'}]});})();</script></body></html>
