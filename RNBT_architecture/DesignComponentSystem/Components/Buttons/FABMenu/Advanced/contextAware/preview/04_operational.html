<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>FABMenu/Advanced/contextAware — 04_operational</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="../../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #030910; color: #d9faff; font-family: "IBM Plex Mono", monospace; padding: 36px; }
      .preview-shell { max-width: 920px; margin: 0 auto; display: grid; gap: 18px; }
      .context-switches { display: flex; gap: 10px; flex-wrap: wrap; }
      .context-button { border: 1px solid rgba(0, 229, 255, 0.18); background: rgba(5, 35, 40, 0.62); color: #9cefff; padding: 8px 12px; border-radius: 999px; cursor: pointer; }
      .preview-log { min-height: 112px; padding: 16px; border-radius: 18px; background: rgba(0, 229, 255, 0.04); border: 1px solid rgba(0, 229, 255, 0.12); white-space: pre-line; font-size: 12px; line-height: 1.6; color: #92b8c2; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>contextAware FABMenu</h1>
      <div class="context-switches">
        <button class="context-button" data-context="idle">idle</button>
        <button class="context-button" data-context="running">running</button>
        <button class="context-button" data-context="alert">alert</button>
      </div>
      <div id="demo"></div>
      <div class="preview-log" id="log">Context drives the menu accent from cyan to amber to red.</div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("demo", "../views/04_operational.html", "../styles/04_operational.css");
        const root = document.getElementById("demo").firstElementChild;
        const log = document.getElementById("log");
        const configs = {
          idle: [{ actionId: "inspect", icon: "search", label: "INSPECT" }, { actionId: "queue", icon: "schedule", label: "QUEUE" }],
          running: [{ actionId: "pause", icon: "pause", label: "PAUSE" }, { actionId: "reroute", icon: "alt_route", label: "REROUTE" }, { actionId: "clone", icon: "content_copy", label: "CLONE" }],
          alert: [{ actionId: "ack", icon: "notification_important", label: "ACK" }, { actionId: "shutdown", icon: "power_settings_new", label: "SHUTDOWN" }, { actionId: "dispatch", icon: "campaign", label: "DISPATCH" }],
        };
        const renderContext = (contextKey) => {
          root.dataset.contextKey = contextKey;
          root.querySelector(".fab-menu__list").innerHTML = configs[contextKey].map((item) => `<button class="fab-menu__item" type="button" data-action-id="${item.actionId}"><span class="fab-menu__item-icon material-symbols-outlined">${item.icon}</span><span class="fab-menu__item-label">${item.label}</span></button>`).join("");
          log.textContent = `topic: menuByContext\ncontextKey: ${contextKey}\nitems: ${configs[contextKey].map((item) => item.actionId).join(", ")}`;
        };
        renderContext("idle");
        document.querySelectorAll(".context-button").forEach((button) => button.addEventListener("click", () => renderContext(button.dataset.context)));
        root.addEventListener("click", (event) => {
          const trigger = event.target.closest(".fab-menu__trigger");
          if (trigger) {
            root.dataset.open = root.dataset.open === "true" ? "false" : "true";
            return;
          }
          const item = event.target.closest(".fab-menu__item");
          if (item) {
            log.textContent = `event: @fabMenuActionClicked\ncontextKey: ${root.dataset.contextKey}\nactionId: ${item.dataset.actionId}`;
            root.dataset.open = "false";
          }
        });
      })();
    </script>
  </body>
</html>
