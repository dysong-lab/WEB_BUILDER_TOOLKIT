<!doctype html>
<html lang="ko">
  <head><meta charset="UTF-8" /><title>ExtendedFABs/Advanced/speedDial — 03_editorial</title><script src="../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6efe4;color:#4b3e33;font-family:"Georgia",serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(255,255,255,.55);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#615243}</style></head>
  <body><div class="preview-shell"><h1>speedDial Extended FAB</h1><div id="demo"></div><div class="preview-log" id="log">Share reveals related editorial actions.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/03_editorial.html","../styles/03_editorial.css");const root=document.getElementById("demo").firstElementChild;const log=document.getElementById("log");root.querySelector(".speed-dial__items").innerHTML=`<button class="speed-dial__item" type="button" data-action-id="mail"><span class="speed-dial__item-icon material-symbols-outlined">mail</span><span class="speed-dial__item-label">Mail</span></button><button class="speed-dial__item" type="button" data-action-id="link"><span class="speed-dial__item-icon material-symbols-outlined">link</span><span class="speed-dial__item-label">Link</span></button><button class="speed-dial__item" type="button" data-action-id="export"><span class="speed-dial__item-icon material-symbols-outlined">ios_share</span><span class="speed-dial__item-label">Export</span></button>`;root.addEventListener("click",e=>{const main=e.target.closest(".extended-fab");if(main){root.dataset.speedDialState=root.dataset.speedDialState==="open"?"closed":"open";return}const item=e.target.closest(".speed-dial__item");if(item){log.textContent=`event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;root.dataset.speedDialState="closed"}});document.addEventListener("click",e=>{if(root.dataset.speedDialState!=="open")return;if(root.contains(e.target))return;root.dataset.speedDialState="closed"},true);document.addEventListener("keydown",e=>{if(e.key==="Escape")root.dataset.speedDialState="closed"})})();</script></body>
</html>
