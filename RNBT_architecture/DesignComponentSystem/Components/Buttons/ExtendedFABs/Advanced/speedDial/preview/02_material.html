<!doctype html>
<html lang="ko">
  <head><meta charset="UTF-8" /><title>ExtendedFABs/Advanced/speedDial — 02_material</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" /><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fb;color:#223144;font-family:"Roboto",sans-serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:#fff;box-shadow:0 12px 24px rgba(113,131,160,.12);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#43546a}</style></head>
  <body><div class="preview-shell"><h1>speedDial Extended FAB</h1><div id="demo"></div><div class="preview-log" id="log">Create opens document tools.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/02_material.html","../styles/02_material.css");const root=document.getElementById("demo").firstElementChild;const log=document.getElementById("log");root.querySelector(".speed-dial__items").innerHTML=`<button class="speed-dial__item" type="button" data-action-id="doc"><span class="speed-dial__item-icon material-symbols-outlined">description</span><span class="speed-dial__item-label">Document</span></button><button class="speed-dial__item" type="button" data-action-id="sheet"><span class="speed-dial__item-icon material-symbols-outlined">table_chart</span><span class="speed-dial__item-label">Sheet</span></button><button class="speed-dial__item" type="button" data-action-id="slide"><span class="speed-dial__item-icon material-symbols-outlined">slideshow</span><span class="speed-dial__item-label">Slide</span></button>`;root.addEventListener("click",e=>{const main=e.target.closest(".extended-fab");if(main){root.dataset.speedDialState=root.dataset.speedDialState==="open"?"closed":"open";return}const item=e.target.closest(".speed-dial__item");if(item){log.textContent=`event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;root.dataset.speedDialState="closed"}});document.addEventListener("click",e=>{if(root.dataset.speedDialState!=="open")return;if(root.contains(e.target))return;root.dataset.speedDialState="closed"},true);document.addEventListener("keydown",e=>{if(e.key==="Escape")root.dataset.speedDialState="closed"})})();</script></body>
</html>
