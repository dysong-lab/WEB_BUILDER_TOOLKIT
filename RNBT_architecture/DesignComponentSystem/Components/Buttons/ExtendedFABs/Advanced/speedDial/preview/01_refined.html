<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ExtendedFABs/Advanced/speedDial — 01_refined</title>
    <script src="../../../../../preview_runtime.js"></script>
    <script src="../../../../../Mixins/ListRenderMixin.js"></script>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#09111b;color:#eaf2ff;font-family:"Pretendard",sans-serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(255,255,255,.04);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#bad0ee}</style>
  </head>
  <body>
    <div class="preview-shell"><h1>speedDial Extended FAB</h1><div id="demo"></div><div class="preview-log" id="log">Click Compose to open the related actions. ESC and outside click close it.</div></div>
    <script>
      (async()=>{await loadComponentAssets("demo","../views/01_refined.html","../styles/01_refined.css");const root=document.getElementById("demo").firstElementChild;const log=document.getElementById("log");const list=root.querySelector(".speed-dial__items");list.innerHTML=`<button class="speed-dial__item" type="button" data-action-id="newPost"><span class="speed-dial__item-icon material-symbols-outlined">article</span><span class="speed-dial__item-label">New post</span></button><button class="speed-dial__item" type="button" data-action-id="newPhoto"><span class="speed-dial__item-icon material-symbols-outlined">photo_camera</span><span class="speed-dial__item-label">New photo</span></button><button class="speed-dial__item" type="button" data-action-id="newDraft"><span class="speed-dial__item-icon material-symbols-outlined">draft</span><span class="speed-dial__item-label">New draft</span></button>`;root.addEventListener("click",e=>{const main=e.target.closest(".extended-fab");if(main){root.dataset.speedDialState=root.dataset.speedDialState==="open"?"closed":"open";return}const item=e.target.closest(".speed-dial__item");if(item){log.textContent=`event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;root.dataset.speedDialState="closed"}});document.addEventListener("click",e=>{if(root.dataset.speedDialState!=="open")return;if(root.contains(e.target))return;root.dataset.speedDialState="closed"},true);document.addEventListener("keydown",e=>{if(e.key==="Escape")root.dataset.speedDialState="closed"})})();
    </script>
  </body>
</html>
