<!doctype html>
<html lang="ko">
  <head><meta charset="UTF-8" /><title>ExtendedFABs/Advanced/speedDial — 04_operational</title><script src="../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#040a10;color:#d9faff;font-family:"IBM Plex Mono",monospace;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:16px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);white-space:pre-line;font-size:12px;line-height:1.6;color:#92b8c2}</style></head>
  <body><div class="preview-shell"><h1>speedDial Extended FAB</h1><div id="demo"></div><div class="preview-log" id="log">EXEC exposes immediate control actions.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/04_operational.html","../styles/04_operational.css");const root=document.getElementById("demo").firstElementChild;const log=document.getElementById("log");root.querySelector(".speed-dial__items").innerHTML=`<button class="speed-dial__item" type="button" data-action-id="run"><span class="speed-dial__item-icon material-symbols-outlined">play_arrow</span><span class="speed-dial__item-label">RUN</span></button><button class="speed-dial__item" type="button" data-action-id="stop"><span class="speed-dial__item-icon material-symbols-outlined">stop</span><span class="speed-dial__item-label">STOP</span></button><button class="speed-dial__item" type="button" data-action-id="reset"><span class="speed-dial__item-icon material-symbols-outlined">restart_alt</span><span class="speed-dial__item-label">RESET</span></button>`;root.addEventListener("click",e=>{const main=e.target.closest(".extended-fab");if(main){root.dataset.speedDialState=root.dataset.speedDialState==="open"?"closed":"open";return}const item=e.target.closest(".speed-dial__item");if(item){log.textContent=`event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;root.dataset.speedDialState="closed"}});document.addEventListener("click",e=>{if(root.dataset.speedDialState!=="open")return;if(root.contains(e.target))return;root.dataset.speedDialState="closed"},true);document.addEventListener("keydown",e=>{if(e.key==="Escape")root.dataset.speedDialState="closed"})})();</script></body>
</html>
