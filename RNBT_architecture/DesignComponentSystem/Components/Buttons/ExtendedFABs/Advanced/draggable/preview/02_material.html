<!doctype html>
<html lang="ko">
  <head><meta charset="UTF-8" /><title>ExtendedFABs/Advanced/draggable — 02_material</title><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f5f7fb;color:#223144;font-family:"Roboto",sans-serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:#fff;box-shadow:0 12px 24px rgba(113,131,160,.12);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#43546a}</style></head>
  <body><div class="preview-shell"><h1>draggable Extended FAB</h1><div id="demo"></div><div class="preview-log" id="log">Move the FAB and release.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/02_material.html","../styles/02_material.css");const fab=document.querySelector("#demo .extended-fab");const log=document.getElementById("log");let x=0,y=0,sx=0,sy=0,ox=0,oy=0,down=false,drag=false;const t=5;const clamp=(nx,ny)=>{const p=fab.parentElement.getBoundingClientRect();return{x:Math.min(Math.max(0,nx),Math.max(0,p.width-fab.offsetWidth)),y:Math.min(Math.max(0,ny),Math.max(0,p.height-fab.offsetHeight))}};const apply=()=>{fab.style.transform=`translate3d(${x}px, ${y}px, 0)`};fab.addEventListener("pointerdown",e=>{down=true;drag=false;sx=e.clientX;sy=e.clientY;ox=x;oy=y;fab.dataset.dragState="idle"});fab.addEventListener("pointermove",e=>{if(!down)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.hypot(dx,dy)>=t){drag=true;fab.dataset.dragState="dragging"}const next=clamp(ox+dx,oy+dy);x=next.x;y=next.y;apply()});fab.addEventListener("pointerup",()=>{if(!down)return;down=false;fab.dataset.dragState="idle";if(drag)log.textContent=`event: @positionChanged\nx: ${x}\ny: ${y}`});fab.addEventListener("click",e=>{if(drag){e.preventDefault();e.stopImmediatePropagation();drag=false;return}log.textContent="event: @extendedFabClicked\nmeaning: primary action remained a click.";},true)})();</script></body>
</html>
