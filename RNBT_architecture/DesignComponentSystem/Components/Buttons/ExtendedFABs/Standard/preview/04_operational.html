<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ExtendedFABs/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0D1B1E;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #1f3a4a;
            border-radius: 2px;
            color: #7dc7d9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #22d3ee;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div id="extended-fab-container"></div>
<div class="demo-log" id="demo-log"><strong>event log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('extended-fab-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'extendedFab', appendElement: document.getElementById('extended-fab-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            extendedFab: '.extended-fab',
            icon:        '.extended-fab__icon',
            label:       '.extended-fab__label'
        }
    });

    instance.subscriptions = { extendedFabInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.extendedFab]: '@extendedFabClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@extendedFabClicked': ({ event }) => {
            const fab = event.target.closest('.extended-fab');
            const label = fab?.querySelector('.extended-fab__label')?.textContent || '(no label)';
            log(`extendedFabClicked "${label}"`);
        }
    });

    instance.fieldRender.renderData({ response: {
        label: 'Execute',
        icon: 'play_arrow'
    }});
})();
</script>
</body>
</html>
