<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SplitButtons/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FAF6EF;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: #FDFBF7;
            border: 1px solid #D1CBC3;
            border-radius: 2px;
            color: #8C7B6B;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #3A3028; font-family: 'Georgia', serif; }
    </style>
</head>
<body>

<div id="split-button-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('split-button-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'split-buttons', appendElement: document.getElementById('split-button-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            action:     '.split-button__action',
            actionIcon: '.split-button__action-icon',
            label:      '.split-button__action-label'
        }
    });

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.split-button__menu',
            template:  '#split-button-menu-item-template',
            menuid:    '.split-button__menu-item',
            selected:  '.split-button__menu-item',
            menuLabel: '.split-button__menu-label',
            menuIcon:  '.split-button__menu-icon'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid:   'menuid',
            selected: 'selected'
        }
    });

    instance.subscriptions = {
        splitButtonAction:    [instance.fieldRender.renderData],
        splitButtonMenuItems: [instance.listRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.action]: '@splitActionClicked',
            '.split-button__trigger':                   '@splitMenuToggled',
            [instance.listRender.cssSelectors.menuid]:  '@splitMenuItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const root = () => instance.appendElement.querySelector('.split-button');

    const menuItems = [
        { menuid: 'publish_now',     menuIcon: 'send',      menuLabel: 'Publish now',     selected: 'false' },
        { menuid: 'publish_schedule',menuIcon: 'schedule',  menuLabel: 'Schedule',        selected: 'false' },
        { menuid: 'publish_draft',   menuIcon: 'edit_note', menuLabel: 'Save as draft',   selected: 'false' }
    ];

    Wkit.onEventBusHandlers({
        '@splitActionClicked': () => {
            log('splitActionClicked → Publish');
        },
        '@splitMenuToggled': () => {
            const el = root();
            const next = el.dataset.open === 'true' ? 'false' : 'true';
            el.dataset.open = next;
            log(`splitMenuToggled → data-open="${next}"`);
        },
        '@splitMenuItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid) return;
            menuItems.forEach(it => {
                targetInstance.listRender.updateItemState(it.menuid, { selected: it.menuid === menuid ? 'true' : 'false' });
            });
            root().dataset.open = 'false';
            log(`splitMenuItemClicked "${menuid}" → selected + menu closed`);
        }
    });

    instance.fieldRender.renderData({ response: { actionIcon: 'send', label: 'Publish' } });
    instance.listRender.renderData({ response: menuItems });
})();
</script>
</body>
</html>
