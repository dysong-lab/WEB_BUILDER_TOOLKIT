<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>FAB/Advanced/speedDial — 03_editorial</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="../../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f6efe4; color: #4a3b2c; font-family: Georgia, serif; padding: 36px; }
      .preview-shell { max-width: 920px; margin: 0 auto; display: grid; gap: 18px; }
      .preview-log { min-height: 112px; padding: 16px; border-radius: 18px; background: rgba(255, 251, 244, 0.8); white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; color: #6a5741; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>speedDial FAB</h1>
      <div id="demo"></div>
      <div class="preview-log" id="log">The share FAB expands into a vertical editorial action list.</div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("demo", "../views/03_editorial.html", "../styles/03_editorial.css");
        const root = document.getElementById("demo").firstElementChild;
        const log = document.getElementById("log");
        root.querySelector(".speed-dial__items").innerHTML = `<button class="speed-dial__item" type="button" data-action-id="mail"><span class="speed-dial__item-icon material-symbols-outlined">mail</span><span class="speed-dial__item-label">Mail</span></button><button class="speed-dial__item" type="button" data-action-id="link"><span class="speed-dial__item-icon material-symbols-outlined">link</span><span class="speed-dial__item-label">Link</span></button><button class="speed-dial__item" type="button" data-action-id="export"><span class="speed-dial__item-icon material-symbols-outlined">ios_share</span><span class="speed-dial__item-label">Export</span></button>`;
        root.addEventListener("click", (event) => {
          const fab = event.target.closest(".fab");
          if (fab) {
            root.dataset.speedDialState = root.dataset.speedDialState === "open" ? "closed" : "open";
            return;
          }
          const item = event.target.closest(".speed-dial__item");
          if (item) {
            log.textContent = `event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;
            root.dataset.speedDialState = "closed";
          }
        });
        document.addEventListener("click", (event) => {
          if (root.dataset.speedDialState !== "open") return;
          if (root.contains(event.target)) return;
          root.dataset.speedDialState = "closed";
        }, true);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") root.dataset.speedDialState = "closed";
        });
      })();
    </script>
  </body>
</html>
