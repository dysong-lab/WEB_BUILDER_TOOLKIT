<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>FAB/Advanced/speedDial — 02_material</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="../../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f3eee7; color: #312719; font-family: "Roboto", sans-serif; padding: 36px; }
      .preview-shell { max-width: 920px; margin: 0 auto; display: grid; gap: 18px; }
      .preview-log { min-height: 112px; padding: 16px; border-radius: 18px; background: rgba(255, 255, 255, 0.72); box-shadow: 0 12px 28px rgba(117, 95, 67, 0.08); white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; color: #5f4c35; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>speedDial FAB</h1>
      <div id="demo"></div>
      <div class="preview-log" id="log">The create FAB reveals radial document actions.</div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("demo", "../views/02_material.html", "../styles/02_material.css");
        const root = document.getElementById("demo").firstElementChild;
        const log = document.getElementById("log");
        const list = root.querySelector(".speed-dial__items");
        const items = [
          { actionId: "doc", icon: "description", label: "Document" },
          { actionId: "sheet", icon: "table_chart", label: "Sheet" },
          { actionId: "slide", icon: "slideshow", label: "Slides" },
          { actionId: "form", icon: "assignment", label: "Form" },
        ];
        const radius = 120;
        const start = 200;
        const end = 340;
        list.innerHTML = items.map((item, index) => {
          const angle = start + ((end - start) * index) / (items.length - 1);
          const rad = angle * Math.PI / 180;
          return `<button class="speed-dial__item" type="button" data-action-id="${item.actionId}" style="--x:${Math.cos(rad) * radius}px;--y:${Math.sin(rad) * radius}px"><span class="speed-dial__item-icon material-symbols-outlined">${item.icon}</span><span class="speed-dial__item-label">${item.label}</span></button>`;
        }).join("");
        root.addEventListener("click", (event) => {
          const fab = event.target.closest(".fab");
          if (fab) {
            root.dataset.speedDialState = root.dataset.speedDialState === "open" ? "closed" : "open";
            return;
          }
          const item = event.target.closest(".speed-dial__item");
          if (item) {
            log.textContent = `event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;
            root.dataset.speedDialState = "closed";
          }
        });
        document.addEventListener("click", (event) => {
          if (root.dataset.speedDialState !== "open") return;
          if (root.contains(event.target)) return;
          root.dataset.speedDialState = "closed";
        }, true);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") root.dataset.speedDialState = "closed";
        });
      })();
    </script>
  </body>
</html>
