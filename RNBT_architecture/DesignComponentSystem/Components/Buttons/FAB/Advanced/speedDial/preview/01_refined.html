<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>FAB/Advanced/speedDial — 01_refined</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="../../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #09111b; color: #eaf2ff; font-family: "Pretendard", sans-serif; padding: 36px; }
      .preview-shell { max-width: 920px; margin: 0 auto; display: grid; gap: 18px; }
      .preview-log { min-height: 112px; padding: 16px; border-radius: 18px; background: rgba(255, 255, 255, 0.04); white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; color: #bad0ee; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>speedDial FAB</h1>
      <div id="demo"></div>
      <div class="preview-log" id="log">Compose opens a radial fan. Outside click and ESC close it.</div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("demo", "../views/01_refined.html", "../styles/01_refined.css");
        const root = document.getElementById("demo").firstElementChild;
        const log = document.getElementById("log");
        const list = root.querySelector(".speed-dial__items");
        const items = [
          { actionId: "newPost", icon: "article", label: "New post" },
          { actionId: "newPhoto", icon: "photo_camera", label: "New photo" },
          { actionId: "newDraft", icon: "draft", label: "New draft" },
        ];
        const radius = 124;
        const start = 258;
        const end = 348;
        list.innerHTML = items.map((item, index) => {
          const angle = items.length === 1 ? start + (end - start) / 2 : start + ((end - start) * index) / (items.length - 1);
          const rad = angle * Math.PI / 180;
          return `<button class="speed-dial__item" type="button" data-action-id="${item.actionId}" style="--x:${Math.cos(rad) * radius}px;--y:${Math.sin(rad) * radius}px"><span class="speed-dial__item-icon material-symbols-outlined">${item.icon}</span></button>`;
        }).join("");
        root.addEventListener("click", (event) => {
          const fab = event.target.closest(".fab");
          if (fab) {
            root.dataset.speedDialState = root.dataset.speedDialState === "open" ? "closed" : "open";
            return;
          }
          const item = event.target.closest(".speed-dial__item");
          if (item) {
            log.textContent = `event: @speedDialActionClicked\nactionId: ${item.dataset.actionId}`;
            root.dataset.speedDialState = "closed";
          }
        });
        document.addEventListener("click", (event) => {
          if (root.dataset.speedDialState !== "open") return;
          if (root.contains(event.target)) return;
          root.dataset.speedDialState = "closed";
        }, true);
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") root.dataset.speedDialState = "closed";
        });
      })();
    </script>
  </body>
</html>
