<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ButtonGroups/Advanced/toggleGroup — 04_operational</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #040a10; color: #d9faff; font-family: "IBM Plex Mono", monospace; padding: 40px; }
      .preview-shell { max-width: 880px; margin: 0 auto; display: grid; gap: 20px; }
      .preview-panel { display: grid; gap: 18px; padding: 24px; border-radius: 22px; background: rgba(0,229,255,0.04); border: 1px solid rgba(0,229,255,0.12); }
      .preview-log { min-height: 120px; padding: 16px; border-radius: 16px; background: rgba(5,16,22,0.9); color: #92b8c2; white-space: pre-line; font-size: 12px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>toggleGroup</h1>
      <div class="preview-panel">
        <div id="toggle-group-demo"></div>
        <div class="preview-log" id="preview-log">Active severity: INFO</div>
      </div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("toggle-group-demo", "../views/04_operational.html", "../styles/04_operational.css");
        const root = document.getElementById("toggle-group-demo");
        const list = root.querySelector(".button-group-toggle__list");
        const log = document.getElementById("preview-log");
        let selectedId = "info";

        list.innerHTML = `
          <button class="button-group-toggle__item" type="button" data-id="info" data-selected="true" aria-pressed="true"><span class="button-group-toggle__label">Info</span></button>
          <button class="button-group-toggle__item" type="button" data-id="warn" data-selected="false" aria-pressed="false"><span class="button-group-toggle__label">Warn</span></button>
          <button class="button-group-toggle__item" type="button" data-id="crit" data-selected="false" aria-pressed="false"><span class="button-group-toggle__label">Crit</span></button>
        `;

        const sync = () => {
          list.querySelectorAll(".button-group-toggle__item").forEach((item) => {
            const active = item.dataset.id === selectedId;
            item.dataset.selected = active ? "true" : "false";
            item.setAttribute("aria-pressed", active ? "true" : "false");
          });
          log.textContent = `event: @buttonGroupToggled\nselectedId: ${selectedId}\nmeaning: one monitoring severity remains latched.`;
        };

        list.addEventListener("click", (event) => {
          const item = event.target.closest(".button-group-toggle__item");
          if (!item) return;
          selectedId = item.dataset.id;
          sync();
        });

        sync();
      })();
    </script>
  </body>
</html>
