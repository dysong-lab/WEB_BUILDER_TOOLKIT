<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ButtonGroups/Advanced/toggleGroup — 01_refined</title>
    <script src="../../../../../preview_runtime.js"></script>
    <script src="../../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #08111b; color: #e6eefc; font-family: "Pretendard", sans-serif; padding: 40px; }
      .preview-shell { max-width: 920px; margin: 0 auto; display: grid; gap: 20px; }
      .preview-panel { display: grid; gap: 18px; padding: 24px; border-radius: 28px; background: rgba(255,255,255,0.04); }
      .preview-log { min-height: 120px; padding: 16px; border-radius: 18px; background: rgba(255,255,255,0.05); color: #bad0ee; white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <div>
        <h1>toggleGroup</h1>
        <p>단일 선택이 컴포넌트 내부에서 강제되고, 변경 시 <code>@buttonGroupToggled</code>가 명시 payload로 발행된다.</p>
      </div>
      <div class="preview-panel">
        <div id="toggle-group-demo"></div>
        <div class="preview-log" id="preview-log">Click a connected button.</div>
      </div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("toggle-group-demo", "../views/01_refined.html", "../styles/01_refined.css");
        const root = document.getElementById("toggle-group-demo");
        const log = document.getElementById("preview-log");
        const instance = { id: "toggle-preview", appendElement: root };

        applyListRenderMixin(instance, {
          cssSelectors: {
            group: ".button-group-toggle",
            container: ".button-group-toggle__list",
            template: "#button-group-toggle-item-template",
            item: ".button-group-toggle__item",
            id: ".button-group-toggle__item",
            label: ".button-group-toggle__label",
          },
          itemKey: "id",
          datasetAttrs: { id: "id", selected: "selected" },
        });

        instance._selectedId = null;
        instance._applySelection = function () {
          const items = root.querySelectorAll(".button-group-toggle__item");
          items.forEach((item) => {
            const active = item.dataset.id === instance._selectedId;
            item.dataset.selected = active ? "true" : "false";
            item.setAttribute("aria-pressed", active ? "true" : "false");
          });
        };
        instance._setSelected = function (id) {
          if (!id || id === instance._selectedId) return;
          const previousId = instance._selectedId;
          instance._selectedId = id;
          instance._applySelection();
          log.textContent = `event: @buttonGroupToggled\nselectedId: ${id}\npreviousId: ${previousId || "-"}`;
        };

        root.addEventListener("click", (event) => {
          const item = event.target.closest(".button-group-toggle__item");
          if (!item) return;
          instance._setSelected(item.dataset.id);
        });

        instance.listRender.renderData({
          response: [
            { id: "day", label: "Day", selected: "true" },
            { id: "week", label: "Week", selected: "false" },
            { id: "month", label: "Month", selected: "false" },
            { id: "quarter", label: "Quarter", selected: "false" }
          ]
        });
        instance._selectedId = "day";
        instance._applySelection();
      })();
    </script>
  </body>
</html>
