<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ButtonGroups/Advanced/toggleGroup — 03_editorial</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f6efe4; color: #4b3e33; font-family: "Georgia", serif; padding: 40px; }
      .preview-shell { max-width: 860px; margin: 0 auto; display: grid; gap: 18px; }
      .preview-panel { display: grid; gap: 18px; padding: 24px; border-radius: 28px; background: rgba(255,255,255,0.55); }
      .preview-log { min-height: 110px; padding: 16px; border-radius: 18px; background: rgba(75,63,54,0.08); white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>toggleGroup</h1>
      <div class="preview-panel">
        <div id="toggle-group-demo"></div>
        <div class="preview-log" id="preview-log">Single selection with connected editorial buttons.</div>
      </div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("toggle-group-demo", "../views/03_editorial.html", "../styles/03_editorial.css");
        const root = document.getElementById("toggle-group-demo");
        const list = root.querySelector(".button-group-toggle__list");
        const log = document.getElementById("preview-log");
        let selectedId = "brief";

        list.innerHTML = `
          <button class="button-group-toggle__item" type="button" data-id="brief" data-selected="true" aria-pressed="true"><span class="button-group-toggle__label">Brief</span></button>
          <button class="button-group-toggle__item" type="button" data-id="feature" data-selected="false" aria-pressed="false"><span class="button-group-toggle__label">Feature</span></button>
          <button class="button-group-toggle__item" type="button" data-id="digest" data-selected="false" aria-pressed="false"><span class="button-group-toggle__label">Digest</span></button>
        `;

        const sync = () => {
          list.querySelectorAll(".button-group-toggle__item").forEach((item) => {
            const active = item.dataset.id === selectedId;
            item.dataset.selected = active ? "true" : "false";
            item.setAttribute("aria-pressed", active ? "true" : "false");
          });
        };

        list.addEventListener("click", (event) => {
          const item = event.target.closest(".button-group-toggle__item");
          if (!item || item.dataset.id === selectedId) return;
          const previousId = selectedId;
          selectedId = item.dataset.id;
          sync();
          log.textContent = `selected: ${selectedId}\nprevious: ${previousId}\nmeaning: one editorial mode remains active.`;
        });

        sync();
      })();
    </script>
  </body>
</html>
