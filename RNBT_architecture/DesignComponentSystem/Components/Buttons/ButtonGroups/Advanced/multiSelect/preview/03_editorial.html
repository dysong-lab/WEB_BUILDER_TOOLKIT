<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ButtonGroups/Advanced/multiSelect — 03_editorial</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f6efe4; color: #4b3e33; font-family: "Georgia", serif; padding: 40px; }
      .preview-shell { max-width: 860px; margin: 0 auto; display: grid; gap: 18px; }
      .preview-panel { display: grid; gap: 18px; padding: 24px; border-radius: 28px; background: rgba(255,255,255,0.55); }
      .preview-log { min-height: 110px; padding: 16px; border-radius: 18px; background: rgba(75,63,54,0.08); white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>multiSelect</h1>
      <div class="preview-panel">
        <div id="multi-group-demo"></div>
        <div class="preview-log" id="preview-log">Any number of editorial tags may stay active.</div>
      </div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("multi-group-demo", "../views/03_editorial.html", "../styles/03_editorial.css");
        const root = document.getElementById("multi-group-demo");
        const list = root.querySelector(".button-group-multi__list");
        const log = document.getElementById("preview-log");
        const selectedIds = new Set(["essay", "archive"]);

        list.innerHTML = `
          <button class="button-group-multi__item" type="button" data-id="essay" data-selected="true" aria-pressed="true"><span class="button-group-multi__label">Essay</span></button>
          <button class="button-group-multi__item" type="button" data-id="memoir" data-selected="false" aria-pressed="false"><span class="button-group-multi__label">Memoir</span></button>
          <button class="button-group-multi__item" type="button" data-id="archive" data-selected="true" aria-pressed="true"><span class="button-group-multi__label">Archive</span></button>
        `;

        const sync = () => {
          list.querySelectorAll(".button-group-multi__item").forEach((item) => {
            const active = selectedIds.has(item.dataset.id);
            item.dataset.selected = active ? "true" : "false";
            item.setAttribute("aria-pressed", active ? "true" : "false");
          });
          log.textContent = `selectedIds: ${Array.from(selectedIds).join(", ")}`;
        };

        list.addEventListener("click", (event) => {
          const item = event.target.closest(".button-group-multi__item");
          if (!item) return;
          if (selectedIds.has(item.dataset.id)) selectedIds.delete(item.dataset.id);
          else selectedIds.add(item.dataset.id);
          sync();
        });

        sync();
      })();
    </script>
  </body>
</html>
