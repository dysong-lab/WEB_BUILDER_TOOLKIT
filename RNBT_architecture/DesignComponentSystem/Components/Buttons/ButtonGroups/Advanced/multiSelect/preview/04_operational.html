<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ButtonGroups/Advanced/multiSelect — 04_operational</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #040a10; color: #d9faff; font-family: "IBM Plex Mono", monospace; padding: 40px; }
      .preview-shell { max-width: 880px; margin: 0 auto; display: grid; gap: 20px; }
      .preview-panel { display: grid; gap: 18px; padding: 24px; border-radius: 22px; background: rgba(0,229,255,0.04); border: 1px solid rgba(0,229,255,0.12); }
      .preview-log { min-height: 120px; padding: 16px; border-radius: 16px; background: rgba(5,16,22,0.9); color: #92b8c2; white-space: pre-line; font-size: 12px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>multiSelect</h1>
      <div class="preview-panel">
        <div id="multi-group-demo"></div>
        <div class="preview-log" id="preview-log">0 ACTIVE</div>
      </div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("multi-group-demo", "../views/04_operational.html", "../styles/04_operational.css");
        const root = document.getElementById("multi-group-demo");
        const list = root.querySelector(".button-group-multi__list");
        const group = root.querySelector(".button-group-multi");
        const log = document.getElementById("preview-log");
        const selectedIds = new Set(["temp", "humidity"]);

        list.innerHTML = `
          <button class="button-group-multi__item" type="button" data-id="temp" data-selected="true" aria-pressed="true"><span class="button-group-multi__label">Temp</span></button>
          <button class="button-group-multi__item" type="button" data-id="humidity" data-selected="true" aria-pressed="true"><span class="button-group-multi__label">Humidity</span></button>
          <button class="button-group-multi__item" type="button" data-id="vibe" data-selected="false" aria-pressed="false"><span class="button-group-multi__label">Vibe</span></button>
          <button class="button-group-multi__item" type="button" data-id="power" data-selected="false" aria-pressed="false"><span class="button-group-multi__label">Power</span></button>
        `;

        const sync = (changedId, changedTo) => {
          list.querySelectorAll(".button-group-multi__item").forEach((item) => {
            const active = selectedIds.has(item.dataset.id);
            item.dataset.selected = active ? "true" : "false";
            item.setAttribute("aria-pressed", active ? "true" : "false");
          });
          group.dataset.selectedCount = String(selectedIds.size);
          log.textContent = `selectedIds: ${Array.from(selectedIds).join(", ") || "-"}\nchangedId: ${changedId || "-"}\nchangedTo: ${changedTo || "-"}`;
        };

        list.addEventListener("click", (event) => {
          const item = event.target.closest(".button-group-multi__item");
          if (!item) return;
          const id = item.dataset.id;
          if (selectedIds.has(id)) {
            selectedIds.delete(id);
            sync(id, "off");
            return;
          }
          selectedIds.add(id);
          sync(id, "on");
        });

        sync(null, null);
      })();
    </script>
  </body>
</html>
