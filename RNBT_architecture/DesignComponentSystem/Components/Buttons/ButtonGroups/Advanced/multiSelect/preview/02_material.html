<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>ButtonGroups/Advanced/multiSelect — 02_material</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f4f6fb; color: #223144; font-family: "Roboto", sans-serif; padding: 40px; }
      .preview-shell { max-width: 920px; margin: 0 auto; display: grid; gap: 20px; }
      .preview-panel { display: grid; gap: 18px; padding: 24px; border-radius: 28px; background: #ffffff; box-shadow: 0 18px 36px rgba(113, 131, 160, 0.16); }
      .preview-log { min-height: 120px; padding: 16px; border-radius: 18px; background: #eff3f9; color: #43546a; white-space: pre-line; font: 12px/1.6 "IBM Plex Mono", monospace; }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <h1>multiSelect</h1>
      <div class="preview-panel">
        <div id="multi-group-demo"></div>
        <div class="preview-log" id="preview-log">Select multiple categories.</div>
      </div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("multi-group-demo", "../views/02_material.html", "../styles/02_material.css");
        const root = document.getElementById("multi-group-demo");
        const list = root.querySelector(".button-group-multi__list");
        const log = document.getElementById("preview-log");
        const selectedIds = new Set(["ops"]);

        list.innerHTML = `
          <button class="button-group-multi__item" type="button" data-id="ops" data-selected="true" aria-pressed="true"><span class="button-group-multi__label">Ops</span></button>
          <button class="button-group-multi__item" type="button" data-id="sales" data-selected="false" aria-pressed="false"><span class="button-group-multi__label">Sales</span></button>
          <button class="button-group-multi__item" type="button" data-id="infra" data-selected="false" aria-pressed="false"><span class="button-group-multi__label">Infra</span></button>
          <button class="button-group-multi__item" type="button" data-id="labs" data-selected="false" aria-pressed="false"><span class="button-group-multi__label">Labs</span></button>
        `;

        const sync = (changedId, changedTo) => {
          list.querySelectorAll(".button-group-multi__item").forEach((item) => {
            const active = selectedIds.has(item.dataset.id);
            item.dataset.selected = active ? "true" : "false";
            item.setAttribute("aria-pressed", active ? "true" : "false");
          });
          log.textContent = `selectedIds: ${Array.from(selectedIds).join(", ") || "-"}\nchangedId: ${changedId || "-"}\nchangedTo: ${changedTo || "-"}`;
        };

        list.addEventListener("click", (event) => {
          const item = event.target.closest(".button-group-multi__item");
          if (!item) return;
          const id = item.dataset.id;
          const active = selectedIds.has(id);
          if (active) selectedIds.delete(id);
          else selectedIds.add(id);
          sync(id, active ? "off" : "on");
        });

        sync(null, null);
      })();
    </script>
  </body>
</html>
