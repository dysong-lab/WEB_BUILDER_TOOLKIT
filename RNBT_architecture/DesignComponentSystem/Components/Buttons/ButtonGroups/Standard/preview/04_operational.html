<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ButtonGroups/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A1214;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #1f3a4a;
            border-radius: 2px;
            color: #7dc7d9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #22d3ee;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div id="btn-group-container"></div>
<div class="demo-log" id="demo-log"><strong>event log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('btn-group-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'button-groups', appendElement: document.getElementById('btn-group-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.btn-group__list',
            template:  '#btn-group-item-template',
            buttonid:  '.btn-group__item',
            selected:  '.btn-group__item',
            label:     '.btn-group__label',
            icon:      '.btn-group__icon'
        },
        itemKey: 'buttonid',
        datasetAttrs: {
            buttonid: 'buttonid',
            selected: 'selected'
        }
    });

    instance.subscriptions = { buttonGroupItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.buttonid]: '@buttonClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@buttonClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.buttonid);
            const buttonid = item?.getAttribute('data-buttonid');
            const wasSelected = item?.getAttribute('data-selected') === 'true';
            targetInstance.listRender.updateItemState(buttonid, { selected: wasSelected ? 'false' : 'true' });
            log(`buttonClicked "${buttonid}" → selected=${!wasSelected}`);
        }
    });

    instance.listRender.renderData({ response: [
        { buttonid: 'realtime', icon: 'speed',   label: 'RT',   selected: 'true' },
        { buttonid: '1h',       icon: '',         label: '1H',   selected: 'false' },
        { buttonid: '24h',      icon: '',         label: '24H',  selected: 'false' },
        { buttonid: '7d',       icon: '',         label: '7D',   selected: 'false' },
        { buttonid: '30d',      icon: '',         label: '30D',  selected: 'false' }
    ]});
})();
</script>
</body>
</html>
