<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IconButtons/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FAF7F2;
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: #FFFFFF;
            border: 1px solid #C9BFB1;
            border-radius: 0;
            color: #5C4E40;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #3A312A; }
    </style>
</head>
<body>

<div id="icon-button-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('icon-button-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'iconButton', appendElement: document.getElementById('icon-button-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            iconButton: '.icon-button',
            icon:       '.icon-button__icon'
        }
    });

    instance.subscriptions = { iconButtonInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.iconButton]: '@iconButtonClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@iconButtonClicked': ({ event }) => {
            const btn = event.target.closest('.icon-button');
            const icon = btn?.querySelector('.icon-button__icon')?.textContent || '(no icon)';
            log(`iconButtonClicked "${icon}"`);
        }
    });

    instance.fieldRender.renderData({ response: {
        icon: 'bookmark'
    }});
})();
</script>
</body>
</html>
