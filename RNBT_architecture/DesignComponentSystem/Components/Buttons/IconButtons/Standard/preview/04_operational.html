<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>IconButtons/Standard — 04_operational</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #05090b;
        display: flex;
        justify-content: center;
        padding: 40px;
      }
      .preview-grid {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="preview-grid">
      <div id="icon-primary"></div>
      <div id="icon-secondary"></div>
      <div id="icon-alert"></div>
    </div>
    <script src="../../../../../preview_runtime.js"></script>
    <script>
      (async () => {
        const ids = ["icon-primary", "icon-secondary", "icon-alert"];
        await Promise.all(
          ids.map((id) =>
            loadComponentAssets(
              id,
              "../views/04_operational.html",
              "../styles/04_operational.css",
            ),
          ),
        );
        const createInstance = (id) => {
          const instance = { id, appendElement: document.getElementById(id) };
          instance.cssSelectors = {
            button: ".icon-button",
            icon: ".icon-button__icon",
          };
          instance.renderIconButtonInfo = function (data = {}) {
            const button = this.appendElement.querySelector(
              this.cssSelectors.button,
            );
            const icon = this.appendElement.querySelector(
              this.cssSelectors.icon,
            );
            if (!button || !icon) return;
            const nextIcon =
              data?.icon === null || data?.icon === undefined
                ? ""
                : String(data.icon);
            const nextAria =
              data?.ariaLabel === null || data?.ariaLabel === undefined
                ? nextIcon
                : String(data.ariaLabel);
            icon.textContent = nextIcon;
            button.setAttribute("aria-label", nextAria);
          };
          instance.customEvents = {
            click: { [instance.cssSelectors.button]: "@iconButtonClicked" },
          };
          Wkit.bindEvents(instance, instance.customEvents);
          return instance;
        };
        const a = createInstance("icon-primary");
        const b = createInstance("icon-secondary");
        const c = createInstance("icon-alert");
        Wkit.onEventBusHandlers({
          "@iconButtonClicked": ({ targetInstance }) => {
            const button =
              targetInstance?.appendElement?.querySelector(".icon-button");
            console.log(
              "[Preview] Icon button clicked:",
              targetInstance?.id,
              button?.getAttribute("aria-label"),
            );
          },
        });
        a.renderIconButtonInfo({
          icon: "power_settings_new",
          ariaLabel: "Power",
        });
        b.renderIconButtonInfo({ icon: "tune", ariaLabel: "Tune" });
        c.renderIconButtonInfo({ icon: "warning", ariaLabel: "Warning" });
      })();
    </script>
  </body>
</html>
