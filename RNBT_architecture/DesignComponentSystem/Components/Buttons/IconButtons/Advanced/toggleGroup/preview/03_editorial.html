<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><title>IconButtons/Advanced/toggleGroup — 03_editorial</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f6efe4;color:#4a3b2c;font-family:Georgia,serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(255,251,244,.8);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#6a5741}</style></head><body><div class="preview-shell"><h1>toggleGroup IconButtons</h1><div id="demo"></div><div class="preview-log" id="log">Choose the current relevance mode.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/03_editorial.html","../styles/03_editorial.css");const root=document.querySelector("#demo .icon-button-group");const list=root.querySelector(".icon-button-group__list");const log=document.getElementById("log");const items=[["latest","schedule","NEW"],["popular","local_fire_department","HOT"],["relevant","bookmark_manager","BEST"]];list.innerHTML=items.map(([id,icon,label],i)=>`<button class="icon-button-group__item" type="button" role="radio" aria-checked="${i===0}" data-action-id="${id}" data-selected="${i===0}"><span class="icon-button-group__item-icon material-symbols-outlined">${icon}</span><span class="icon-button-group__item-label">${label}</span></button>`).join("");root.dataset.selectedId="latest";root.addEventListener("click",(e)=>{const item=e.target.closest(".icon-button-group__item");if(!item)return;const prev=root.dataset.selectedId;root.querySelectorAll(".icon-button-group__item").forEach((node)=>{const sel=node===item;node.dataset.selected=sel?"true":"false";node.setAttribute("aria-checked",sel?"true":"false")});root.dataset.selectedId=item.dataset.actionId;log.textContent=`event: @iconButtonToggled\nselectedId: ${item.dataset.actionId}\npreviousId: ${prev}`})})();</script></body></html>
