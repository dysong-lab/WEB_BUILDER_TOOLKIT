<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><title>IconButtons/Advanced/toggleGroup — 04_operational</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#030910;color:#d9faff;font-family:"IBM Plex Mono",monospace;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.12);white-space:pre-line;font-size:12px;line-height:1.6;color:#92b8c2}</style></head><body><div class="preview-shell"><h1>toggleGroup IconButtons</h1><div id="demo"></div><div class="preview-log" id="log">Operational severity keeps exactly one active level.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/04_operational.html","../styles/04_operational.css");const root=document.querySelector("#demo .icon-button-group");const list=root.querySelector(".icon-button-group__list");const log=document.getElementById("log");const items=[["info","info","INFO"],["warn","warning","WARN"],["critical","priority_high","CRIT"]];list.innerHTML=items.map(([id,icon,label],i)=>`<button class="icon-button-group__item" type="button" role="radio" aria-checked="${i===0}" data-action-id="${id}" data-selected="${i===0}"><span class="icon-button-group__item-icon material-symbols-outlined">${icon}</span><span class="icon-button-group__item-label">${label}</span></button>`).join("");root.dataset.selectedId="info";root.addEventListener("click",(e)=>{const item=e.target.closest(".icon-button-group__item");if(!item)return;const prev=root.dataset.selectedId;root.querySelectorAll(".icon-button-group__item").forEach((node)=>{const sel=node===item;node.dataset.selected=sel?"true":"false";node.setAttribute("aria-checked",sel?"true":"false")});root.dataset.selectedId=item.dataset.actionId;log.textContent=`event: @iconButtonToggled\nselectedId: ${item.dataset.actionId}\npreviousId: ${prev}`})})();</script></body></html>
