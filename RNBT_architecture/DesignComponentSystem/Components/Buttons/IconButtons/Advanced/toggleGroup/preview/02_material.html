<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><title>IconButtons/Advanced/toggleGroup — 02_material</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/><script src="../../../../../../preview_runtime.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#f3eee7;color:#312719;font-family:"Roboto",sans-serif;padding:36px}.preview-shell{max-width:920px;margin:0 auto;display:grid;gap:18px}.preview-log{min-height:112px;padding:16px;border-radius:18px;background:rgba(255,255,255,.72);box-shadow:0 12px 28px rgba(117,95,67,.08);white-space:pre-line;font:12px/1.6 "IBM Plex Mono",monospace;color:#5f4c35}</style></head><body><div class="preview-shell"><h1>toggleGroup IconButtons</h1><div id="demo"></div><div class="preview-log" id="log">View mode behaves like a compact radiogroup.</div></div><script>(async()=>{await loadComponentAssets("demo","../views/02_material.html","../styles/02_material.css");const root=document.querySelector("#demo .icon-button-group");const list=root.querySelector(".icon-button-group__list");const log=document.getElementById("log");const items=[["grid","grid_view","GRID"],["list","view_list","LIST"],["compact","density_medium","DENSE"]];list.innerHTML=items.map(([id,icon,label],i)=>`<button class="icon-button-group__item" type="button" role="radio" aria-checked="${i===0}" data-action-id="${id}" data-selected="${i===0}"><span class="icon-button-group__item-icon material-symbols-outlined">${icon}</span><span class="icon-button-group__item-label">${label}</span></button>`).join("");root.dataset.selectedId="grid";root.addEventListener("click",(e)=>{const item=e.target.closest(".icon-button-group__item");if(!item)return;const prev=root.dataset.selectedId;root.querySelectorAll(".icon-button-group__item").forEach((node)=>{const sel=node===item;node.dataset.selected=sel?"true":"false";node.setAttribute("aria-checked",sel?"true":"false")});root.dataset.selectedId=item.dataset.actionId;log.textContent=`event: @iconButtonToggled\nselectedId: ${item.dataset.actionId}\npreviousId: ${prev}`})})();</script></body></html>
