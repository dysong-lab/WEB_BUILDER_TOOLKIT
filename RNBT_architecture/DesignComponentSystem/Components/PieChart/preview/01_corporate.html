<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PieChart — 01_corporate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #piechart-container { width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="piechart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('piechart-container', '../views/01_corporate.html', '../styles/01_corporate.css');

        const instance = {
            id: 'pie-chart',
            appendElement: document.getElementById('piechart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                series: [{
                    type: 'pie',
                    radius: ['40%', '65%'],
                    label: { show: true, formatter: '{b}: {d}%' }
                }],
                tooltip: { trigger: 'item' },
                legend: { orient: 'vertical', right: 10, top: 'center' }
            },
            mapData: function(data, option) {
                option.series[0].data = data.items;
                return option;
            }
        });

        instance.echarts.renderData({
            response: {
                items: [
                    { name: 'UPS', value: 35 },
                    { name: 'CRAC', value: 25 },
                    { name: 'PDU', value: 20 },
                    { name: 'Sensor', value: 12 },
                    { name: 'Switch', value: 8 }
                ]
            }
        });
    })();
    </script>
</body>
</html>
