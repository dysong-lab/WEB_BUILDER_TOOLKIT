<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CameraFocusButton — 01_standard</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #0f1117;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .preview-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .rnbt-container {
            width: 140px;
            height: 40px;
            overflow: auto;
        }
        .rnbt-container--wide {
            width: 180px;
            height: 40px;
            overflow: auto;
        }
    </style>
    <link rel="stylesheet" href="../styles/01_standard.css">
</head>
<body>
    <div class="preview-grid">
        <div class="rnbt-container">
            <button class="camera-focus-btn" data-target="pump-01" data-active="true">
                <span class="camera-focus-btn__icon">⌖</span>
                <span class="camera-focus-btn__label">Pump 01</span>
            </button>
        </div>

        <div class="rnbt-container">
            <button class="camera-focus-btn" data-target="valve-03" data-active="false">
                <span class="camera-focus-btn__icon">⌖</span>
                <span class="camera-focus-btn__label">Valve 03</span>
            </button>
        </div>

        <div class="rnbt-container--wide">
            <button class="camera-focus-btn" data-target="reactor-02" data-active="false">
                <span class="camera-focus-btn__icon">⌖</span>
                <span class="camera-focus-btn__label">Reactor 02</span>
            </button>
        </div>

        <div class="rnbt-container">
            <button class="camera-focus-btn" data-target="overview" data-active="false">
                <span class="camera-focus-btn__icon">⌖</span>
                <span class="camera-focus-btn__label">Overview</span>
            </button>
        </div>
    </div>
</body>
</html>
