<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EventBrowser — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #event-browser-container { width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="event-browser-container"></div>

    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/ListRenderMixin.js"></script>
    <script src="../../../../Mixins/ShadowPopupMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('event-browser-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'event-browser',
            appendElement: document.getElementById('event-browser-container')
        };

        applyListRenderMixin(instance, {
            cssSelectors: {
                container: '.event-browser__list',
                template:  '#event-browser-item-template',
                time:      '.event-browser__item-time',
                level:     '.event-browser__item-level',
                message:   '.event-browser__item-message',
                source:    '.event-browser__item-source'
            }
        });

        applyShadowPopupMixin(instance, {
            cssSelectors: {
                template: '#event-detail-popup-template',
                closeBtn: '.popup-close-btn'
            },
            onCreated: function(shadowRoot) {
                instance._popupScope = { appendElement: shadowRoot };
                applyListRenderMixin(instance._popupScope, {
                    cssSelectors: {
                        container: '.popup-detail-list',
                        template:  '#popup-detail-item-template',
                        label:     '.popup-field__label',
                        value:     '.popup-field__value'
                    }
                });
            }
        });

        instance.listRender.renderData({
            response: [
                { time: '14:30:05', level: 'error',   message: 'UPS-01 voltage drop detected',     source: 'UPS' },
                { time: '14:28:12', level: 'warning', message: 'CRAC-02 temperature above threshold', source: 'CRAC' },
                { time: '14:25:33', level: 'info',    message: 'PDU-03 load balancing completed',   source: 'PDU' },
                { time: '14:22:01', level: 'info',    message: 'Sensor-04 calibration started',     source: 'Sensor' },
                { time: '14:20:45', level: 'warning', message: 'Switch-05 port flapping detected',  source: 'Switch' },
                { time: '14:18:30', level: 'error',   message: 'UPS-06 battery replacement required', source: 'UPS' }
            ]
        });

        instance.appendElement.addEventListener('click', function(e) {
            const item = e.target.closest('.event-browser__item');
            if (!item) return;
            instance.shadowPopup.show();
            if (instance._popupScope && instance._popupScope.listRender) {
                instance._popupScope.listRender.renderData({
                    response: [
                        { label: 'Time',    value: item.querySelector('.event-browser__item-time').textContent },
                        { label: 'Level',   value: item.querySelector('.event-browser__item-level').textContent },
                        { label: 'Message', value: item.querySelector('.event-browser__item-message').textContent },
                        { label: 'Source',  value: item.querySelector('.event-browser__item-source').textContent }
                    ]
                });
            }
        });

        instance.shadowPopup.bindPopupEvents({
            click: { '.popup-close-btn': function() { instance.shadowPopup.hide(); } }
        });
    })();
    </script>
</body>
</html>
