<div class="event-browser">
    <div class="event-browser__header">
        <h3 class="event-browser__title">Event Log</h3>
    </div>
    <div class="event-browser__list"></div>

    <template id="event-browser-item-template">
        <div class="event-browser__item" data-level="">
            <span class="event-browser__item-time"></span>
            <span class="event-browser__item-level"></span>
            <span class="event-browser__item-message"></span>
            <span class="event-browser__item-source"></span>
        </div>
    </template>

    <template id="event-detail-popup-template">
        <style>
            .popup-overlay {
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.3);
                display: flex; align-items: center; justify-content: center;
                z-index: 1000;
            }
            .popup-panel {
                background: #ffffff; border-radius: 8px;
                padding: 24px; min-width: 400px; max-width: 500px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.15);
                font-family: 'Segoe UI', sans-serif;
            }
            .popup-header {
                display: flex; justify-content: space-between; align-items: center;
                margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e2e8f0;
            }
            .popup-title { font-size: 16px; font-weight: 600; color: #1e293b; }
            .popup-close-btn {
                width: 28px; height: 28px; border: none; background: #f1f5f9;
                border-radius: 4px; cursor: pointer; font-size: 14px; color: #64748b;
            }
            .popup-close-btn:hover { background: #e2e8f0; }
            .popup-detail-list { display: flex; flex-direction: column; gap: 8px; }
            .popup-field {
                display: flex; justify-content: space-between; padding: 6px 0;
                border-bottom: 1px solid #f1f5f9;
            }
            .popup-field__label { font-size: 13px; color: #64748b; }
            .popup-field__value { font-size: 13px; color: #1e293b; font-weight: 500; }
        </style>
        <div class="popup-overlay">
            <div class="popup-panel">
                <div class="popup-header">
                    <span class="popup-title">Event Detail</span>
                    <button class="popup-close-btn">✕</button>
                </div>
                <div class="popup-detail-list"></div>
                <template id="popup-detail-item-template">
                    <div class="popup-field">
                        <span class="popup-field__label"></span>
                        <span class="popup-field__value"></span>
                    </div>
                </template>
            </div>
        </div>
    </template>
</div>
