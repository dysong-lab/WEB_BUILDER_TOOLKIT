<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Roboto', sans-serif; }
        #top-app-bar-container { margin: 40px auto 0; }
        .demo-log {
            width: 360px;
            margin: 24px auto 0;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            color: #5f6368;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .demo-log strong { color: #1a73e8; font-weight: 500; }
    </style>
</head>
<body>

<div id="top-app-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            title:   '.top-app-bar__title',
            bar:     '.top-app-bar',
            navIcon: '.top-app-bar__nav-icon',
            action:  '.top-app-bar__action'
        }
    });

    instance.subscriptions = { appBarInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.navIcon]: '@navigationClicked',
            [instance.fieldRender.cssSelectors.action]:  '@actionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@navigationClicked': () => log('navigationClicked → drawer.toggle()'),
        '@actionClicked': ({ event }) => {
            const btn = event.target.closest('.top-app-bar__action');
            const label = btn?.getAttribute('aria-label') || '(unknown)';
            log(`actionClicked "${label}"`);
        }
    });

    instance.fieldRender.renderData({ response: { title: 'Settings' } });
})();
</script>
</body>
</html>
