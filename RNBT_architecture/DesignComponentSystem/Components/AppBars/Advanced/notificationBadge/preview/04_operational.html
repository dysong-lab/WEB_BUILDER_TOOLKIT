<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/notificationBadge — 04_operational</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010409; font-family: 'IBM Plex Mono', monospace; padding: 40px 0; }
        #top-app-bar-container, .demo-controls, .demo-log { width: 600px; margin: 0 auto; }
        .demo-controls { display: flex; gap: 8px; margin-top: 16px; }
        .demo-controls button { padding: 9px 12px; border: 1px solid rgba(77,208,225,0.18); border-radius: 4px; background: #0D1117; color: #8FA3B8; cursor: pointer; }
        .demo-log { margin-top: 16px; padding: 12px; border: 1px solid rgba(77,208,225,0.18); color: #8FA3B8; background: #0D1117; }
    </style>
</head>
<body>
<div id="top-app-bar-container"></div>
<div class="demo-controls">
    <button data-count="0" data-tone="info">CLEAR</button>
    <button data-count="4" data-tone="info">4</button>
    <button data-count="9" data-tone="warning">9</button>
    <button data-count="ALR" data-tone="critical">ALR</button>
</div>
<div class="demo-log" id="demo-log">log: ready</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/04_operational.html', '../styles/04_operational.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, { cssSelectors: { title: '.top-app-bar__title', badgeCount: '.top-app-bar__badge-count' } });
    instance.renderBadge = ({ response }) => {
        const badge = instance.appendElement.querySelector('.top-app-bar__badge');
        const count = response?.count ?? '';
        const visible = response?.visible === false ? false : Boolean(String(count).length);
        instance.fieldRender.renderData({ response: { badgeCount: visible ? String(count) : '' } });
        badge.dataset.visible = visible ? 'true' : 'false';
        badge.dataset.tone = response?.tone || 'info';
    };
    instance.fieldRender.renderData({ response: { title: 'LIVE ALERT BUS' } });
    instance.renderBadge({ response: { count: '4', tone: 'info', visible: true } });
    const log = (m) => { document.getElementById('demo-log').textContent = 'log: ' + m; };
    document.querySelectorAll('.demo-controls button').forEach((button) => button.addEventListener('click', () => {
        instance.renderBadge({ response: { count: button.dataset.count, tone: button.dataset.tone, visible: button.dataset.count !== '0' } });
        log(`badge -> ${button.dataset.count}`);
    }));
})();
</script>
</body>
</html>
