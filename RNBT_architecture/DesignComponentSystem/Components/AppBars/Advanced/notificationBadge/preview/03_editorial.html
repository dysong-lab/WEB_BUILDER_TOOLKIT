<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/notificationBadge — 03_editorial</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F6F2EC; font-family: 'Inter', sans-serif; padding: 40px 0; }
        #top-app-bar-container, .demo-controls, .demo-log { width: 600px; margin: 0 auto; }
        .demo-controls { display: flex; gap: 16px; margin-top: 16px; }
        .demo-controls button { padding: 10px 0; border: none; border-bottom: 1px solid #CFC5BA; background: none; color: #5B544D; cursor: pointer; }
        .demo-log { margin-top: 16px; padding-top: 12px; border-top: 1px solid #DDD4C9; color: #6B6560; }
    </style>
</head>
<body>
<div id="top-app-bar-container"></div>
<div class="demo-controls">
    <button data-count="0" data-tone="info">none</button>
    <button data-count="2" data-tone="info">2</button>
    <button data-count="5" data-tone="warning">5</button>
    <button data-count="11" data-tone="critical">11</button>
</div>
<div class="demo-log" id="demo-log">log: ready</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/03_editorial.html', '../styles/03_editorial.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, { cssSelectors: { title: '.top-app-bar__title', badgeCount: '.top-app-bar__badge-count' } });
    instance.renderBadge = ({ response }) => {
        const badge = instance.appendElement.querySelector('.top-app-bar__badge');
        const count = response?.count ?? '';
        const visible = response?.visible === false ? false : Boolean(String(count).length);
        instance.fieldRender.renderData({ response: { badgeCount: visible ? String(count) : '' } });
        badge.dataset.visible = visible ? 'true' : 'false';
        badge.dataset.tone = response?.tone || 'info';
    };
    instance.fieldRender.renderData({ response: { title: 'Letters & Notes' } });
    instance.renderBadge({ response: { count: '2', tone: 'info', visible: true } });
    const log = (m) => { document.getElementById('demo-log').textContent = 'log: ' + m; };
    document.querySelectorAll('.demo-controls button').forEach((button) => button.addEventListener('click', () => {
        instance.renderBadge({ response: { count: button.dataset.count, tone: button.dataset.tone, visible: button.dataset.count !== '0' } });
        log(`badge -> ${button.dataset.count}`);
    }));
})();
</script>
</body>
</html>
