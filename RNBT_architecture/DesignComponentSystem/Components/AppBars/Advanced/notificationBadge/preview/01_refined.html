<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/notificationBadge — 01_refined</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #12153D; font-family: 'Pretendard', sans-serif; padding: 40px 0; }
        #top-app-bar-container, .demo-controls, .demo-log { width: 600px; margin: 0 auto; }
        .demo-controls { display: flex; gap: 8px; margin-top: 16px; }
        .demo-controls button { padding: 10px 14px; border-radius: 10px; border: 1px solid #2A2574; background: rgba(255,255,255,0.04); color: #D3DBF9; cursor: pointer; }
        .demo-log { margin-top: 16px; padding: 12px 16px; border: 1px solid #2A2574; border-radius: 12px; color: #A6B3DE; background: rgba(255,255,255,0.04); }
    </style>
</head>
<body>
<div id="top-app-bar-container"></div>
<div class="demo-controls">
    <button data-count="0" data-tone="info">Clear</button>
    <button data-count="3" data-tone="info">3</button>
    <button data-count="12" data-tone="warning">12</button>
    <button data-count="99+" data-tone="critical">99+</button>
</div>
<div class="demo-log" id="demo-log">log: ready</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/01_refined.html', '../styles/01_refined.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, { cssSelectors: { title: '.top-app-bar__title', bar: '.top-app-bar', navIcon: '.top-app-bar__nav-icon', badgeAction: '.top-app-bar__action--badge', utilityAction: '.top-app-bar__action--utility', badgeCount: '.top-app-bar__badge-count', badge: '.top-app-bar__badge' } });
    instance.renderBadge = ({ response }) => {
        const badge = instance.appendElement.querySelector('.top-app-bar__badge');
        const btn = instance.appendElement.querySelector('.top-app-bar__action--badge');
        const count = response?.count ?? '';
        const visible = response?.visible === false ? false : Boolean(String(count).length);
        instance.fieldRender.renderData({ response: { badgeCount: visible ? String(count) : '' } });
        badge.dataset.visible = visible ? 'true' : 'false';
        badge.dataset.tone = response?.tone || 'info';
        btn.setAttribute('aria-label', visible ? `Notifications (${count})` : 'Notifications');
    };
    instance.fieldRender.renderData({ response: { title: 'Operations Center' } });
    instance.renderBadge({ response: { count: '3', tone: 'info', visible: true } });
    const log = (m) => { document.getElementById('demo-log').textContent = 'log: ' + m; };
    document.querySelectorAll('.demo-controls button').forEach((button) => button.addEventListener('click', () => {
        instance.renderBadge({ response: { count: button.dataset.count, tone: button.dataset.tone, visible: button.dataset.count !== '0' } });
        log(`badge -> ${button.dataset.count}`);
    }));
    instance.appendElement.querySelector('.top-app-bar__action--badge').addEventListener('click', () => log('badge clicked'));
})();
</script>
</body>
</html>
