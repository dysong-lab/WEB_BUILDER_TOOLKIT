<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/notificationBadge — 02_material</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #EEF3FB; font-family: 'Roboto', sans-serif; padding: 40px 0; }
        #top-app-bar-container, .demo-controls, .demo-log { width: 600px; margin: 0 auto; }
        .demo-controls { display: flex; gap: 8px; margin-top: 16px; }
        .demo-controls button { padding: 10px 14px; border-radius: 10px; border: 1px solid #D7E2F1; background: #fff; color: #223041; cursor: pointer; }
        .demo-log { margin-top: 16px; padding: 12px 16px; border: 1px solid #D7E2F1; border-radius: 12px; color: #607284; background: #fff; }
    </style>
</head>
<body>
<div id="top-app-bar-container"></div>
<div class="demo-controls">
    <button data-count="0" data-tone="info">0</button>
    <button data-count="7" data-tone="info">7</button>
    <button data-count="18" data-tone="warning">18</button>
    <button data-count="42" data-tone="critical">42</button>
</div>
<div class="demo-log" id="demo-log">log: ready</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/02_material.html', '../styles/02_material.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, { cssSelectors: { title: '.top-app-bar__title', badgeCount: '.top-app-bar__badge-count' } });
    instance.renderBadge = ({ response }) => {
        const badge = instance.appendElement.querySelector('.top-app-bar__badge');
        const count = response?.count ?? '';
        const visible = response?.visible === false ? false : Boolean(String(count).length);
        instance.fieldRender.renderData({ response: { badgeCount: visible ? String(count) : '' } });
        badge.dataset.visible = visible ? 'true' : 'false';
        badge.dataset.tone = response?.tone || 'info';
    };
    instance.fieldRender.renderData({ response: { title: 'Workspace Alerts' } });
    instance.renderBadge({ response: { count: '7', tone: 'info', visible: true } });
    const log = (m) => { document.getElementById('demo-log').textContent = 'log: ' + m; };
    document.querySelectorAll('.demo-controls button').forEach((button) => button.addEventListener('click', () => {
        instance.renderBadge({ response: { count: button.dataset.count, tone: button.dataset.tone, visible: button.dataset.count !== '0' } });
        log(`badge -> ${button.dataset.count}`);
    }));
})();
</script>
</body>
</html>
