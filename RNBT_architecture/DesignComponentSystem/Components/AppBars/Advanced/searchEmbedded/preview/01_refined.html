<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/searchEmbedded — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #12153D; font-family: 'Pretendard', sans-serif; }
        #top-app-bar-container { margin: 40px auto 0; }
        .demo-log {
            width: 360px;
            margin: 24px auto 0;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="top-app-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            bar:         '.top-app-bar',
            placeholder: '.top-app-bar__search-input',
            count:       '.top-app-bar__count',
            navIcon:     '.top-app-bar__nav-icon',
            clearIcon:   '.top-app-bar__clear'
        },
        elementAttrs: {
            placeholder: 'placeholder'
        }
    });

    instance.subscriptions = { searchInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.placeholder]: '@searchInputChanged'
        },
        click: {
            [instance.fieldRender.cssSelectors.navIcon]:   '@navigationClicked',
            [instance.fieldRender.cssSelectors.clearIcon]: '@searchCleared'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    // ── 페이지 측 시뮬레이션: 디바운스 + 검색 + count 업데이트 ──
    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const FAKE_DEVICES = ['battery-01', 'battery-02', 'chiller-01', 'chiller-02', 'panel-01', 'ups-01', 'ups-02', 'thermo-01'];
    let debounceTimer = null;

    Wkit.onEventBusHandlers({
        '@navigationClicked': () => log('navigationClicked → drawer.open()'),

        '@searchInputChanged': ({ event }) => {
            const value = event.target.value;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const matched = value
                    ? FAKE_DEVICES.filter(d => d.includes(value.toLowerCase())).length
                    : FAKE_DEVICES.length;
                log(`searchInputChanged "${value}" → ${matched} results`);
                GlobalDataPublisher.publish('searchInfo', { response: { count: matched + ' results' } });
            }, 200);
        },

        '@searchCleared': () => {
            const input = instance.appendElement.querySelector(instance.fieldRender.cssSelectors.placeholder);
            if (input) input.value = '';
            clearTimeout(debounceTimer);
            log('searchCleared → input reset');
            GlobalDataPublisher.publish('searchInfo', { response: { count: FAKE_DEVICES.length + ' results' } });
        }
    });

    // 초기 데이터 — placeholder 텍스트 + 결과 개수
    instance.fieldRender.renderData({
        response: {
            placeholder: 'Search devices…',
            count: FAKE_DEVICES.length + ' results'
        }
    });
})();
</script>
</body>
</html>
