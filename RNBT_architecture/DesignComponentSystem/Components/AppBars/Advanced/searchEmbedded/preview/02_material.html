<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/searchEmbedded — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Roboto', sans-serif; }
        #top-app-bar-container { width: 600px; margin: 40px auto 0; }
        .demo-log {
            width: 600px;
            margin: 20px auto 0;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #d9e2f2;
            border-radius: 16px;
            color: #455a64;
            font-size: 13px;
            line-height: 1.6;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        }
        .demo-log strong { color: #1565C0; }
    </style>
</head>
<body>

<div id="top-app-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>Event log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            bar:         '.top-app-bar',
            placeholder: '.top-app-bar__search-input',
            count:       '.top-app-bar__count',
            navIcon:     '.top-app-bar__nav-icon',
            clearIcon:   '.top-app-bar__clear'
        },
        elementAttrs: {
            placeholder: 'placeholder'
        }
    });

    instance.subscriptions = { searchInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.placeholder]: '@searchInputChanged'
        },
        click: {
            [instance.fieldRender.cssSelectors.navIcon]: '@navigationClicked',
            [instance.fieldRender.cssSelectors.clearIcon]: '@searchCleared'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>Event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const FAKE_DEVICES = ['Battery Rack 01', 'Battery Rack 02', 'Cooling CRAC 01', 'Cooling CRAC 02', 'PDU North', 'UPS Line A', 'UPS Line B', 'ATS East'];
    let debounceTimer = null;

    Wkit.onEventBusHandlers({
        '@navigationClicked': () => log('navigationClicked -> drawer.open()'),
        '@searchInputChanged': ({ event }) => {
            const value = event.target.value.toLowerCase();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const matched = value ? FAKE_DEVICES.filter((d) => d.toLowerCase().includes(value)).length : FAKE_DEVICES.length;
                log(`searchInputChanged "${event.target.value}" -> ${matched} results`);
                instance.fieldRender.renderData({ response: { count: matched + ' results' } });
            }, 180);
        },
        '@searchCleared': () => {
            const input = instance.appendElement.querySelector(instance.fieldRender.cssSelectors.placeholder);
            if (input) input.value = '';
            clearTimeout(debounceTimer);
            log('searchCleared -> reset query');
            instance.fieldRender.renderData({ response: { count: FAKE_DEVICES.length + ' results' } });
        }
    });

    instance.fieldRender.renderData({
        response: {
            placeholder: 'Search equipment',
            count: FAKE_DEVICES.length + ' results'
        }
    });
})();
</script>
</body>
</html>
