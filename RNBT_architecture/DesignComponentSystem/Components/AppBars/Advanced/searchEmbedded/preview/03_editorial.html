<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/searchEmbedded — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f2efe9; font-family: 'Inter', sans-serif; }
        #top-app-bar-container { width: 600px; margin: 40px auto 0; }
        .demo-log {
            width: 600px;
            margin: 20px auto 0;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.45);
            border: 1px solid #ddd4c9;
            color: #5b544d;
            font-size: 13px;
            line-height: 1.7;
        }
        .demo-log strong { color: #2c2824; font-family: 'DM Serif Display', serif; font-size: 18px; }
    </style>
</head>
<body>

<div id="top-app-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>Search Session</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            bar:         '.top-app-bar',
            placeholder: '.top-app-bar__search-input',
            count:       '.top-app-bar__count',
            navIcon:     '.top-app-bar__nav-icon',
            clearIcon:   '.top-app-bar__clear'
        },
        elementAttrs: {
            placeholder: 'placeholder'
        }
    });

    instance.subscriptions = { searchInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.placeholder]: '@searchInputChanged'
        },
        click: {
            [instance.fieldRender.cssSelectors.navIcon]: '@navigationClicked',
            [instance.fieldRender.cssSelectors.clearIcon]: '@searchCleared'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Search Session</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>Search Session</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const FAKE_DEVICES = ['Issue Archive', 'Operator Notes', 'Cooling Summary', 'North Wing Layout', 'Weekly Report', 'UPS Inspection', 'ATS Procedure', 'Battery Memo'];
    let debounceTimer = null;

    Wkit.onEventBusHandlers({
        '@navigationClicked': () => log('navigationClicked -> return to index'),
        '@searchInputChanged': ({ event }) => {
            const value = event.target.value.toLowerCase();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const matched = value ? FAKE_DEVICES.filter((d) => d.toLowerCase().includes(value)).length : FAKE_DEVICES.length;
                log(`searchInputChanged "${event.target.value}" -> ${matched} matches`);
                instance.fieldRender.renderData({ response: { count: matched + ' matches' } });
            }, 180);
        },
        '@searchCleared': () => {
            const input = instance.appendElement.querySelector(instance.fieldRender.cssSelectors.placeholder);
            if (input) input.value = '';
            clearTimeout(debounceTimer);
            log('searchCleared -> field emptied');
            instance.fieldRender.renderData({ response: { count: FAKE_DEVICES.length + ' matches' } });
        }
    });

    instance.fieldRender.renderData({
        response: {
            placeholder: 'Search reports and notes',
            count: FAKE_DEVICES.length + ' matches'
        }
    });
})();
</script>
</body>
</html>
