<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/searchEmbedded — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010409; font-family: 'Inter', sans-serif; }
        #top-app-bar-container { width: 600px; margin: 40px auto 0; }
        .demo-log {
            width: 600px;
            margin: 18px auto 0;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid rgba(77, 208, 225, 0.18);
            color: #8fa3b8;
            font-size: 12px;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.7;
        }
        .demo-log strong { color: #4dd0e1; }
    </style>
</head>
<body>

<div id="top-app-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>CONTROL LOG</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            bar:         '.top-app-bar',
            placeholder: '.top-app-bar__search-input',
            count:       '.top-app-bar__count',
            navIcon:     '.top-app-bar__nav-icon',
            clearIcon:   '.top-app-bar__clear'
        },
        elementAttrs: {
            placeholder: 'placeholder'
        }
    });

    instance.subscriptions = { searchInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.placeholder]: '@searchInputChanged'
        },
        click: {
            [instance.fieldRender.cssSelectors.navIcon]: '@navigationClicked',
            [instance.fieldRender.cssSelectors.clearIcon]: '@searchCleared'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>CONTROL LOG</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>CONTROL LOG</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const FAKE_DEVICES = ['HV-U8-B', 'HV-P1-A', 'ATS-EAST', 'PDU-NORTH', 'UPS-R03', 'CRAC-01', 'CRAC-02', 'BATT-A1'];
    let debounceTimer = null;

    Wkit.onEventBusHandlers({
        '@navigationClicked': () => log('navigationClicked -> OPEN SIDEBAR'),
        '@searchInputChanged': ({ event }) => {
            const value = event.target.value.toLowerCase();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const matched = value ? FAKE_DEVICES.filter((d) => d.toLowerCase().includes(value)).length : FAKE_DEVICES.length;
                log(`searchInputChanged "${event.target.value}" -> ${matched} records`);
                instance.fieldRender.renderData({ response: { count: matched + ' records' } });
            }, 140);
        },
        '@searchCleared': () => {
            const input = instance.appendElement.querySelector(instance.fieldRender.cssSelectors.placeholder);
            if (input) input.value = '';
            clearTimeout(debounceTimer);
            log('searchCleared -> RESET QUERY');
            instance.fieldRender.renderData({ response: { count: FAKE_DEVICES.length + ' records' } });
        }
    });

    instance.fieldRender.renderData({
        response: {
            placeholder: 'QUERY DEVICE ID',
            count: FAKE_DEVICES.length + ' records'
        }
    });
})();
</script>
</body>
</html>
