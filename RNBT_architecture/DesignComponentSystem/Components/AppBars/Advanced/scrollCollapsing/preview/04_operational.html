<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/scrollCollapsing — 04_operational</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010409; font-family: 'IBM Plex Mono', monospace; padding: 32px 0; }
        .demo-shell { width: 680px; margin: 0 auto; }
        #top-app-bar-container, .demo-controls, .demo-scroll, .demo-log { width: 600px; margin: 0 auto; }
        .demo-controls { display: flex; gap: 8px; margin-top: 16px; }
        .demo-controls button { padding: 9px 12px; border: 1px solid rgba(77,208,225,0.18); border-radius: 4px; background: #0D1117; color: #8FA3B8; cursor: pointer; }
        .demo-scroll { height: 320px; margin-top: 12px; overflow: auto; border: 1px solid rgba(77,208,225,0.18); background: #0D1117; }
        .demo-section { padding: 20px; border-bottom: 1px solid rgba(77,208,225,0.08); color: #C9D6E3; }
        .demo-section p { color: #8FA3B8; line-height: 1.6; }
        .demo-log { margin-top: 16px; padding: 12px; border: 1px solid rgba(77,208,225,0.18); color: #8FA3B8; background: #0D1117; }
    </style>
</head>
<body>
<div class="demo-shell">
    <div id="top-app-bar-container"></div>
    <div class="demo-controls">
        <button id="btn-expand">EXPAND</button>
        <button id="btn-collapse">COLLAPSE</button>
        <button id="btn-title">SWITCH TITLE</button>
    </div>
    <div class="demo-scroll" id="demo-scroll"></div>
    <div class="demo-log" id="demo-log">log: ready</div>
</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/04_operational.html', '../styles/04_operational.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, { cssSelectors: { title: '.top-app-bar__title', bar: '.top-app-bar', navIcon: '.top-app-bar__nav-icon', action: '.top-app-bar__action' } });
    const bar = () => instance.appendElement.querySelector('.top-app-bar');
    instance.collapse = () => { bar().dataset.collapsed = 'true'; log('collapsed'); };
    instance.expand = () => { bar().dataset.collapsed = 'false'; log('expanded'); };
    const scrollEl = document.getElementById('demo-scroll');
    scrollEl.addEventListener('scroll', () => (scrollEl.scrollTop >= 72 ? instance.collapse() : instance.expand()), { passive: true });
    instance.fieldRender.renderData({ response: { title: 'ALARM TIMELINE' } });
    const log = (message) => { document.getElementById('demo-log').textContent = 'log: ' + message; };
    scrollEl.innerHTML = Array.from({ length: 8 }).map((_, i) => `<section class="demo-section"><h3>BLOCK ${i + 1}</h3><p>Operational variant uses compact density and strong collapse state.</p></section>`).join('');
    document.getElementById('btn-expand').addEventListener('click', () => instance.expand());
    document.getElementById('btn-collapse').addEventListener('click', () => instance.collapse());
    document.getElementById('btn-title').addEventListener('click', () => instance.fieldRender.renderData({ response: { title: 'EVENT BUFFER' } }));
})();
</script>
</body>
</html>
