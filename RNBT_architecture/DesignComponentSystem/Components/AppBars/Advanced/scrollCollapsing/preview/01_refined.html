<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/scrollCollapsing — 01_refined</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #12153D; font-family: 'Pretendard', sans-serif; padding: 32px 0; }
        .demo-shell { width: 680px; margin: 0 auto; }
        #top-app-bar-container { width: 600px; margin: 0 auto; }
        .demo-controls, .demo-log { width: 600px; margin: 16px auto 0; }
        .demo-controls { display: flex; gap: 8px; }
        .demo-controls button {
            border: 1px solid #2A2574; background: rgba(255,255,255,0.04); color: #D3DBF9;
            padding: 10px 14px; border-radius: 10px; cursor: pointer;
        }
        .demo-scroll {
            width: 600px; height: 320px; margin: 12px auto 0; overflow: auto;
            border: 1px solid #2A2574; border-radius: 20px; background: #191D50;
        }
        .demo-section { padding: 24px; border-bottom: 1px solid rgba(112, 126, 180, 0.2); color: #D3DBF9; }
        .demo-section h3 { margin-bottom: 8px; font-size: 18px; }
        .demo-section p { color: #A6B3DE; line-height: 1.6; }
        .demo-log {
            padding: 12px 16px; border: 1px solid #2A2574; border-radius: 12px;
            color: #A6B3DE; font-size: 12px; line-height: 1.6; background: rgba(255,255,255,0.04);
        }
    </style>
</head>
<body>
<div class="demo-shell">
    <div id="top-app-bar-container"></div>
    <div class="demo-controls">
        <button id="btn-expand">Force Expand</button>
        <button id="btn-collapse">Force Collapse</button>
        <button id="btn-title">Change Title</button>
    </div>
    <div class="demo-scroll" id="demo-scroll"></div>
    <div class="demo-log" id="demo-log">log: ready</div>
</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/01_refined.html', '../styles/01_refined.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, {
        cssSelectors: { title: '.top-app-bar__title', bar: '.top-app-bar', navIcon: '.top-app-bar__nav-icon', action: '.top-app-bar__action' }
    });
    instance.scrollState = { collapsed: false, threshold: 72, container: null, handler: null };
    instance.collapse = () => { instance.appendElement.querySelector('.top-app-bar').dataset.collapsed = 'true'; instance.scrollState.collapsed = true; log('collapsed'); };
    instance.expand = () => { instance.appendElement.querySelector('.top-app-bar').dataset.collapsed = 'false'; instance.scrollState.collapsed = false; log('expanded'); };
    instance.syncScrollState = (scrollTop = 0) => scrollTop >= instance.scrollState.threshold ? instance.collapse() : instance.expand();
    instance.detachScrollListener = () => {
        if (!instance.scrollState.container || !instance.scrollState.handler) return;
        instance.scrollState.container.removeEventListener('scroll', instance.scrollState.handler);
    };
    instance.attachScrollListener = ({ container, threshold = 72 } = {}) => {
        instance.detachScrollListener();
        instance.scrollState.threshold = threshold;
        instance.scrollState.container = container;
        instance.scrollState.handler = () => instance.syncScrollState(container.scrollTop || 0);
        container.addEventListener('scroll', instance.scrollState.handler, { passive: true });
        instance.scrollState.handler();
    };
    instance.fieldRender.renderData({ response: { title: 'Facility Overview' } });

    const logEl = document.getElementById('demo-log');
    function log(message) { logEl.textContent = 'log: ' + message; }

    document.getElementById('demo-scroll').innerHTML = Array.from({ length: 8 }).map((_, i) => `
        <section class="demo-section">
            <h3>Section ${i + 1}</h3>
            <p>Scroll down to collapse the app bar. Each section simulates a content block inside a page container.</p>
        </section>
    `).join('');

    const scrollEl = document.getElementById('demo-scroll');
    instance.attachScrollListener({ container: scrollEl, threshold: 84 });

    document.getElementById('btn-expand').addEventListener('click', () => instance.expand());
    document.getElementById('btn-collapse').addEventListener('click', () => instance.collapse());
    document.getElementById('btn-title').addEventListener('click', () => {
        const next = instance.scrollState.collapsed ? 'Critical Events' : 'Facility Overview';
        instance.fieldRender.renderData({ response: { title: next } });
        log('title changed');
    });
})();
</script>
</body>
</html>
