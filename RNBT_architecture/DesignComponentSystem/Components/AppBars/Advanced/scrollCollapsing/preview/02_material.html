<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/scrollCollapsing — 02_material</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #EEF3FB; font-family: 'Roboto', sans-serif; padding: 32px 0; }
        .demo-shell { width: 680px; margin: 0 auto; }
        #top-app-bar-container, .demo-controls, .demo-scroll, .demo-log { width: 600px; margin: 0 auto; }
        .demo-controls { display: flex; gap: 8px; margin-top: 16px; }
        .demo-controls button { padding: 10px 14px; border-radius: 10px; border: 1px solid #D7E2F1; background: #fff; color: #223041; cursor: pointer; }
        .demo-scroll { height: 320px; margin-top: 12px; overflow: auto; border-radius: 16px; background: #fff; box-shadow: 0 2px 8px rgba(19,40,72,0.08); }
        .demo-section { padding: 24px; border-bottom: 1px solid #E7EDF7; color: #223041; }
        .demo-section p { color: #607284; line-height: 1.6; }
        .demo-log { margin-top: 16px; padding: 12px 16px; background: #fff; border: 1px solid #D7E2F1; border-radius: 12px; color: #607284; }
    </style>
</head>
<body>
<div class="demo-shell">
    <div id="top-app-bar-container"></div>
    <div class="demo-controls">
        <button id="btn-expand">Expand</button>
        <button id="btn-collapse">Collapse</button>
        <button id="btn-title">Change Title</button>
    </div>
    <div class="demo-scroll" id="demo-scroll"></div>
    <div class="demo-log" id="demo-log">log: ready</div>
</div>
<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/02_material.html', '../styles/02_material.css');
    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };
    applyFieldRenderMixin(instance, { cssSelectors: { title: '.top-app-bar__title', bar: '.top-app-bar', navIcon: '.top-app-bar__nav-icon', action: '.top-app-bar__action' } });
    const bar = () => instance.appendElement.querySelector('.top-app-bar');
    instance.collapse = () => { bar().dataset.collapsed = 'true'; log('collapsed'); };
    instance.expand = () => { bar().dataset.collapsed = 'false'; log('expanded'); };
    instance.attachScrollListener = ({ container, threshold = 88 } = {}) => {
        container.addEventListener('scroll', () => (container.scrollTop >= threshold ? instance.collapse() : instance.expand()), { passive: true });
    };
    instance.fieldRender.renderData({ response: { title: 'Workspace Dashboard' } });
    const logEl = document.getElementById('demo-log');
    const log = (message) => { logEl.textContent = 'log: ' + message; };
    document.getElementById('demo-scroll').innerHTML = Array.from({ length: 8 }).map((_, i) => `<section class="demo-section"><h3>Card ${i + 1}</h3><p>Material variant preview content block for scroll collapsing behavior.</p></section>`).join('');
    instance.attachScrollListener({ container: document.getElementById('demo-scroll') });
    document.getElementById('btn-expand').addEventListener('click', () => instance.expand());
    document.getElementById('btn-collapse').addEventListener('click', () => instance.collapse());
    document.getElementById('btn-title').addEventListener('click', () => instance.fieldRender.renderData({ response: { title: 'Recent Activity' } }));
})();
</script>
</body>
</html>
