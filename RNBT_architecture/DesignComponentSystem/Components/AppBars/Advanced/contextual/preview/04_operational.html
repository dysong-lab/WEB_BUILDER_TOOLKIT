<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AppBars/Advanced/contextual — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #010409; font-family: 'Inter', sans-serif; padding: 40px 0; }
        .sim-wrap { width: 600px; margin: 0 auto; }
        .sim-note {
            padding: 10px 14px;
            margin-bottom: 12px;
            background: #0d1117;
            border: 1px solid rgba(77, 208, 225, 0.18);
            color: #8fa3b8;
            font-size: 12px;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.7;
        }
        .sim-note strong { color: #4dd0e1; }
        .mock-list {
            margin-top: 8px;
            background: #0d1117;
            border: 1px solid rgba(77, 208, 225, 0.18);
            overflow: hidden;
        }
        .mock-list__header {
            padding: 10px 16px;
            font-size: 11px;
            color: #4dd0e1;
            font-family: 'IBM Plex Mono', monospace;
            border-bottom: 1px solid rgba(77, 208, 225, 0.14);
            letter-spacing: 0.1em;
        }
        .mock-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(77, 208, 225, 0.08);
            color: #c9d6e3;
            font-size: 13px;
            font-family: 'IBM Plex Mono', monospace;
        }
        .mock-item:last-child { border-bottom: none; }
        .mock-item--active { background: rgba(77, 208, 225, 0.08); }
        .mock-item input[type="checkbox"] { accent-color: #4dd0e1; width: 16px; height: 16px; }
        .demo-log {
            margin-top: 16px;
            padding: 12px 14px;
            background: #0d1117;
            border: 1px solid rgba(77, 208, 225, 0.18);
            color: #8fa3b8;
            font-size: 12px;
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1.7;
        }
        .demo-log strong { color: #4dd0e1; }
    </style>
</head>
<body>

<div class="sim-wrap">
    <div class="sim-note">
        <strong>CONTROL MODE</strong><br>
        Selected rows drive the contextual action bar in the control-room theme.
    </div>
    <div id="top-app-bar-container"></div>
    <div class="mock-list">
        <div class="mock-list__header">DEVICE GROUPS</div>
        <div id="mock-list-body"></div>
    </div>
    <div class="demo-log" id="demo-log"><strong>CONTROL LOG</strong><br>—</div>
</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('top-app-bar-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'top-app-bar', appendElement: document.getElementById('top-app-bar-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            bar: '.top-app-bar',
            count: '.top-app-bar__count',
            closeIcon: '.top-app-bar__close'
        }
    });

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.top-app-bar__action-list',
            template: '#top-app-bar-action-template',
            item: '.top-app-bar__action-item',
            id: '.top-app-bar__action-item',
            actionLabel: '.top-app-bar__action-item',
            icon: '.top-app-bar__action-icon',
            label: '.top-app-bar__action-label'
        },
        datasetAttrs: { id: 'id' },
        elementAttrs: { actionLabel: 'aria-label' }
    });

    instance.renderSelection = ({ response }) => {
        instance.fieldRender.renderData({ response: { count: response.count } });
        instance.listRender.renderData({
            response: response.actions.map((action) => ({
                ...action,
                actionLabel: action.label || ''
            }))
        });
    };

    const ITEMS = [
        { id: 'hv-u8-b', label: 'HV-U8-B' },
        { id: 'hv-p1-a', label: 'HV-P1-A' },
        { id: 'ats-east', label: 'ATS-EAST' },
        { id: 'ups-r03', label: 'UPS-R03' },
        { id: 'pdu-north', label: 'PDU-NORTH' }
    ];
    const selected = new Set();
    const listEl = document.getElementById('mock-list-body');
    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>CONTROL LOG</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>CONTROL LOG</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).slice(0, 12).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const renderMockList = () => {
        listEl.innerHTML = ITEMS.map((item) => {
            const isActive = selected.has(item.id);
            return `
                <label class="mock-item ${isActive ? 'mock-item--active' : ''}">
                    <input type="checkbox" data-id="${item.id}" ${isActive ? 'checked' : ''}>
                    <span>${item.label}</span>
                </label>
            `;
        }).join('');
    };

    const computeActions = (count) => {
        if (count === 0) return [];
        if (count === 1) return [
            { id: 'inspect', icon: 'search', label: 'Inspect' },
            { id: 'mute', icon: 'notifications_off', label: 'Mute' }
        ];
        return [
            { id: 'isolate', icon: 'power_settings_new', label: 'Isolate' },
            { id: 'ack', icon: 'task_alt', label: 'Acknowledge' }
        ];
    };

    const syncAppBar = () => {
        const count = selected.size;
        instance.renderSelection({
            response: {
                count: count ? `${count} selected` : '',
                actions: computeActions(count)
            }
        });
    };

    listEl.addEventListener('change', (e) => {
        if (e.target.type !== 'checkbox') return;
        const { id } = e.target.dataset;
        if (e.target.checked) selected.add(id);
        else selected.delete(id);
        renderMockList();
        syncAppBar();
        log(`selection -> ${selected.size} active`);
    });

    Wkit.onEventBusHandlers({
        '@selectionActionClicked': ({ event }) => {
            const actionId = event.target.closest('.top-app-bar__action-item')?.dataset.id;
            log(`action "${actionId}" executed`);
            selected.clear();
            renderMockList();
            syncAppBar();
        },
        '@selectionCleared': () => {
            log('selection cleared');
            selected.clear();
            renderMockList();
            syncAppBar();
        }
    });

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.closeIcon]: '@selectionCleared',
            [instance.listRender.cssSelectors.item]: '@selectionActionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    renderMockList();
    syncAppBar();
})();
</script>
</body>
</html>
