<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TopAppBar — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f2efe9; }
        #top-app-bar-container { width: 600px; margin: 40px auto 0; }

        /* 03_editorial: Persona C — Minimal Editorial */
        #top-app-bar-container {
            .top-app-bar {
                display: flex;
                align-items: center;
                height: 72px;
                padding: 0 24px;
                background: #faf9f7;
                border-bottom: 1px solid #e8e4de;
            }

            .top-app-bar__nav-icon {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: none;
                background: none;
                color: #a09890;
                cursor: pointer;
                border-radius: 0;
            }

            .top-app-bar__nav-icon:hover {
                color: #3d3833;
            }

            .top-app-bar__nav-icon .material-symbols-outlined {
                font-size: 20px;
            }

            .top-app-bar__title {
                font-family: 'DM Serif Display', serif;
                font-size: 22px;
                font-weight: 400;
                color: #2c2824;
                padding-left: 20px;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                letter-spacing: 0.3px;
                line-height: 1.3;
            }

            .top-app-bar__actions {
                display: flex;
                gap: 8px;
            }

            .top-app-bar__action {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: none;
                background: none;
                color: #a09890;
                cursor: pointer;
                border-radius: 0;
            }

            .top-app-bar__action:hover {
                color: #3d3833;
            }

            .top-app-bar__action .material-symbols-outlined {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div id="top-app-bar-container">
    <div class="top-app-bar">
        <button class="top-app-bar__nav-icon" aria-label="Menu">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="top-app-bar__title">Weekly Report</div>
        <div class="top-app-bar__actions">
            <button class="top-app-bar__action" aria-label="Search">
                <span class="material-symbols-outlined">search</span>
            </button>
        </div>
    </div>
</div>

</body>
</html>
