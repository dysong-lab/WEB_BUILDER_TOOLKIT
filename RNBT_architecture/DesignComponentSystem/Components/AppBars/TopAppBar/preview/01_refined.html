<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TopAppBar — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #12153D; }
        #top-app-bar-container { width: 600px; margin: 40px auto 0; }

        /* 01_refined: Persona A — Refined Technical */
        #top-app-bar-container {
            .top-app-bar {
                display: flex;
                align-items: center;
                height: 56px;
                padding: 0 8px;
                background: linear-gradient(90deg, rgba(80, 46, 233, 0.06) 0%, rgba(146, 168, 244, 0.03) 100%),
                            #191D50;
                border-bottom: 1px solid #2A2574;
            }

            .top-app-bar__nav-icon {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: none;
                background: none;
                color: #707EB4;
                cursor: pointer;
                border-radius: 8px;
                transition: background-color 150ms ease-out;
            }

            .top-app-bar__nav-icon:hover {
                color: #A6B3DE;
                background: rgba(80, 46, 233, 0.12);
            }

            .top-app-bar__nav-icon .material-symbols-outlined {
                font-size: 22px;
            }

            .top-app-bar__title {
                font-family: 'Pretendard', sans-serif;
                font-size: 18px;
                font-weight: 600;
                color: #E8EDFF;
                padding-left: 12px;
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .top-app-bar__actions {
                display: flex;
                gap: 4px;
            }

            .top-app-bar__action {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: none;
                background: none;
                color: #707EB4;
                cursor: pointer;
                border-radius: 8px;
                transition: background-color 150ms ease-out;
            }

            .top-app-bar__action:hover {
                color: #A6B3DE;
                background: rgba(80, 46, 233, 0.12);
            }

            .top-app-bar__action .material-symbols-outlined {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div id="top-app-bar-container">
    <div class="top-app-bar">
        <button class="top-app-bar__nav-icon" aria-label="Menu">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="top-app-bar__title">Dashboard</div>
        <div class="top-app-bar__actions">
            <button class="top-app-bar__action" aria-label="Search">
                <span class="material-symbols-outlined">search</span>
            </button>
            <button class="top-app-bar__action" aria-label="More">
                <span class="material-symbols-outlined">more_vert</span>
            </button>
        </div>
    </div>
</div>

</body>
</html>
