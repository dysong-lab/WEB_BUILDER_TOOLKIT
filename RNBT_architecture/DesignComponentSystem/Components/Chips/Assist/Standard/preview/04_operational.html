<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Chips/Assist/Standard — 04_operational</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <script src="../../../../../preview_runtime.js"></script>
    <script src="../../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #050b13;
        display: flex;
        justify-content: center;
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <div id="chip-root"></div>
    <script>
      (async () => {
        await loadComponentAssets(
          "chip-root",
          "../views/04_operational.html",
          "../styles/04_operational.css",
        );
        const instance = {
          id: "chip-root",
          appendElement: document.getElementById("chip-root"),
        };
        applyListRenderMixin(instance, {
          cssSelectors: {
            container: ".assist-chips",
            template: "#assist-chip-item-template",
            item: ".assist-chip",
            id: ".assist-chip",
            disabled: ".assist-chip",
            leadingIcon: ".assist-chip__icon",
            label: ".assist-chip__label",
          },
          itemKey: "id",
          datasetAttrs: {
            id: "id",
            disabled: "disabled",
          },
        });
        instance.customEvents = {
          click: {
            [instance.listRender.cssSelectors.item]: "@assistChipClicked",
          },
        };
        Wkit.bindEvents(instance, instance.customEvents);
        Wkit.onEventBusHandlers({
          "@assistChipClicked": ({ targetInstance, event }) => {
            const el = event.target.closest(".assist-chip");
            console.log(
              "[Preview] Assist chip clicked:",
              targetInstance?.id,
              el?.dataset.id,
              el?.dataset.disabled,
            );
          },
        });
        instance.listRender.renderData({
          response: [
            {
              id: "refresh",
              disabled: "false",
              leadingIcon: "refresh",
              label: "REFRESH",
            },
            {
              id: "pin",
              disabled: "false",
              leadingIcon: "push_pin",
              label: "PIN",
            },
            {
              id: "dispatch",
              disabled: "false",
              leadingIcon: "send",
              label: "DISPATCH",
            },
          ],
        });
      })();
    </script>
  </body>
</html>
