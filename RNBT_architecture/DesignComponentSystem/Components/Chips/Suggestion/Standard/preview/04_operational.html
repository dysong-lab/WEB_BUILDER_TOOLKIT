<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chips/Suggestion/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 400px;
            padding: 8px 12px;
            background: #161b22;
            border: 1px solid rgba(77, 208, 225, 0.12);
            border-radius: 4px;
            color: #7a8fa5;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #b0c4d8; }
    </style>
</head>
<body>

<div id="suggestion-chip-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('suggestion-chip-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'suggestion-chip', appendElement: document.getElementById('suggestion-chip-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.suggestion-chip__list',
            template:  '#suggestion-chip-item-template',
            chipid:    '.suggestion-chip__item',
            icon:      '.suggestion-chip__icon',
            label:     '.suggestion-chip__label'
        },
        datasetAttrs: {
            chipid: 'chipid'
        }
    });

    instance.subscriptions = { suggestionChipItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.chipid]: '@suggestionChipClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@suggestionChipClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.chipid);
            const chipid = item?.getAttribute('data-chipid');
            if (!chipid) return;
            log(`suggestionChipClicked "${chipid}"`);
        }
    });

    const chipData = [
        { chipid: 'weather',   icon: '\u{2600}', label: 'Weather today' },
        { chipid: 'nearby',    icon: '\u{1F4CD}', label: 'Restaurants nearby' },
        { chipid: 'translate', icon: '\u{1F310}', label: 'Translate this' },
        { chipid: 'summary',   icon: '\u{1F4DD}', label: 'Summarize' },
        { chipid: 'define',    icon: '',           label: 'Define word' }
    ];

    instance.listRender.renderData({ response: chipData });
})();
</script>
</body>
</html>
