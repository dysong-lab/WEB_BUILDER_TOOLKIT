<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Chips/Input/Standard — 02_material</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <script src="../../../../../preview_runtime.js"></script>
    <script src="../../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f4edf7;
        display: flex;
        justify-content: center;
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <div id="chip-root"></div>
    <script>
      (async () => {
        await loadComponentAssets(
          "chip-root",
          "../views/02_material.html",
          "../styles/02_material.css",
        );
        const instance = {
          id: "chip-root",
          appendElement: document.getElementById("chip-root"),
        };
        applyListRenderMixin(instance, {
          cssSelectors: {
            container: ".input-chips",
            template: "#input-chip-item-template",
            item: ".input-chip",
            chipid: ".input-chip",
            disabled: ".input-chip",
            label: ".input-chip__label",
            removeBtn: ".input-chip__remove",
          },
          itemKey: "chipid",
          datasetAttrs: {
            chipid: "chipid",
            disabled: "disabled",
          },
        });
        instance.removeItem = function (targetChipId) {
          const target = this.appendElement.querySelector(
            `${this.listRender.cssSelectors.item}[data-chipid="${String(targetChipId)}"]`,
          );
          if (!target || target.dataset.disabled === "true") return;
          target.remove();
        };
        instance.customEvents = {
          click: {
            [instance.listRender.cssSelectors.removeBtn]:
              "@inputChipRemoveClicked",
          },
        };
        Wkit.bindEvents(instance, instance.customEvents);
        Wkit.onEventBusHandlers({
          "@inputChipRemoveClicked": ({ targetInstance, event }) => {
            const chip = event.target.closest(".input-chip");
            const chipid = chip?.dataset.chipid;
            targetInstance?.removeItem(chipid);
            console.log(
              "[Preview] Input chip remove clicked:",
              targetInstance?.id,
              chipid,
            );
          },
        });
        instance.listRender.renderData({
          response: [
            { chipid: "alex", disabled: "false", label: "Alex" },
            { chipid: "mina", disabled: "false", label: "Mina" },
            { chipid: "park", disabled: "false", label: "Park" },
          ],
        });
      })();
    </script>
  </body>
</html>
