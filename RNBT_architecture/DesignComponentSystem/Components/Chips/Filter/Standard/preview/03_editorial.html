<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Chips/Filter/Standard — 03_editorial</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <script src="../../../../../preview_runtime.js"></script>
    <script src="../../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f2eadf;
        display: flex;
        justify-content: center;
        padding: 40px;
      }
    </style>
  </head>
  <body>
    <div id="chip-root"></div>
    <script>
      (async () => {
        await loadComponentAssets(
          "chip-root",
          "../views/03_editorial.html",
          "../styles/03_editorial.css",
        );

        const instance = { id: "chip-root", appendElement: document.getElementById("chip-root") };
        applyListRenderMixin(instance, {
          cssSelectors: {
            container: ".filter-chips",
            template: "#filter-chip-item-template",
            item: ".filter-chip",
            id: ".filter-chip",
            selected: ".filter-chip",
            disabled: ".filter-chip",
            leadingIcon: ".filter-chip__icon",
            label: ".filter-chip__label",
          },
          itemKey: "id",
          datasetAttrs: {
            id: "id",
            selected: "selected",
            disabled: "disabled",
          },
        });
        instance.toggleItem = function (targetId) {
          const target = this.appendElement.querySelector(
            `${this.listRender.cssSelectors.item}[data-id="${String(targetId)}"]`,
          );
          if (!target || target.dataset.disabled === "true") return;
          target.setAttribute(
            "data-selected",
            target.dataset.selected === "true" ? "false" : "true",
          );
        };
        instance.customEvents = {
          click: {
            [instance.listRender.cssSelectors.item]: "@filterChipClicked",
          },
        };
        Wkit.bindEvents(instance, instance.customEvents);
        Wkit.onEventBusHandlers({
          "@filterChipClicked": ({ targetInstance, event }) => {
            const el = event.target.closest(".filter-chip");
            const id = el?.dataset.id;
            targetInstance?.toggleItem(id);
            console.log(
              "[Preview] Filter chip clicked:",
              targetInstance?.id,
              id,
              el?.dataset.selected,
            );
          },
        });
        instance.listRender.renderData({
          response: [
            { id: "essays", selected: "true", disabled: "false", leadingIcon: "", label: "Essays" },
            { id: "notes", selected: "false", disabled: "false", leadingIcon: "", label: "Notes" },
            { id: "letters", selected: "false", disabled: "false", leadingIcon: "", label: "Letters" },
            { id: "locked", selected: "false", disabled: "true", leadingIcon: "", label: "Locked" },
          ],
        });
      })();
    </script>
  </body>
</html>
