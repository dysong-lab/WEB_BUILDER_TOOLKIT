<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sidebar — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #sidebar-container { width: 220px; height: 400px; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/ListRenderMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('sidebar-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'sidebar',
            appendElement: document.getElementById('sidebar-container')
        };

        applyListRenderMixin(instance, {
            cssSelectors: {
                container: '.sidebar__menu',
                template:  '#sidebar-menu-item-template',
                menuid:    '.sidebar__item',
                active:    '.sidebar__item',
                icon:      '.sidebar__item-icon',
                label:     '.sidebar__item-label',
                badge:     '.sidebar__item-badge'
            },
            itemKey: 'menuid',
            datasetAttrs: {
                menuid:  'menuid',
                active:  'active'
            }
        });

        instance.statefulList.renderData({
            response: [
                { menuid: 'dashboard', icon: '📊', label: 'Dashboard',  badge: '',   active: 'true' },
                { menuid: 'devices',   icon: '🖥️', label: 'Devices',    badge: '12', active: '' },
                { menuid: 'events',    icon: '📋', label: 'Events',     badge: '3',  active: '' },
                { menuid: 'reports',   icon: '📈', label: 'Reports',    badge: '',   active: '' },
                { menuid: 'settings',  icon: '⚙️', label: 'Settings',   badge: '',   active: '' }
            ]
        });
    })();
    </script>
</body>
</html>
