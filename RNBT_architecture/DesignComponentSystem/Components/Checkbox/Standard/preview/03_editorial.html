<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Checkbox/Standard — 03_editorial</title>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #eeece8;
        display: flex;
        justify-content: center;
        padding: 40px;
        gap: 32px;
      }
    </style>
  </head>
  <body>
    <div id="checkbox-1"></div>
    <div id="checkbox-2"></div>
    <script>
      (async () => {
        const ids = ["checkbox-1", "checkbox-2"];
        await Promise.all(
          ids.map((id) =>
            loadComponentAssets(
              id,
              "../views/03_editorial.html",
              "../styles/03_editorial.css",
            ),
          ),
        );

        const createInstance = (id) => {
          const instance = { id, appendElement: document.getElementById(id) };
          applyListRenderMixin(instance, {
            cssSelectors: {
              container: ".checkbox-group",
              template: "#checkbox-item-template",
              item: ".checkbox-item",
              id: ".checkbox-item",
              checked: ".checkbox-item",
              disabled: ".checkbox-item",
              label: ".checkbox-item__label",
            },
            itemKey: "id",
            datasetAttrs: {
              id: "id",
              checked: "checked",
              disabled: "disabled",
            },
          });
          instance.toggleItem = function (targetId) {
            const target = this.appendElement.querySelector(
              `${this.listRender.cssSelectors.item}[data-id="${String(targetId)}"]`,
            );
            if (!target || target.dataset.disabled === "true") return;
            target.setAttribute(
              "data-checked",
              target.dataset.checked === "true" ? "false" : "true",
            );
          };
          instance.customEvents = {
            click: {
              [instance.listRender.cssSelectors.item]: "@checkboxChanged",
            },
          };
          Wkit.bindEvents(instance, instance.customEvents);
          return instance;
        };

        const primary = createInstance("checkbox-1");
        const secondary = createInstance("checkbox-2");

        Wkit.onEventBusHandlers({
          "@checkboxChanged": ({ targetInstance, event }) => {
            const el = event.target.closest(".checkbox-item");
            const id = el?.dataset.id;
            targetInstance?.toggleItem(id);
          },
        });

        primary.listRender.renderData({
          response: [
            { id: "design", label: "디자인 시스템", checked: "true", disabled: "false" },
            { id: "research", label: "사용자 리서치", checked: "false", disabled: "false" },
            { id: "prototype", label: "프로토타입", checked: "true", disabled: "false" },
            { id: "legacy", label: "레거시 (종료)", checked: "false", disabled: "true" },
          ],
        });

        secondary.listRender.renderData({
          response: [
            { id: "figma", label: "Figma 연동", checked: "true", disabled: "false" },
            { id: "storybook", label: "Storybook", checked: "false", disabled: "false" },
            { id: "zeplin", label: "Zeplin", checked: "false", disabled: "false" },
          ],
        });
      })();
    </script>
  </body>
</html>
