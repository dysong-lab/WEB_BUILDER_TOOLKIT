<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dialogs/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-trigger {
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            background: #1565C0;
            color: #ffffff;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(21, 101, 192, 0.24);
            transition: background-color 200ms ease-in-out, box-shadow 200ms ease-in-out;
        }
        .demo-trigger:hover {
            background: #1976D2;
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            color: #5f6368;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #1a1a1a; }
    </style>
</head>
<body>

<button class="demo-trigger" id="open-btn">Open Dialog</button>
<div id="dialog-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ShadowPopupMixin.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('dialog-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'dialog', appendElement: document.getElementById('dialog-container') };

    instance._popupScope = null;

    applyShadowPopupMixin(instance, {
        cssSelectors: {
            template: '#dialog-popup-template',
            closeBtn: '.dialog__close-btn'
        },
        onCreated: (shadowRoot) => {
            instance._popupScope = { appendElement: shadowRoot };

            applyFieldRenderMixin(instance._popupScope, {
                cssSelectors: {
                    icon:       '.dialog__icon',
                    headline:   '.dialog__headline',
                    supporting: '.dialog__supporting'
                }
            });

            applyListRenderMixin(instance._popupScope, {
                cssSelectors: {
                    container:   '.dialog__actions',
                    template:    '#dialog-action-template',
                    actionid:    '.dialog__action',
                    actionLabel: '.dialog__action-label'
                },
                itemKey: 'actionid',
                datasetAttrs: {
                    actionid: 'actionid'
                }
            });
        }
    });

    instance.shadowPopup.bindPopupEvents({
        click: {
            [instance.shadowPopup.cssSelectors.closeBtn]: '@dialogClose',
            '.dialog__action': '@dialogActionClicked'
        }
    });

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@dialogClose': () => {
            instance.shadowPopup.hide();
            log('dialogClose → hide');
        },
        '@dialogActionClicked': ({ event }) => {
            const item = event.target.closest('.dialog__action');
            const actionid = item?.getAttribute('data-actionid');
            log(`dialogActionClicked "${actionid}"`);
            if (actionid === 'cancel') instance.shadowPopup.hide();
        }
    });

    document.getElementById('open-btn').addEventListener('click', () => {
        instance.shadowPopup.show();
        log('show dialog');

        instance._popupScope.fieldRender.renderData({ response: {
            icon: 'delete',
            headline: 'Delete File?',
            supporting: '이 파일을 삭제하면 복구할 수 없습니다. 연결된 모든 데이터도 함께 제거됩니다.'
        } });

        instance._popupScope.listRender.renderData({ response: [
            { actionid: 'cancel', actionLabel: 'Cancel' },
            { actionid: 'delete', actionLabel: 'Delete' }
        ] });
    });
})();
</script>
</body>
</html>
