<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dialogs/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0ede8;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-trigger {
            padding: 12px 28px;
            border: 1px solid #3d3833;
            border-radius: 2px;
            background: #3d3833;
            color: #fafaf8;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .demo-trigger:hover {
            background: #524d47;
        }
        .demo-log {
            width: 380px;
            padding: 12px 16px;
            background: #fafaf8;
            border: 1px solid #ddd8d0;
            border-radius: 2px;
            color: #6b6560;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #3d3833; }
    </style>
</head>
<body>

<button class="demo-trigger" id="open-btn">Open Dialog</button>
<div id="dialog-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ShadowPopupMixin.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('dialog-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'dialog', appendElement: document.getElementById('dialog-container') };

    instance._popupScope = null;

    applyShadowPopupMixin(instance, {
        cssSelectors: {
            template: '#dialog-popup-template',
            closeBtn: '.dialog__close-btn'
        },
        onCreated: (shadowRoot) => {
            instance._popupScope = { appendElement: shadowRoot };

            applyFieldRenderMixin(instance._popupScope, {
                cssSelectors: {
                    icon:       '.dialog__icon',
                    headline:   '.dialog__headline',
                    supporting: '.dialog__supporting'
                }
            });

            applyListRenderMixin(instance._popupScope, {
                cssSelectors: {
                    container:   '.dialog__actions',
                    template:    '#dialog-action-template',
                    actionid:    '.dialog__action',
                    actionLabel: '.dialog__action-label'
                },
                itemKey: 'actionid',
                datasetAttrs: {
                    actionid: 'actionid'
                }
            });
        }
    });

    instance.shadowPopup.bindPopupEvents({
        click: {
            [instance.shadowPopup.cssSelectors.closeBtn]: '@dialogClose',
            '.dialog__action': '@dialogActionClicked'
        }
    });

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@dialogClose': () => {
            instance.shadowPopup.hide();
            log('dialogClose → hide');
        },
        '@dialogActionClicked': ({ event }) => {
            const item = event.target.closest('.dialog__action');
            const actionid = item?.getAttribute('data-actionid');
            log(`dialogActionClicked "${actionid}"`);
            if (actionid === 'dismiss') instance.shadowPopup.hide();
        }
    });

    document.getElementById('open-btn').addEventListener('click', () => {
        instance.shadowPopup.show();
        log('show dialog');

        instance._popupScope.fieldRender.renderData({ response: {
            icon: 'info',
            headline: 'Save Changes',
            supporting: 'You have unsaved changes in this document. Would you like to save them before closing?'
        } });

        instance._popupScope.listRender.renderData({ response: [
            { actionid: 'dismiss', actionLabel: 'Discard' },
            { actionid: 'save', actionLabel: 'Save' }
        ] });
    });
})();
</script>
</body>
</html>
