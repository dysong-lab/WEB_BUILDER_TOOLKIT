<template id="dialog-popup-template">
    <style>
        /* 01_refined: Persona A — Refined Technical
           퍼플 팔레트 / 그라디언트 깊이 / Pretendard / 다크 / Tonal Dialog */

        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0');

        .dialog__overlay {
            position: fixed;
            inset: 0;
            background: rgba(14, 17, 48, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .dialog__surface {
            display: flex;
            flex-direction: column;
            width: 360px;
            background: linear-gradient(160deg, #1F2358 0%, #171A44 100%);
            border: 1px solid rgba(80, 46, 233, 0.4);
            border-radius: 20px;
            overflow: hidden;
        }

        .dialog__header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 28px 28px 0;
        }

        .dialog__icon {
            font-family: 'Material Symbols Outlined';
            font-size: 32px;
            color: #92A8F4;
        }

        .dialog__icon:empty {
            display: none;
        }

        .dialog__headline {
            font-family: 'Pretendard', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #E8EDFF;
            line-height: 1.35;
            text-align: center;
        }

        .dialog__body {
            padding: 16px 28px 24px;
        }

        .dialog__supporting {
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #A6B3DE;
            line-height: 1.6;
            text-align: center;
        }

        .dialog__supporting:empty {
            display: none;
        }

        .dialog__divider {
            height: 1px;
            background: rgba(80, 46, 233, 0.2);
            margin: 0 28px;
        }

        .dialog__actions {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px 20px;
        }

        .dialog__actions:empty {
            display: none;
        }

        .dialog__action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #92A8F4;
            cursor: pointer;
            transition: background-color 150ms ease-out;
        }

        .dialog__action:hover {
            background: rgba(80, 46, 233, 0.16);
        }

        .dialog__action:last-child {
            background: #502EE9;
            color: #E8EDFF;
        }

        .dialog__action:last-child:hover {
            background: #6B4BF0;
        }

        .dialog__action-label {
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .dialog__close-btn {
            display: none;
        }

        template {
            display: none;
        }
    </style>
    <div class="dialog__overlay">
        <div class="dialog__surface">
            <div class="dialog__header">
                <span class="dialog__icon"></span>
                <div class="dialog__headline"></div>
            </div>
            <div class="dialog__body">
                <div class="dialog__supporting"></div>
            </div>
            <div class="dialog__divider"></div>
            <div class="dialog__actions"></div>
            <template id="dialog-action-template">
                <button class="dialog__action" data-actionid="">
                    <span class="dialog__action-label"></span>
                </button>
            </template>
            <button class="dialog__close-btn"></button>
        </div>
    </div>
</template>
