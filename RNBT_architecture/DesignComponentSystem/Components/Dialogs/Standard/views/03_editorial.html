<div class="dialogs dialogs--editorial" aria-hidden="true">
    <template id="dialog-popup-template">
        <style>
            .dialog__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px;
                background: rgba(241, 236, 228, 0.74);
                backdrop-filter: blur(10px);
            }

            .dialog__surface {
                width: min(100%, 520px);
                border: 1px solid rgba(63, 50, 35, 0.14);
                border-radius: 24px;
                padding: 36px 34px 32px;
                background: #fffdf8;
                box-shadow: 0 28px 54px rgba(48, 39, 28, 0.12);
                color: #2f241a;
            }

            .dialog__header {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 18px;
            }

            .dialog__headline {
                font-family: 'Cormorant Garamond', 'Times New Roman', serif;
                font-size: 34px;
                font-weight: 600;
                line-height: 1.02;
                letter-spacing: -0.03em;
            }

            .dialog__close {
                width: 38px;
                height: 38px;
                border: 0;
                border-radius: 999px;
                background: rgba(47, 36, 26, 0.06);
                color: #2f241a;
                font-size: 20px;
                cursor: pointer;
            }

            .dialog__supporting-text {
                font-family: 'Instrument Sans', -apple-system, sans-serif;
                font-size: 15px;
                line-height: 1.75;
                color: rgba(47, 36, 26, 0.78);
            }

            .dialog__actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                margin-top: 28px;
            }

            .dialog__button {
                min-width: 120px;
                height: 46px;
                padding: 0 20px;
                border-radius: 999px;
                font-family: 'Instrument Sans', -apple-system, sans-serif;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                cursor: pointer;
            }

            .dialog__cancel {
                border: 1px solid rgba(47, 36, 26, 0.16);
                background: transparent;
                color: #2f241a;
            }

            .dialog__confirm {
                border: 1px solid #2f241a;
                background: #2f241a;
                color: #fffaf2;
            }
        </style>

        <div class="dialog__overlay">
            <div class="dialog__surface" role="dialog" aria-modal="true" aria-labelledby="dialog-editorial-title">
                <div class="dialog__header">
                    <h2 id="dialog-editorial-title" class="dialog__headline">Archive this edition for handoff?</h2>
                    <button type="button" class="dialog__close" aria-label="Close dialog">×</button>
                </div>
                <p class="dialog__supporting-text">A snapshot of the current layout, linked assets, and publishing metadata will be stored for the editorial team. You can restore it later from revision history.</p>
                <div class="dialog__actions">
                    <button type="button" class="dialog__button dialog__cancel"><span class="dialog__cancel-label">Review</span></button>
                    <button type="button" class="dialog__button dialog__confirm"><span class="dialog__confirm-label">Archive</span></button>
                </div>
            </div>
        </div>
    </template>
</div>
