<div class="dialogs dialogs--editorial" aria-hidden="true">
    <template id="dialog-popup-template">
        <style>
            .dialog__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px;
                background: rgba(241, 236, 228, 0.74);
                backdrop-filter: blur(10px);
                opacity: 0;
                transition: opacity 280ms cubic-bezier(0.22, 1, 0.36, 1);
            }

            .dialog__surface {
                width: min(100%, 520px);
                border: 1px solid rgba(63, 50, 35, 0.14);
                border-radius: 24px;
                padding: 36px 34px 32px;
                background: #fffdf8;
                box-shadow: 0 28px 54px rgba(48, 39, 28, 0.12);
                color: #2f241a;
                opacity: 0;
                transform: translateY(20px) scale(0.975);
                transform-origin: center center;
                transition:
                    opacity 280ms cubic-bezier(0.22, 1, 0.36, 1),
                    transform 280ms cubic-bezier(0.22, 1, 0.36, 1),
                    box-shadow 280ms cubic-bezier(0.22, 1, 0.36, 1);
            }

            .dialog__overlay[data-state="open"] {
                opacity: 1;
            }

            .dialog__overlay[data-state="open"] .dialog__surface {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            .dialog__overlay[data-state="closing"] .dialog__surface {
                opacity: 0;
                transform: translateY(10px) scale(0.99);
            }

            .dialog__header {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 18px;
            }

            .dialog__headline {
                font-family: 'Cormorant Garamond', 'Times New Roman', serif;
                font-size: 34px;
                font-weight: 600;
                line-height: 1.02;
                letter-spacing: -1px;
            }

            .dialog__close {
                width: 38px;
                height: 38px;
                border: 0;
                border-radius: 999px;
                background: rgba(47, 36, 26, 0.06);
                color: #2f241a;
                font-size: 20px;
                cursor: pointer;
                transition:
                    transform 170ms cubic-bezier(0.22, 1, 0.36, 1),
                    background-color 170ms ease,
                    box-shadow 170ms ease;
            }

            .dialog__close:hover {
                background: rgba(47, 36, 26, 0.1);
                box-shadow: 0 8px 18px rgba(48, 39, 28, 0.08);
            }

            .dialog__close:active {
                transform: scale(0.94);
            }

            .dialog__supporting-text {
                font-family: 'Instrument Sans', -apple-system, sans-serif;
                font-size: 15px;
                line-height: 1.75;
                color: rgba(47, 36, 26, 0.78);
            }

            .dialog__actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                margin-top: 28px;
            }

            .dialog__button {
                min-width: 120px;
                height: 46px;
                padding: 0 20px;
                border-radius: 999px;
                font-family: 'Instrument Sans', -apple-system, sans-serif;
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 1px;
                text-transform: uppercase;
                cursor: pointer;
                transition:
                    transform 170ms cubic-bezier(0.22, 1, 0.36, 1),
                    background-color 170ms ease,
                    color 170ms ease,
                    box-shadow 170ms ease,
                    border-color 170ms ease;
            }

            .dialog__cancel {
                border: 1px solid rgba(47, 36, 26, 0.16);
                background: transparent;
                color: #2f241a;
            }

            .dialog__cancel:hover {
                background: rgba(47, 36, 26, 0.06);
            }

            .dialog__confirm {
                border: 1px solid #2f241a;
                background: #2f241a;
                color: #fffaf2;
                box-shadow: 0 12px 24px rgba(48, 39, 28, 0.12);
            }

            .dialog__confirm:hover {
                transform: translateY(-1px);
                box-shadow: 0 16px 28px rgba(48, 39, 28, 0.16);
            }

            .dialog__button:active {
                transform: scale(0.97);
            }
        </style>

        <div class="dialog__overlay" data-state="closed">
            <div class="dialog__surface" role="dialog" aria-modal="true" aria-labelledby="dialog-editorial-title">
                <div class="dialog__header">
                    <h2 id="dialog-editorial-title" class="dialog__headline">Archive this edition for handoff?</h2>
                    <button type="button" class="dialog__close" aria-label="Close dialog">×</button>
                </div>
                <p class="dialog__supporting-text">A snapshot of the current layout, linked assets, and publishing metadata will be stored for the editorial team. You can restore it later from revision history.</p>
                <div class="dialog__actions">
                    <button type="button" class="dialog__button dialog__cancel"><span class="dialog__cancel-label">Review</span></button>
                    <button type="button" class="dialog__button dialog__confirm"><span class="dialog__confirm-label">Archive</span></button>
                </div>
            </div>
        </div>
    </template>
</div>
