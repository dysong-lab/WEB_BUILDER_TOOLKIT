<template id="dialog-popup-template">
    <style>
        /* 04_operational: Persona D — Dark Operational
           다크 시안 / JetBrains Mono / 밀집 / 미세 테두리 / 컴팩트 Dialog */

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0');

        .dialog__overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 20, 0.68);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .dialog__surface {
            display: flex;
            flex-direction: column;
            width: 320px;
            background: #0d1117;
            border: 1px solid rgba(77, 208, 225, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .dialog__header {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            padding: 14px 16px 0;
        }

        .dialog__icon {
            font-family: 'Material Symbols Outlined';
            font-size: 20px;
            color: #4dd0e1;
        }

        .dialog__icon:empty {
            display: none;
        }

        .dialog__headline {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #c9d1d9;
            line-height: 1.3;
        }

        .dialog__close-btn {
            margin-left: auto;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(77, 208, 225, 0.15);
            border-radius: 2px;
            background: transparent;
            color: #7a8fa5;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 150ms ease-out, color 150ms ease-out;
        }

        .dialog__close-btn::after {
            content: '\00d7';
        }

        .dialog__close-btn:hover {
            border-color: rgba(77, 208, 225, 0.5);
            color: #4dd0e1;
        }

        .dialog__body {
            padding: 10px 16px 14px;
        }

        .dialog__supporting {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 400;
            color: #7a8fa5;
            line-height: 1.6;
        }

        .dialog__supporting:empty {
            display: none;
        }

        .dialog__divider {
            height: 1px;
            background: rgba(77, 208, 225, 0.1);
            margin: 0;
        }

        .dialog__actions {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            gap: 6px;
            padding: 10px 12px;
        }

        .dialog__actions:empty {
            display: none;
        }

        .dialog__action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 12px;
            border: 1px solid rgba(77, 208, 225, 0.15);
            border-radius: 2px;
            background: transparent;
            color: #7a8fa5;
            cursor: pointer;
            transition: border-color 150ms ease-out, color 150ms ease-out;
        }

        .dialog__action:hover {
            border-color: rgba(77, 208, 225, 0.4);
            color: #c9d1d9;
        }

        .dialog__action:last-child {
            background: rgba(77, 208, 225, 0.12);
            border-color: rgba(77, 208, 225, 0.3);
            color: #4dd0e1;
        }

        .dialog__action:last-child:hover {
            background: rgba(77, 208, 225, 0.2);
            border-color: rgba(77, 208, 225, 0.5);
        }

        .dialog__action-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        template {
            display: none;
        }
    </style>
    <div class="dialog__overlay">
        <div class="dialog__surface">
            <div class="dialog__header">
                <span class="dialog__icon"></span>
                <div class="dialog__headline"></div>
                <button class="dialog__close-btn"></button>
            </div>
            <div class="dialog__body">
                <div class="dialog__supporting"></div>
            </div>
            <div class="dialog__divider"></div>
            <div class="dialog__actions"></div>
            <template id="dialog-action-template">
                <button class="dialog__action" data-actionid="">
                    <span class="dialog__action-label"></span>
                </button>
            </template>
        </div>
    </div>
</template>
