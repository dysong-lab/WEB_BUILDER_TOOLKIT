<div class="dialogs dialogs--operational" aria-hidden="true">
    <template id="dialog-popup-template">
        <style>
            .dialog__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                background:
                    linear-gradient(180deg, rgba(7, 16, 21, 0.76), rgba(7, 16, 21, 0.88));
                backdrop-filter: blur(8px);
                opacity: 0;
                transition: opacity 280ms cubic-bezier(0.16, 1, 0.3, 1);
            }

            .dialog__surface {
                width: min(100%, 420px);
                border: 1px solid rgba(84, 218, 255, 0.28);
                border-radius: 18px;
                padding: 22px 22px 20px;
                background: #09161d;
                box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
                color: #dffbff;
                opacity: 0;
                transform: translateY(14px) scale(0.97);
                transform-origin: center center;
                transition:
                    opacity 280ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 280ms cubic-bezier(0.16, 1, 0.3, 1),
                    box-shadow 280ms cubic-bezier(0.16, 1, 0.3, 1);
            }

            .dialog__overlay[data-state="open"] {
                opacity: 1;
            }

            .dialog__overlay[data-state="open"] .dialog__surface {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            .dialog__overlay[data-state="closing"] .dialog__surface {
                opacity: 0;
                transform: translateY(8px) scale(0.985);
            }

            .dialog__header {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 12px;
            }

            .dialog__headline {
                font-family: 'IBM Plex Mono', 'SFMono-Regular', monospace;
                font-size: 20px;
                font-weight: 600;
                line-height: 1.3;
                letter-spacing: 0px;
                text-transform: uppercase;
            }

            .dialog__close {
                width: 34px;
                height: 34px;
                border: 1px solid rgba(84, 218, 255, 0.2);
                border-radius: 10px;
                background: transparent;
                color: #8ce7ff;
                font-size: 18px;
                cursor: pointer;
                transition:
                    transform 150ms cubic-bezier(0.16, 1, 0.3, 1),
                    background-color 150ms ease,
                    box-shadow 150ms ease,
                    border-color 150ms ease;
            }

            .dialog__close:hover {
                background: rgba(84, 218, 255, 0.08);
                box-shadow: 0 0 20px rgba(84, 218, 255, 0.12);
            }

            .dialog__close:active {
                transform: scale(0.94);
            }

            .dialog__supporting-text {
                font-family: 'IBM Plex Mono', 'SFMono-Regular', monospace;
                font-size: 13px;
                line-height: 1.7;
                color: rgba(223, 251, 255, 0.78);
            }

            .dialog__actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                margin-top: 22px;
            }

            .dialog__button {
                min-width: 96px;
                height: 40px;
                padding: 0 16px;
                border-radius: 10px;
                font-family: 'IBM Plex Mono', 'SFMono-Regular', monospace;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 1px;
                text-transform: uppercase;
                cursor: pointer;
                transition:
                    transform 150ms cubic-bezier(0.16, 1, 0.3, 1),
                    background-color 150ms ease,
                    color 150ms ease,
                    box-shadow 150ms ease,
                    border-color 150ms ease;
            }

            .dialog__cancel {
                border: 1px solid rgba(84, 218, 255, 0.2);
                background: transparent;
                color: #8ce7ff;
            }

            .dialog__cancel:hover {
                background: rgba(84, 218, 255, 0.08);
                box-shadow: 0 0 20px rgba(84, 218, 255, 0.08);
            }

            .dialog__confirm {
                border: 1px solid #ff6b57;
                background: #ff6b57;
                color: #130605;
                box-shadow: 0 12px 24px rgba(255, 107, 87, 0.22);
            }

            .dialog__confirm:hover {
                transform: translateY(-1px);
                box-shadow: 0 16px 28px rgba(255, 107, 87, 0.28);
            }

            .dialog__button:active {
                transform: scale(0.97);
            }
        </style>

        <div class="dialog__overlay" data-state="closed">
            <div class="dialog__surface" role="dialog" aria-modal="true" aria-labelledby="dialog-operational-title">
                <div class="dialog__header">
                    <h2 id="dialog-operational-title" class="dialog__headline">Shutdown zone 04 assets?</h2>
                    <button type="button" class="dialog__close" aria-label="Close dialog">×</button>
                </div>
                <p class="dialog__supporting-text">The command will stop active collectors and suspend live updates for the selected zone. Confirm only after the maintenance team is on standby.</p>
                <div class="dialog__actions">
                    <button type="button" class="dialog__button dialog__cancel"><span class="dialog__cancel-label">Abort</span></button>
                    <button type="button" class="dialog__button dialog__confirm"><span class="dialog__confirm-label">Shutdown</span></button>
                </div>
            </div>
        </div>
    </template>
</div>
