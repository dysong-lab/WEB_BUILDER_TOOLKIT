<div class="dialogs dialogs--material" aria-hidden="true">
    <template id="dialog-popup-template">
        <style>
            .dialog__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: rgba(26, 28, 30, 0.34);
                opacity: 0;
                transition: opacity 280ms cubic-bezier(0.2, 0, 0, 1);
            }

            .dialog__surface {
                width: min(100%, 420px);
                border-radius: 28px;
                padding: 24px;
                background: #fdf8fd;
                box-shadow:
                    0 24px 48px rgba(31, 38, 44, 0.16),
                    0 2px 6px rgba(31, 38, 44, 0.08);
                color: #1b1b1f;
                opacity: 0;
                transform: translateY(16px) scale(0.98);
                transform-origin: center center;
                transition:
                    opacity 280ms cubic-bezier(0.2, 0, 0, 1),
                    transform 280ms cubic-bezier(0.2, 0, 0, 1),
                    box-shadow 280ms cubic-bezier(0.2, 0, 0, 1);
            }

            .dialog__overlay[data-state="open"] {
                opacity: 1;
            }

            .dialog__overlay[data-state="open"] .dialog__surface {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            .dialog__overlay[data-state="closing"] .dialog__surface {
                opacity: 0;
                transform: translateY(8px) scale(0.99);
            }

            .dialog__header {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 16px;
            }

            .dialog__headline {
                font-family: 'Roboto', -apple-system, sans-serif;
                font-size: 24px;
                font-weight: 400;
                line-height: 1.33;
            }

            .dialog__close {
                width: 40px;
                height: 40px;
                border: 0;
                border-radius: 20px;
                background: transparent;
                color: #5f6368;
                font-size: 22px;
                cursor: pointer;
                transition:
                    transform 150ms cubic-bezier(0.2, 0, 0, 1),
                    background-color 150ms ease,
                    color 150ms ease;
            }

            .dialog__close:hover {
                background: rgba(103, 80, 164, 0.08);
                color: #3f2d72;
            }

            .dialog__close:active {
                transform: scale(0.94);
            }

            .dialog__supporting-text {
                font-family: 'Roboto', -apple-system, sans-serif;
                font-size: 14px;
                line-height: 1.45;
                color: #49454f;
            }

            .dialog__actions {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 24px;
            }

            .dialog__button {
                min-width: 84px;
                height: 40px;
                padding: 0 18px;
                border-radius: 999px;
                border: 0;
                background: transparent;
                font-family: 'Roboto', -apple-system, sans-serif;
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0px;
                cursor: pointer;
                transition:
                    transform 150ms cubic-bezier(0.2, 0, 0, 1),
                    background-color 150ms ease,
                    box-shadow 150ms ease,
                    color 150ms ease;
            }

            .dialog__cancel {
                color: #6750a4;
            }

            .dialog__cancel:hover {
                background: rgba(103, 80, 164, 0.08);
            }

            .dialog__confirm {
                color: #6750a4;
            }

            .dialog__confirm:hover {
                background: rgba(103, 80, 164, 0.12);
            }

            .dialog__button:active {
                transform: scale(0.97);
            }
        </style>

        <div class="dialog__overlay" data-state="closed">
            <div class="dialog__surface" role="dialog" aria-modal="true" aria-labelledby="dialog-material-title">
                <div class="dialog__header">
                    <h2 id="dialog-material-title" class="dialog__headline">Sync project changes now?</h2>
                    <button type="button" class="dialog__close" aria-label="Close dialog">×</button>
                </div>
                <p class="dialog__supporting-text">Recent edits will be published to the shared environment. Team members may see the updated dashboard immediately after the sync finishes.</p>
                <div class="dialog__actions">
                    <button type="button" class="dialog__button dialog__cancel"><span class="dialog__cancel-label">Later</span></button>
                    <button type="button" class="dialog__button dialog__confirm"><span class="dialog__confirm-label">Sync</span></button>
                </div>
            </div>
        </div>
    </template>
</div>
