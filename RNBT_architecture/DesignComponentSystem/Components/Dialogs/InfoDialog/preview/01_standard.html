<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>InfoDialog — 01_standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #infodialog-container { margin: 0 auto; max-width: 400px; }
        .demo-open-btn { display: block; margin: 0 auto; padding: 10px 24px; font-size: 14px; background: #6750a4; color: #ffffff; border: none; border-radius: 20px; cursor: pointer; font-weight: 500; }
        .demo-open-btn:hover { background: #7c6bb0; }
    </style>
</head>
<body>
    <button class="demo-open-btn" id="open-dialog-btn">Open Info Dialog</button>
    <div id="infodialog-container"></div>

    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/ShadowPopupMixin.js"></script>
    <script src="../../../../Mixins/FieldRenderMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('infodialog-container', '../views/01_standard.html', '../styles/01_standard.css');

        const instance = {
            id: 'infodialog',
            appendElement: document.getElementById('infodialog-container')
        };

        let popupScope = null;

        applyShadowPopupMixin(instance, {
            cssSelectors: {
                template:  '#info-dialog-popup-template',
                closeBtn:  '.dialog-close',
                overlay:   '.dialog-overlay',
                confirm:   '.dialog-confirm'
            },
            onCreated: (shadowRoot) => {
                popupScope = { appendElement: shadowRoot };
                applyFieldRenderMixin(popupScope, {
                    cssSelectors: {
                        icon:  '.dialog-icon',
                        title: '.dialog-title',
                        body:  '.dialog-body'
                    }
                });

                popupScope.fieldRender.renderData({
                    response: {
                        icon:  'ℹ️',
                        title: 'System Information',
                        body:  'All systems are operating normally. Last health check completed at 14:30 UTC with no issues detected.'
                    }
                });
            }
        });

        // 열기 버튼
        document.getElementById('open-dialog-btn').addEventListener('click', function() {
            instance.shadowPopup.show();
        });

        // Shadow DOM 내부 이벤트: 닫기/확인 클릭
        instance.shadowPopup.bindPopupEvents({
            click: {
                '.dialog-close': function() { instance.shadowPopup.hide(); },
                '.dialog-confirm': function() { instance.shadowPopup.hide(); }
            }
        });
    })();
    </script>
</body>
</html>
