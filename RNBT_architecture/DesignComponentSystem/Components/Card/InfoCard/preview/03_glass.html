<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>InfoCard — 03_glass</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #0f1117 0%, #1a1040 50%, #0f1117 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .preview-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .rnbt-container {
            width: 220px;
            height: 130px;
            overflow: auto;
        }
    </style>
    <link rel="stylesheet" href="../styles/03_glass.css">
</head>
<body>
    <div class="preview-grid">
        <div class="rnbt-container">
            <div class="info-card" data-status="running">
                <div class="info-card__top">
                    <span class="info-card__indicator"></span>
                    <span class="info-card__title">Server</span>
                </div>
                <span class="info-card__value">RNBT-01</span>
                <span class="info-card__desc">Uptime 72h</span>
            </div>
        </div>

        <div class="rnbt-container">
            <div class="info-card" data-status="warning">
                <div class="info-card__top">
                    <span class="info-card__indicator"></span>
                    <span class="info-card__title">Database</span>
                </div>
                <span class="info-card__value">PostgreSQL</span>
                <span class="info-card__desc">High latency detected</span>
            </div>
        </div>

        <div class="rnbt-container">
            <div class="info-card" data-status="error">
                <div class="info-card__top">
                    <span class="info-card__indicator"></span>
                    <span class="info-card__title">Gateway</span>
                </div>
                <span class="info-card__value">Offline</span>
                <span class="info-card__desc">Last seen 5m ago</span>
            </div>
        </div>

        <div class="rnbt-container">
            <div class="info-card" data-status="stopped">
                <div class="info-card__top">
                    <span class="info-card__indicator"></span>
                    <span class="info-card__title">Backup</span>
                </div>
                <span class="info-card__value">Disabled</span>
                <span class="info-card__desc">Manual restart required</span>
            </div>
        </div>
    </div>
</body>
</html>
