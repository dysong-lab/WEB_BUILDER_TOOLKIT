<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Menus/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #06080C;
            font-family: 'IBM Plex Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 320px;
            padding: 10px 14px;
            background: #0D1117;
            border: 1px solid rgba(99, 199, 255, 0.18);
            border-radius: 4px;
            color: #7A8FA5;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            letter-spacing: 0.2px;
        }
        .demo-log strong {
            color: #E6EDF3;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="menu-container"></div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('menu-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'menu', appendElement: document.getElementById('menu-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.menu__items',
            template:  '#menu-item-template',
            menuid:    '.menu__item',
            disabled:  '.menu__item',
            divider:   '.menu__item',
            leading:   '.menu__leading',
            label:     '.menu__label',
            trailing:  '.menu__trailing'
        },
        datasetAttrs: {
            menuid:   'menuid',
            disabled: 'disabled',
            divider:  'divider'
        }
    });

    instance.subscriptions = { menuItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@menuItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@menuItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            if (!item) return;
            if (item.getAttribute('data-disabled') === 'true') {
                log(`menuItemClicked ignored (disabled) "${item.getAttribute('data-menuid')}"`);
                return;
            }
            if (item.getAttribute('data-divider') === 'true') return;
            const menuid = item.getAttribute('data-menuid');
            log(`menuItemClicked "${menuid}"`);
        }
    });

    const menuData = [
        { menuid: 'start',   leading: '\u{25B6}',  label: 'Start Service',   trailing: 'F5' },
        { menuid: 'stop',    leading: '\u{25A0}',  label: 'Stop Service',    trailing: 'F6' },
        { menuid: 'restart', leading: '\u{21BB}',  label: 'Restart',         trailing: 'F7' },
        { menuid: 'div-1',   leading: '',          label: '',                trailing: '', divider: 'true' },
        { menuid: 'logs',    leading: '\u{1F4C4}', label: 'View Logs',       trailing: 'CTRL+L' },
        { menuid: 'metrics', leading: '\u{1F4CA}', label: 'Metrics',         trailing: 'CTRL+M' },
        { menuid: 'div-2',   leading: '',          label: '',                trailing: '', divider: 'true' },
        { menuid: 'deploy',  leading: '\u{1F680}', label: 'Deploy',          trailing: 'F9', disabled: 'true' },
        { menuid: 'rollback', leading: '\u{23EA}', label: 'Rollback',        trailing: 'SHIFT+F9' }
    ];

    instance.listRender.renderData({ response: menuData });
})();
</script>
</body>
</html>
