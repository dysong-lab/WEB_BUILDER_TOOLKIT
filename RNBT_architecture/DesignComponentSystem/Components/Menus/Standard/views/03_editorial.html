<!-- 03_editorial: Persona C — Minimal Editorial -->
<div class="menus menus--editorial" aria-hidden="true">
    <template id="menu-popup-template">
        <style>
            .menu__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(44, 38, 32, 0.18);
                opacity: 0;
                transition: opacity 200ms ease;
            }

            .menu__overlay[data-state="open"] {
                opacity: 1;
            }

            .menu__overlay[data-state="open"] .menu__surface {
                opacity: 1;
                transform: translateY(0);
            }

            .menu__overlay[data-state="closing"] .menu__surface {
                opacity: 0;
                transform: translateY(-6px);
            }

            .menu__surface {
                min-width: 220px;
                max-width: 340px;
                border: 1px solid rgba(44, 38, 32, 0.12);
                border-radius: 6px;
                padding: 8px 0;
                background: #faf8f5;
                box-shadow:
                    0 4px 20px rgba(44, 38, 32, 0.12),
                    0 1px 4px rgba(44, 38, 32, 0.08);
                opacity: 0;
                transform: translateY(-10px);
                transform-origin: top center;
                transition:
                    opacity 200ms ease,
                    transform 200ms ease;
            }

            .menu__list {
                display: flex;
                flex-direction: column;
            }

            .menu__item {
                display: flex;
                align-items: center;
                gap: 14px;
                width: 100%;
                padding: 13px 20px;
                border: 0;
                background: transparent;
                color: #2c2620;
                font-family: 'Georgia', 'Times New Roman', serif;
                font-size: 15px;
                font-weight: 400;
                text-align: left;
                cursor: pointer;
                transition: background 120ms ease;
            }

            .menu__item:hover {
                background: rgba(44, 38, 32, 0.05);
            }

            .menu__item:active {
                background: rgba(44, 38, 32, 0.09);
            }

            .menu__item[data-disabled="true"] {
                opacity: 0.35;
                cursor: not-allowed;
                pointer-events: none;
            }

            .menu__item-icon {
                flex-shrink: 0;
                width: 18px;
                font-size: 14px;
                color: rgba(44, 38, 32, 0.48);
                text-align: center;
            }

            .menu__item-label {
                flex: 1;
            }
        </style>

        <div class="menu__overlay" data-state="closed">
            <div class="menu__surface" role="menu">
                <div class="menu__list"></div>
                <template id="menu-item-template">
                    <button type="button" class="menu__item" role="menuitem">
                        <span class="menu__item-icon"></span>
                        <span class="menu__item-label"></span>
                    </button>
                </template>
            </div>
        </div>
    </template>
</div>
