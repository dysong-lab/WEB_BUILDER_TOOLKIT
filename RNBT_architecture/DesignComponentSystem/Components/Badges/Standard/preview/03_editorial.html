<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Badges/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #efe7dc;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .preview-grid {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<div class="preview-grid">
    <div id="badge-large"></div>
    <div id="badge-small"></div>
    <div id="badge-capped"></div>
</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    const previewIds = ['badge-large', 'badge-small', 'badge-capped'];
    await Promise.all(previewIds.map(id => loadComponentAssets(id, '../views/03_editorial.html', '../styles/03_editorial.css')));

    const createBadgeInstance = (id) => {
        const instance = { id, appendElement: document.getElementById(id) };

        applyFieldRenderMixin(instance, {
            cssSelectors: {
                anchor: '.badge-anchor',
                badge: '.badge',
                count: '.badge__count'
            }
        });

        instance.normalizeBadgeCount = function(count) {
            if (count === null || count === undefined || count === '' || count === 0 || count === '0') {
                return { visible: false, text: '' };
            }

            const numericCount = Number(count);
            if (!Number.isNaN(numericCount)) {
                return { visible: true, text: numericCount > 99 ? '99+' : String(numericCount) };
            }

            const textCount = String(count).trim();
            if (!textCount) return { visible: false, text: '' };

            return { visible: true, text: textCount.length > 4 ? textCount.slice(0, 4) : textCount };
        };

        instance.renderBadgeInfo = function({ response: data }) {
            const badge = this.appendElement.querySelector(this.fieldRender.cssSelectors.badge);
            if (!badge) return;

            const normalized = this.normalizeBadgeCount(data?.count);
            const size = data?.size === 'small' ? 'small' : 'large';

            this.fieldRender.renderData({
                response: {
                    count: size === 'small' ? '' : normalized.text
                }
            });

            badge.dataset.size = size;
            badge.dataset.visible = normalized.visible ? 'true' : 'false';
            badge.setAttribute('aria-hidden', normalized.visible ? 'false' : 'true');
        };

        instance.subscriptions = { badgeInfo: [instance.renderBadgeInfo] };
        Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
            handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
        );

        instance.customEvents = {
            click: {
                [instance.fieldRender.cssSelectors.anchor]: '@badgeClicked'
            }
        };
        Wkit.bindEvents(instance, instance.customEvents);

        return instance;
    };

    const large = createBadgeInstance('badge-large');
    const small = createBadgeInstance('badge-small');
    const capped = createBadgeInstance('badge-capped');

    Wkit.onEventBusHandlers({
        '@badgeClicked': ({ targetInstance }) => {
            const badge = targetInstance?.appendElement?.querySelector('.badge');
            console.log('[Preview] Badge clicked:', targetInstance?.id, badge?.dataset.size, badge?.dataset.visible);
        }
    });

    large.renderBadgeInfo({ response: { count: 24, size: 'large' } });
    small.renderBadgeInfo({ response: { count: 6, size: 'small' } });
    capped.renderBadgeInfo({ response: { count: 128, size: 'large' } });
})();
</script>
</body>
</html>
