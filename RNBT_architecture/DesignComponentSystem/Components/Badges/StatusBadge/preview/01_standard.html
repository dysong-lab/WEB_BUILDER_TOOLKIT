<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>StatusBadge — 01_standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        .demo-container { margin: 0 auto; max-width: 400px; background: #ffffff; border-radius: 8px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .demo-row { display: flex; align-items: center; gap: 12px; }
        .demo-label { font-size: 13px; color: #6b7280; min-width: 60px; }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-row">
            <span class="demo-label">Online</span>
            <div id="badge-online"></div>
        </div>
        <div class="demo-row">
            <span class="demo-label">Warning</span>
            <div id="badge-warning"></div>
        </div>
        <div class="demo-row">
            <span class="demo-label">Error</span>
            <div id="badge-error"></div>
        </div>
        <div class="demo-row">
            <span class="demo-label">Offline</span>
            <div id="badge-offline"></div>
        </div>
    </div>

    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/FieldRenderMixin.js"></script>

    <script>
    (async () => {
        const states = [
            { id: 'badge-online',  status: 'online',  label: 'Online' },
            { id: 'badge-warning', status: 'warning', label: 'Warning' },
            { id: 'badge-error',   status: 'error',   label: 'Error' },
            { id: 'badge-offline', status: 'offline',  label: 'Offline' }
        ];

        for (const state of states) {
            await loadComponentAssets(state.id, '../views/01_standard.html', '../styles/01_standard.css');

            const instance = {
                id: state.id,
                appendElement: document.getElementById(state.id)
            };

            applyFieldRenderMixin(instance, {
                cssSelectors: {
                    status: '.status-badge',
                    label:  '.status-badge__label'
                },
                datasetAttrs: {
                    status: 'status'
                }
            });

            instance.fieldRender.renderData({
                response: {
                    status: state.status,
                    label:  state.label
                }
            });
        }
    })();
    </script>
</body>
</html>
