<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GaugeChart — 03_minimal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafa; padding: 40px; }
        #gaugechart-container { width: 500px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="gaugechart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('gaugechart-container', '../views/03_minimal.html', '../styles/03_minimal.css');

        const instance = {
            id: 'gauge-chart',
            appendElement: document.getElementById('gaugechart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                series: [{
                    type: 'gauge',
                    min: 0,
                    max: 100,
                    detail: { formatter: '{value}%', fontSize: 18, color: '#374151' },
                    title: { color: '#9ca3af', fontSize: 11 },
                    axisLine: { lineStyle: { width: 10, color: [[1, '#e5e7eb']] } },
                    progress: { show: true, width: 10, itemStyle: { color: '#6b7280' } },
                    axisTick: { show: false },
                    splitLine: { lineStyle: { color: '#d1d5db' } },
                    axisLabel: { color: '#9ca3af', fontSize: 9 }
                }]
            },
            mapData: function(data, option) {
                option.series[0].data = [{ value: data.value, name: data.name }];
                return option;
            }
        });

        instance.echarts.renderData({
            response: { value: 72, name: 'CPU Usage' }
        });
    })();
    </script>
</body>
</html>
