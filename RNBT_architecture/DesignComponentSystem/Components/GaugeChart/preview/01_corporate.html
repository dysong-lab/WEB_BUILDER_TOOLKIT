<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GaugeChart — 01_corporate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #gaugechart-container { width: 500px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="gaugechart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('gaugechart-container', '../views/01_corporate.html', '../styles/01_corporate.css');

        const instance = {
            id: 'gauge-chart',
            appendElement: document.getElementById('gaugechart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                series: [{
                    type: 'gauge',
                    min: 0,
                    max: 100,
                    detail: { formatter: '{value}%', fontSize: 20 },
                    axisLine: { lineStyle: { width: 15 } }
                }]
            },
            mapData: function(data, option) {
                option.series[0].data = [{ value: data.value, name: data.name }];
                return option;
            }
        });

        instance.echarts.renderData({
            response: { value: 72, name: 'CPU Usage' }
        });
    })();
    </script>
</body>
</html>
