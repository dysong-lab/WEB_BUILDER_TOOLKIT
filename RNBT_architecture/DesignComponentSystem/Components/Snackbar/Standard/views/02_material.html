<div class="snackbar" data-open="false">
    <div class="snackbar__supporting"></div>
    <div class="snackbar__actions"></div>
    <button class="snackbar__close-btn" aria-label="Close">
        <span class="snackbar__close-icon material-symbols-outlined">close</span>

    <template id="snackbar-action-template">
        <button class="snackbar__action" data-actionid="">

        </button>
    </template>
</div>
