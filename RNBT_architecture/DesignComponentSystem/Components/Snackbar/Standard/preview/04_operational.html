<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Snackbar/Standard — 04_operational</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: #090d11;
      }
      .preview-panel { display: flex; flex-direction: column; gap: 16px; }
      .preview-actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .preview-actions button {
        padding: 10px 14px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        background: rgba(142, 255, 97, 0.16);
        color: #d8ffbf;
      }
    </style>
  </head>
  <body>
    <div class="preview-panel">
      <div class="preview-actions">
        <button id="show-warning">Show warning</button>
        <button id="show-danger">Show danger</button>
        <button id="hide-snackbar">Hide</button>
      </div>
      <div id="snackbar-operational"></div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("snackbar-operational", "../views/04_operational.html", "../styles/04_operational.css");
        const instance = { id: "snackbar-operational", appendElement: document.getElementById("snackbar-operational") };
        const root = document.querySelector("#snackbar-operational .snackbar");
        const message = root.querySelector(".snackbar__message");
        const action = root.querySelector(".snackbar__action");
        const actionLabel = root.querySelector(".snackbar__action-label");
        const dismiss = root.querySelector(".snackbar__dismiss");
        let timer = null;
        const show = payload => {
          if (timer) clearTimeout(timer);
          root.dataset.tone = payload.tone || "warning";
          root.dataset.open = "true";
          root.dataset.hasAction = payload.actionLabel ? "true" : "false";
          root.setAttribute("aria-hidden", "false");
          message.textContent = payload.message || "";
          actionLabel.textContent = payload.actionLabel || "";
          action.hidden = !payload.actionLabel;
          Weventbus.emit("@snackbarShown", { event: { type: "show" }, targetInstance: instance });
          if (payload.duration > 0) {
            timer = setTimeout(() => hide("timeout"), payload.duration);
          }
        };
        const hide = reason => {
          if (timer) clearTimeout(timer);
          root.dataset.open = "false";
          root.setAttribute("aria-hidden", "true");
          Weventbus.emit("@snackbarHidden", { event: { type: reason }, targetInstance: instance });
        };
        action.addEventListener("click", () => Weventbus.emit("@snackbarActionClicked", { event: { type: "click" }, targetInstance: instance }));
        dismiss.addEventListener("click", () => {
          Weventbus.emit("@snackbarDismissed", { event: { type: "click" }, targetInstance: instance });
          hide("dismiss");
        });
        document.getElementById("show-warning").addEventListener("click", () => show({ message: "Generator voltage left the approved band.", actionLabel: "Acknowledge", tone: "warning", duration: 0 }));
        document.getElementById("show-danger").addEventListener("click", () => show({ message: "Cooling loop 2 has stopped responding. Fallback engaged.", actionLabel: "Inspect", tone: "danger", duration: 0 }));
        document.getElementById("hide-snackbar").addEventListener("click", () => hide("manual"));
      })();
    </script>
  </body>
</html>
