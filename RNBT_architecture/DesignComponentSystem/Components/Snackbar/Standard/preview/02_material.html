<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Snackbar/Standard — 02_material</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: #efe9fb;
      }
      .preview-panel { display: flex; flex-direction: column; gap: 16px; }
      .preview-actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .preview-actions button {
        padding: 10px 14px;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        background: #e8def8;
        color: #4f378b;
      }
    </style>
  </head>
  <body>
    <div class="preview-panel">
      <div class="preview-actions">
        <button id="show-neutral">Show neutral</button>
        <button id="show-success">Show success</button>
        <button id="hide-snackbar">Hide</button>
      </div>
      <div id="snackbar-material"></div>
    </div>
    <script>
      (async () => {
        await loadComponentAssets("snackbar-material", "../views/02_material.html", "../styles/02_material.css");
        const instance = { id: "snackbar-material", appendElement: document.getElementById("snackbar-material") };
        const root = instance.appendElement.querySelector(".snackbar");
        const message = instance.appendElement.querySelector(".snackbar__message");
        const action = instance.appendElement.querySelector(".snackbar__action");
        const actionLabel = instance.appendElement.querySelector(".snackbar__action-label");
        const dismiss = instance.appendElement.querySelector(".snackbar__dismiss");
        let timer = null;
        const show = payload => {
          if (timer) clearTimeout(timer);
          root.dataset.tone = payload.tone || "neutral";
          root.dataset.open = "true";
          root.dataset.hasAction = payload.actionLabel ? "true" : "false";
          root.setAttribute("aria-hidden", "false");
          message.textContent = payload.message || "";
          actionLabel.textContent = payload.actionLabel || "";
          action.hidden = !payload.actionLabel;
          Weventbus.emit("@snackbarShown", { event: { type: "show" }, targetInstance: instance });
          if (payload.duration > 0) {
            timer = setTimeout(() => hide("timeout"), payload.duration);
          }
        };
        const hide = reason => {
          if (timer) clearTimeout(timer);
          root.dataset.open = "false";
          root.setAttribute("aria-hidden", "true");
          Weventbus.emit("@snackbarHidden", { event: { type: reason }, targetInstance: instance });
        };
        action.addEventListener("click", () => Weventbus.emit("@snackbarActionClicked", { event: { type: "click" }, targetInstance: instance }));
        dismiss.addEventListener("click", () => {
          Weventbus.emit("@snackbarDismissed", { event: { type: "click" }, targetInstance: instance });
          hide("dismiss");
        });
        document.getElementById("show-neutral").addEventListener("click", () => show({ message: "Draft moved to the review queue.", actionLabel: "Open", tone: "neutral", duration: 3200 }));
        document.getElementById("show-success").addEventListener("click", () => show({ message: "Comment posted to the page.", actionLabel: "View", tone: "success", duration: 3200 }));
        document.getElementById("hide-snackbar").addEventListener("click", () => hide("manual"));
      })();
    </script>
  </body>
</html>
