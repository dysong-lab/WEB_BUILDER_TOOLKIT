<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Snackbar/Standard — 03_editorial</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: linear-gradient(180deg, #f4ecdf, #eadfce);
      }
      .preview-panel { display: flex; flex-direction: column; gap: 16px; }
      .preview-actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .preview-actions button {
        padding: 10px 14px;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        background: rgba(142, 82, 33, 0.12);
        color: #6d3515;
      }
      #event-log {
        width: 340px;
        min-height: 220px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(255, 250, 244, 0.78);
        border: 1px solid rgba(125, 81, 38, 0.16);
        color: #51331f;
        font: 12px/1.5 monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="preview-panel">
      <div class="preview-actions">
        <button id="show-story">Show update</button>
        <button id="show-warning">Show warning</button>
        <button id="hide-snackbar">Hide</button>
      </div>
      <div id="snackbar-editorial"></div>
    </div>
    <pre id="event-log">[ready] waiting for snackbar events</pre>
    <script>
      (async () => {
        await loadComponentAssets("snackbar-editorial", "../views/03_editorial.html", "../styles/03_editorial.css");
        const root = document.querySelector("#snackbar-editorial .snackbar");
        const message = root.querySelector(".snackbar__message");
        const action = root.querySelector(".snackbar__action");
        const actionLabel = root.querySelector(".snackbar__action-label");
        const dismiss = root.querySelector(".snackbar__dismiss");
        const log = document.getElementById("event-log");
        let timer = null;
        const appendLog = text => {
          log.textContent = `${text}\n${log.textContent}`.trim();
          console.log(text);
        };
        const show = payload => {
          if (timer) clearTimeout(timer);
          root.dataset.tone = payload.tone || "success";
          root.dataset.open = "true";
          root.dataset.hasAction = payload.actionLabel ? "true" : "false";
          root.setAttribute("aria-hidden", "false");
          message.textContent = payload.message || "";
          actionLabel.textContent = payload.actionLabel || "";
          action.hidden = !payload.actionLabel;
          appendLog(`@snackbarShown tone=${root.dataset.tone} message="${message.textContent}"`);
          if (payload.duration > 0) {
            timer = setTimeout(() => hide("timeout"), payload.duration);
          }
        };
        const hide = reason => {
          if (timer) clearTimeout(timer);
          root.dataset.open = "false";
          root.setAttribute("aria-hidden", "true");
          appendLog(`@snackbarHidden reason=${reason}`);
        };
        action.addEventListener("click", () => appendLog("@snackbarActionClicked"));
        dismiss.addEventListener("click", () => {
          appendLog("@snackbarDismissed");
          hide("dismiss");
        });
        document.getElementById("show-story").addEventListener("click", () => show({ message: "Issue archived. The live page now reflects the updated narrative.", actionLabel: "Review", tone: "success", duration: 3600 }));
        document.getElementById("show-warning").addEventListener("click", () => show({ message: "Caption overflow remains on the narrowest mobile breakpoint.", actionLabel: "Inspect", tone: "warning", duration: 0 }));
        document.getElementById("hide-snackbar").addEventListener("click", () => hide("manual"));
      })();
    </script>
  </body>
</html>
