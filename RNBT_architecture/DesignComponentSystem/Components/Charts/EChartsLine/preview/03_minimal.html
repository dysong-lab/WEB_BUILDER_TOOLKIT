<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chart — 03_minimal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafa; padding: 40px; }
        #linechart-container { margin: 0 auto; }
    </style>
</head>
<body>
    <div id="linechart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('linechart-container', '../views/03_minimal.html', '../styles/03_minimal.css');

        const instance = {
            id: 'chart',
            appendElement: document.getElementById('linechart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                xAxis: {
                    type: 'category',
                    axisLine: { lineStyle: { color: '#e5e7eb' } },
                    axisLabel: { color: '#9ca3af', fontSize: 11 }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: '#f3f4f6' } },
                    axisLabel: { color: '#9ca3af', fontSize: 11 }
                },
                series: [
                    { name: 'CPU', type: 'line', smooth: true, lineStyle: { width: 1.5 } },
                    { name: 'Memory', type: 'line', smooth: true, lineStyle: { width: 1.5 } }
                ],
                tooltip: { trigger: 'axis' },
                legend: { data: ['CPU', 'Memory'], textStyle: { color: '#9ca3af', fontSize: 11 } },
                color: ['#6b7280', '#d1d5db']
            }
        });

        instance.echarts.renderData({
            response: {
                categories: ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00'],
                values: [
                    [42, 55, 48, 72, 65, 58],
                    [65, 68, 72, 70, 75, 73]
                ]
            }
        });
    })();
    </script>
</body>
</html>
