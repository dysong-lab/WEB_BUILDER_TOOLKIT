<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PieChart — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #piechart-container { width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="piechart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('piechart-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'pie-chart',
            appendElement: document.getElementById('piechart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                backgroundColor: 'transparent',
                series: [{
                    type: 'pie',
                    radius: ['40%', '65%'],
                    label: { show: true, formatter: '{b}: {d}%', color: '#94a3b8', fontSize: 10 },
                    itemStyle: { borderColor: '#0f172a', borderWidth: 2 }
                }],
                tooltip: { trigger: 'item', backgroundColor: '#1e293b', borderColor: '#334155',
                           textStyle: { color: '#e2e8f0', fontSize: 11 } },
                legend: { orient: 'vertical', right: 10, top: 'center',
                          textStyle: { color: '#64748b', fontSize: 10 } },
                color: ['#22c55e', '#38bdf8', '#a78bfa', '#fbbf24', '#f87171']
            },
            mapData: function(data, option) {
                option.series[0].data = data.items;
                return option;
            }
        });

        instance.echarts.renderData({
            response: {
                items: [
                    { name: 'UPS', value: 35 },
                    { name: 'CRAC', value: 25 },
                    { name: 'PDU', value: 20 },
                    { name: 'Sensor', value: 12 },
                    { name: 'Switch', value: 8 }
                ]
            }
        });
    })();
    </script>
</body>
</html>
