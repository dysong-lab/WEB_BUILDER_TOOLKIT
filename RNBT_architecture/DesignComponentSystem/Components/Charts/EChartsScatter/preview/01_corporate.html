<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ScatterChart — 01_corporate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #scatterchart-container { margin: 0 auto; }
    </style>
</head>
<body>
    <div id="scatterchart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('scatterchart-container', '../views/01_corporate.html', '../styles/01_corporate.css');

        const instance = {
            id: 'scatter-chart',
            appendElement: document.getElementById('scatterchart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                xAxis: { type: 'value' },
                yAxis: { type: 'value' },
                series: [],
                tooltip: { trigger: 'item' }
            },
            mapData: function(data, optionCopy) {
                optionCopy.series = data.series.map(function(s) {
                    return {
                        name: s.name,
                        type: 'scatter',
                        data: s.data,
                        symbolSize: s.symbolSize || 10
                    };
                });
                if (data.legend) {
                    optionCopy.legend = { data: data.legend };
                }
                return optionCopy;
            }
        });

        instance.echarts.renderData({
            response: {
                legend: ['Temperature', 'Humidity'],
                series: [
                    {
                        name: 'Temperature',
                        data: [[10,8.04],[8,6.95],[13,7.58],[9,8.81],[11,8.33],[14,9.96],[6,7.24],[4,4.26],[12,10.84],[7,4.82],[5,5.68]],
                        symbolSize: 12
                    },
                    {
                        name: 'Humidity',
                        data: [[8,5.04],[6,4.95],[11,5.58],[7,6.81],[9,6.33],[12,7.96],[4,5.24],[3,3.26],[10,8.84],[5,3.82],[4,4.68]],
                        symbolSize: 12
                    }
                ]
            }
        });
    })();
    </script>
</body>
</html>
