<section class="area-chart area-chart--operational">
  <div class="area-chart__header">
    <div>
      <span class="area-chart__eyebrow">Console / Node-07</span>
      <h2 class="area-chart__title">Usage Envelope</h2>
    </div>
    <div class="area-chart__legend" aria-hidden="true">
      <span class="area-chart__legend-item"
        ><span class="area-chart__dot area-chart__dot--primary"></span
        >Capacity</span
      ><span class="area-chart__legend-item"
        ><span class="area-chart__dot area-chart__dot--secondary"></span
        >Usage</span
      >
    </div>
  </div>
  <div class="area-chart__status-row">
    <span class="area-chart__status">Headroom nominal</span
    ><span class="area-chart__timestamp">UTC+09 14:30</span>
  </div>
  <div
    class="area-chart__canvas"
    role="img"
    aria-label="Capacity and usage area chart"
  ></div>
</section>
