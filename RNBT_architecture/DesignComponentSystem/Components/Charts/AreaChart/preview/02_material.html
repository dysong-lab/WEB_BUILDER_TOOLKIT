<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charts/AreaChart — 02_material</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        padding: 40px 20px;
        background: linear-gradient(180deg, #e9eef8 0%, #dfe7f5 100%);
      }
    </style>
  </head>
  <body>
    <div id="area-chart-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>
    <script>
      (async () => {
        await loadComponentAssets(
          "area-chart-container",
          "../views/02_material.html",
          "../styles/02_material.css",
        );
        const instance = {
          id: "area-chart",
          appendElement: document.getElementById("area-chart-container"),
        };
        applyEChartsMixin(instance, {
          cssSelectors: { container: ".area-chart__canvas" },
          option: {
            animationDuration: 500,
            grid: {
              top: 16,
              right: 8,
              bottom: 12,
              left: 8,
              containLabel: true,
            },
            tooltip: {
              trigger: "axis",
              backgroundColor: "#23395d",
              borderWidth: 0,
              textStyle: { color: "#fff", fontFamily: "SUIT" },
            },
            legend: { show: false },
            xAxis: {
              type: "category",
              axisLine: { lineStyle: { color: "rgba(88,116,165,0.18)" } },
              axisTick: { show: false },
              axisLabel: { color: "#5874a5", fontSize: 12, fontFamily: "SUIT" },
            },
            yAxis: {
              type: "value",
              splitLine: { lineStyle: { color: "rgba(88,116,165,0.12)" } },
              axisLabel: { color: "#6b81a3", fontSize: 11, fontFamily: "SUIT" },
            },
            series: [
              {
                name: "Capacity",
                type: "line",
                smooth: 0.4,
                symbol: "none",
                lineStyle: { width: 2.5, color: "#497bff" },
                areaStyle: { color: "rgba(73,123,255,0.18)" },
              },
              {
                name: "Usage",
                type: "line",
                smooth: 0.4,
                symbol: "none",
                lineStyle: { width: 2.5, color: "#63c5b1" },
                areaStyle: { color: "rgba(99,197,177,0.18)" },
              },
            ],
          },
        });
        instance.subscriptions = { chartData: [instance.echarts.renderData] };
        Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
          handlers.forEach((handler) =>
            GlobalDataPublisher.subscribe(topic, instance, handler),
          ),
        );
        instance.customEvents = {};
        Wkit.bindEvents(instance, instance.customEvents);
        instance.echarts.renderData({
          response: {
            categories: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
            values: [
              [68, 72, 80, 96, 88, 104],
              [42, 48, 55, 62, 58, 70],
            ],
          },
        });
      })();
    </script>
  </body>
</html>
