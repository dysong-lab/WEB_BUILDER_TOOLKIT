<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AreaChart — 01_corporate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #areachart-container { margin: 0 auto; }
    </style>
</head>
<body>
    <div id="areachart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('areachart-container', '../views/01_corporate.html', '../styles/01_corporate.css');

        const instance = {
            id: 'area-chart',
            appendElement: document.getElementById('areachart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                xAxis: { type: 'category' },
                yAxis: { type: 'value' },
                series: [
                    { name: 'Series A', type: 'line', areaStyle: {}, smooth: true },
                    { name: 'Series B', type: 'line', areaStyle: {}, smooth: true }
                ],
                tooltip: { trigger: 'axis' },
                legend: { data: ['Series A', 'Series B'] }
            }
        });

        instance.echarts.renderData({
            response: {
                categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                values: [
                    [820, 932, 901, 934, 1290, 1330],
                    [620, 732, 701, 734, 1090, 1130]
                ]
            }
        });
    })();
    </script>
</body>
</html>
