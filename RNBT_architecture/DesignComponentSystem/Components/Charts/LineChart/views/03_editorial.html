<section class="line-chart line-chart--editorial">
    <div class="line-chart__header">
        <div>
            <span class="line-chart__eyebrow">Field Report</span>
            <h2 class="line-chart__title">Signal Trend</h2>
        </div>
        <div class="line-chart__legend" aria-hidden="true">
            <span class="line-chart__legend-item"><span class="line-chart__dot line-chart__dot--primary"></span>Inbound</span>
            <span class="line-chart__legend-item"><span class="line-chart__dot line-chart__dot--secondary"></span>Outbound</span>
        </div>
    </div>
    <p class="line-chart__summary">Trend lines highlight the widening gap between input and output flow.</p>
    <div class="line-chart__canvas" role="img" aria-label="Inbound and Outbound trend line chart"></div>
</section>
