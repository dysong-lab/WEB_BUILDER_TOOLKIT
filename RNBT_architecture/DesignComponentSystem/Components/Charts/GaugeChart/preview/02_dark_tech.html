<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GaugeChart — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #gaugechart-container { width: 500px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="gaugechart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('gaugechart-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'gauge-chart',
            appendElement: document.getElementById('gaugechart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                backgroundColor: 'transparent',
                series: [{
                    type: 'gauge',
                    min: 0,
                    max: 100,
                    detail: { formatter: '{value}%', fontSize: 18, color: '#e2e8f0' },
                    title: { color: '#64748b', fontSize: 11 },
                    axisLine: { lineStyle: { width: 12, color: [[0.6, '#22c55e'], [0.8, '#fbbf24'], [1, '#f87171']] } },
                    axisTick: { lineStyle: { color: '#475569' } },
                    splitLine: { lineStyle: { color: '#475569' } },
                    axisLabel: { color: '#475569', fontSize: 9 }
                }]
            },
            mapData: function(data, option) {
                option.series[0].data = [{ value: data.value, name: data.name }];
                return option;
            }
        });

        instance.echarts.renderData({
            response: { value: 72, name: 'CPU Usage' }
        });
    })();
    </script>
</body>
</html>
