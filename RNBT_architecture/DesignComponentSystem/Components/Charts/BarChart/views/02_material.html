<!-- 02_material: Persona B — Material Elevated -->
<section class="bar-chart bar-chart--material">
    <div class="bar-chart__header">
        <div class="bar-chart__heading">
            <span class="bar-chart__eyebrow">Performance</span>
            <h2 class="bar-chart__title">Weekly Throughput</h2>
        </div>
        <div class="bar-chart__legend" aria-hidden="true">
            <span class="bar-chart__legend-item">
                <span class="bar-chart__legend-swatch bar-chart__legend-swatch--primary"></span>
                Inbound
            </span>
            <span class="bar-chart__legend-item">
                <span class="bar-chart__legend-swatch bar-chart__legend-swatch--secondary"></span>
                Outbound
            </span>
        </div>
    </div>
    <p class="bar-chart__summary">Core network traffic trend for the latest 6-day window.</p>
    <div class="bar-chart__canvas" role="img" aria-label="Inbound and Outbound traffic bar chart"></div>
</section>
