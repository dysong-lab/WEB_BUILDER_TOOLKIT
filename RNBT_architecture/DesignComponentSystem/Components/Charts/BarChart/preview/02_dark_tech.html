<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BarChart — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #barchart-container { width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="barchart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('barchart-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'bar-chart',
            appendElement: document.getElementById('barchart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                backgroundColor: 'transparent',
                xAxis: {
                    type: 'category',
                    axisLine: { lineStyle: { color: '#1e3a5f' } },
                    axisLabel: { color: '#475569', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: '#1e3a5f30' } },
                    axisLabel: { color: '#475569', fontSize: 10 }
                },
                series: [
                    { name: 'Input', type: 'bar', itemStyle: { color: '#22c55e' } },
                    { name: 'Output', type: 'bar', itemStyle: { color: '#38bdf8' } }
                ],
                tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155',
                           textStyle: { color: '#e2e8f0', fontSize: 11 } },
                legend: { data: ['Input', 'Output'], textStyle: { color: '#64748b', fontSize: 10 } }
            }
        });

        instance.echarts.renderData({
            response: {
                categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                values: [
                    [120, 200, 150, 80, 70, 110],
                    [90, 170, 130, 60, 50, 90]
                ]
            }
        });
    })();
    </script>
</body>
</html>
