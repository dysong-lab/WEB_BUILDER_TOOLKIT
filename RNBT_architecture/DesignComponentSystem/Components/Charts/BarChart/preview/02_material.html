<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charts/BarChart — 02_material</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            padding: 40px 20px;
            background: linear-gradient(180deg, #e9eef8 0%, #dfe7f5 100%);
        }
    </style>
</head>
<body>

<div id="bar-chart-container"></div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/EChartsMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('bar-chart-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = {
        id: 'bar-chart',
        appendElement: document.getElementById('bar-chart-container')
    };

    applyEChartsMixin(instance, {
        cssSelectors: {
            container: '.bar-chart__canvas'
        },
        option: {
            animationDuration: 500,
            grid: { top: 12, right: 8, bottom: 12, left: 8, containLabel: true },
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#23395d',
                borderWidth: 0,
                textStyle: { color: '#ffffff', fontFamily: 'SUIT' }
            },
            legend: { show: false },
            xAxis: {
                type: 'category',
                axisLine: { lineStyle: { color: 'rgba(88, 116, 165, 0.18)' } },
                axisTick: { show: false },
                axisLabel: { color: '#5874a5', fontSize: 12, fontFamily: 'SUIT' }
            },
            yAxis: {
                type: 'value',
                splitLine: { lineStyle: { color: 'rgba(88, 116, 165, 0.12)' } },
                axisLabel: { color: '#6b81a3', fontSize: 11, fontFamily: 'SUIT' }
            },
            series: [
                {
                    name: 'Inbound',
                    type: 'bar',
                    barMaxWidth: 24,
                    itemStyle: { color: '#497bff', borderRadius: [8, 8, 0, 0] }
                },
                {
                    name: 'Outbound',
                    type: 'bar',
                    barMaxWidth: 24,
                    itemStyle: { color: '#9eb4e7', borderRadius: [8, 8, 0, 0] }
                }
            ]
        }
    });

    instance.subscriptions = {
        chartData: [instance.echarts.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {};
    Wkit.bindEvents(instance, instance.customEvents);

    instance.echarts.renderData({
        response: {
            categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            values: [
                [120, 168, 142, 210, 196, 184],
                [96, 132, 124, 188, 174, 160]
            ]
        }
    });
})();
</script>
</body>
</html>
