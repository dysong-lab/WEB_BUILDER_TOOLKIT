<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Trees/Standard — 01_refined (Persona A)</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #08111b;
        display: flex;
        justify-content: center;
        padding: 40px;
        color: #eaf2ff;
        font-family: "SUIT", "Pretendard", sans-serif;
      }
      .preview-shell {
        width: min(100%, 960px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
      }
      .preview-card {
        padding: 24px;
        border-radius: 28px;
        background:
          radial-gradient(circle at top left, rgba(155, 204, 255, 0.22), transparent 42%),
          linear-gradient(180deg, #0d1827 0%, #09111c 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 20px 44px rgba(0, 0, 0, 0.34);
      }
      .preview-card h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.6px;
      }
      .preview-card p {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.6;
        color: rgba(210, 226, 255, 0.7);
      }
      .preview-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }
      .preview-actions button {
        height: 36px;
        padding: 0 14px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #eaf2ff;
        cursor: pointer;
      }
      #tree-container {
        margin-top: 18px;
      }
      .preview-log {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 12px;
        color: rgba(210, 226, 255, 0.62);
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <section class="preview-card">
        <h1>Trees / Standard</h1>
        <p>운영 구조를 계층형으로 표시하고, 토글과 선택 상태를 함께 확인합니다.</p>
        <div class="preview-actions">
          <button type="button" class="expand-all">Expand all</button>
          <button type="button" class="collapse-all">Collapse all</button>
        </div>
        <div id="tree-container"></div>
        <div class="preview-log">No event yet.</div>
      </section>
    </div>

    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/TreeRenderMixin.js"></script>
    <script>
      (async () => {
        await loadComponentAssets(
          "tree-container",
          "../views/01_refined.html",
          "../styles/01_refined.css",
        );

        const treeData = [
          {
            id: "ops",
            icon: "◫",
            label: "Operations Core",
            meta: "12 nodes",
            tone: "accent",
            children: [
              {
                id: "ops-zone-04",
                icon: "▣",
                label: "Zone 04",
                meta: "3 alerts",
                tone: "warning",
                children: [
                  {
                    id: "ops-zone-04-edge",
                    icon: "•",
                    label: "Edge Monitor",
                    meta: "Latency 28ms",
                    children: [],
                  },
                ],
              },
            ],
          },
          {
            id: "archive",
            icon: "◩",
            label: "Archive Vault",
            meta: "2 rooms",
            children: [
              {
                id: "archive-index",
                icon: "•",
                label: "Index Ledger",
                meta: "Updated 4m ago",
                children: [],
              },
            ],
          },
        ];

        const instance = { id: "trees-standard", appendElement: document.getElementById("tree-container") };

        applyTreeRenderMixin(instance, {
          cssSelectors: {
            container: ".tree__list",
            template: "#tree-node-template",
            node: ".tree__node",
            toggle: ".tree__toggle",
            content: ".tree__content",
            icon: ".tree__icon",
            label: ".tree__label",
            meta: ".tree__meta",
            tone: ".tree__node",
            empty: ".tree__empty",
          },
          nodeKey: "id",
          childrenKey: "children",
          datasetAttrs: { tone: "tone" },
        });

        instance.syncEmptyState = function () {
          const empty = this.appendElement.querySelector(".tree__empty");
          const nodes = this.appendElement.querySelectorAll(".tree__node");
          if (empty) empty.hidden = nodes.length > 0;
        };

        instance.setSelectedNode = function (nodeId) {
          const nodes = this.appendElement.querySelectorAll(".tree__node");
          nodes.forEach((node) => {
            node.setAttribute("data-selected", node.dataset.nodeId === String(nodeId) ? "true" : "false");
          });
        };

        instance.renderTreeData = function (payload = {}) {
          this.treeRender.renderData(payload);
          this.treeRender.collapseAll();
          this.setSelectedNode(null);
          this.syncEmptyState();
        };

        instance.expandAllNodes = function () {
          this.treeRender.expandAll();
        };

        instance.collapseAllNodes = function () {
          this.treeRender.collapseAll();
        };

        instance.appendElement.addEventListener("click", (event) => {
          const toggle = event.target.closest(".tree__toggle");
          const log = document.querySelector(".preview-log");

          if (toggle) {
            const node = toggle.closest(".tree__node");
            const nodeId = node?.dataset.nodeId;
            if (!nodeId || node?.dataset.hasChildren !== "true") return;
            instance.treeRender.toggle(nodeId);
            console.log("[Trees/Standard Preview] toggled:", nodeId, instance.treeRender.getNodeState(nodeId));
            log.textContent = `Toggled: ${nodeId}`;
            return;
          }

          const content = event.target.closest(".tree__content");
          if (!content) return;

          const node = content.closest(".tree__node");
          const nodeId = node?.dataset.nodeId;
          if (!nodeId) return;
          instance.setSelectedNode(nodeId);
          console.log("[Trees/Standard Preview] selected:", nodeId);
          log.textContent = `Selected: ${nodeId}`;
        });

        instance.renderTreeData({ response: treeData });

        document.querySelector(".expand-all").addEventListener("click", () => {
          instance.expandAllNodes();
        });

        document.querySelector(".collapse-all").addEventListener("click", () => {
          instance.collapseAllNodes();
        });
      })();
    </script>
  </body>
</html>
