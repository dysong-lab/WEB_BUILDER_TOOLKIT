<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Trees/Standard — 01_refined (Persona A)</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 420px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="tree-container"></div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>&mdash;</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('tree-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'tree', appendElement: document.getElementById('tree-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container:   '.tree__list',
            template:    '#tree-node-template',
            treeid:      '.tree__node',
            depth:       '.tree__node',
            expanded:    '.tree__node',
            hasChildren: '.tree__node',
            selected:    '.tree__node',
            toggle:      '.tree__toggle',
            leading:     '.tree__leading',
            label:       '.tree__label',
            trailing:    '.tree__trailing'
        },
        datasetAttrs: {
            treeid:      'treeid',
            depth:       'depth',
            expanded:    'expanded',
            hasChildren: 'has-children',
            selected:    'selected'
        }
    });

    instance.subscriptions = { treeNodes: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.toggle]: '@treeToggleClicked',
            [instance.listRender.cssSelectors.treeid]: '@treeNodeClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    // 프리뷰용 계층 트리 상태 (페이지 책임 영역 시뮬레이션)
    const rootTree = [
        { treeid: 'site-1', leading: '\u{1F3E2}', label: 'HQ Campus', trailing: '42', expanded: true, children: [
            { treeid: 'floor-3', leading: '\u{1F3E0}', label: 'Floor 3', trailing: '18', expanded: true, children: [
                { treeid: 'room-301', leading: '\u{1F5A5}', label: 'Server Room', trailing: '12' },
                { treeid: 'room-302', leading: '\u{26A1}', label: 'Power Room', trailing: '6' }
            ]},
            { treeid: 'floor-2', leading: '\u{1F3E0}', label: 'Floor 2', trailing: '14', expanded: false, children: [
                { treeid: 'room-201', leading: '\u{1F5A5}', label: 'Lab A', trailing: '8' },
                { treeid: 'room-202', leading: '\u{1F5A5}', label: 'Lab B', trailing: '6' }
            ]},
            { treeid: 'floor-1', leading: '\u{1F3E0}', label: 'Floor 1', trailing: '10', expanded: false, children: [
                { treeid: 'room-101', leading: '\u{1F4E1}', label: 'Lobby IoT', trailing: '10' }
            ]}
        ]},
        { treeid: 'site-2', leading: '\u{1F3ED}', label: 'Branch Factory', trailing: '27', expanded: false, children: [
            { treeid: 'line-a', leading: '\u{2699}', label: 'Line A', trailing: '15' },
            { treeid: 'line-b', leading: '\u{2699}', label: 'Line B', trailing: '12' }
        ]}
    ];
    let selectedId = null;

    const flatten = (nodes, depth = 0, out = []) => {
        nodes.forEach(n => {
            const hasChildren = Array.isArray(n.children) && n.children.length > 0;
            out.push({
                treeid:      n.treeid,
                depth:       String(depth),
                expanded:    String(!!n.expanded),
                hasChildren: String(hasChildren),
                selected:    String(n.treeid === selectedId),
                leading:     n.leading || '',
                label:       n.label || '',
                trailing:    n.trailing || ''
            });
            if (hasChildren && n.expanded) flatten(n.children, depth + 1, out);
        });
        return out;
    };

    const findNode = (nodes, id) => {
        for (const n of nodes) {
            if (n.treeid === id) return n;
            if (n.children) {
                const hit = findNode(n.children, id);
                if (hit) return hit;
            }
        }
        return null;
    };

    const publish = () => {
        instance.listRender.renderData({ response: flatten(rootTree) });
    };

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>&mdash;';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@treeToggleClicked': ({ event }) => {
            event.stopPropagation();
            const nodeEl = event.target.closest('.tree__node');
            const id = nodeEl?.getAttribute('data-treeid');
            if (!id) return;
            const node = findNode(rootTree, id);
            if (!node || !Array.isArray(node.children) || node.children.length === 0) return;
            node.expanded = !node.expanded;
            log('treeToggleClicked "' + id + '" &rarr; expanded=' + node.expanded);
            publish();
        },
        '@treeNodeClicked': ({ event }) => {
            const nodeEl = event.target.closest('.tree__node');
            const id = nodeEl?.getAttribute('data-treeid');
            if (!id) return;
            selectedId = id;
            log('treeNodeClicked "' + id + '"');
            publish();
        }
    });

    publish();
})();
</script>
</body>
</html>
