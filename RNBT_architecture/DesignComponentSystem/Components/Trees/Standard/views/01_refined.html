<!-- 01_refined: Persona A — Refined Technical -->
<div class="tree tree--refined">
  <div class="tree__list"></div>
  <p class="tree__empty" hidden>No nodes available.</p>

  <template id="tree-node-template">
    <div class="tree__node" data-selected="false">
      <button type="button" class="tree__toggle" aria-label="Toggle node">
        <span class="tree__toggle-glyph">▸</span>
      </button>
      <button type="button" class="tree__content">
        <span class="tree__icon">◫</span>
        <span class="tree__text">
          <span class="tree__label">Node</span>
          <span class="tree__meta"></span>
        </span>
      </button>
    </div>
  </template>
</div>
