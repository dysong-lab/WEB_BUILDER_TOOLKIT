<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TreeView — 01_standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f1f5f9; padding: 40px; }
        #tree-view-container { width: 400px; height: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<div id="tree-view-container"></div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/TreeRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('tree-view-container', '../views/01_standard.html', '../styles/01_standard.css');

    const instance = { id: 'tree-view', appendElement: document.getElementById('tree-view-container') };

    // 1. Mixin 적용
    applyTreeRenderMixin(instance, {
        cssSelectors: {
            container:   '.tree-view__list',
            template:    '#tree-view-node-template',
            node:        '.tree-view__node',
            toggle:      '.tree-view__toggle',
            icon:        '.tree-view__icon',
            label:       '.tree-view__label',
            badge:       '.tree-view__badge',
            status:      '.tree-view__node',
            expandAll:   '.tree-view__expand-all-btn',
            collapseAll: '.tree-view__collapse-all-btn'
        },
        nodeKey: 'id',
        childrenKey: 'children',
        datasetAttrs: {
            status: 'status'
        }
    });

    // 2. 이벤트 핸들러 등록
    Wkit.onEventBusHandlers({
        '@nodeToggled': ({ event, targetInstance }) => {
            const nodeEl = event.target.closest('.tree-view__node');
            const nodeId = nodeEl?.dataset.nodeId;
            if (nodeId) targetInstance.treeRender.toggle(nodeId);
        },
        '@nodeSelected': ({ event, targetInstance }) => {
            if (event.target.closest('.tree-view__toggle')) return;
            const nodeEl = event.target.closest('.tree-view__node');
            const nodeId = nodeEl?.dataset.nodeId;
            if (!nodeId) return;

            // 선택 상태 토글
            const allNodes = targetInstance.appendElement.querySelectorAll('.tree-view__node');
            allNodes.forEach(el => el.removeAttribute('data-selected'));
            nodeEl.setAttribute('data-selected', 'true');

            const state = targetInstance.treeRender.getNodeState(nodeId);
            console.log('[Preview] Node selected:', nodeId, state);
        },
        '@expandAll': ({ targetInstance }) => {
            targetInstance.treeRender.expandAll();
        },
        '@collapseAll': ({ targetInstance }) => {
            targetInstance.treeRender.collapseAll();
        }
    });

    // 3. 이벤트 매핑
    instance.customEvents = {
        click: {
            [instance.treeRender.cssSelectors.toggle]:      '@nodeToggled',
            [instance.treeRender.cssSelectors.node]:         '@nodeSelected',
            [instance.treeRender.cssSelectors.expandAll]:    '@expandAll',
            [instance.treeRender.cssSelectors.collapseAll]:  '@collapseAll'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    // 4. Mock 데이터로 렌더링
    const mockData = [
        {
            id: 'site-hq',
            label: 'Headquarters',
            icon: '\uD83C\uDFE2',
            status: 'normal',
            badge: '3 floors',
            children: [
                {
                    id: 'floor-1',
                    label: '1F - Lobby',
                    icon: '\uD83C\uDFEB',
                    status: 'normal',
                    children: [
                        { id: 'room-101', label: 'Reception', icon: '\uD83D\uDCCB', status: 'normal', children: [] },
                        { id: 'room-102', label: 'Security Office', icon: '\uD83D\uDD12', status: 'normal', children: [] }
                    ]
                },
                {
                    id: 'floor-2',
                    label: '2F - Offices',
                    icon: '\uD83C\uDFE2',
                    status: 'warning',
                    badge: '1 alert',
                    children: [
                        { id: 'room-201', label: 'Engineering Lab', icon: '\uD83D\uDD27', status: 'normal', children: [] },
                        { id: 'room-202', label: 'Conference Room A', icon: '\uD83D\uDCDD', status: 'warning', badge: 'HVAC issue', children: [] },
                        { id: 'room-203', label: 'Open Workspace', icon: '\uD83D\uDCBB', status: 'normal', children: [] }
                    ]
                },
                {
                    id: 'floor-3',
                    label: '3F - Data Center',
                    icon: '\uD83D\uDCE1',
                    status: 'critical',
                    badge: '2 alerts',
                    children: [
                        { id: 'room-301', label: 'Server Room A', icon: '\uD83D\uDDA5\uFE0F', status: 'critical', badge: 'Temp 42\u00B0C', children: [] },
                        { id: 'room-302', label: 'Server Room B', icon: '\uD83D\uDDA5\uFE0F', status: 'normal', children: [] },
                        { id: 'room-303', label: 'UPS Room', icon: '\u26A1', status: 'warning', badge: 'Battery 45%', children: [] }
                    ]
                }
            ]
        },
        {
            id: 'site-branch',
            label: 'Branch Office',
            icon: '\uD83C\uDFE0',
            status: 'offline',
            badge: 'Disconnected',
            children: [
                { id: 'branch-room-1', label: 'Main Office', icon: '\uD83D\uDCBB', status: 'offline', children: [] },
                { id: 'branch-room-2', label: 'Equipment Room', icon: '\uD83D\uDD27', status: 'offline', children: [] }
            ]
        }
    ];

    instance.treeRender.renderData({ response: mockData });
})();
</script>
</body>
</html>
