<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Switch/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="switch-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('switch-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'switch', appendElement: document.getElementById('switch-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.switch__list',
            template:  '#switch-item-template',
            switchid:  '.switch__item',
            checked:   '.switch__item',
            disabled:  '.switch__item',
            label:     '.switch__label'
        },
        itemKey: 'switchid',
        datasetAttrs: {
            switchid: 'switchid',
            checked:  'checked',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { switchItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.switchid]: '@switchClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { switchid: 'wifi',      label: 'Wi-Fi',            checked: 'true',  disabled: 'false' },
        { switchid: 'bluetooth', label: 'Bluetooth',        checked: 'false', disabled: 'false' },
        { switchid: 'hotspot',   label: 'Personal hotspot', checked: 'true',  disabled: 'false' },
        { switchid: 'airplane',  label: 'Airplane mode',    checked: 'false', disabled: 'true'  }
    ];

    Wkit.onEventBusHandlers({
        '@switchClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.switchid);
            const switchid = item?.getAttribute('data-switchid');
            if (!switchid) return;
            const current = itemsData.find(it => it.switchid === switchid);
            if (!current || current.disabled === 'true') return;
            const next = current.checked === 'true' ? 'false' : 'true';
            current.checked = next;
            targetInstance.listRender.updateItemState(switchid, { checked: next });
            log(`switchClicked "${switchid}" → ${next}`);
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
