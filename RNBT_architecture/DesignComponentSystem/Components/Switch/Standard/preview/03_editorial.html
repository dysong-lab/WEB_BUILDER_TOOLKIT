<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Switch/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FAF8F4;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 14px 18px;
            background: #faf8f3;
            border: 1px solid #d4c9b5;
            border-radius: 2px;
            color: #5c544a;
            font-size: 12px;
            line-height: 1.7;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #2a2520;
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="switch-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('switch-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'switch', appendElement: document.getElementById('switch-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.switch__list',
            template:  '#switch-item-template',
            switchid:  '.switch__item',
            checked:   '.switch__item',
            disabled:  '.switch__item',
            label:     '.switch__label'
        },
        itemKey: 'switchid',
        datasetAttrs: {
            switchid: 'switchid',
            checked:  'checked',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { switchItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.switchid]: '@switchClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { switchid: 'newsletter',  label: 'Weekly newsletter',        checked: 'true',  disabled: 'false' },
        { switchid: 'digest',      label: 'Daily editorial digest',    checked: 'false', disabled: 'false' },
        { switchid: 'comments',    label: 'Comment notifications',    checked: 'true',  disabled: 'false' },
        { switchid: 'print',       label: 'Print subscription',       checked: 'false', disabled: 'true'  }
    ];

    Wkit.onEventBusHandlers({
        '@switchClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.switchid);
            const switchid = item?.getAttribute('data-switchid');
            if (!switchid) return;
            const current = itemsData.find(it => it.switchid === switchid);
            if (!current || current.disabled === 'true') return;
            const next = current.checked === 'true' ? 'false' : 'true';
            current.checked = next;
            targetInstance.listRender.updateItemState(switchid, { checked: next });
            log(`switchClicked "${switchid}" → ${next}`);
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
