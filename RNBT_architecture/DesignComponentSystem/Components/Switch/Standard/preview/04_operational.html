<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Switch/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A1214;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #1f3a4a;
            border-radius: 2px;
            color: #7dc7d9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #22d3ee;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div id="switch-container"></div>
<div class="demo-log" id="demo-log"><strong>event log</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('switch-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'switch', appendElement: document.getElementById('switch-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.switch__list',
            template:  '#switch-item-template',
            switchid:  '.switch__item',
            checked:   '.switch__item',
            disabled:  '.switch__item',
            label:     '.switch__label'
        },
        itemKey: 'switchid',
        datasetAttrs: {
            switchid: 'switchid',
            checked:  'checked',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { switchItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.switchid]: '@switchClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { switchid: 'telemetry', label: 'TELEMETRY',  checked: 'true',  disabled: 'false' },
        { switchid: 'alerts',    label: 'ALERTS',     checked: 'true',  disabled: 'false' },
        { switchid: 'failover',  label: 'FAILOVER',   checked: 'false', disabled: 'false' },
        { switchid: 'debug',     label: 'DEBUG MODE', checked: 'false', disabled: 'false' },
        { switchid: 'maint',     label: 'MAINT LOCK', checked: 'false', disabled: 'true'  }
    ];

    Wkit.onEventBusHandlers({
        '@switchClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.switchid);
            const switchid = item?.getAttribute('data-switchid');
            if (!switchid) return;
            const current = itemsData.find(it => it.switchid === switchid);
            if (!current || current.disabled === 'true') return;
            const next = current.checked === 'true' ? 'false' : 'true';
            current.checked = next;
            targetInstance.listRender.updateItemState(switchid, { checked: next });
            log(`switchClicked "${switchid}" → ${next}`);
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
