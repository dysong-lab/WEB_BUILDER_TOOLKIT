<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Switch/Standard — 02_material</title>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;
        background: #efe9fb;
      }
    </style>
  </head>
  <body>
    <div id="switch-material"></div>
    <script>
      (async () => {
        await loadComponentAssets("switch-material", "../views/02_material.html", "../styles/02_material.css");
        const instance = { id: "switch-material", appendElement: document.getElementById("switch-material") };
        applyListRenderMixin(instance, {
          cssSelectors: {
            container: ".switch-group",
            template: "#switch-item-template",
            item: ".switch-item",
            id: ".switch-item",
            checked: ".switch-item",
            disabled: ".switch-item",
            label: ".switch-item__label",
            supportingText: ".switch-item__supporting",
          },
          itemKey: "id",
          datasetAttrs: { id: "id", checked: "checked", disabled: "disabled" },
        });
        instance.listRender.renderData({
          response: [
            { id: "updates", label: "Auto updates", supportingText: "Install patches overnight", checked: "true", disabled: "false" },
            { id: "review", label: "Review mode", supportingText: "Queue changes for approval", checked: "false", disabled: "false" },
          ],
        });
        instance.appendElement.addEventListener("click", (event) => {
          const item = event.target.closest(".switch-item");
          if (!item || item.dataset.disabled === "true") return;
          item.dataset.checked = item.dataset.checked === "true" ? "false" : "true";
          item.setAttribute("data-checked", item.dataset.checked);
          Weventbus.emit("@switchChanged", { event, targetInstance: instance });
        });
      })();
    </script>
  </body>
</html>
