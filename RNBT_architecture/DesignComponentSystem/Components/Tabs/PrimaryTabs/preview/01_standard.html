<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PrimaryTabs — 01_standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #primarytabs-container { margin: 0 auto; max-width: 480px; background: #ffffff; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>
    <div id="primarytabs-container"></div>

    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/ListRenderMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('primarytabs-container', '../views/01_standard.html', '../styles/01_standard.css');

        const instance = {
            id: 'primarytabs',
            appendElement: document.getElementById('primarytabs-container')
        };

        applyListRenderMixin(instance, {
            cssSelectors: {
                container: '.primary-tabs__list',
                template:  '#primary-tab-item-template',
                tabid:     '.primary-tabs__tab',
                active:    '.primary-tabs__tab',
                icon:      '.primary-tabs__tab-icon',
                label:     '.primary-tabs__tab-label'
            },
            itemKey: 'tabid',
            datasetAttrs: {
                tabid:  'tabid',
                active: 'active'
            }
        });

        instance.listRender.renderData({
            response: [
                { tabid: 'overview', active: 'true',  icon: '📊', label: 'Overview' },
                { tabid: 'details',  active: 'false', icon: '📋', label: 'Details' },
                { tabid: 'history',  active: 'false', icon: '🕐', label: 'History' }
            ]
        });

        // indicator 위치 업데이트
        function updateIndicator() {
            const activeTab = instance.appendElement.querySelector('.primary-tabs__tab[data-active="true"]');
            const indicator = instance.appendElement.querySelector('.primary-tabs__indicator');
            if (!activeTab || !indicator) return;

            const list = instance.appendElement.querySelector('.primary-tabs__list');
            const listRect = list.getBoundingClientRect();
            const tabRect = activeTab.getBoundingClientRect();

            indicator.style.left = (tabRect.left - listRect.left) + 'px';
            indicator.style.width = tabRect.width + 'px';
        }

        updateIndicator();

        // 탭 클릭 → 활성 상태 전환 + indicator 이동
        instance.appendElement.addEventListener('click', function(e) {
            const tab = e.target.closest('.primary-tabs__tab');
            if (!tab) return;

            const id = tab.dataset.tabid;
            const tabs = instance.appendElement.querySelectorAll('.primary-tabs__tab');
            tabs.forEach(function(el) { el.dataset.active = 'false'; });
            tab.dataset.active = 'true';

            updateIndicator();
        });
    })();
    </script>
</body>
</html>
