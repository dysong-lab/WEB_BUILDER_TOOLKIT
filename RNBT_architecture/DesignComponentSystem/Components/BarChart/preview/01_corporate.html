<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BarChart — 01_corporate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #barchart-container { width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="barchart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('barchart-container', '../views/01_corporate.html', '../styles/01_corporate.css');

        const instance = {
            id: 'bar-chart',
            appendElement: document.getElementById('barchart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                xAxis: { type: 'category' },
                yAxis: { type: 'value' },
                series: [
                    { name: 'Input', type: 'bar' },
                    { name: 'Output', type: 'bar' }
                ],
                tooltip: { trigger: 'axis' },
                legend: { data: ['Input', 'Output'] }
            }
        });

        instance.echarts.renderData({
            response: {
                categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                values: [
                    [120, 200, 150, 80, 70, 110],
                    [90, 170, 130, 60, 50, 90]
                ]
            }
        });
    })();
    </script>
</body>
</html>
