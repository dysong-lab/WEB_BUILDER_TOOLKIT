<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Header — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #header-container { width: 900px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/FieldRenderMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('header-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'header',
            appendElement: document.getElementById('header-container')
        };

        applyFieldRenderMixin(instance, {
            cssSelectors: {
                title:    '.header__title',
                userName: '.header__user-name',
                time:     '.header__time'
            }
        });

        instance.fieldRender.renderData({
            response: {
                title:    'ECO Monitoring Dashboard',
                userName: 'Admin',
                time:     '2026-03-26 14:30:05'
            }
        });
    })();
    </script>
</body>
</html>
