<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tooltips/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 28px;
            padding: 60px 20px 80px;
        }
        .demo-row {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .demo-anchor {
            padding: 10px 20px;
            border: 1px solid rgba(80, 46, 233, 0.4);
            border-radius: 8px;
            background: #1F2358;
            color: #E8EDFF;
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .demo-anchor:hover { background: #2A2B6E; }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 160px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
        #tooltip-container {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="demo-row">
    <button class="demo-anchor" data-tip="Save draft">Hover: Save</button>
    <button class="demo-anchor" data-tip="Share with team">Hover: Share</button>
    <button class="demo-anchor" data-tip="Delete this item permanently">Hover: Delete</button>
</div>
<div id="tooltip-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('tooltip-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'tooltip', appendElement: document.getElementById('tooltip-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            tooltip: '.tooltip',
            label:   '.tooltip__label'
        }
    });

    instance.subscriptions = {
        tooltipInfo: [instance.fieldRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {};
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const rootEl = () => instance.appendElement.querySelector('.tooltip');
    let dismissTimer = null;

    const placeAbove = (anchor) => {
        const rect = anchor.getBoundingClientRect();
        const el = rootEl();
        el.style.left = (rect.left + rect.width / 2) + 'px';
        el.style.top = (rect.top - 8) + 'px';
        el.style.transform = 'translate(-50%, -100%)';
    };

    const openTooltip = (anchor, label) => {
        clearTimeout(dismissTimer);
        instance.fieldRender.renderData({ response: { label } });
        placeAbove(anchor);
        rootEl().dataset.open = 'true';
        dismissTimer = setTimeout(() => {
            rootEl().dataset.open = 'false';
            log('auto dismiss (1500ms)');
        }, 1500);
    };

    const closeTooltip = () => {
        clearTimeout(dismissTimer);
        rootEl().dataset.open = 'false';
    };

    document.querySelectorAll('.demo-anchor').forEach(anchor => {
        anchor.addEventListener('mouseenter', () => {
            const label = anchor.getAttribute('data-tip');
            openTooltip(anchor, label);
            log(`show "${label}"`);
        });
        anchor.addEventListener('mouseleave', () => {
            closeTooltip();
        });
        anchor.addEventListener('focus', () => {
            const label = anchor.getAttribute('data-tip');
            openTooltip(anchor, label);
            log(`focus show "${label}"`);
        });
        anchor.addEventListener('blur', () => {
            closeTooltip();
        });
    });
})();
</script>
</body>
</html>
