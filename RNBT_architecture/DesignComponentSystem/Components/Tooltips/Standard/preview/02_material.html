<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Tooltips/Standard — 02_material</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px; background: #efe9fb; }
    </style>
  </head>
  <body>
    <div id="tooltip-material"></div>
    <script>
      (async () => {
        await loadComponentAssets("tooltip-material", "../views/02_material.html", "../styles/02_material.css");
        const root = document.getElementById("tooltip-material");
        const instance = { id: "tooltip-material", appendElement: root };
        const trigger = root.querySelector(".tooltip-host__trigger");
        const show = () => {
          let host = document.querySelector(".preview-tooltip-material");
          if (!host) {
            host = document.createElement("div");
            host.className = "preview-tooltip-material";
            host.textContent = "Format painter - Apply the same visual treatment to another block.";
            host.style.cssText = "position:fixed;left:50%;top:calc(50% - 54px);transform:translateX(-50%);padding:12px 14px;border-radius:12px;background:#fffafb;color:#241d27;border:1px solid #e1d5e3;font:12px/1.5 'Segoe UI',sans-serif;box-shadow:0 10px 24px rgba(63,45,73,0.16)";
            document.body.appendChild(host);
          }
          host.hidden = false;
          Weventbus.emit('@tooltipShown', { targetInstance: instance, response: { label: 'Format painter' } });
        };
        const hide = () => {
          const host = document.querySelector(".preview-tooltip-material");
          if (!host) return;
          host.hidden = true;
          Weventbus.emit('@tooltipHidden', { targetInstance: instance, response: { reason: 'leave' } });
        };
        trigger.addEventListener("mouseenter", show);
        trigger.addEventListener("mouseleave", hide);
        document.addEventListener("pointerdown", (event) => {
          if (trigger.contains(event.target)) return;
          hide();
        });
      })();
    </script>
  </body>
</html>
