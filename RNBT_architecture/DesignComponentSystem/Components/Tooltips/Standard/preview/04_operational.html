<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tooltips/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A1416;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 60px 20px 80px;
            color: #B2EBF2;
        }
        .demo-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .demo-anchor {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 12px;
            border: 1px solid #2A3A3E;
            border-radius: 2px;
            background: #0D1B1E;
            color: #B2EBF2;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: border-color 100ms ease-out, color 100ms ease-out;
        }
        .demo-anchor:hover { border-color: #00BCD4; color: #FFFFFF; }
        .demo-log {
            width: 360px;
            padding: 10px 14px;
            background: #0D1B1E;
            border: 1px solid #2A3A3E;
            border-radius: 2px;
            color: #5A7A80;
            font-size: 11px;
            line-height: 1.6;
            max-height: 160px;
            overflow-y: auto;
            letter-spacing: 0.3px;
        }
        .demo-log strong { color: #00BCD4; }
        #tooltip-container {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="demo-row">
    <button class="demo-anchor" data-tip="PUMP_01 status: NOMINAL">pump_01</button>
    <button class="demo-anchor" data-tip="TEMP threshold: 85C">temp</button>
    <button class="demo-anchor" data-tip="CRITICAL shutdown trigger">shutdown</button>
</div>
<div id="tooltip-container"></div>
<div class="demo-log" id="demo-log"><strong>&gt; event log</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('tooltip-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'tooltip', appendElement: document.getElementById('tooltip-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            tooltip: '.tooltip',
            label:   '.tooltip__label'
        }
    });

    instance.subscriptions = {
        tooltipInfo: [instance.fieldRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {};
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>&gt; event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>&gt; event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const rootEl = () => instance.appendElement.querySelector('.tooltip');
    let dismissTimer = null;

    const placeAbove = (anchor) => {
        const rect = anchor.getBoundingClientRect();
        const el = rootEl();
        el.style.left = (rect.left + rect.width / 2) + 'px';
        el.style.top = (rect.top - 6) + 'px';
        el.style.transform = 'translate(-50%, -100%)';
    };

    const openTooltip = (anchor, label) => {
        clearTimeout(dismissTimer);
        instance.fieldRender.renderData({ response: { label } });
        placeAbove(anchor);
        rootEl().dataset.open = 'true';
        dismissTimer = setTimeout(() => {
            rootEl().dataset.open = 'false';
            log('>> auto dismiss (1500ms)');
        }, 1500);
    };

    const closeTooltip = () => {
        clearTimeout(dismissTimer);
        rootEl().dataset.open = 'false';
    };

    document.querySelectorAll('.demo-anchor').forEach(anchor => {
        anchor.addEventListener('mouseenter', () => {
            const label = anchor.getAttribute('data-tip');
            openTooltip(anchor, label);
            log(`>> show "${label}"`);
        });
        anchor.addEventListener('mouseleave', () => closeTooltip());
        anchor.addEventListener('focus', () => {
            const label = anchor.getAttribute('data-tip');
            openTooltip(anchor, label);
            log(`>> focus "${label}"`);
        });
        anchor.addEventListener('blur', () => closeTooltip());
    });
})();
</script>
</body>
</html>
