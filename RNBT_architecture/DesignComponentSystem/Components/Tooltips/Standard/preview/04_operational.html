<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Tooltips/Standard — 04_operational</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px; background: #090d11; }
    </style>
  </head>
  <body>
    <div id="tooltip-operational"></div>
    <script>
      (async () => {
        await loadComponentAssets("tooltip-operational", "../views/04_operational.html", "../styles/04_operational.css");
        const root = document.getElementById("tooltip-operational");
        const instance = { id: "tooltip-operational", appendElement: root };
        const trigger = root.querySelector(".tooltip-host__trigger");
        const show = () => {
          let host = document.querySelector(".preview-tooltip-operational");
          if (!host) {
            host = document.createElement("div");
            host.className = "preview-tooltip-operational";
            host.textContent = "Signal health - Packet jitter remains inside the acceptable threshold.";
            host.style.cssText = "position:fixed;left:50%;top:calc(50% - 54px);transform:translateX(-50%);padding:10px 12px;background:#0d141b;color:#d6e2ea;border:1px solid #1d2a34;font:12px/1.5 'Segoe UI',sans-serif;box-shadow:0 12px 24px rgba(0,0,0,0.28)";
            document.body.appendChild(host);
          }
          host.hidden = false;
          Weventbus.emit('@tooltipShown', { targetInstance: instance, response: { label: 'Signal health' } });
        };
        const hide = () => {
          const host = document.querySelector(".preview-tooltip-operational");
          if (!host) return;
          host.hidden = true;
          Weventbus.emit('@tooltipHidden', { targetInstance: instance, response: { reason: 'leave' } });
        };
        trigger.addEventListener("mouseenter", show);
        trigger.addEventListener("focus", show);
        trigger.addEventListener("mouseleave", hide);
        trigger.addEventListener("blur", hide);
      })();
    </script>
  </body>
</html>
