<div class="tooltip-host tooltip-host--refined">
  <button class="tooltip-host__trigger" type="button">Hover For Detail</button>
  <template id="tooltip-popup-template">
    <style>
      .tooltip__overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .tooltip__surface {
        position: fixed;
        top: 50%;
        left: 50%;
        display: grid;
        gap: 6px;
        min-width: 180px;
        max-width: 260px;
        padding: 12px 14px;
        border-radius: 14px;
        color: #eef6ff;
        background: linear-gradient(180deg, rgba(15, 29, 44, 0.96), rgba(7, 15, 24, 0.98));
        border: 1px solid rgba(145, 220, 255, 0.22);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
        opacity: 0;
        transform: translate(-50%, calc(-50% - 8px));
        transition: opacity 140ms ease, transform 140ms ease;
      }

      .tooltip__overlay[data-state="open"] .tooltip__surface[data-open="true"] {
        opacity: 1;
        transform: translate(-50%, -50%);
      }

      .tooltip__label {
        font: 700 13px/1.2 "Segoe UI", sans-serif;
      }

      .tooltip__supporting {
        color: rgba(238, 246, 255, 0.74);
        font: 400 12px/1.5 "Segoe UI", sans-serif;
      }
    </style>
    <div class="tooltip__overlay" data-state="closed">
      <div class="tooltip__surface" data-open="false" data-placement="top" role="tooltip">
        <div class="tooltip__label"></div>
        <div class="tooltip__supporting"></div>
      </div>
    </div>
  </template>
</div>
