<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Radio/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A1214;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #1f3a4a;
            border-radius: 2px;
            color: #7dc7d9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #22d3ee;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div id="radio-container"></div>
<div class="demo-log" id="demo-log"><strong>event log</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('radio-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'radio', appendElement: document.getElementById('radio-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.radio__list',
            template:  '#radio-item-template',
            radioid:   '.radio__item',
            selected:  '.radio__item',
            disabled:  '.radio__item',
            label:     '.radio__label'
        },
        itemKey: 'radioid',
        datasetAttrs: {
            radioid:  'radioid',
            selected: 'selected',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { radioItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.radioid]: '@radioClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>event log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>event log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { radioid: 'mode-auto',   label: 'AUTO',      selected: 'true',  disabled: 'false' },
        { radioid: 'mode-manual', label: 'MANUAL',    selected: 'false', disabled: 'false' },
        { radioid: 'mode-safe',   label: 'SAFE',      selected: 'false', disabled: 'false' },
        { radioid: 'mode-diag',   label: 'DIAG',      selected: 'false', disabled: 'false' },
        { radioid: 'mode-admin',  label: 'ADMIN',     selected: 'false', disabled: 'true' }
    ];

    Wkit.onEventBusHandlers({
        '@radioClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.radioid);
            const radioid = item?.getAttribute('data-radioid');
            if (!radioid) return;
            const current = itemsData.find(it => it.radioid === radioid);
            if (!current || current.disabled === 'true') return;
            if (current.selected === 'true') return;
            const prev = itemsData.find(it => it.selected === 'true');
            if (prev) {
                prev.selected = 'false';
                targetInstance.listRender.updateItemState(prev.radioid, { selected: 'false' });
            }
            current.selected = 'true';
            targetInstance.listRender.updateItemState(radioid, { selected: 'true' });
            log(`radioClicked "${radioid}"` + (prev ? ` (prev: "${prev.radioid}")` : ''));
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
