<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Radio/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FAF8F4;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 14px 18px;
            background: #faf8f3;
            border: 1px solid #d4c9b5;
            border-radius: 2px;
            color: #5c544a;
            font-size: 12px;
            line-height: 1.7;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #2a2520;
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="radio-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('radio-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'radio', appendElement: document.getElementById('radio-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.radio__list',
            template:  '#radio-item-template',
            radioid:   '.radio__item',
            selected:  '.radio__item',
            disabled:  '.radio__item',
            label:     '.radio__label'
        },
        itemKey: 'radioid',
        datasetAttrs: {
            radioid:  'radioid',
            selected: 'selected',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { radioItems: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.radioid]: '@radioClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const itemsData = [
        { radioid: 'binding-hard',  label: 'Hardcover',        selected: 'true',  disabled: 'false' },
        { radioid: 'binding-soft',  label: 'Softcover',        selected: 'false', disabled: 'false' },
        { radioid: 'binding-spiral',label: 'Spiral-bound',     selected: 'false', disabled: 'false' },
        { radioid: 'binding-leaf',  label: 'Loose-leaf',       selected: 'false', disabled: 'false' },
        { radioid: 'binding-rare',  label: 'Rare book (temporarily unavailable)', selected: 'false', disabled: 'true' }
    ];

    Wkit.onEventBusHandlers({
        '@radioClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.radioid);
            const radioid = item?.getAttribute('data-radioid');
            if (!radioid) return;
            const current = itemsData.find(it => it.radioid === radioid);
            if (!current || current.disabled === 'true') return;
            if (current.selected === 'true') return;
            const prev = itemsData.find(it => it.selected === 'true');
            if (prev) {
                prev.selected = 'false';
                targetInstance.listRender.updateItemState(prev.radioid, { selected: 'false' });
            }
            current.selected = 'true';
            targetInstance.listRender.updateItemState(radioid, { selected: 'true' });
            log(`radioClicked "${radioid}"` + (prev ? ` (prev: "${prev.radioid}")` : ''));
        }
    });

    instance.listRender.renderData({ response: itemsData });
})();
</script>
</body>
</html>
