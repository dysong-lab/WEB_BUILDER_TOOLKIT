<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Cards/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="card-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('card-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'cards', appendElement: document.getElementById('card-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            card:       '.card',
            icon:       '.card__icon',
            headline:   '.card__headline',
            subhead:    '.card__subhead',
            supporting: '.card__supporting'
        }
    });

    applyListRenderMixin(instance, {
        cssSelectors: {
            container:   '.card__actions',
            template:    '#card-action-template',
            actionid:    '.card__action',
            actionLabel: '.card__action-label',
            actionIcon:  '.card__action-icon'
        },
        itemKey: 'actionid',
        datasetAttrs: {
            actionid: 'actionid'
        }
    });

    instance.subscriptions = {
        cardInfo:    [instance.fieldRender.renderData],
        cardActions: [instance.listRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.card]:     '@cardClicked',
            [instance.listRender.cssSelectors.actionid]:  '@cardActionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@cardActionClicked': ({ event }) => {
            const item = event.target.closest('.card__action');
            const actionid = item?.getAttribute('data-actionid');
            log(`cardActionClicked "${actionid}"`);
        },
        '@cardClicked': ({ event }) => {
            if (event.target.closest('.card__action')) return;
            log('cardClicked → card body');
        }
    });

    GlobalDataPublisher.publish('cardInfo', {
        icon:       'bolt',
        headline:   'Energy Optimization',
        subhead:    'RNBT-01 · Sector A',
        supporting: '실시간 전력 소비 패턴을 분석하여 최적의 운영 구간을 자동으로 조정합니다.'
    });

    instance.listRender.renderData({ response: [
        { actionid: 'details', actionIcon: 'arrow_forward', actionLabel: 'Details' },
        { actionid: 'share',   actionIcon: 'ios_share',     actionLabel: 'Share' }
    ]});
})();
</script>
</body>
</html>
