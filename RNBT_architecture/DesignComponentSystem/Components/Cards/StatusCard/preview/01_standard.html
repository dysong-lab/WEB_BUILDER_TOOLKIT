<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>StatusCard — 01_standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f5f9; padding: 40px; }
        #statuscard-container { margin: 0 auto; }
    </style>
</head>
<body>
    <div id="statuscard-container"></div>

    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/FieldRenderMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('statuscard-container', '../views/01_standard.html', '../styles/01_standard.css');

        const instance = {
            id: 'status-card',
            appendElement: document.getElementById('statuscard-container')
        };

        applyFieldRenderMixin(instance, {
            cssSelectors: {
                title:   '.status-card__title',
                status:  '.status-card__status',
                version: '.status-card__version',
                uptime:  '.status-card__uptime'
            },
            datasetAttrs: {
                status: 'status'
            }
        });

        instance.fieldRender.renderData({
            response: {
                title:   'API Server',
                status:  'normal',
                version: 'v2.4.1',
                uptime:  '14d 7h 32m'
            }
        });
    })();
    </script>
</body>
</html>
