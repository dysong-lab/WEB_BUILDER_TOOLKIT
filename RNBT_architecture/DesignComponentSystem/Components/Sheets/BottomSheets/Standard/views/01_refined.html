<template id="bottom-sheet-popup-template">
    <style>
        /* 01_refined: Persona A — Refined Technical
           퍼플 팔레트 / 그라디언트 깊이 / Pretendard / 다크 / Modal Bottom Sheet */

        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0');

        .bottom-sheet__scrim {
            position: fixed;
            inset: 0;
            background: rgba(14, 17, 48, 0.72);
            z-index: 1000;
            cursor: pointer;
        }

        .bottom-sheet__surface {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #1F2358 0%, #171A44 100%);
            border-top: 1px solid rgba(80, 46, 233, 0.4);
            border-radius: 20px 20px 0 0;
            z-index: 1001;
            overflow: hidden;
        }

        .bottom-sheet__drag-handle-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0 8px;
            cursor: pointer;
        }

        .bottom-sheet__drag-handle {
            width: 36px;
            height: 4px;
            background: rgba(146, 168, 244, 0.5);
            border-radius: 30px;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .bottom-sheet__drag-handle:hover {
            background: rgba(146, 168, 244, 0.8);
        }

        .bottom-sheet__header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 28px 8px;
        }

        .bottom-sheet__headline {
            font-family: 'Pretendard', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #E8EDFF;
            line-height: 1.35;
        }

        .bottom-sheet__supporting {
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #A6B3DE;
            line-height: 1.6;
        }

        .bottom-sheet__supporting:empty {
            display: none;
        }

        .bottom-sheet__divider {
            height: 1px;
            background: rgba(80, 46, 233, 0.2);
            margin: 16px 28px 0;
        }

        .bottom-sheet__actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px 20px 24px;
        }

        .bottom-sheet__actions:empty {
            display: none;
        }

        .bottom-sheet__action {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 44px;
            padding: 0 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #E8EDFF;
            cursor: pointer;
            transition: background-color 150ms ease-out;
            text-align: left;
        }

        .bottom-sheet__action:hover {
            background: rgba(80, 46, 233, 0.16);
        }

        .bottom-sheet__action:last-child {
            background: #502EE9;
        }

        .bottom-sheet__action:last-child:hover {
            background: #6B4BF0;
        }

        .bottom-sheet__action-icon {
            font-family: 'Material Symbols Outlined';
            font-size: 20px;
            color: #92A8F4;
            flex-shrink: 0;
        }

        .bottom-sheet__action-icon:empty {
            display: none;
        }

        .bottom-sheet__action-label {
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        template {
            display: none;
        }
    </style>
    <div class="bottom-sheet__scrim"></div>
    <div class="bottom-sheet__surface">
        <div class="bottom-sheet__drag-handle-area">
            <button class="bottom-sheet__drag-handle" aria-label="close"></button>
        </div>
        <div class="bottom-sheet__header">
            <div class="bottom-sheet__headline"></div>
            <div class="bottom-sheet__supporting"></div>
        </div>
        <div class="bottom-sheet__divider"></div>
        <div class="bottom-sheet__actions"></div>
        <template id="bottom-sheet-action-template">
            <button class="bottom-sheet__action" data-actionid="">
                <span class="bottom-sheet__action-icon material-symbols-outlined"></span>
                <span class="bottom-sheet__action-label"></span>
            </button>
        </template>
    </div>
</template>
