<div class="bottom-sheets bottom-sheets--material" aria-hidden="true">
    <template id="bottom-sheet-popup-template">
        <style>
            .bottom-sheet__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                padding: 24px;
                background: rgba(17, 24, 39, 0.34);
                opacity: 0;
                transition: opacity 240ms ease;
            }

            .bottom-sheet__surface {
                width: min(100%, 680px);
                border-radius: 28px 28px 0 0;
                padding: 16px 24px 24px;
                background: #fcfbff;
                color: #1b1b1f;
                box-shadow: 0 18px 44px rgba(15, 23, 42, 0.26);
                opacity: 0;
                transform: translateY(26px);
                transition: transform 240ms ease, opacity 240ms ease;
            }

            .bottom-sheet__overlay[data-state="open"] {
                opacity: 1;
            }

            .bottom-sheet__overlay[data-state="open"] .bottom-sheet__surface {
                opacity: 1;
                transform: translateY(0);
            }

            .bottom-sheet__overlay[data-state="closing"] .bottom-sheet__surface {
                opacity: 0;
                transform: translateY(18px);
            }

            .bottom-sheet__handle {
                width: 40px;
                height: 4px;
                margin: 0 auto 18px;
                border-radius: 999px;
                background: #c6c5d0;
            }

            .bottom-sheet__header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
            }

            .bottom-sheet__headline {
                font-family: 'Roboto', sans-serif;
                font-size: 24px;
                font-weight: 500;
                line-height: 1.25;
            }

            .bottom-sheet__close {
                width: 40px;
                height: 40px;
                border: 0;
                border-radius: 20px;
                background: #eceaf4;
                color: #44474f;
                font-size: 20px;
                cursor: pointer;
                transition: background-color 200ms ease;
            }

            .bottom-sheet__close:hover {
                background: #e0def0;
            }

            .bottom-sheet__supporting-text {
                margin-top: 12px;
                font-family: 'Roboto', sans-serif;
                font-size: 15px;
                line-height: 1.6;
                color: #5d5f68;
            }

            .bottom-sheet__body {
                margin-top: 12px;
                font-family: 'Roboto', sans-serif;
                font-size: 14px;
                line-height: 1.7;
                color: #474a52;
            }

            .bottom-sheet__actions {
                display: flex;
                justify-content: flex-end;
                gap: 12px;
                margin-top: 24px;
            }

            .bottom-sheet__button {
                min-width: 112px;
                height: 40px;
                padding: 0 18px;
                border-radius: 20px;
                border: 0;
                font-family: 'Roboto', sans-serif;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background-color 200ms ease, box-shadow 200ms ease;
            }

            .bottom-sheet__secondary {
                background: #eceaf4;
                color: #44474f;
            }

            .bottom-sheet__secondary:hover {
                background: #e1dfec;
            }

            .bottom-sheet__primary {
                background: #3957ff;
                color: #ffffff;
                box-shadow: 0 6px 16px rgba(57, 87, 255, 0.22);
            }

            .bottom-sheet__primary:hover {
                background: #4b67ff;
                box-shadow: 0 8px 18px rgba(57, 87, 255, 0.26);
            }
        </style>

        <div class="bottom-sheet__overlay" data-state="closed">
            <div class="bottom-sheet__surface" role="dialog" aria-modal="true">
                <div class="bottom-sheet__handle"></div>
                <div class="bottom-sheet__header">
                    <h2 class="bottom-sheet__headline">Report actions</h2>
                    <button type="button" class="bottom-sheet__close" aria-label="Close bottom sheet">×</button>
                </div>
                <p class="bottom-sheet__supporting-text">Choose what to do with the selected report.</p>
                <p class="bottom-sheet__body">Exports keep the current filters and annotations.</p>
                <div class="bottom-sheet__actions">
                    <button type="button" class="bottom-sheet__button bottom-sheet__secondary"><span class="bottom-sheet__secondary-label">Later</span></button>
                    <button type="button" class="bottom-sheet__button bottom-sheet__primary"><span class="bottom-sheet__primary-label">Run export</span></button>
                </div>
            </div>
        </div>
    </template>
</div>
