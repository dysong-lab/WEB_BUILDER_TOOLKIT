<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BottomSheets/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #faf8f5;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 40px;
            padding: 80px 20px;
        }
        .demo-trigger {
            padding: 12px 32px;
            border: 1px solid #3d3833;
            border-radius: 0;
            background: transparent;
            color: #3d3833;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: color 150ms ease, border-color 150ms ease;
        }
        .demo-trigger:hover {
            color: #1a1814;
            border-color: #1a1814;
        }
        .demo-log {
            width: 360px;
            padding: 16px 20px;
            background: transparent;
            border: 1px solid #d6cdbe;
            border-radius: 0;
            color: #6b6560;
            font-size: 13px;
            line-height: 1.7;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            color: #3d3833;
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            font-weight: 400;
        }
    </style>
</head>
<body>

<button class="demo-trigger" id="open-btn">Open Bottom Sheet</button>
<div id="bottom-sheet-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>&mdash;</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ShadowPopupMixin.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('bottom-sheet-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'bottomSheet', appendElement: document.getElementById('bottom-sheet-container') };

    instance._popupScope = null;

    applyShadowPopupMixin(instance, {
        cssSelectors: {
            template: '#bottom-sheet-popup-template',
            closeBtn: '.bottom-sheet__drag-handle',
            scrim:    '.bottom-sheet__scrim'
        },
        onCreated: (shadowRoot) => {
            instance._popupScope = { appendElement: shadowRoot };

            applyFieldRenderMixin(instance._popupScope, {
                cssSelectors: {
                    headline:   '.bottom-sheet__headline',
                    supporting: '.bottom-sheet__supporting'
                }
            });

            applyListRenderMixin(instance._popupScope, {
                cssSelectors: {
                    container:   '.bottom-sheet__actions',
                    template:    '#bottom-sheet-action-template',
                    actionid:    '.bottom-sheet__action',
                    actionLabel: '.bottom-sheet__action-label',
                    actionIcon:  '.bottom-sheet__action-icon'
                },
                itemKey: 'actionid',
                datasetAttrs: {
                    actionid: 'actionid'
                }
            });
        }
    });

    instance.shadowPopup.bindPopupEvents({
        click: {
            [instance.shadowPopup.cssSelectors.closeBtn]: '@bottomSheetClose',
            [instance.shadowPopup.cssSelectors.scrim]:    '@bottomSheetClose',
            '.bottom-sheet__action':                      '@bottomSheetActionClicked'
        }
    });

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>&mdash;';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@bottomSheetClose': () => {
            instance.shadowPopup.hide();
            log('bottomSheetClose &rarr; hide');
        },
        '@bottomSheetActionClicked': ({ event }) => {
            const item = event.target.closest('.bottom-sheet__action');
            const actionid = item?.getAttribute('data-actionid');
            log(`bottomSheetActionClicked "${actionid}"`);
            instance.shadowPopup.hide();
        }
    });

    document.getElementById('open-btn').addEventListener('click', () => {
        instance.shadowPopup.show();
        log('show bottomSheet');

        instance._popupScope.fieldRender.renderData({ response: {
            headline: 'Share This Report',
            supporting: 'Select a distribution channel to share the quarterly summary with your collaborators.'
        } });

        instance._popupScope.listRender.renderData({ response: [
            { actionid: 'copy',    actionLabel: 'Copy link' },
            { actionid: 'email',   actionLabel: 'Send by email' },
            { actionid: 'confirm', actionLabel: 'Download PDF' }
        ] });
    });
})();
</script>
</body>
</html>
