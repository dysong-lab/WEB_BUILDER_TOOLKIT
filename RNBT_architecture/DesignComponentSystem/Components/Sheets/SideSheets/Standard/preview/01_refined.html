<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SideSheets/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-trigger {
            padding: 12px 28px;
            border: 1px solid rgba(80, 46, 233, 0.4);
            border-radius: 8px;
            background: #502EE9;
            color: #E8EDFF;
            font-family: 'Pretendard', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 150ms ease-out;
        }
        .demo-trigger:hover {
            background: #6B4BF0;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<button class="demo-trigger" id="open-btn">Open Side Sheet</button>
<div id="side-sheet-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>&mdash;</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ShadowPopupMixin.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('side-sheet-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'sideSheet', appendElement: document.getElementById('side-sheet-container') };

    instance._popupScope = null;

    applyShadowPopupMixin(instance, {
        cssSelectors: {
            template: '#side-sheet-popup-template',
            closeBtn: '.side-sheet__close-btn',
            scrim:    '.side-sheet__scrim'
        },
        onCreated: (shadowRoot) => {
            instance._popupScope = { appendElement: shadowRoot };

            applyFieldRenderMixin(instance._popupScope, {
                cssSelectors: {
                    headline:   '.side-sheet__headline',
                    supporting: '.side-sheet__supporting'
                }
            });

            applyListRenderMixin(instance._popupScope, {
                cssSelectors: {
                    container:   '.side-sheet__actions',
                    template:    '#side-sheet-action-template',
                    actionid:    '.side-sheet__action',
                    actionLabel: '.side-sheet__action-label',
                    actionIcon:  '.side-sheet__action-icon'
                },
                itemKey: 'actionid',
                datasetAttrs: {
                    actionid: 'actionid'
                }
            });
        }
    });

    instance.shadowPopup.bindPopupEvents({
        click: {
            [instance.shadowPopup.cssSelectors.closeBtn]: '@sideSheetClose',
            [instance.shadowPopup.cssSelectors.scrim]:    '@sideSheetClose',
            '.side-sheet__action':                        '@sideSheetActionClicked'
        }
    });

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>&mdash;';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@sideSheetClose': () => {
            instance.shadowPopup.hide();
            log('sideSheetClose &rarr; hide');
        },
        '@sideSheetActionClicked': ({ event }) => {
            const item = event.target.closest('.side-sheet__action');
            const actionid = item?.getAttribute('data-actionid');
            log(`sideSheetActionClicked "${actionid}"`);
            instance.shadowPopup.hide();
        }
    });

    document.getElementById('open-btn').addEventListener('click', () => {
        instance.shadowPopup.show();
        log('show sideSheet');

        instance._popupScope.fieldRender.renderData({ response: {
            headline: 'Filter Reports',
            supporting: '보고서 목록에 적용할 필터 옵션을 선택하세요.'
        } });

        instance._popupScope.listRender.renderData({ response: [
            { actionid: 'reset',   actionIcon: 'refresh',     actionLabel: 'Reset filters' },
            { actionid: 'save',    actionIcon: 'bookmark',    actionLabel: 'Save preset' },
            { actionid: 'apply',   actionIcon: 'check',       actionLabel: 'Apply filters' }
        ] });
    });
})();
</script>
</body>
</html>
