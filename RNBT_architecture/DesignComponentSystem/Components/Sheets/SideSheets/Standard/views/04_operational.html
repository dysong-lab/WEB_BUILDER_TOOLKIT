<div class="side-sheets side-sheets--operational" aria-hidden="true">
    <template id="side-sheet-popup-template">
        <style>
            .side-sheet__overlay {
                position: fixed;
                inset: 0;
                display: flex;
                justify-content: flex-end;
                padding: 20px;
                background: rgba(3, 12, 18, 0.54);
                opacity: 0;
                transition: opacity 220ms linear;
            }

            .side-sheet__surface {
                width: min(100%, 380px);
                height: 100%;
                border: 1px solid rgba(71, 202, 255, 0.18);
                border-radius: 4px;
                padding: 16px;
                background: linear-gradient(180deg, #0d1d28, #07131b);
                color: #dbf6ff;
                opacity: 0;
                transform: translateX(18px);
                transition: transform 220ms linear, opacity 220ms linear;
            }

            .side-sheet__overlay[data-state="open"] {
                opacity: 1;
            }

            .side-sheet__overlay[data-state="open"] .side-sheet__surface {
                opacity: 1;
                transform: translateX(0);
            }

            .side-sheet__overlay[data-state="closing"] .side-sheet__surface {
                opacity: 0;
                transform: translateX(12px);
            }

            .side-sheet__header {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 10px;
            }

            .side-sheet__headline {
                font-family: 'IBM Plex Mono', monospace;
                font-size: 18px;
                font-weight: 600;
                line-height: 1.2;
                text-transform: uppercase;
                letter-spacing: 0.6px;
            }

            .side-sheet__close {
                width: 30px;
                height: 30px;
                border: 1px solid rgba(78, 214, 255, 0.18);
                border-radius: 3px;
                background: rgba(10, 27, 38, 0.9);
                color: #dbf6ff;
                font-size: 16px;
                cursor: pointer;
            }

            .side-sheet__supporting-text,
            .side-sheet__body {
                margin-top: 10px;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 12px;
                line-height: 1.7;
            }

            .side-sheet__supporting-text {
                color: rgba(219, 246, 255, 0.78);
            }

            .side-sheet__body {
                color: rgba(172, 214, 226, 0.84);
            }

            .side-sheet__metrics {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-top: 14px;
            }

            .side-sheet__metric {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 12px;
                border: 1px solid rgba(78, 214, 255, 0.12);
                border-radius: 3px;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 11px;
            }

            .side-sheet__actions {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
                margin-top: 14px;
            }

            .side-sheet__button {
                height: 34px;
                padding: 0 12px;
                border: 1px solid rgba(78, 214, 255, 0.22);
                border-radius: 3px;
                background: rgba(10, 27, 38, 0.9);
                color: #dbf6ff;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                cursor: pointer;
            }

            .side-sheet__primary {
                background: #4ed6ff;
                border-color: #4ed6ff;
                color: #041017;
            }
        </style>

        <div class="side-sheet__overlay" data-state="closed">
            <div class="side-sheet__surface" role="dialog" aria-modal="true">
                <div class="side-sheet__header">
                    <h2 class="side-sheet__headline">Device details</h2>
                    <button type="button" class="side-sheet__close" aria-label="Close side sheet">×</button>
                </div>
                <p class="side-sheet__supporting-text">Optional context stays visible beside the main view.</p>
                <p class="side-sheet__body">The selected feeder is currently operating in supervised mode.</p>
                <div class="side-sheet__metrics">
                    <div class="side-sheet__metric"><span>Collector</span><strong>RNBT-04</strong></div>
                    <div class="side-sheet__metric"><span>Alarm state</span><strong>Normal</strong></div>
                </div>
                <div class="side-sheet__actions">
                    <button type="button" class="side-sheet__button side-sheet__secondary"><span class="side-sheet__secondary-label">Dismiss</span></button>
                    <button type="button" class="side-sheet__button side-sheet__primary"><span class="side-sheet__primary-label">Inspect</span></button>
                </div>
            </div>
        </div>
    </template>
</div>
