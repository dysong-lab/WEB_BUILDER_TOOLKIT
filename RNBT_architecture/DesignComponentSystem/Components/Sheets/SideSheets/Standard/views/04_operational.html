<template id="side-sheet-popup-template">
    <style>
        /* 04_operational: Persona D — Dark Operational
           쿨톤 다크 시안 / JetBrains Mono (데이터) + Inter (UI) / 얇은 테두리 + 각진 모서리 / Compact Modal Side Sheet */

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0');

        .side-sheet__scrim {
            position: fixed;
            inset: 0;
            background: rgba(13, 17, 23, 0.78);
            z-index: 1000;
            cursor: pointer;
        }

        .side-sheet__surface {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 320px;
            display: flex;
            flex-direction: column;
            background: #0d1117;
            border-left: 1px solid rgba(99, 199, 255, 0.24);
            border-radius: 0;
            z-index: 1001;
            overflow: hidden;
        }

        .side-sheet__header {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 8px 8px 16px;
            border-bottom: 1px solid rgba(99, 199, 255, 0.08);
        }

        .side-sheet__header-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }

        .side-sheet__headline {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #c9d1d9;
            line-height: 1.35;
            letter-spacing: 0.1px;
            text-transform: uppercase;
        }

        .side-sheet__supporting {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 400;
            color: #7a8fa5;
            line-height: 1.5;
        }

        .side-sheet__supporting:empty {
            display: none;
        }

        .side-sheet__close-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            border: 1px solid transparent;
            border-radius: 2px;
            background: transparent;
            color: #4dd0e1;
            cursor: pointer;
            font-family: 'Material Symbols Outlined';
            font-size: 16px;
            padding: 0;
            transition: border-color 150ms ease, background-color 150ms ease, color 150ms ease;
        }

        .side-sheet__close-btn:hover {
            border-color: rgba(77, 208, 225, 0.5);
            background: rgba(77, 208, 225, 0.06);
            color: #e6edf3;
        }

        .side-sheet__close-btn::before {
            content: 'close';
        }

        .side-sheet__divider {
            height: 1px;
            background: rgba(99, 199, 255, 0.12);
            margin: 0;
        }

        .side-sheet__content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .side-sheet__actions {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 8px;
            border-top: 1px solid rgba(99, 199, 255, 0.12);
        }

        .side-sheet__actions:empty {
            display: none;
        }

        .side-sheet__action {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            height: 32px;
            padding: 0 10px;
            border: 1px solid transparent;
            border-radius: 2px;
            background: transparent;
            color: #c9d1d9;
            cursor: pointer;
            transition: border-color 150ms ease, background-color 150ms ease, color 150ms ease;
            text-align: left;
        }

        .side-sheet__action:hover {
            border-color: rgba(77, 208, 225, 0.5);
            background: rgba(77, 208, 225, 0.06);
            color: #e6edf3;
        }

        .side-sheet__action:last-child {
            border-color: rgba(77, 208, 225, 0.4);
            color: #4dd0e1;
        }

        .side-sheet__action:last-child:hover {
            border-color: #4dd0e1;
            background: rgba(77, 208, 225, 0.12);
        }

        .side-sheet__action-icon {
            font-family: 'Material Symbols Outlined';
            font-size: 16px;
            color: #4dd0e1;
            flex-shrink: 0;
        }

        .side-sheet__action-icon:empty {
            display: none;
        }

        .side-sheet__action-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        template {
            display: none;
        }
    </style>
    <div class="side-sheet__scrim"></div>
    <div class="side-sheet__surface">
        <div class="side-sheet__header">
            <div class="side-sheet__header-text">
                <div class="side-sheet__headline"></div>
                <div class="side-sheet__supporting"></div>
            </div>
            <button class="side-sheet__close-btn" aria-label="close"></button>
        </div>
        <div class="side-sheet__divider"></div>
        <div class="side-sheet__content"></div>
        <div class="side-sheet__actions"></div>
        <template id="side-sheet-action-template">
            <button class="side-sheet__action" data-actionid="">
                <span class="side-sheet__action-icon material-symbols-outlined"></span>
                <span class="side-sheet__action-label"></span>
            </button>
        </template>
    </div>
</template>
