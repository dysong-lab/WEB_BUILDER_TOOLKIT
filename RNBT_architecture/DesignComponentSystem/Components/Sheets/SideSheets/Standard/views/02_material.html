<template id="side-sheet-popup-template">
    <style>
        /* 02_material: Persona B — Material Elevated
           라이트 블루 / shadow elevation / Roboto / 라이트 / Elevated Modal Side Sheet */

        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0');

        .side-sheet__scrim {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.32);
            z-index: 1000;
            cursor: pointer;
        }

        .side-sheet__surface {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 400px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 12px 0 0 12px;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.14), -2px 0 8px rgba(0, 0, 0, 0.08);
            z-index: 1001;
            overflow: hidden;
            transition: box-shadow 200ms ease-in-out;
        }

        .side-sheet__header {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 16px 12px 24px;
        }

        .side-sheet__header-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .side-sheet__headline {
            font-family: 'Roboto', sans-serif;
            font-size: 20px;
            font-weight: 500;
            color: #1a1a1a;
            line-height: 1.4;
        }

        .side-sheet__supporting {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #5f6368;
            line-height: 1.55;
        }

        .side-sheet__supporting:empty {
            display: none;
        }

        .side-sheet__close-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #1565C0;
            cursor: pointer;
            font-family: 'Material Symbols Outlined';
            font-size: 22px;
            padding: 0;
            transition: background-color 200ms ease-in-out;
        }

        .side-sheet__close-btn:hover {
            background: rgba(21, 101, 192, 0.08);
        }

        .side-sheet__close-btn::before {
            content: 'close';
        }

        .side-sheet__divider {
            height: 1px;
            background: #e0e0e0;
            margin: 0;
        }

        .side-sheet__content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .side-sheet__actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px 8px 16px;
            border-top: 1px solid #e0e0e0;
        }

        .side-sheet__actions:empty {
            display: none;
        }

        .side-sheet__action {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
            padding: 0 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #1a1a1a;
            cursor: pointer;
            transition: background-color 200ms ease-in-out, box-shadow 200ms ease-in-out;
            text-align: left;
        }

        .side-sheet__action:hover {
            background: rgba(21, 101, 192, 0.08);
        }

        .side-sheet__action:last-child {
            background: #1565C0;
            color: #ffffff;
        }

        .side-sheet__action:last-child:hover {
            background: #1976D2;
            box-shadow: 0 2px 6px rgba(21, 101, 192, 0.24);
        }

        .side-sheet__action-icon {
            font-family: 'Material Symbols Outlined';
            font-size: 20px;
            color: #1565C0;
            flex-shrink: 0;
        }

        .side-sheet__action:last-child .side-sheet__action-icon {
            color: #ffffff;
        }

        .side-sheet__action-icon:empty {
            display: none;
        }

        .side-sheet__action-label {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        template {
            display: none;
        }
    </style>
    <div class="side-sheet__scrim"></div>
    <div class="side-sheet__surface">
        <div class="side-sheet__header">
            <div class="side-sheet__header-text">
                <div class="side-sheet__headline"></div>
                <div class="side-sheet__supporting"></div>
            </div>
            <button class="side-sheet__close-btn" aria-label="close"></button>
        </div>
        <div class="side-sheet__divider"></div>
        <div class="side-sheet__content"></div>
        <div class="side-sheet__actions"></div>
        <template id="side-sheet-action-template">
            <button class="side-sheet__action" data-actionid="">
                <span class="side-sheet__action-icon material-symbols-outlined"></span>
                <span class="side-sheet__action-label"></span>
            </button>
        </template>
    </div>
</template>
