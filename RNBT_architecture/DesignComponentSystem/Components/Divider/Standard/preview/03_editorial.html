<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Divider/Standard — 03_editorial (Persona C)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #ece3d7;
        display: flex;
        justify-content: center;
        padding: 40px;
        color: #4e3827;
        font-family: "SUIT", "Pretendard", sans-serif;
      }
      .preview-grid {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        align-items: stretch;
      }
      .scene {
        width: 320px;
        min-height: 220px;
        padding: 24px;
        border-radius: 10px;
        background:
          linear-gradient(135deg, rgba(255, 250, 243, 0.7), rgba(255, 250, 243, 0) 44%),
          linear-gradient(180deg, #f5efe6 0%, #e9decf 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.74),
          0 12px 28px rgba(98, 74, 49, 0.14);
      }
      .scene h2 {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 18px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: rgba(78, 56, 39, 0.74);
      }
      .vertical-layout {
        display: flex;
        align-items: stretch;
        gap: 18px;
        margin-top: 18px;
        min-height: 132px;
      }
      .column {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .metric {
        padding: 12px 0;
      }
      .metric strong {
        display: block;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.6px;
      }
      .metric span {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        color: rgba(78, 56, 39, 0.56);
      }
    </style>
  </head>
  <body>
    <div class="preview-grid">
      <section class="scene">
        <h2>Article Sections</h2>
        <div class="stack">
          <div class="row"><span>Introduction</span><span>01</span></div>
          <div id="divider-horizontal"></div>
          <div class="row"><span>Field Notes</span><span>02</span></div>
          <div class="row"><span>Closing Remarks</span><span>03</span></div>
        </div>
      </section>
      <section class="scene">
        <h2>Inset Catalog</h2>
        <div class="stack">
          <div class="row"><span>Monograph</span><span>Available</span></div>
          <div id="divider-inset"></div>
          <div class="row"><span>Archive Copy</span><span>Reading room</span></div>
          <div class="row"><span>Transcript</span><span>Pending</span></div>
        </div>
      </section>
      <section class="scene">
        <h2>Side Note</h2>
        <div class="vertical-layout">
          <div class="column">
            <div class="metric"><strong>1968</strong><span>Edition year</span></div>
            <div class="metric"><strong>224</strong><span>Pages</span></div>
          </div>
          <div id="divider-vertical"></div>
          <div class="column">
            <div class="metric"><strong>Essay</strong><span>Format</span></div>
            <div class="metric"><strong>Seoul</strong><span>Archive</span></div>
          </div>
        </div>
      </section>
    </div>

    <script src="../../../../preview_runtime.js"></script>
    <script>
      (async () => {
        const previewIds = [
          "divider-horizontal",
          "divider-inset",
          "divider-vertical",
        ];

        await Promise.all(
          previewIds.map((id) =>
            loadComponentAssets(
              id,
              "../views/03_editorial.html",
              "../styles/03_editorial.css",
            ),
          ),
        );

        const applyDividerInfo = (id, data) => {
          const root = document.getElementById(id).querySelector(".md-divider");
          if (!root) return;

          const orientation =
            data?.orientation === "vertical" ? "vertical" : "horizontal";
          const inset =
            data?.inset === "start" || data?.inset === "both"
              ? data.inset
              : "full";
          const thicknessValue = Number(data?.thickness);
          const thickness =
            Number.isFinite(thicknessValue) && thicknessValue >= 1
              ? Math.round(thicknessValue)
              : 1;
          const emphasis = data?.emphasis === "strong" ? "strong" : "subtle";

          root.dataset.orientation = orientation;
          root.dataset.inset = inset;
          root.dataset.emphasis = emphasis;
          root.style.setProperty("--divider-thickness", `${thickness}px`);
          root.setAttribute("aria-orientation", orientation);
        };

        applyDividerInfo("divider-horizontal", {
          orientation: "horizontal",
          inset: "both",
          thickness: 1,
          emphasis: "subtle",
        });
        applyDividerInfo("divider-inset", {
          orientation: "horizontal",
          inset: "start",
          thickness: 2,
          emphasis: "strong",
        });
        applyDividerInfo("divider-vertical", {
          orientation: "vertical",
          inset: "start",
          thickness: 1,
          emphasis: "strong",
        });
      })();
    </script>
  </body>
</html>
