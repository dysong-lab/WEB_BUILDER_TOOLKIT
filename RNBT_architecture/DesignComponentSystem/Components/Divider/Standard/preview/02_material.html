<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Divider/Standard — 02_material (Persona B)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #efe7de;
        display: flex;
        justify-content: center;
        padding: 40px;
        color: #3c3128;
        font-family: "SUIT", "Pretendard", sans-serif;
      }
      .preview-grid {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        align-items: stretch;
      }
      .scene {
        width: 320px;
        min-height: 220px;
        padding: 24px;
        border-radius: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.92), transparent 48%),
          linear-gradient(180deg, #f7f3ee 0%, #ebe4db 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.88),
          0 18px 36px rgba(89, 72, 50, 0.14);
      }
      .scene h2 {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 18px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: rgba(60, 49, 40, 0.76);
      }
      .vertical-layout {
        display: flex;
        align-items: stretch;
        gap: 18px;
        margin-top: 18px;
        min-height: 132px;
      }
      .column {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .metric {
        padding: 12px 0;
      }
      .metric strong {
        display: block;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.6px;
      }
      .metric span {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        color: rgba(60, 49, 40, 0.56);
      }
    </style>
  </head>
  <body>
    <div class="preview-grid">
      <section class="scene">
        <h2>Menu Grouping</h2>
        <div class="stack">
          <div class="row"><span>Profile</span><span></span></div>
          <div class="row"><span>Security</span><span></span></div>
          <div id="divider-horizontal"></div>
          <div class="row"><span>Notifications</span><span></span></div>
          <div class="row"><span>Appearance</span><span></span></div>
        </div>
      </section>
      <section class="scene">
        <h2>Inset Settings</h2>
        <div class="stack">
          <div class="row"><span>Sound</span><span>On</span></div>
          <div id="divider-inset"></div>
          <div class="row"><span>Location</span><span>While using</span></div>
          <div class="row"><span>Backup</span><span>Daily</span></div>
        </div>
      </section>
      <section class="scene">
        <h2>Dual Summary</h2>
        <div class="vertical-layout">
          <div class="column">
            <div class="metric"><strong>128</strong><span>Files</span></div>
            <div class="metric"><strong>8.4GB</strong><span>Storage</span></div>
          </div>
          <div id="divider-vertical"></div>
          <div class="column">
            <div class="metric"><strong>14</strong><span>Shared</span></div>
            <div class="metric"><strong>2</strong><span>Pending</span></div>
          </div>
        </div>
      </section>
    </div>

    <script src="../../../../preview_runtime.js"></script>
    <script>
      (async () => {
        const previewIds = [
          "divider-horizontal",
          "divider-inset",
          "divider-vertical",
        ];

        await Promise.all(
          previewIds.map((id) =>
            loadComponentAssets(
              id,
              "../views/02_material.html",
              "../styles/02_material.css",
            ),
          ),
        );

        const applyDividerInfo = (id, data) => {
          const root = document.getElementById(id).querySelector(".md-divider");
          if (!root) return;

          const orientation =
            data?.orientation === "vertical" ? "vertical" : "horizontal";
          const inset =
            data?.inset === "start" || data?.inset === "both"
              ? data.inset
              : "full";
          const thicknessValue = Number(data?.thickness);
          const thickness =
            Number.isFinite(thicknessValue) && thicknessValue >= 1
              ? Math.round(thicknessValue)
              : 1;
          const emphasis = data?.emphasis === "strong" ? "strong" : "subtle";

          root.dataset.orientation = orientation;
          root.dataset.inset = inset;
          root.dataset.emphasis = emphasis;
          root.style.setProperty("--divider-thickness", `${thickness}px`);
          root.setAttribute("aria-orientation", orientation);
        };

        applyDividerInfo("divider-horizontal", {
          orientation: "horizontal",
          inset: "full",
          thickness: 1,
          emphasis: "subtle",
        });
        applyDividerInfo("divider-inset", {
          orientation: "horizontal",
          inset: "start",
          thickness: 1,
          emphasis: "strong",
        });
        applyDividerInfo("divider-vertical", {
          orientation: "vertical",
          inset: "both",
          thickness: 2,
          emphasis: "subtle",
        });
      })();
    </script>
  </body>
</html>
