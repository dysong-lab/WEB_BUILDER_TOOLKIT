<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationBar/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .demo-log {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            padding: 12px 16px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
            color: #424242;
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong { color: #1565C0; }
    </style>
</head>
<body>

<div id="nav-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-bar-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'navigation-bar', appendElement: document.getElementById('nav-bar-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-bar__list',
            template:  '#nav-bar-item-template',
            menuid:    '.nav-bar__item',
            active:    '.nav-bar__item',
            icon:      '.nav-bar__icon',
            label:     '.nav-bar__label',
            badge:     '.nav-bar__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationBar: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@navBarItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    let activeMenuid = 'home';
    Wkit.onEventBusHandlers({
        '@navBarItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid || menuid === activeMenuid) {
                log(`navBarItemClicked "${menuid}" (이미 활성)`);
                return;
            }
            targetInstance.listRender.updateItemState(activeMenuid, { active: 'false' });
            targetInstance.listRender.updateItemState(menuid,       { active: 'true' });
            activeMenuid = menuid;
            log(`navBarItemClicked "${menuid}" → 활성 전환`);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'home',     icon: 'home',          label: 'Home',      badge: '',   active: 'true' },
        { menuid: 'search',   icon: 'search',        label: 'Search',    badge: '',   active: 'false' },
        { menuid: 'inbox',    icon: 'mail',          label: 'Inbox',     badge: '12', active: 'false' },
        { menuid: 'library',  icon: 'collections_bookmark', label: 'Library', badge: '', active: 'false' },
        { menuid: 'profile',  icon: 'person',        label: 'Profile',   badge: '',   active: 'false' }
    ]});
})();
</script>
</body>
</html>
