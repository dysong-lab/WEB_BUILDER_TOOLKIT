<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationBar/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            padding: 32px;
        }

        .demo-log {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 320px;
            padding: 14px 18px;
            background: #faf9f7;
            border: 1px solid #e8e4de;
            color: #3d3833;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong {
            font-family: 'DM Serif Display', serif;
            font-size: 14px;
            color: #2c2824;
            font-weight: 400;
        }
    </style>
</head>
<body>

<div id="nav-bar-container"></div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-bar-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'navigation-bar', appendElement: document.getElementById('nav-bar-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-bar__list',
            template:  '#nav-bar-item-template',
            menuid:    '.nav-bar__item',
            active:    '.nav-bar__item',
            icon:      '.nav-bar__icon',
            label:     '.nav-bar__label',
            badge:     '.nav-bar__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationBar: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@navBarItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    let activeMenuid = 'read';
    Wkit.onEventBusHandlers({
        '@navBarItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid || menuid === activeMenuid) {
                log(`navBarItemClicked "${menuid}" (already active)`);
                return;
            }
            targetInstance.listRender.updateItemState(activeMenuid, { active: 'false' });
            targetInstance.listRender.updateItemState(menuid,       { active: 'true' });
            activeMenuid = menuid;
            log(`navBarItemClicked "${menuid}" → activated`);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'read',    icon: 'menu_book',     label: 'Read',    badge: '',  active: 'true' },
        { menuid: 'saved',   icon: 'bookmark',      label: 'Saved',   badge: '',  active: 'false' },
        { menuid: 'notes',   icon: 'edit_note',     label: 'Notes',   badge: '2', active: 'false' },
        { menuid: 'profile', icon: 'person_outline', label: 'Profile', badge: '', active: 'false' }
    ]});
})();
</script>
</body>
</html>
