<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationBar/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #12153D; display: flex; flex-direction: column; height: 100vh; }
        .preview-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-label {
            font-family: 'Pretendard', sans-serif;
            font-size: 13px;
            color: rgba(146, 168, 244, 0.4);
            letter-spacing: 0.4px;
        }
        #nav-bar-container { flex-shrink: 0; }
    </style>
</head>
<body>

<div class="preview-content">
    <span class="preview-label">NavigationBar / Refined Technical</span>
</div>
<div id="nav-bar-container"></div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-bar-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'navigation-bar', appendElement: document.getElementById('nav-bar-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-bar__list',
            template:  '#nav-bar-item-template',
            menuid:    '.nav-bar__item',
            active:    '.nav-bar__item',
            icon:      '.nav-bar__icon',
            label:     '.nav-bar__label'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationMenu: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: { [instance.listRender.cssSelectors.menuid]: '@navItemClicked' }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    Wkit.onEventBusHandlers({
        '@navItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            console.log('[Preview] Nav item clicked:', menuid);
            if (menuid) {
                targetInstance.listRender.renderData({ response: [
                    { menuid: 'dashboard',     icon: 'dashboard',     label: 'Dashboard',     active: menuid === 'dashboard'     ? 'true' : 'false' },
                    { menuid: 'devices',       icon: 'devices',       label: 'Devices',       active: menuid === 'devices'       ? 'true' : 'false' },
                    { menuid: 'analytics',     icon: 'analytics',     label: 'Analytics',     active: menuid === 'analytics'     ? 'true' : 'false' },
                    { menuid: 'settings',      icon: 'settings',      label: 'Settings',      active: menuid === 'settings'      ? 'true' : 'false' },
                    { menuid: 'notifications', icon: 'notifications', label: 'Notifications', active: menuid === 'notifications' ? 'true' : 'false' }
                ]});
            }
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'dashboard',     icon: 'dashboard',     label: 'Dashboard',     active: 'true'  },
        { menuid: 'devices',       icon: 'devices',       label: 'Devices',       active: 'false' },
        { menuid: 'analytics',     icon: 'analytics',     label: 'Analytics',     active: 'false' },
        { menuid: 'settings',      icon: 'settings',      label: 'Settings',      active: 'false' },
        { menuid: 'notifications', icon: 'notifications', label: 'Notifications', active: 'false' }
    ]});
})();
</script>
</body>
</html>
