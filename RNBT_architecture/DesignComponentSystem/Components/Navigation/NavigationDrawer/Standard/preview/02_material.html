<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationDrawer/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; }
        #nav-drawer-container { height: 100vh; }
    </style>
</head>
<body>

<div id="nav-drawer-container"></div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-drawer-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'navigation-drawer', appendElement: document.getElementById('nav-drawer-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-drawer__list',
            template:  '#nav-drawer-item-template',
            menuid:    '.nav-drawer__item',
            active:    '.nav-drawer__item',
            icon:      '.nav-drawer__icon',
            label:     '.nav-drawer__label',
            badge:     '.nav-drawer__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationMenu: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@menuItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    Wkit.onEventBusHandlers({
        '@menuItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            console.log('[Preview] Menu item clicked:', menuid);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'dashboard',     icon: 'dashboard',     label: 'Dashboard',     badge: '',   active: 'true' },
        { menuid: 'devices',       icon: 'devices',       label: 'Devices',       badge: '12', active: 'false' },
        { menuid: 'analytics',     icon: 'analytics',     label: 'Analytics',     badge: '',   active: 'false' },
        { menuid: 'settings',      icon: 'settings',      label: 'Settings',      badge: '',   active: 'false' },
        { menuid: 'notifications', icon: 'notifications', label: 'Notifications', badge: '3',  active: 'false' }
    ]});
})();
</script>
</body>
</html>
