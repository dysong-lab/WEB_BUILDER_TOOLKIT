<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationDrawer/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0ece6; display: flex; height: 100vh; }
        .preview-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 200;
            padding: 8px 16px; border: 1px solid #e8e4de; background: #faf9f7;
            color: #3d3833; cursor: pointer; border-radius: 2px;
            font-family: 'Inter', sans-serif; font-size: 13px;
        }
        .preview-toggle:hover { background: #ede8e1; }
        .demo-log {
            position: fixed;
            top: 64px;
            right: 16px;
            width: 320px;
            padding: 14px 18px;
            background: #faf8f3;
            border: 1px solid #d4c9b5;
            border-radius: 2px;
            color: #5c544a;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            line-height: 1.7;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong {
            color: #2a2520;
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="nav-drawer-container"></div>
<button class="preview-toggle" onclick="toggleDrawer()">Toggle Drawer</button>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
let _instance;

(async () => {
    await loadComponentAssets('nav-drawer-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'navigation-drawer', appendElement: document.getElementById('nav-drawer-container') };
    _instance = instance;

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-drawer__list',
            template:  '#nav-drawer-item-template',
            menuid:    '.nav-drawer__item',
            active:    '.nav-drawer__item',
            icon:      '.nav-drawer__icon',
            label:     '.nav-drawer__label',
            badge:     '.nav-drawer__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance._drawerSelector = '.nav-drawer';

    instance.drawerOpen = function() {
        const drawer = this.appendElement.querySelector(this._drawerSelector);
        if (drawer) drawer.setAttribute('data-open', 'true');
    };

    instance.drawerClose = function() {
        const drawer = this.appendElement.querySelector(this._drawerSelector);
        if (drawer) drawer.setAttribute('data-open', 'false');
    };

    instance.drawerToggle = function() {
        const drawer = this.appendElement.querySelector(this._drawerSelector);
        const isOpen = drawer?.getAttribute('data-open') === 'true';
        if (isOpen) { this.drawerClose(); } else { this.drawerOpen(); }
    };

    instance.subscriptions = { navigationMenu: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@menuItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    let activeMenuid = 'dashboard';
    Wkit.onEventBusHandlers({
        '@menuItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid || menuid === activeMenuid) {
                log(`menuItemClicked "${menuid}" (이미 활성)`);
                return;
            }
            targetInstance.listRender.updateItemState(activeMenuid, { active: 'false' });
            targetInstance.listRender.updateItemState(menuid,       { active: 'true' });
            activeMenuid = menuid;
            log(`menuItemClicked "${menuid}" → 활성 전환`);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'dashboard',     icon: 'dashboard',     label: 'Dashboard',     badge: '',   active: 'true' },
        { menuid: 'devices',       icon: 'devices',       label: 'Devices',       badge: '12', active: 'false' },
        { menuid: 'analytics',     icon: 'analytics',     label: 'Analytics',     badge: '',   active: 'false' },
        { menuid: 'settings',      icon: 'settings',      label: 'Settings',      badge: '',   active: 'false' },
        { menuid: 'notifications', icon: 'notifications', label: 'Notifications', badge: '3',  active: 'false' }
    ]});
})();

function toggleDrawer() { if (_instance) _instance.drawerToggle(); }
</script>
</body>
</html>
