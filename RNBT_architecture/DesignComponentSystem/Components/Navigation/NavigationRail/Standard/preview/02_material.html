<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationRail/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f7fb;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        .demo-log {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            padding: 12px 16px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            color: #424242;
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong { color: #1565C0; font-weight: 700; }
    </style>
</head>
<body>

<div id="nav-rail-container"></div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-rail-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'navigation-rail', appendElement: document.getElementById('nav-rail-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-rail__list',
            template:  '#nav-rail-item-template',
            menuid:    '.nav-rail__item',
            active:    '.nav-rail__item',
            icon:      '.nav-rail__icon',
            label:     '.nav-rail__label',
            badge:     '.nav-rail__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationRail: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@navRailItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    let activeMenuid = 'inbox';
    Wkit.onEventBusHandlers({
        '@navRailItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid || menuid === activeMenuid) {
                log(`navRailItemClicked "${menuid}" (already active)`);
                return;
            }
            targetInstance.listRender.updateItemState(activeMenuid, { active: 'false' });
            targetInstance.listRender.updateItemState(menuid,       { active: 'true' });
            activeMenuid = menuid;
            log(`navRailItemClicked "${menuid}" → activated`);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'inbox',   icon: 'inbox',         label: 'Inbox',   badge: '12', active: 'true'  },
        { menuid: 'starred', icon: 'star',          label: 'Starred', badge: '',   active: 'false' },
        { menuid: 'sent',    icon: 'send',          label: 'Sent',    badge: '',   active: 'false' },
        { menuid: 'drafts',  icon: 'drafts',        label: 'Drafts',  badge: '2',  active: 'false' },
        { menuid: 'trash',   icon: 'delete',        label: 'Trash',   badge: '',   active: 'false' }
    ]});
})();
</script>
</body>
</html>
