<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationRail/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f3ee;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px;
            gap: 40px;
        }

        .demo-log {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 320px;
            padding: 14px 18px;
            background: #ffffff;
            border: 1px solid #e8e4de;
            color: #6b6560;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            line-height: 1.7;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong {
            color: #2c2824;
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="nav-rail-container"></div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-rail-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'navigation-rail', appendElement: document.getElementById('nav-rail-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-rail__list',
            template:  '#nav-rail-item-template',
            menuid:    '.nav-rail__item',
            active:    '.nav-rail__item',
            icon:      '.nav-rail__icon',
            label:     '.nav-rail__label',
            badge:     '.nav-rail__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationRail: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@navRailItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    let activeMenuid = 'stories';
    Wkit.onEventBusHandlers({
        '@navRailItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid || menuid === activeMenuid) {
                log(`navRailItemClicked "${menuid}" (already active)`);
                return;
            }
            targetInstance.listRender.updateItemState(activeMenuid, { active: 'false' });
            targetInstance.listRender.updateItemState(menuid,       { active: 'true' });
            activeMenuid = menuid;
            log(`navRailItemClicked "${menuid}" → activated`);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'stories',   icon: 'menu_book',        label: 'Stories',   badge: '',  active: 'true'  },
        { menuid: 'essays',    icon: 'auto_stories',     label: 'Essays',    badge: '',  active: 'false' },
        { menuid: 'archive',   icon: 'inventory_2',      label: 'Archive',   badge: '',  active: 'false' },
        { menuid: 'drafts',    icon: 'draft',            label: 'Drafts',    badge: '4', active: 'false' }
    ]});
})();
</script>
</body>
</html>
