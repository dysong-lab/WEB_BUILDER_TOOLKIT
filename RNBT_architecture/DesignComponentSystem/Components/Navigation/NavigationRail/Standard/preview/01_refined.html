<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NavigationRail/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        .demo-log {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            padding: 12px 16px;
            background: rgba(25, 29, 80, 0.9);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-family: 'Pretendard', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="nav-rail-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('nav-rail-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'navigation-rail', appendElement: document.getElementById('nav-rail-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.nav-rail__list',
            template:  '#nav-rail-item-template',
            menuid:    '.nav-rail__item',
            active:    '.nav-rail__item',
            icon:      '.nav-rail__icon',
            label:     '.nav-rail__label',
            badge:     '.nav-rail__badge'
        },
        itemKey: 'menuid',
        datasetAttrs: {
            menuid: 'menuid',
            active: 'active'
        }
    });

    instance.subscriptions = { navigationRail: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.menuid]: '@navRailItemClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    let activeMenuid = 'dashboard';
    Wkit.onEventBusHandlers({
        '@navRailItemClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.menuid);
            const menuid = item?.getAttribute('data-menuid');
            if (!menuid || menuid === activeMenuid) {
                log(`navRailItemClicked "${menuid}" (이미 활성)`);
                return;
            }
            targetInstance.listRender.updateItemState(activeMenuid, { active: 'false' });
            targetInstance.listRender.updateItemState(menuid,       { active: 'true' });
            activeMenuid = menuid;
            log(`navRailItemClicked "${menuid}" → 활성 전환`);
        }
    });

    instance.listRender.renderData({ response: [
        { menuid: 'dashboard', icon: 'dashboard',     label: 'Dashboard', badge: '',  active: 'true'  },
        { menuid: 'explore',   icon: 'explore',       label: 'Explore',   badge: '',  active: 'false' },
        { menuid: 'alerts',    icon: 'notifications', label: 'Alerts',    badge: '3', active: 'false' },
        { menuid: 'reports',   icon: 'insert_chart',  label: 'Reports',   badge: '',  active: 'false' },
        { menuid: 'profile',   icon: 'person',        label: 'Profile',   badge: '',  active: 'false' }
    ]});
})();
</script>
</body>
</html>
