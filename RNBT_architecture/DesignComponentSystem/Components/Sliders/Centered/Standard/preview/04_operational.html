<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Centered — 04_operational</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: #090d11;
      }
      #event-log {
        width: 320px;
        min-height: 220px;
        padding: 16px;
        border-radius: 12px;
        background: rgba(7, 11, 14, 0.86);
        border: 1px solid rgba(255, 190, 85, 0.22);
        color: #ffdca3;
        font: 12px/1.5 monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="centered-operational"></div>
    <pre id="event-log">[ready] waiting for slider events</pre>
    <script>
      (async () => {
        await loadComponentAssets("centered-operational", "../views/04_operational.html", "../styles/04_operational.css");
        const root = document.querySelector("#centered-operational .centered-slider");
        const input = root.querySelector(".centered-slider__native");
        const fill = root.querySelector(".centered-slider__fill");
        const value = root.querySelector(".centered-slider__value");
        const log = document.getElementById("event-log");
        const appendLog = message => {
          log.textContent = `${message}\n${log.textContent}`.trim();
          console.log(message);
        };
        const sync = () => {
          const min = Number(input.min);
          const max = Number(input.max);
          const current = Number(input.value);
          const center = (min + max) / 2;
          const start = Math.min((center - min) / (max - min), (current - min) / (max - min));
          const size = Math.abs(current - center) / (max - min);
          fill.style.left = `${start * 100}%`;
          fill.style.width = `${size * 100}%`;
          value.textContent = `${current > center ? "+" : ""}${current} dB`;
        };
        input.addEventListener("input", () => {
          sync();
          appendLog(`@centeredSliderInputChanged value=${input.value}`);
        });
        input.addEventListener("change", () => {
          sync();
          appendLog(`@centeredSliderChanged value=${input.value}`);
        });
        sync();
      })();
    </script>
  </body>
</html>
