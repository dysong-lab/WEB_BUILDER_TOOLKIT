<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Centered — 03_editorial</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: linear-gradient(180deg, #f3ecdf, #eadfcf);
      }
    </style>
  </head>
  <body>
    <div id="centered-editorial"></div>
    <script>
      (async () => {
        await loadComponentAssets("centered-editorial", "../views/03_editorial.html", "../styles/03_editorial.css");
        const instance = { id: "centered-editorial", appendElement: document.getElementById("centered-editorial") };
        const root = document.querySelector("#centered-editorial .centered-slider");
        const input = root.querySelector(".centered-slider__native");
        const fill = root.querySelector(".centered-slider__fill");
        const value = root.querySelector(".centered-slider__value");
        const sync = () => {
          const min = Number(input.min);
          const max = Number(input.max);
          const current = Number(input.value);
          const center = (min + max) / 2;
          const start = Math.min((center - min) / (max - min), (current - min) / (max - min));
          const size = Math.abs(current - center) / (max - min);
          fill.style.left = `${start * 100}%`;
          fill.style.width = `${size * 100}%`;
          value.textContent = `${current > center ? "+" : ""}${current}`;
        };
        input.addEventListener("input", () => {
          sync();
          Weventbus.emit("@centeredSliderInputChanged", { event: { type: "input" }, targetInstance: instance });
        });
        input.addEventListener("change", () => {
          sync();
          Weventbus.emit("@centeredSliderChanged", { event: { type: "change" }, targetInstance: instance });
        });
        sync();
      })();
    </script>
  </body>
</html>
