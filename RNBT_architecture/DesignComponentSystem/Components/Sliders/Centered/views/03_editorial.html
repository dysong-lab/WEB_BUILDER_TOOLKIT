<div class="centered-slider centered-slider--editorial" data-disabled="false">
  <div class="centered-slider__header">
    <span class="centered-slider__eyebrow">Typography</span>
    <div class="centered-slider__title-row">
      <span class="centered-slider__label">Headline contrast</span>
      <output class="centered-slider__value">+3</output>
    </div>
  </div>
  <div class="centered-slider__control">
    <div class="centered-slider__track">
      <div class="centered-slider__fill"></div>
      <div class="centered-slider__center-mark"></div>
    </div>
    <input class="centered-slider__native" type="range" min="-8" max="8" step="1" value="3" />
  </div>
  <div class="centered-slider__scale">
    <span class="centered-slider__negative-label">Soft</span>
    <span class="centered-slider__positive-label">Bold</span>
  </div>
  <p class="centered-slider__supporting">Shift emphasis around the neutral editorial baseline.</p>
</div>
