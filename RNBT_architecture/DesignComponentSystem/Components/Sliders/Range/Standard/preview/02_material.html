<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Range — 02_material</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: #efe9fb;
      }
    </style>
  </head>
  <body>
    <div id="range-material"></div>
    <script>
      (async () => {
        await loadComponentAssets("range-material", "../views/02_material.html", "../styles/02_material.css");
        const instance = { id: "range-material", appendElement: document.getElementById("range-material") };
        const root = document.querySelector("#range-material .range-slider");
        const lower = root.querySelector(".range-slider__input--lower");
        const upper = root.querySelector(".range-slider__input--upper");
        const fill = root.querySelector(".range-slider__fill");
        const value = root.querySelector(".range-slider__value");
        const sync = source => {
          if (source === "lower" && Number(lower.value) > Number(upper.value)) upper.value = lower.value;
          if (source === "upper" && Number(upper.value) < Number(lower.value)) lower.value = upper.value;
          const min = Number(lower.min);
          const max = Number(lower.max);
          const start = (Number(lower.value) - min) / (max - min);
          const end = (Number(upper.value) - min) / (max - min);
          fill.style.left = `${start * 100}%`;
          fill.style.width = `${(end - start) * 100}%`;
          value.textContent = `$${lower.value} - $${upper.value}`;
        };
        lower.addEventListener("input", () => {
          sync("lower");
          Weventbus.emit("@rangeSliderInputChanged", { event: { type: "input" }, targetInstance: instance });
        });
        upper.addEventListener("input", () => {
          sync("upper");
          Weventbus.emit("@rangeSliderInputChanged", { event: { type: "input" }, targetInstance: instance });
        });
        lower.addEventListener("change", () => {
          sync("lower");
          Weventbus.emit("@rangeSliderChanged", { event: { type: "change" }, targetInstance: instance });
        });
        upper.addEventListener("change", () => {
          sync("upper");
          Weventbus.emit("@rangeSliderChanged", { event: { type: "change" }, targetInstance: instance });
        });
        sync();
      })();
    </script>
  </body>
</html>
