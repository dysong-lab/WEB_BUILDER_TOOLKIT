<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Range — 03_editorial</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: linear-gradient(180deg, #f3ecdf, #eadfcf);
      }
      #event-log {
        width: 320px;
        min-height: 220px;
        padding: 16px;
        border-radius: 16px;
        background: rgba(255, 250, 244, 0.72);
        border: 1px solid rgba(125, 81, 38, 0.18);
        color: #51331f;
        font: 12px/1.5 monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="range-editorial"></div>
    <pre id="event-log">[ready] waiting for slider events</pre>
    <script>
      (async () => {
        await loadComponentAssets("range-editorial", "../views/03_editorial.html", "../styles/03_editorial.css");
        const root = document.querySelector("#range-editorial .range-slider");
        const lower = root.querySelector(".range-slider__input--lower");
        const upper = root.querySelector(".range-slider__input--upper");
        const fill = root.querySelector(".range-slider__fill");
        const value = root.querySelector(".range-slider__value");
        const log = document.getElementById("event-log");
        const appendLog = message => {
          log.textContent = `${message}\n${log.textContent}`.trim();
          console.log(message);
        };
        const sync = source => {
          if (source === "lower" && Number(lower.value) > Number(upper.value)) upper.value = lower.value;
          if (source === "upper" && Number(upper.value) < Number(lower.value)) lower.value = upper.value;
          const min = Number(lower.min);
          const max = Number(lower.max);
          const start = (Number(lower.value) - min) / (max - min);
          const end = (Number(upper.value) - min) / (max - min);
          fill.style.left = `${start * 100}%`;
          fill.style.width = `${(end - start) * 100}%`;
          value.textContent = `${lower.value} min - ${upper.value} min`;
        };
        lower.addEventListener("input", () => {
          sync("lower");
          appendLog(`@rangeSliderInputChanged handle=lower start=${lower.value} end=${upper.value}`);
        });
        upper.addEventListener("input", () => {
          sync("upper");
          appendLog(`@rangeSliderInputChanged handle=upper start=${lower.value} end=${upper.value}`);
        });
        lower.addEventListener("change", () => {
          sync("lower");
          appendLog(`@rangeSliderChanged handle=lower start=${lower.value} end=${upper.value}`);
        });
        upper.addEventListener("change", () => {
          sync("upper");
          appendLog(`@rangeSliderChanged handle=upper start=${lower.value} end=${upper.value}`);
        });
        sync();
      })();
    </script>
  </body>
</html>
