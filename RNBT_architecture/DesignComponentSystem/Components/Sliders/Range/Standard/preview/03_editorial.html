<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sliders/Range/Standard — 03_editorial (Persona C)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F2EEE6;
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 32px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 400px;
            padding: 16px 20px;
            background: #FFFFFF;
            border-top: 1px solid #3D3833;
            border-bottom: 1px solid #3D3833;
            color: #6B6560;
            font-family: 'Georgia', serif;
            font-size: 13px;
            line-height: 1.7;
            max-height: 200px;
            overflow-y: auto;
            font-style: italic;
        }
        .demo-log strong { color: #3D3833; font-style: normal; }
    </style>
</head>
<body>

<div id="slider-range-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('slider-range-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'slider-range', appendElement: document.getElementById('slider-range-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            slider:        '.slider',
            label:         '.slider__label',
            lowText:       '.slider__value-label--low',
            highText:      '.slider__value-label--high',
            lowInput:      '.slider__input--low',
            highInput:     '.slider__input--high',
            lowInputMin:   '.slider__input--low',
            lowInputMax:   '.slider__input--low',
            lowInputStep:  '.slider__input--low',
            low:           '.slider__input--low',
            highInputMin:  '.slider__input--high',
            highInputMax:  '.slider__input--high',
            highInputStep: '.slider__input--high',
            high:          '.slider__input--high',
            lowProgress:   '.slider__track-active',
            progress:      '.slider__track-active'
        },
        elementAttrs: {
            lowInputMin:   'min',
            lowInputMax:   'max',
            lowInputStep:  'step',
            low:           'value',
            highInputMin:  'min',
            highInputMax:  'max',
            highInputStep: 'step',
            high:          'value'
        },
        styleAttrs: {
            lowProgress: { property: 'left',  unit: '%' },
            progress:    { property: 'width', unit: '%' }
        }
    });

    instance.updateSliderValue = function ({ response: data }) {
        if (!data) return;
        const min  = Number.isFinite(data.min)  ? data.min  : 0;
        const max  = Number.isFinite(data.max)  ? data.max  : 100;
        const step = Number.isFinite(data.step) ? data.step : 1;
        const minDist = Math.max(0, Number.isFinite(data.minDistance) ? data.minDistance : 0);
        let low  = Number.isFinite(data.low)  ? data.low  : min;
        let high = Number.isFinite(data.high) ? data.high : max;
        low  = Math.min(Math.max(low,  min), max);
        high = Math.min(Math.max(high, min), max);
        if (low > high) { const t = low; low = high; high = t; }
        if (minDist > 0 && (high - low) < minDist) {
            if (low + minDist <= max) high = low + minDist;
            else { high = max; low = Math.max(min, max - minDist); }
        }
        const span = max - min;
        const lowProgress  = span > 0 ? ((low  - min) / span) * 100 : 0;
        const highProgress = span > 0 ? ((high - min) / span) * 100 : 0;
        const progress     = Math.max(0, highProgress - lowProgress);
        const lowText  = data.lowText  != null ? String(data.lowText)  : String(low);
        const highText = data.highText != null ? String(data.highText) : String(high);
        this.fieldRender.renderData({
            response: {
                label: data.label ?? '',
                lowText, highText,
                lowInputMin: min, lowInputMax: max, lowInputStep: step, low,
                highInputMin: min, highInputMax: max, highInputStep: step, high,
                lowProgress, progress
            }
        });
        const sliderEl = this.appendElement.querySelector(this.fieldRender.cssSelectors.slider);
        if (sliderEl) sliderEl.dataset.disabled = data.disabled ? 'true' : 'false';
        const lowEl  = this.appendElement.querySelector(this.fieldRender.cssSelectors.lowInput);
        if (lowEl)  lowEl.disabled  = !!data.disabled;
        const highEl = this.appendElement.querySelector(this.fieldRender.cssSelectors.highInput);
        if (highEl) highEl.disabled = !!data.disabled;
    };

    instance.subscriptions = { sliderInfo: [instance.updateSliderValue] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.lowInput]:  '@sliderChanged',
            [instance.fieldRender.cssSelectors.highInput]: '@sliderChanged'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const state = { label: 'Reading Hours', low: 3, high: 8, min: 0, max: 12, step: 1, minDistance: 1, disabled: false };

    Wkit.onEventBusHandlers({
        '@sliderChanged': ({ event, targetInstance }) => {
            const handle = event.target.dataset.handle;
            const nextValue = Number(event.target.value);
            if (handle === 'low')  state.low  = nextValue;
            if (handle === 'high') state.high = nextValue;
            targetInstance.updateSliderValue({ response: { ...state } });
            log(`sliderChanged ${handle} → <strong>${nextValue}</strong> (low=${state.low}, high=${state.high})`);
        }
    });

    instance.updateSliderValue({ response: { ...state } });
})();
</script>
</body>
</html>
