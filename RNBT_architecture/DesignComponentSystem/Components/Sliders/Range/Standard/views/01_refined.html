<div class="range-slider range-slider--refined" data-disabled="false">
  <div class="range-slider__header">
    <span class="range-slider__eyebrow">Humidity</span>
    <div class="range-slider__title-row">
      <span class="range-slider__label">Target window</span>
      <output class="range-slider__value">38% - 62%</output>
    </div>
  </div>
  <div class="range-slider__control">
    <div class="range-slider__track">
      <div class="range-slider__fill"></div>
    </div>
    <input class="range-slider__input range-slider__input--lower" type="range" min="0" max="100" step="1" value="38" />
    <input class="range-slider__input range-slider__input--upper" type="range" min="0" max="100" step="1" value="62" />
  </div>
  <div class="range-slider__scale">
    <span class="range-slider__min-label">0%</span>
    <span class="range-slider__max-label">100%</span>
  </div>
  <p class="range-slider__supporting">Keep alerts inside the preferred humidity band.</p>
</div>
