<div class="range-slider range-slider--editorial" data-disabled="false">
  <div class="range-slider__header">
    <span class="range-slider__eyebrow">Publishing</span>
    <div class="range-slider__title-row">
      <span class="range-slider__label">Reading time target</span>
      <output class="range-slider__value">4 min - 9 min</output>
    </div>
  </div>
  <div class="range-slider__control">
    <div class="range-slider__track">
      <div class="range-slider__fill"></div>
    </div>
    <input class="range-slider__input range-slider__input--lower" type="range" min="1" max="15" step="1" value="4" />
    <input class="range-slider__input range-slider__input--upper" type="range" min="1" max="15" step="1" value="9" />
  </div>
  <div class="range-slider__scale">
    <span class="range-slider__min-label">1 min</span>
    <span class="range-slider__max-label">15 min</span>
  </div>
  <p class="range-slider__supporting">Set the narrative band readers can absorb in one sitting.</p>
</div>
