<div class="range-slider range-slider--material" data-disabled="false">
  <div class="range-slider__header">
    <span class="range-slider__eyebrow">Budget</span>
    <div class="range-slider__title-row">
      <span class="range-slider__label">Monthly spend guardrail</span>
      <output class="range-slider__value">$1200 - $2800</output>
    </div>
  </div>
  <div class="range-slider__control">
    <div class="range-slider__track">
      <div class="range-slider__fill"></div>
    </div>
    <input class="range-slider__input range-slider__input--lower" type="range" min="0" max="4000" step="100" value="1200" />
    <input class="range-slider__input range-slider__input--upper" type="range" min="0" max="4000" step="100" value="2800" />
  </div>
  <div class="range-slider__scale">
    <span class="range-slider__min-label">$0</span>
    <span class="range-slider__max-label">$4000</span>
  </div>
  <p class="range-slider__supporting">Define the range that still feels healthy this quarter.</p>
</div>
