<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Basic — 01_refined</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;
        background: radial-gradient(circle at top, #12304d, #07111c 60%);
      }
    </style>
  </head>
  <body>
    <div id="basic-refined"></div>
    <script>
      (async () => {
        await loadComponentAssets("basic-refined", "../views/01_refined.html", "../styles/01_refined.css");
        const root = document.querySelector("#basic-refined .slider");
        const input = root.querySelector(".slider__native");
        const fill = root.querySelector(".slider__fill");
        const value = root.querySelector(".slider__value");
        const sync = () => {
          const min = Number(input.min);
          const max = Number(input.max);
          const ratio = (Number(input.value) - min) / (max - min);
          fill.style.width = `${Math.max(0, Math.min(1, ratio)) * 100}%`;
          value.textContent = `${input.value}%`;
        };
        input.addEventListener("input", sync);
        sync();
      })();
    </script>
  </body>
</html>
