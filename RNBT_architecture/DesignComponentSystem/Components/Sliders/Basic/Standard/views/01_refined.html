<div class="slider" data-disabled="false">
    <div class="slider__header">
        <label class="slider__label" for="slider-basic-input">-</label>
        <span class="slider__value-label">-</span>
    </div>
    <div class="slider__track">
        <div class="slider__track-inactive"></div>
        <div class="slider__track-active" style="width: 0%"></div>
        <input class="slider__input"
               id="slider-basic-input"
               type="range"
               min="0"
               max="100"
               step="1"
               value="0"
               aria-label="slider">
    </div>
</div>
