<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Basic — 03_editorial</title>
    <script src="../../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: linear-gradient(180deg, #f3ecdf, #eadfcf);
      }
    </style>
  </head>
  <body>
    <div id="basic-editorial"></div>
    <script>
      (async () => {
        await loadComponentAssets("basic-editorial", "../views/03_editorial.html", "../styles/03_editorial.css");
        const instance = { id: "basic-editorial", appendElement: document.getElementById("basic-editorial") };
        const root = document.querySelector("#basic-editorial .slider");
        const input = root.querySelector(".slider__native");
        const fill = root.querySelector(".slider__fill");
        const value = root.querySelector(".slider__value");
        const sync = () => {
          const min = Number(input.min);
          const max = Number(input.max);
          fill.style.width = `${((Number(input.value) - min) / (max - min)) * 100}%`;
          value.textContent = `${input.value}%`;
        };
        input.addEventListener("input", () => {
          sync();
          Weventbus.emit("@sliderInputChanged", { event: { type: "input" }, targetInstance: instance });
        });
        input.addEventListener("change", () => {
          sync();
          Weventbus.emit("@sliderChanged", { event: { type: "change" }, targetInstance: instance });
        });
        sync();
      })();
    </script>
  </body>
</html>
