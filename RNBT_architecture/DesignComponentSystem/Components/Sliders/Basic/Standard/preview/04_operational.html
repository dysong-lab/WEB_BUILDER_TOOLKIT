<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sliders/Basic — 04_operational</title>
    <script src="../../../../preview_runtime.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 48px;
        background: #090d11;
      }
      #event-log {
        width: 320px;
        min-height: 220px;
        padding: 16px;
        border-radius: 12px;
        background: rgba(7, 11, 14, 0.86);
        border: 1px solid rgba(141, 177, 101, 0.22);
        color: #dff2c1;
        font: 12px/1.5 monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="basic-operational"></div>
    <pre id="event-log">[ready] waiting for slider events</pre>
    <script>
      (async () => {
        await loadComponentAssets("basic-operational", "../views/04_operational.html", "../styles/04_operational.css");
        const root = document.querySelector("#basic-operational .slider");
        const input = root.querySelector(".slider__native");
        const fill = root.querySelector(".slider__fill");
        const value = root.querySelector(".slider__value");
        const log = document.getElementById("event-log");
        const appendLog = message => {
          log.textContent = `${message}\n${log.textContent}`.trim();
          console.log(message);
        };
        const sync = () => {
          const min = Number(input.min);
          const max = Number(input.max);
          fill.style.width = `${((Number(input.value) - min) / (max - min)) * 100}%`;
          value.textContent = `${input.value}%`;
        };
        input.addEventListener("input", () => {
          sync();
          appendLog(`@sliderInputChanged value=${input.value}`);
        });
        input.addEventListener("change", () => {
          sync();
          appendLog(`@sliderChanged value=${input.value}`);
        });
        sync();
      })();
    </script>
  </body>
</html>
