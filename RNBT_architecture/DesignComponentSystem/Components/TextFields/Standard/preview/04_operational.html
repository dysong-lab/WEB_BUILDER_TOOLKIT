<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>TextFields/Standard — 04_operational</title>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/FieldRenderMixin.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px; background: #090d11; }
    </style>
  </head>
  <body>
    <div id="textfield-operational"></div>
    <script>
      (async () => {
        await loadComponentAssets("textfield-operational", "../views/04_operational.html", "../styles/04_operational.css");
        const instance = { id: "textfield-operational", appendElement: document.getElementById("textfield-operational") };
        applyFieldRenderMixin(instance, { cssSelectors: { root: ".text-field", label: ".text-field__label", input: ".text-field__input", supportingText: ".text-field__supporting", errorText: ".text-field__error", clearButton: ".text-field__clear" } });
        const root = instance.appendElement.querySelector(".text-field");
        const input = instance.appendElement.querySelector(".text-field__input");
        const clear = instance.appendElement.querySelector(".text-field__clear");
        instance.fieldRender.renderData({ response: { label: "Operator note", supportingText: "Attached to the current alarm context.", errorText: "" } });
        input.placeholder = "Enter operator note";
        input.value = "Bus B voltage drop acknowledged.";
        root.dataset.hasValue = "true";
        clear.hidden = false;
        input.addEventListener("input", (event) => { root.dataset.hasValue = input.value.trim() ? "true" : "false"; clear.hidden = !input.value.trim(); Weventbus.emit("@textFieldInputChanged", { event, targetInstance: instance }); });
        input.addEventListener("change", (event) => Weventbus.emit("@textFieldChanged", { event, targetInstance: instance }));
        input.addEventListener("focus", (event) => Weventbus.emit("@textFieldFocused", { event, targetInstance: instance }));
        input.addEventListener("blur", (event) => Weventbus.emit("@textFieldBlurred", { event, targetInstance: instance }));
        clear.addEventListener("click", (event) => { input.value = ""; root.dataset.hasValue = "false"; clear.hidden = true; Weventbus.emit("@textFieldCleared", { event, targetInstance: instance }); });
      })();
    </script>
  </body>
</html>
