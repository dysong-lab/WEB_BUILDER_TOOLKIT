<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TextFields/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #010409;
            font-family: 'IBM Plex Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 16px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 340px;
            padding: 10px 12px;
            background: #0D1117;
            border: 1px solid rgba(99, 199, 255, 0.18);
            border-radius: 2px;
            color: #7A8FA5;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
            max-height: 180px;
            overflow-y: auto;
            letter-spacing: 0.2px;
        }
        .demo-log strong { color: #4DD0E1; }
        .demo-actions { display: flex; gap: 6px; }
        .demo-actions button {
            padding: 4px 10px;
            background: #0D1117;
            border: 1px solid rgba(77, 208, 225, 0.3);
            border-radius: 2px;
            color: #4DD0E1;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .demo-actions button:hover {
            background: #161B22;
            color: #E6EDF3;
        }
    </style>
</head>
<body>

<div id="text-field-container"></div>
<div class="demo-actions">
    <button data-demo="error">[!] Error</button>
    <button data-demo="disable">[~] Disable</button>
    <button data-demo="reset">[&lt;] Reset</button>
</div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>&mdash;</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('text-field-container', '../views/04_operational.html', '../styles/04_operational.css');

    const instance = { id: 'text-field', appendElement: document.getElementById('text-field-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            root:         '.text-field',
            label:        '.text-field__label',
            leadingIcon:  '.text-field__leading',
            value:        '.text-field__input',
            placeholder:  '.text-field__input',
            trailingIcon: '.text-field__trailing',
            supporting:   '.text-field__supporting',
            errorText:    '.text-field__error',
            state:        '.text-field',
            required:     '.text-field'
        },
        elementAttrs: {
            value:       'value',
            placeholder: 'placeholder'
        },
        datasetAttrs: {
            state:    'state',
            required: 'required'
        }
    });

    instance.subscriptions = {
        textField: [instance.fieldRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.value]:        '@textFieldInput'
        },
        change: {
            [instance.fieldRender.cssSelectors.value]:        '@textFieldChanged'
        },
        click: {
            [instance.fieldRender.cssSelectors.trailingIcon]: '@textFieldTrailingClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>&mdash;';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const baseData = {
        label:        'device id',
        required:     'true',
        value:        '',
        placeholder:  'rnbt-XXX',
        leadingIcon:  '[#]',
        trailingIcon: '[X]',
        supporting:   'format: rnbt-<ddd>',
        errorText:    '',
        state:        'enabled'
    };

    instance.fieldRender.renderData({ response: baseData });

    Wkit.onEventBusHandlers({
        '@textFieldInput':            ({ event })           => log('input "' + event.target.value + '"'),
        '@textFieldChanged':          ({ event })           => log('<strong>change</strong> "' + event.target.value + '"'),
        '@textFieldTrailingClicked':  ({ targetInstance })  => {
            log('trailing click → clear');
            const input = targetInstance.appendElement.querySelector(targetInstance.fieldRender.cssSelectors.value);
            if (input) input.value = '';
            instance.fieldRender.renderData({ response: {
                ...baseData, value: '', state: 'enabled', errorText: ''
            }});
        }
    });

    document.querySelector('[data-demo="error"]').addEventListener('click', () => {
        instance.fieldRender.renderData({ response: {
            ...baseData, state: 'error', errorText: 'device id not found in registry'
        }});
        log('demo: error');
    });
    let disabled = false;
    document.querySelector('[data-demo="disable"]').addEventListener('click', () => {
        disabled = !disabled;
        instance.fieldRender.renderData({ response: {
            ...baseData,
            state: disabled ? 'disabled' : 'enabled'
        }});
        log('demo: disabled=' + disabled);
    });
    document.querySelector('[data-demo="reset"]').addEventListener('click', () => {
        const input = instance.appendElement.querySelector(instance.fieldRender.cssSelectors.value);
        if (input) input.value = '';
        instance.fieldRender.renderData({ response: baseData });
        log('demo: reset');
    });
})();
</script>
</body>
</html>
