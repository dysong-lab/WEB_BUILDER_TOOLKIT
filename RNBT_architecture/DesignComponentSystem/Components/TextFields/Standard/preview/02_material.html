<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TextFields/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F5F3F7;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 20px;
            padding: 60px 20px;
        }
        .demo-log {
            width: 340px;
            padding: 12px 16px;
            background: #FFFFFF;
            border: 1px solid #CAC4D0;
            border-radius: 8px;
            color: #49454F;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #1C1B1F; }
        .demo-actions { display: flex; gap: 8px; }
        .demo-actions button {
            padding: 6px 14px;
            background: #FFFFFF;
            border: 1px solid #79747E;
            border-radius: 100px;
            color: #6750A4;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }
        .demo-actions button:hover { background: #F5F0FA; }
    </style>
</head>
<body>

<div id="text-field-container"></div>
<div class="demo-actions">
    <button data-demo="error">Trigger error</button>
    <button data-demo="disable">Toggle disabled</button>
    <button data-demo="reset">Reset</button>
</div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>&mdash;</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('text-field-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'text-field', appendElement: document.getElementById('text-field-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            root:         '.text-field',
            label:        '.text-field__label',
            leadingIcon:  '.text-field__leading',
            value:        '.text-field__input',
            placeholder:  '.text-field__input',
            trailingIcon: '.text-field__trailing',
            supporting:   '.text-field__supporting',
            errorText:    '.text-field__error',
            state:        '.text-field',
            required:     '.text-field'
        },
        elementAttrs: {
            value:       'value',
            placeholder: 'placeholder'
        },
        datasetAttrs: {
            state:    'state',
            required: 'required'
        }
    });

    instance.subscriptions = {
        textField: [instance.fieldRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.value]:        '@textFieldInput'
        },
        change: {
            [instance.fieldRender.cssSelectors.value]:        '@textFieldChanged'
        },
        click: {
            [instance.fieldRender.cssSelectors.trailingIcon]: '@textFieldTrailingClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>&mdash;';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    const baseData = {
        label:        'Username',
        required:     'true',
        value:        '',
        placeholder:  'Enter username',
        leadingIcon:  'person',
        trailingIcon: 'visibility',
        supporting:   'Must be 3-20 characters',
        errorText:    '',
        state:        'enabled'
    };

    instance.fieldRender.renderData({ response: baseData });

    Wkit.onEventBusHandlers({
        '@textFieldInput':            ({ event })           => log('textFieldInput "' + event.target.value + '"'),
        '@textFieldChanged':          ({ event })           => log('<strong>textFieldChanged</strong> "' + event.target.value + '"'),
        '@textFieldTrailingClicked':  ({ targetInstance })  => {
            log('textFieldTrailingClicked');
            const input = targetInstance.appendElement.querySelector(targetInstance.fieldRender.cssSelectors.value);
            // visibility 토글 시뮬레이션 (실제로는 페이지가 type 변경)
            if (input) {
                input.type = input.type === 'password' ? 'text' : 'password';
                log('  → input type=' + input.type);
            }
        }
    });

    document.querySelector('[data-demo="error"]').addEventListener('click', () => {
        instance.fieldRender.renderData({ response: {
            ...baseData, state: 'error', errorText: 'Username already taken.'
        }});
        log('demo: error state');
    });
    let disabled = false;
    document.querySelector('[data-demo="disable"]').addEventListener('click', () => {
        disabled = !disabled;
        instance.fieldRender.renderData({ response: {
            ...baseData,
            state: disabled ? 'disabled' : 'enabled'
        }});
        log('demo: disabled=' + disabled);
    });
    document.querySelector('[data-demo="reset"]').addEventListener('click', () => {
        const input = instance.appendElement.querySelector(instance.fieldRender.cssSelectors.value);
        if (input) input.value = '';
        instance.fieldRender.renderData({ response: baseData });
        log('demo: reset');
    });
})();
</script>
</body>
</html>
