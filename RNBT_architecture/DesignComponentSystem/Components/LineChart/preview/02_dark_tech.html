<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chart — 02_dark_tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; padding: 40px; }
        #chart-container { width: 700px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="../../../preview_runtime.js"></script>
    <script src="../../../Mixins/EChartsMixin.js"></script>

    <script>
    (async () => {
        await loadComponentAssets('chart-container', '../views/02_dark_tech.html', '../styles/02_dark_tech.css');

        const instance = {
            id: 'chart',
            appendElement: document.getElementById('chart-container')
        };

        applyEChartsMixin(instance, {
            cssSelectors: { container: '.chart__canvas' },
            option: {
                backgroundColor: 'transparent',
                xAxis: {
                    type: 'category',
                    axisLine: { lineStyle: { color: '#1e3a5f' } },
                    axisLabel: { color: '#475569', fontSize: 10 }
                },
                yAxis: {
                    type: 'value',
                    splitLine: { lineStyle: { color: '#1e3a5f30' } },
                    axisLabel: { color: '#475569', fontSize: 10 }
                },
                series: [
                    { name: 'CPU', type: 'line', smooth: true,
                      lineStyle: { color: '#22c55e' }, itemStyle: { color: '#22c55e' },
                      areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                          colorStops: [{ offset: 0, color: '#22c55e30' }, { offset: 1, color: '#22c55e05' }] } } },
                    { name: 'Memory', type: 'line', smooth: true,
                      lineStyle: { color: '#38bdf8' }, itemStyle: { color: '#38bdf8' },
                      areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                          colorStops: [{ offset: 0, color: '#38bdf830' }, { offset: 1, color: '#38bdf805' }] } } }
                ],
                tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155',
                           textStyle: { color: '#e2e8f0', fontSize: 11 } },
                legend: { data: ['CPU', 'Memory'], textStyle: { color: '#64748b', fontSize: 10 } }
            }
        });

        instance.echarts.renderData({
            response: {
                data: {
                    categories: ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00'],
                    values: [
                        [42, 55, 48, 72, 65, 58],
                        [65, 68, 72, 70, 75, 73]
                    ]
                }
            }
        });
    })();
    </script>
</body>
</html>
