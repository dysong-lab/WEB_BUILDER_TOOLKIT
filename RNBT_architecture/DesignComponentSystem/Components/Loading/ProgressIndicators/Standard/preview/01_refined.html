<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Loading/ProgressIndicators/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500;600&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #191D50;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }

        #progress-indicators-container {
            width: 360px;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(80, 46, 233, 0.06) 0%, rgba(5, 171, 207, 0.03) 100%),
                        #2A2063;
            border-radius: 20px;
        }
        #progress-indicators-container .progress-indicator {
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
            transition: background-color 150ms ease-out;
        }
        #progress-indicators-container .progress-indicator__header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
        }
        #progress-indicators-container .progress-indicator__label {
            font-family: 'Pretendard', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: #C8D0EC;
            line-height: 1.3;
        }
        #progress-indicators-container .progress-indicator__value {
            font-family: 'Tomorrow', sans-serif;
            font-weight: 500;
            font-size: 14px;
            color: #92A8F4;
            line-height: 1.3;
        }
        #progress-indicators-container .progress-indicator__track {
            width: 100%;
            height: 8px;
            background: rgba(80, 46, 233, 0.18);
            border-radius: 8px;
            overflow: hidden;
        }
        #progress-indicators-container .progress-indicator__bar {
            height: 100%;
            background: linear-gradient(90deg, #502EE9 0%, #92A8F4 100%);
            border-radius: 8px;
            transition: width 150ms ease-out;
        }
        #progress-indicators-container .progress-indicator[data-status="warning"] .progress-indicator__bar {
            background: linear-gradient(90deg, #FDD01F 0%, #FD7F04 100%);
        }
        #progress-indicators-container .progress-indicator[data-status="warning"] .progress-indicator__value { color: #FDD01F; }
        #progress-indicators-container .progress-indicator[data-status="error"] .progress-indicator__bar {
            background: linear-gradient(90deg, #F43031 0%, #FD7F04 100%);
        }
        #progress-indicators-container .progress-indicator[data-status="error"] .progress-indicator__value { color: #F43031; }
        #progress-indicators-container .progress-indicator[data-status="success"] .progress-indicator__bar {
            background: linear-gradient(90deg, #32D28C 0%, #92A8F4 100%);
        }
        #progress-indicators-container .progress-indicator[data-status="success"] .progress-indicator__value { color: #32D28C; }

        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="progress-indicators-container">
    <div class="progress-indicator" data-status="normal">
        <div class="progress-indicator__header">
            <span class="progress-indicator__label">-</span>
            <span class="progress-indicator__value">-</span>
        </div>
        <div class="progress-indicator__track">
            <div class="progress-indicator__bar" style="width: 0%"></div>
        </div>
    </div>
</div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('progress-indicators-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'progressIndicators', appendElement: document.getElementById('progress-indicators-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            indicator: '.progress-indicator',
            track:     '.progress-indicator__track',
            bar:       '.progress-indicator__bar',
            label:     '.progress-indicator__label',
            valueText: '.progress-indicator__value',
            status:    '.progress-indicator'
        },
        datasetAttrs: {
            status:    'status'
        },
        styleAttrs: {
            progress:  { property: 'width', unit: '%' }
        }
    });

    instance.subscriptions = { progressInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.indicator]: '@progressClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@progressClicked': () => {
            const label = instance.appendElement.querySelector('.progress-indicator__label')?.textContent;
            const value = instance.appendElement.querySelector('.progress-indicator__value')?.textContent;
            log(`progressClicked "${label}" (${value})`);
        }
    });

    // 초기 렌더
    instance.fieldRender.renderData({ response: {
        progress: 45,
        label: 'Uploading files',
        valueText: '45%',
        status: 'normal'
    }});

    // 진행 시뮬레이션 — 구독자(렌더 핸들러)를 직접 호출
    const states = [
        { progress: 25, label: 'Uploading files', valueText: '25%', status: 'normal' },
        { progress: 68, label: 'Uploading files', valueText: '68%', status: 'normal' },
        { progress: 85, label: 'Uploading files', valueText: '85%', status: 'warning' },
        { progress: 100, label: 'Upload complete', valueText: '100%', status: 'success' },
        { progress: 40, label: 'Connection lost', valueText: '40% (paused)', status: 'error' }
    ];
    let i = 0;
    setInterval(() => {
        instance.fieldRender.renderData({ response: states[i] });
        i = (i + 1) % states.length;
    }, 2500);
})();
</script>
</body>
</html>
