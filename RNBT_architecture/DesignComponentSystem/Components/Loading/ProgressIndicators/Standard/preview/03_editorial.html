<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Loading/ProgressIndicators/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #faf8f5;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 32px;
            padding: 60px 20px;
        }

        #progress-indicators-container {
            width: 400px;
            padding: 32px 36px;
            background: #ffffff;
            border: 1px solid #e8e3de;
            border-radius: 2px;
        }
        #progress-indicators-container .progress-indicator {
            display: flex;
            flex-direction: column;
            gap: 20px;
            cursor: pointer;
        }
        #progress-indicators-container .progress-indicator__header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e8e3de;
            transition: border-color 150ms ease-out;
        }
        #progress-indicators-container .progress-indicator__label {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 18px;
            color: #3d3833;
            line-height: 1.3;
        }
        #progress-indicators-container .progress-indicator__value {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #6b6560;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }
        #progress-indicators-container .progress-indicator__track {
            width: 100%;
            height: 2px;
            background: #e8e3de;
            border-radius: 0;
            overflow: hidden;
        }
        #progress-indicators-container .progress-indicator__bar {
            height: 100%;
            background: #3d3833;
            border-radius: 0;
            transition: width 150ms ease-out;
        }
        #progress-indicators-container .progress-indicator[data-status="warning"] .progress-indicator__bar { background: #b07d2d; }
        #progress-indicators-container .progress-indicator[data-status="warning"] .progress-indicator__value { color: #b07d2d; }
        #progress-indicators-container .progress-indicator[data-status="error"] .progress-indicator__bar { background: #9c3a3a; }
        #progress-indicators-container .progress-indicator[data-status="error"] .progress-indicator__value { color: #9c3a3a; }
        #progress-indicators-container .progress-indicator[data-status="success"] .progress-indicator__bar { background: #4a7c59; }
        #progress-indicators-container .progress-indicator[data-status="success"] .progress-indicator__value { color: #4a7c59; }
        #progress-indicators-container .progress-indicator:hover .progress-indicator__header {
            border-bottom-color: #3d3833;
        }

        .demo-log {
            width: 400px;
            padding: 16px 20px;
            background: #ffffff;
            border: 1px solid #e8e3de;
            border-radius: 2px;
            color: #6b6560;
            font-size: 12px;
            line-height: 1.7;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            color: #3d3833;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="progress-indicators-container">
    <div class="progress-indicator" data-status="normal">
        <div class="progress-indicator__header">
            <span class="progress-indicator__label">-</span>
            <span class="progress-indicator__value">-</span>
        </div>
        <div class="progress-indicator__track">
            <div class="progress-indicator__bar" style="width: 0%"></div>
        </div>
    </div>
</div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../../preview_runtime.js"></script>
<script src="../../../../../Mixins/FieldRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('progress-indicators-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'progressIndicators', appendElement: document.getElementById('progress-indicators-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            indicator: '.progress-indicator',
            track:     '.progress-indicator__track',
            bar:       '.progress-indicator__bar',
            label:     '.progress-indicator__label',
            valueText: '.progress-indicator__value',
            status:    '.progress-indicator'
        },
        datasetAttrs: { status: 'status' },
        styleAttrs:   { progress: { property: 'width', unit: '%' } }
    });

    instance.subscriptions = { progressInfo: [instance.fieldRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.fieldRender.cssSelectors.indicator]: '@progressClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@progressClicked': () => {
            const label = instance.appendElement.querySelector('.progress-indicator__label')?.textContent;
            const value = instance.appendElement.querySelector('.progress-indicator__value')?.textContent;
            log(`progressClicked "${label}" (${value})`);
        }
    });

    instance.fieldRender.renderData({ response: {
        progress: 35,
        label: 'Chapter draft',
        valueText: '35 of 100 pages',
        status: 'normal'
    }});

    const states = [
        { progress: 15, label: 'Chapter draft', valueText: '15 of 100 pages', status: 'normal' },
        { progress: 50, label: 'Chapter draft', valueText: '50 of 100 pages', status: 'normal' },
        { progress: 80, label: 'Chapter review', valueText: '80 of 100 pages', status: 'warning' },
        { progress: 100, label: 'Chapter complete', valueText: '100 of 100 pages', status: 'success' },
        { progress: 45, label: 'Revision needed', valueText: '45 of 100 pages', status: 'error' }
    ];
    let i = 0;
    setInterval(() => {
        instance.fieldRender.renderData({ response: states[i] });
        i = (i + 1) % states.length;
    }, 2500);
})();
</script>
</body>
</html>
