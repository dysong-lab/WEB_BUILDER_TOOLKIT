<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Loading/LoadingIndicator/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fafaf8;
            font-family: 'DM Serif Display', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #loading-indicator-container {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading-indicator-container .loading-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        #loading-indicator-container .loading-indicator__dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #loading-indicator-container .loading-indicator__dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3d3833;
            animation: fade-editorial 1.4s ease-in-out infinite;
        }

        #loading-indicator-container .loading-indicator__dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        #loading-indicator-container .loading-indicator__dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        #loading-indicator-container .loading-indicator__label {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 13px;
            color: #6b6560;
            line-height: 1.3;
        }

        @keyframes fade-editorial {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="loading-indicator-container">
    <div class="loading-indicator">
        <div class="loading-indicator__dots">
            <span class="loading-indicator__dot"></span>
            <span class="loading-indicator__dot"></span>
            <span class="loading-indicator__dot"></span>
        </div>
        <span class="loading-indicator__label">Loading</span>
    </div>
</div>

</body>
</html>
