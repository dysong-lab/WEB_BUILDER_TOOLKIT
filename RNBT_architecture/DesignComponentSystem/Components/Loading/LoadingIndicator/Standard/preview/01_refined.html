<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Loading/LoadingIndicator/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #191D50;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #loading-indicator-container {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading-indicator-container .loading-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        #loading-indicator-container .loading-indicator__spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(80, 46, 233, 0.15);
            border-top-color: #502EE9;
            animation: spin-refined 1s linear infinite;
        }

        #loading-indicator-container .loading-indicator__label {
            font-family: 'Pretendard', sans-serif;
            font-weight: 500;
            font-size: 13px;
            color: #707EB4;
            line-height: 1.3;
        }

        @keyframes spin-refined {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading-indicator-container">
    <div class="loading-indicator">
        <div class="loading-indicator__spinner"></div>
        <span class="loading-indicator__label">Loading</span>
    </div>
</div>

</body>
</html>
