<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Loading/LoadingIndicator/Standard — 04_operational (Persona D)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            font-family: 'IBM Plex Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #loading-indicator-container {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading-indicator-container .loading-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #loading-indicator-container .loading-indicator__dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #loading-indicator-container .loading-indicator__dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #4dd0e1;
            animation: pulse-operational 1.2s ease-in-out infinite;
        }

        #loading-indicator-container .loading-indicator__dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        #loading-indicator-container .loading-indicator__dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        #loading-indicator-container .loading-indicator__label {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 400;
            font-size: 11px;
            color: #7a8fa5;
            line-height: 1.3;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @keyframes pulse-operational {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

<div id="loading-indicator-container">
    <div class="loading-indicator">
        <div class="loading-indicator__dots">
            <span class="loading-indicator__dot"></span>
            <span class="loading-indicator__dot"></span>
            <span class="loading-indicator__dot"></span>
        </div>
        <span class="loading-indicator__label">Loading</span>
    </div>
</div>

</body>
</html>
