<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Panel — 03_status_popup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #panel-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
            position: relative;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-controls-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .demo-label {
            font-size: 11px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .demo-separator {
            width: 1px;
            height: 24px;
            background: #2a2a4a;
            margin: 0 8px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
        .demo-btn[data-action="popup"]   { background: #8b5cf6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <div class="demo-controls-group">
            <span class="demo-label">Status</span>
            <button class="demo-btn" data-status="normal">Normal</button>
            <button class="demo-btn" data-status="warning">Warning</button>
            <button class="demo-btn" data-status="error">Error</button>
            <button class="demo-btn" data-status="offline">Offline</button>
            <button class="demo-btn" data-status="reset">Reset</button>
        </div>
        <div class="demo-separator"></div>
        <div class="demo-controls-group">
            <span class="demo-label">Popup</span>
            <button class="demo-btn" data-action="popup">Show Detail</button>
        </div>
    </div>

    <div id="panel-pageThreeLayer"></div>

    <!-- Mixin 로드 -->
    <script src="../../../../../Mixins/MeshStateMixin.js"></script>
    <script src="../../../../../Mixins/3DShadowPopupMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Popup HTML/CSS (publishCode 시뮬레이션) ───────────────
    const popupHTML = `
        <div class="popup-overlay">
            <div class="popup-panel">
                <div class="popup-header">
                    <h3 class="popup-name">Panel</h3>
                    <div class="popup-header-right">
                        <span class="popup-status" data-status="normal">normal</span>
                        <button class="popup-close" type="button">&times;</button>
                    </div>
                </div>
                <div class="popup-body">
                    <table class="popup-info-table">
                        <tr><th>Type</th><td>Panel Unit</td></tr>
                        <tr><th>Model</th><td>Panel-DC-48V</td></tr>
                        <tr><th>Location</th><td>DC-1F-R05</td></tr>
                        <tr><th>Status</th><td class="popup-status-cell">-</td></tr>
                    </table>
                </div>
            </div>
        </div>
    `;

    const popupCSS = `
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .popup-panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            width: 320px;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #334155;
        }
        .popup-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }
        .popup-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .popup-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            background: #334155;
            color: #94a3b8;
        }
        .popup-status[data-status="normal"]  { background: #0d3b2e; color: #34d399; }
        .popup-status[data-status="warning"] { background: #3b2e0d; color: #fbbf24; }
        .popup-status[data-status="error"]   { background: #3b0d0d; color: #f87171; }
        .popup-status[data-status="offline"] { background: #1e293b; color: #6b7280; }
        .popup-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .popup-close:hover { background: rgba(255,255,255,0.1); }
        .popup-body { padding: 16px; }
        .popup-info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .popup-info-table th {
            text-align: left;
            color: #94a3b8;
            padding: 6px 0;
            width: 90px;
            font-weight: 500;
        }
        .popup-info-table td {
            padding: 6px 0;
            color: #e2e8f0;
        }
    `;

    // ── Three.js Scene Setup ──────────────────────────────────
    const pageThreeLayer = document.getElementById('panel-pageThreeLayer');
    const width = pageThreeLayer.clientWidth;
    const height = pageThreeLayer.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
    camera.position.set(4, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    pageThreeLayer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // ── Grid ──────────────────────────────────────────────────
    scene.add(new THREE.GridHelper(10, 20, 0x2a2a4a, 0x2a2a4a));

    // ── Mock Instance ─────────────────────────────────────────
    const instance = {
        appendElement: null,
        name: 'Panel-01',
        page: { appendElement: pageThreeLayer }  // 3D: 페이지 DOM에 팝업 부착
    };

    // ── Load Model ────────────────────────────────────────────
    const loader = new GLTFLoader();

    loader.load('../../../../../models/Panel/Panel.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin 적용
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // 3DShadowPopupMixin 적용
        apply3DShadowPopupMixin(instance, {
            getHTML:   () => popupHTML,
            getStyles: () => popupCSS
        });

        // 시연용 정적 이벤트 — show 전 호출 (Mixin이 큐잉 후 첫 show 시 자동 바인딩)
        instance.shadowPopup.bindPopupEvents({
            click: {
                '.popup-close': () => instance.shadowPopup.hide(),
                '.popup-overlay': (e) => {
                    if (e.target.classList.contains('popup-overlay')) {
                        instance.shadowPopup.hide();
                    }
                }
            }
        });

        // 카메라 타겟 조정
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        controls.target.copy(center);
        camera.position.set(center.x + 4, center.y + 2, center.z + 5);
        controls.update();
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Demo: Status (renderData) ─────────────────────────────
    let currentStatus = 'normal';

    document.querySelectorAll('.demo-btn[data-status]').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                const mesh = instance.appendElement.getObjectByName('panel');
                if (mesh) mesh.material.color.setHex(0xffffff);
                currentStatus = 'normal';
                return;
            }

            instance.meshState.renderData({
                response: [{ meshName: 'panel', status }]
            });
            currentStatus = status;
        });
    });

    // ── Demo: Popup ───────────────────────────────────────────
    document.querySelector('.demo-btn[data-action="popup"]').addEventListener('click', () => {
        if (!instance.shadowPopup) return;

        instance.shadowPopup.show();

        // 팝업에 현재 상태 반영
        const statusEl = instance.shadowPopup.query('.popup-status');
        const statusCell = instance.shadowPopup.query('.popup-status-cell');
        const nameEl = instance.shadowPopup.query('.popup-name');

        if (nameEl) nameEl.textContent = instance.name;
        if (statusEl) {
            statusEl.textContent = currentStatus;
            statusEl.dataset.status = currentStatus;
        }
        if (statusCell) statusCell.textContent = currentStatus;
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = pageThreeLayer.clientWidth;
        const h = pageThreeLayer.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
