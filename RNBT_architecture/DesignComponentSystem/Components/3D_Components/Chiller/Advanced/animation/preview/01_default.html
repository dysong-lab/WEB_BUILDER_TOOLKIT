<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Chiller — Advanced/animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #chiller-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            flex-wrap: wrap;
        }
        .demo-controls-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .demo-label {
            font-size: 11px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-action="all-on"]  { background: #22d3ee; color: #1a1a2e; }
        .demo-btn[data-action="all-off"] { background: #64748b; }

        .clip-checkbox {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            border-radius: 4px;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        .clip-checkbox input { cursor: pointer; }
        .clip-checkbox:has(input:checked) {
            background: #a855f7;
            border-color: #c084fc;
        }

        .demo-log {
            max-width: 600px;
            margin: 8px auto;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 4px;
            color: #94a3b8;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            min-height: 60px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="demo-controls">
        <div class="demo-controls-group">
            <span class="demo-label">Status</span>
            <button class="demo-btn" data-status="normal">Normal</button>
            <button class="demo-btn" data-status="warning">Warning</button>
            <button class="demo-btn" data-status="error">Error</button>
            <button class="demo-btn" data-status="offline">Offline</button>
        </div>
    </div>

    <div class="demo-controls" id="clip-checkboxes">
        <div class="demo-controls-group">
            <span class="demo-label">runningClips</span>
            <span style="color:#64748b;font-size:12px;">모델 로드 중…</span>
        </div>
    </div>

    <div class="demo-controls">
        <div class="demo-controls-group">
            <span class="demo-label">Shortcut</span>
            <button class="demo-btn" data-action="all-on">전체 체크 → 전송</button>
            <button class="demo-btn" data-action="all-off">전체 해제 → 전송</button>
        </div>
    </div>

    <div id="chiller-pageThreeLayer"></div>
    <div class="demo-log" id="demo-log"><strong>이벤트 로그</strong>
—</div>

    <!-- preview_runtime.js: GlobalDataPublisher 시뮬레이션 -->
    <script src="../../../../../../preview_runtime.js"></script>
    <!-- Mixin 로드 -->
    <script src="../../../../../../Mixins/MeshStateMixin.js"></script>
    <script src="../../../../../../Mixins/AnimationMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    window.THREE = THREE;

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('chiller-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
    camera.position.set(2, 2, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // ── Grid ──────────────────────────────────────────────────
    scene.add(new THREE.GridHelper(10, 20, 0x2a2a4a, 0x2a2a4a));

    // ── Mock Instance ─────────────────────────────────────────
    const instance = { appendElement: null, animations: [], name: 'Chiller-01' };

    // ── Demo Log ─────────────────────────────────────────────
    const logEl = document.getElementById('demo-log');
    let logLines = ['—'];
    const log = (msg) => {
        logLines.unshift(msg);
        logLines = logLines.slice(0, 8);
        logEl.innerHTML = '<strong>이벤트 로그</strong>\n' + logLines.join('\n');
    };

    // ── 체크박스 기반 runningClips 전송 ───────────────────────
    function collectCheckedClips() {
        return Array.from(document.querySelectorAll('#clip-checkboxes input[type=checkbox]'))
            .filter(cb => cb.checked)
            .map(cb => cb.value);
    }

    function dispatchRunningClips() {
        const runningClips = collectCheckedClips();
        const payload = { response: [{ runningClips }] };
        instance.updateEquipmentAnimation(payload);
        log(`payload ▶ ${JSON.stringify(payload.response[0])}`);
    }

    function renderClipCheckboxes(clipNames) {
        const wrap = document.getElementById('clip-checkboxes');
        wrap.innerHTML = '';

        const group = document.createElement('div');
        group.className = 'demo-controls-group';

        const label = document.createElement('span');
        label.className = 'demo-label';
        label.textContent = 'runningClips';
        group.appendChild(label);

        if (!clipNames.length) {
            const empty = document.createElement('span');
            empty.style.cssText = 'color:#64748b;font-size:12px;';
            empty.textContent = '(GLTF에 클립 없음)';
            group.appendChild(empty);
            wrap.appendChild(group);
            return;
        }

        clipNames.forEach((name) => {
            const labelEl = document.createElement('label');
            labelEl.className = 'clip-checkbox';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = name;
            cb.addEventListener('change', dispatchRunningClips);

            const text = document.createElement('span');
            text.textContent = name;

            labelEl.appendChild(cb);
            labelEl.appendChild(text);
            group.appendChild(labelEl);
        });

        wrap.appendChild(group);
    }

    // ── Load Model ────────────────────────────────────────────
    const loader = new GLTFLoader();

    loader.load('../../../../../../models/Chiller/01_default/Chiller.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;
        instance.animations = gltf.animations || [];

        // MeshStateMixin 적용
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // AnimationMixin 적용
        applyAnimationMixin(instance);

        // register.js와 동일한 커스텀 메서드 (diff 방식)
        instance.updateEquipmentAnimation = function({ response: data }) {
            const row = Array.isArray(data) ? data[0] : data;
            if (!row) return;

            const desired = new Set(row.runningClips || []);
            const clips = instance.animation.getClipNames();

            clips.forEach(name => {
                const shouldRun = desired.has(name);
                const isRunning = instance.animation.isPlaying(name);
                if (shouldRun && !isRunning) {
                    instance.animation.play(name, { loop: THREE.LoopRepeat });
                } else if (!shouldRun && isRunning) {
                    instance.animation.stop(name);
                }
            });
        };

        // 카메라 타겟 조정
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        controls.target.copy(center);
        camera.position.set(center.x + 4, center.y + 2, center.z + 5);
        controls.update();

        const clipNames = instance.animation.getClipNames();
        renderClipCheckboxes(clipNames);
        log(`모델 로드 완료. 클립 ${clipNames.length}개: ${clipNames.join(', ') || '(없음)'}`);
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Demo: Status (renderData) ─────────────────────────────
    document.querySelectorAll('.demo-btn[data-status]').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;
            const status = btn.dataset.status;
            instance.meshState.renderData({
                response: [{ meshName: 'chiller', status }]
            });
            log(`status='${status}' → meshState.renderData`);
        });
    });

    // ── Demo: Shortcut (전체 체크/해제 후 전송) ───────────────
    document.querySelectorAll('.demo-btn[data-action]').forEach((btn) => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            const checkboxes = document.querySelectorAll('#clip-checkboxes input[type=checkbox]');
            checkboxes.forEach(cb => cb.checked = (action === 'all-on'));
            dispatchRunningClips();
        });
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
