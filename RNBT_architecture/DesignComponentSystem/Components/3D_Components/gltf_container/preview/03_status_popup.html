<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>gltf_container — 03_status_popup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #gltf-container-pageThreeLayer {
            width: 800px;
            height: 600px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
            position: relative;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .demo-label {
            font-size: 11px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .demo-separator {
            width: 1px;
            height: 24px;
            background: #2a2a4a;
            margin: 0 8px;
        }
        .demo-interval {
            font-size: 13px;
            color: #e2e8f0;
            background: #2a2a4a;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: 'Segoe UI', monospace;
        }

        .demo-clicked-mesh {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            background: #2a2a4a;
            padding: 8px 16px;
            border-radius: 4px;
            min-width: 120px;
            text-align: center;
        }

        .demo-info {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            padding: 4px;
            font-family: 'Segoe UI', sans-serif;
        }

        .demo-log {
            width: 800px;
            margin: 0 auto;
            max-height: 120px;
            overflow-y: auto;
            background: #0f0f1e;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 8px 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #94a3b8;
        }
        .demo-log-entry { margin: 2px 0; }
        .demo-log-entry .mesh { color: #e2e8f0; }
        .demo-log-entry .status-normal  { color: #34d399; }
        .demo-log-entry .status-warning { color: #fbbf24; }
        .demo-log-entry .status-error   { color: #f87171; }
        .demo-log-entry .status-offline { color: #6b7280; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <span class="demo-label">Status Interval</span>
        <span class="demo-interval" id="intervalDisplay">3s</span>
        <div class="demo-separator"></div>
        <span class="demo-label">Clicked</span>
        <span class="demo-clicked-mesh" id="clickedMesh">-</span>
    </div>
    <div class="demo-info">3D 모델을 클릭하면 해당 Mesh의 데이터를 조회하여 팝업을 표시합니다 · 상태 데이터는 3초마다 자동 갱신됩니다</div>

    <div id="gltf-container-pageThreeLayer"></div>

    <div class="demo-log" id="log"></div>

    <!-- Mixin 로드 -->
    <script src="../../../../Mixins/MeshStateMixin.js"></script>
    <script src="../../../../Mixins/3DShadowPopupMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    /**
     * intersects에서 클릭된 Mesh 이름 추출
     */
    function resolveMeshName(intersects) {
        if (!intersects || !intersects.length) return null;

        let current = intersects[0].object;
        while (current) {
            if (current.name) return current.name;
            current = current.parent;
        }
        return null;
    }

    /**
     * Mock fetchData — 실제 Wkit.fetchData 시뮬레이션
     * Promise.resolve로 클릭된 Mesh의 상세 데이터를 반환한다.
     */
    function mockFetchData(meshName) {
        const statuses = ['normal', 'warning', 'error', 'offline'];
        const types = { HV: 'High Voltage Panel', LV: 'Low Voltage Panel', TR: 'Transformer', SHV: 'Semi-HV Panel', SC: 'SC Panel', G: 'Generator', GP: 'Generator Panel', TIE: 'Tie', MTR: 'Meter', BLK: 'Blank', ATS: 'ATS', ALTS: 'ALTS' };

        const prefix = meshName.split('-')[0];
        const type = types[prefix] || 'Equipment';
        const status = statuses[Math.floor(Math.random() * statuses.length)];

        return Promise.resolve({
            meshName,
            type,
            status,
            location: 'B4F',
            lastUpdate: new Date().toLocaleTimeString()
        });
    }

    // ── Popup HTML/CSS ────────────────────────────────────────
    const popupHTML = `
        <div class="popup-overlay">
            <div class="popup-panel">
                <div class="popup-header">
                    <h3 class="popup-name">-</h3>
                    <div class="popup-header-right">
                        <span class="popup-status" data-status="normal">normal</span>
                        <button class="popup-close" type="button">&times;</button>
                    </div>
                </div>
                <div class="popup-body">
                    <table class="popup-info-table">
                        <tr><th>Mesh</th><td class="popup-mesh-name">-</td></tr>
                        <tr><th>Type</th><td class="popup-type">-</td></tr>
                        <tr><th>Location</th><td class="popup-location">-</td></tr>
                        <tr><th>Status</th><td class="popup-status-cell">-</td></tr>
                        <tr><th>Updated</th><td class="popup-updated">-</td></tr>
                    </table>
                </div>
            </div>
        </div>
    `;

    const popupCSS = `
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .popup-panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            width: 320px;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #334155;
        }
        .popup-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }
        .popup-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .popup-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            background: #334155;
            color: #94a3b8;
        }
        .popup-status[data-status="normal"]  { background: #0d3b2e; color: #34d399; }
        .popup-status[data-status="warning"] { background: #3b2e0d; color: #fbbf24; }
        .popup-status[data-status="error"]   { background: #3b0d0d; color: #f87171; }
        .popup-status[data-status="offline"] { background: #1e293b; color: #6b7280; }
        .popup-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .popup-close:hover { background: rgba(255,255,255,0.1); }
        .popup-body { padding: 16px; }
        .popup-info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .popup-info-table th {
            text-align: left;
            color: #94a3b8;
            padding: 6px 0;
            width: 90px;
            font-weight: 500;
        }
        .popup-info-table td {
            padding: 6px 0;
            color: #e2e8f0;
        }
    `;

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('gltf-container-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(30, 20, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(20, 30, 15);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-10, 10, -8);
    scene.add(fillLight);

    // ── Raycasting ────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // ── Mock Instance ─────────────────────────────────────────
    const instance = {
        appendElement: null,
        page: { appendElement: container }
    };

    // ── Mock Data ─────────────────────────────────────────────
    const statuses = ['normal', 'warning', 'error', 'offline'];
    let allMeshNames = [];

    function generateMockResponse() {
        const count = 3 + Math.floor(Math.random() * 6);
        const shuffled = [...allMeshNames].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, count);

        return selected.map(meshName => ({
            meshName,
            status: statuses[Math.floor(Math.random() * statuses.length)]
        }));
    }

    // ── Log ───────────────────────────────────────────────────
    const logEl = document.getElementById('log');

    function logResponse(response) {
        const entries = response.map(({ meshName, status }) =>
            `<span class="demo-log-entry"><span class="mesh">${meshName}</span> → <span class="status-${status}">${status}</span></span>`
        ).join('  ');

        const line = document.createElement('div');
        line.innerHTML = `<span style="color:#4a5568">[${new Date().toLocaleTimeString()}]</span> ${entries}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // ── Load Model ────────────────────────────────────────────
    const loader = new GLTFLoader();

    loader.load('../../../../models/gltf_container/gltf_container.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // 모든 Mesh 이름 수집
        model.traverse(child => {
            if (child.isMesh && child.name) {
                allMeshNames.push(child.name);
            }
        });

        // MeshStateMixin 적용
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // 3DShadowPopupMixin 적용
        apply3DShadowPopupMixin(instance, {
            getHTML:   () => popupHTML,
            getStyles: () => popupCSS,
            onCreated: () => {
                instance.shadowPopup.bindPopupEvents({
                    click: {
                        '.popup-close': () => instance.shadowPopup.hide(),
                        '.popup-overlay': (e) => {
                            if (e.target.classList.contains('popup-overlay')) {
                                instance.shadowPopup.hide();
                            }
                        }
                    }
                });
            }
        });

        // 카메라 타겟을 모델 중심으로 조정
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        controls.target.copy(center);
        camera.position.set(center.x + maxDim * 0.8, center.y + maxDim * 0.5, center.z + maxDim * 0.8);
        controls.update();

        // ── Mesh 원본 색상 저장 ──────────────────────────────────
        const originalColors = new Map();
        model.traverse(child => {
            if (child.isMesh && child.name && child.material) {
                originalColors.set(child.name, child.material.color.getHex());
            }
        });

        // ── 주기적 Mock 데이터 발행 ──────────────────────────────
        let prevMeshNames = [];

        function fetchAndApply() {
            prevMeshNames.forEach(name => {
                const mesh = model.getObjectByName(name);
                if (mesh && mesh.material && originalColors.has(name)) {
                    mesh.material.color.setHex(originalColors.get(name));
                }
            });

            const response = generateMockResponse();
            instance.meshState.renderData({ response });
            prevMeshNames = response.map(item => item.meshName);
            logResponse(response);
        }

        fetchAndApply();
        setInterval(fetchAndApply, 3000);
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── showDetail — Mesh 클릭 → 데이터 조회 → 팝업 ──────────
    function showDetail(meshName, data) {
        if (!instance.shadowPopup) return;

        instance.shadowPopup.show();

        const nameEl = instance.shadowPopup.query('.popup-name');
        const statusEl = instance.shadowPopup.query('.popup-status');
        const meshCell = instance.shadowPopup.query('.popup-mesh-name');
        const typeCell = instance.shadowPopup.query('.popup-type');
        const locationCell = instance.shadowPopup.query('.popup-location');
        const statusCell = instance.shadowPopup.query('.popup-status-cell');
        const updatedCell = instance.shadowPopup.query('.popup-updated');

        if (nameEl) nameEl.textContent = meshName;
        if (statusEl) {
            statusEl.textContent = data.status;
            statusEl.dataset.status = data.status;
        }
        if (meshCell) meshCell.textContent = data.meshName;
        if (typeCell) typeCell.textContent = data.type;
        if (locationCell) locationCell.textContent = data.location;
        if (statusCell) statusCell.textContent = data.status;
        if (updatedCell) updatedCell.textContent = data.lastUpdate;
    }

    // ── 클릭 → fetchData → 팝업 ──────────────────────────────
    const clickedMeshEl = document.getElementById('clickedMesh');

    renderer.domElement.addEventListener('click', (event) => {
        if (!instance.appendElement) return;

        mouse.x = (event.offsetX / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.offsetY / renderer.domElement.clientHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(scene.children, true);
        const meshName = resolveMeshName(intersects);
        if (!meshName) return;

        clickedMeshEl.textContent = meshName;

        // 실제: fetchData(page, 'meshDetail', { meshName })
        mockFetchData(meshName)
            .then(data => showDetail(meshName, data));
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
