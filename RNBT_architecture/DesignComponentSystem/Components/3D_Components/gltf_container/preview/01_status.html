<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>gltf_container — 01_status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #gltf-container-pageThreeLayer {
            width: 800px;
            height: 600px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .demo-label {
            font-size: 11px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .demo-separator {
            width: 1px;
            height: 24px;
            background: #2a2a4a;
            margin: 0 8px;
        }
        .demo-interval {
            font-size: 13px;
            color: #e2e8f0;
            background: #2a2a4a;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: 'Segoe UI', monospace;
        }

        .demo-log {
            width: 800px;
            margin: 0 auto;
            max-height: 120px;
            overflow-y: auto;
            background: #0f0f1e;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 8px 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #94a3b8;
        }
        .demo-log-entry { margin: 2px 0; }
        .demo-log-entry .mesh { color: #e2e8f0; }
        .demo-log-entry .status-normal  { color: #34d399; }
        .demo-log-entry .status-warning { color: #fbbf24; }
        .demo-log-entry .status-error   { color: #f87171; }
        .demo-log-entry .status-offline { color: #6b7280; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <span class="demo-label">Mock Data Interval</span>
        <span class="demo-interval" id="intervalDisplay">3s</span>
        <div class="demo-separator"></div>
        <span class="demo-label">Last Response</span>
        <span class="demo-interval" id="countDisplay">-</span>
    </div>

    <div id="gltf-container-pageThreeLayer"></div>

    <div class="demo-log" id="log"></div>

    <!-- Mixin 로드 -->
    <script src="../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('gltf-container-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(30, 20, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(20, 30, 15);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-10, 10, -8);
    scene.add(fillLight);

    // ── Mock Instance ─────────────────────────────────────────
    const instance = { appendElement: null };

    // ── Mock Data ─────────────────────────────────────────────
    const statuses = ['normal', 'warning', 'error', 'offline'];
    let allMeshNames = [];

    /**
     * 랜덤 상태 데이터 생성
     * 실제 API 응답과 동일한 형태: [{ meshName, status }, ...]
     * 매 호출마다 랜덤 3~8개 Mesh에 랜덤 상태를 부여한다.
     */
    function generateMockResponse() {
        const count = 3 + Math.floor(Math.random() * 6);
        const shuffled = [...allMeshNames].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, count);

        return selected.map(meshName => ({
            meshName,
            status: statuses[Math.floor(Math.random() * statuses.length)]
        }));
    }

    // ── Log ───────────────────────────────────────────────────
    const logEl = document.getElementById('log');
    const countDisplay = document.getElementById('countDisplay');

    function logResponse(response) {
        countDisplay.textContent = response.length + ' meshes';

        const entries = response.map(({ meshName, status }) =>
            `<span class="demo-log-entry"><span class="mesh">${meshName}</span> → <span class="status-${status}">${status}</span></span>`
        ).join('  ');

        const line = document.createElement('div');
        line.innerHTML = `<span style="color:#4a5568">[${new Date().toLocaleTimeString()}]</span> ${entries}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // ── Load Model ────────────────────────────────────────────
    const loader = new GLTFLoader();

    loader.load('../../../../models/gltf_container/01_default/gltf_container.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // 모든 Mesh 이름 수집
        model.traverse(child => {
            if (child.isMesh && child.name) {
                allMeshNames.push(child.name);
            }
        });

        // MeshStateMixin 적용
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // 카메라 타겟을 모델 중심으로 조정
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        controls.target.copy(center);
        camera.position.set(center.x + maxDim * 0.8, center.y + maxDim * 0.5, center.z + maxDim * 0.8);
        controls.update();

        // ── Mesh 원본 색상 저장 ──────────────────────────────────
        const originalColors = new Map();
        model.traverse(child => {
            if (child.isMesh && child.name && child.material) {
                originalColors.set(child.name, child.material.color.getHex());
            }
        });

        // ── 주기적 Mock 데이터 발행 (실제 loaded.js의 refreshInterval 시뮬레이션) ──
        let prevMeshNames = [];

        function fetchAndApply() {
            // 이전 Mesh들 원본 색상 복원
            prevMeshNames.forEach(name => {
                const mesh = model.getObjectByName(name);
                if (mesh && mesh.material && originalColors.has(name)) {
                    mesh.material.color.setHex(originalColors.get(name));
                }
            });

            const response = generateMockResponse();
            instance.meshState.renderData({ response });
            prevMeshNames = response.map(item => item.meshName);
            logResponse(response);
        }

        fetchAndApply();
        setInterval(fetchAndApply, 3000);
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
