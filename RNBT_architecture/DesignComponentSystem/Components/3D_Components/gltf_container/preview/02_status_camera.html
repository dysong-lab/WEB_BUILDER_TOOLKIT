<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>gltf_container — 02_status_camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #gltf-container-pageThreeLayer {
            width: 800px;
            height: 600px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            flex-wrap: wrap;
        }
        .demo-controls-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .demo-label {
            font-size: 11px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .demo-separator {
            width: 1px;
            height: 24px;
            background: #2a2a4a;
            margin: 0 8px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-action="reset-camera"] { background: #64748b; }

        .demo-clicked-mesh {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            background: #2a2a4a;
            padding: 8px 16px;
            border-radius: 4px;
            min-width: 120px;
            text-align: center;
        }

        .demo-info {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            padding: 4px;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>
    <div class="demo-controls">
        <div class="demo-controls-group">
            <span class="demo-label">Clicked</span>
            <span class="demo-clicked-mesh" id="clickedMesh">-</span>
        </div>
        <div class="demo-separator"></div>
        <div class="demo-controls-group">
            <span class="demo-label">Status</span>
            <button class="demo-btn" data-status="normal">Normal</button>
            <button class="demo-btn" data-status="warning">Warning</button>
            <button class="demo-btn" data-status="error">Error</button>
            <button class="demo-btn" data-status="offline">Offline</button>
        </div>
        <div class="demo-separator"></div>
        <div class="demo-controls-group">
            <span class="demo-label">Camera</span>
            <button class="demo-btn" data-action="reset-camera">Reset</button>
        </div>
    </div>
    <div class="demo-info">3D 모델을 클릭하면 해당 Mesh로 카메라가 이동합니다</div>

    <div id="gltf-container-pageThreeLayer"></div>

    <!-- Mixin 로드 -->
    <script src="../../../../Mixins/MeshStateMixin.js"></script>
    <script src="../../../../Mixins/CameraFocusMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    window.THREE = THREE;

    /**
     * intersects에서 클릭된 Mesh 이름 추출
     */
    function resolveMeshName(intersects) {
        if (!intersects || !intersects.length) return null;

        let current = intersects[0].object;
        while (current) {
            if (current.name) return current.name;
            current = current.parent;
        }
        return null;
    }

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('gltf-container-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(30, 20, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(20, 30, 15);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-10, 10, -8);
    scene.add(fillLight);

    // ── Raycasting ────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // ── Mock Instance ─────────────────────────────────────────
    const instance = { appendElement: null };

    // ── Load Model ────────────────────────────────────────────
    const loader = new GLTFLoader();

    loader.load('../../../../models/gltf_container/gltf_container.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin 적용
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // CameraFocusMixin 적용
        applyCameraFocusMixin(instance, {
            camera,
            controls,
            duration: 1000
        });

        // 카메라 타겟을 모델 중심으로 조정
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        controls.target.copy(center);
        camera.position.set(center.x + maxDim * 0.8, center.y + maxDim * 0.5, center.z + maxDim * 0.8);
        controls.update();
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Demo: 클릭 → 카메라 포커스 ────────────────────────────
    const clickedMeshEl = document.getElementById('clickedMesh');
    let selectedMeshName = null;

    renderer.domElement.addEventListener('click', (event) => {
        if (!instance.appendElement) return;

        mouse.x = (event.offsetX / renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.offsetY / renderer.domElement.clientHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(scene.children, true);
        const meshName = resolveMeshName(intersects);
        if (!meshName) return;

        selectedMeshName = meshName;
        clickedMeshEl.textContent = meshName;

        if (instance.cameraFocus) {
            instance.cameraFocus.focusOn({
                container: instance.appendElement,
                meshName,
                offset: { x: 0, y: 5, z: 10 }
            });
        }
    });

    // ── Demo: Status ──────────────────────────────────────────
    document.querySelectorAll('.demo-btn[data-status]').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState || !selectedMeshName) return;

            instance.meshState.renderData({
                response: [{ meshName: selectedMeshName, status: btn.dataset.status }]
            });
        });
    });

    // ── Demo: Camera Reset ────────────────────────────────────
    document.querySelector('.demo-btn[data-action="reset-camera"]').addEventListener('click', () => {
        if (instance.cameraFocus) instance.cameraFocus.reset();
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
