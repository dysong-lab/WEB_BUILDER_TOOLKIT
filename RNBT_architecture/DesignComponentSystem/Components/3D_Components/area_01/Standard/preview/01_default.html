<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>area_01 — Standard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; color: #e5e7eb; font-family: Arial, sans-serif; }
    .demo-controls { display: flex; justify-content: center; gap: 8px; padding: 16px; flex-wrap: wrap; }
    .demo-btn { padding: 8px 14px; border: 0; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .demo-btn[data-status="normal"] { background: #34d399; color: #052e16; }
    .demo-btn[data-status="warning"] { background: #fbbf24; color: #422006; }
    .demo-btn[data-status="error"] { background: #f87171; color: #450a0a; }
    .demo-btn[data-status="offline"] { background: #94a3b8; color: #0f172a; }
    .demo-btn[data-action] { background: #374151; color: #f9fafb; }
    .demo-view { width: 720px; height: 520px; margin: 0 auto; overflow: hidden; border-radius: 10px; border: 1px solid #374151; }
    .demo-log { width: 720px; margin: 12px auto 24px; padding: 12px 14px; background: #0f172a; border: 1px solid #1f2937; border-radius: 8px; color: #94a3b8; font: 12px/1.5 ui-monospace, monospace; white-space: pre-wrap; }
    .demo-note { width: 720px; margin: 8px auto 0; color: #9ca3af; font-size: 12px; text-align: center; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div class="demo-controls"><button class="demo-btn" data-status="normal">Normal</button><button class="demo-btn" data-status="warning">Warning</button><button class="demo-btn" data-status="error">Error</button><button class="demo-btn" data-status="offline">Offline</button><button class="demo-btn" data-action="reset">Reset</button></div><div id="demo-view" class="demo-view"></div><div class="demo-note">상태 버튼으로 MeshStateMixin 색상 변경을 확인합니다</div><div id="demo-log" class="demo-log">loading...</div>
  <script src="../../../../../../preview_runtime.js"></script>
  <script src="../../../../../../Mixins/MeshStateMixin.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
window.THREE = THREE;
const MESH_NAMES = ["HV-U8-B","BLK-HV-01","cnsFloorB4f","G-1","HV-P1-A"];
const container = document.getElementById('demo-view');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111827);
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(4, 3, 6);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const mainLight = new THREE.DirectionalLight(0xffffff, 1.1);
mainLight.position.set(4, 8, 5);
scene.add(mainLight);
scene.add(new THREE.GridHelper(12, 24, 0x334155, 0x1f2937));
const logEl = document.getElementById('demo-log');
const log = (msg) => { logEl.textContent = msg; };
log("area_01 standard preview");
const instance = { appendElement: null, animations: [] };
let clickable = [];
function makeFallbackModel() {
  const group = new THREE.Group();
  MESH_NAMES.forEach((name, index) => {
    const isPipe = name.includes('Flow');
    const geometry = isPipe ? new THREE.CylinderGeometry(0.12, 0.12, 2, 24, 1, true) : new THREE.BoxGeometry(0.8, 0.6, 0.8);
    let material;
    if (isPipe) {
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = name.includes('02') ? '#ef4444' : '#3b82f6';
      ctx.fillRect(0, 0, 64, 64);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let y = 0; y < 64; y += 8) ctx.fillRect(0, y, 64, 4);
      material = new THREE.MeshStandardMaterial({ color: 0xffffff, map: new THREE.CanvasTexture(canvas) });
    } else {
      material = new THREE.MeshStandardMaterial({ color: 0xffffff });
    }
    const mesh = new THREE.Mesh(geometry, material);
    mesh.name = name;
    mesh.position.set((index % 4) * 1.4 - 2.1, isPipe ? 0.9 : 0.4, Math.floor(index / 4) * 1.4 - 1.4);
    if (isPipe) mesh.rotation.z = Math.PI / 2;
    group.add(mesh);
  });

  return group;
}
function finalizeModel(model, animations = []) {
  instance.appendElement = model;
  instance.animations = animations;
  scene.add(model);
  clickable = [];
  model.traverse((obj) => { if (obj.isMesh) clickable.push(obj); });
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  controls.target.copy(center);
  camera.position.set(center.x + maxDim * 2.2, center.y + maxDim * 1.4, center.z + maxDim * 2.2);
  camera.updateProjectionMatrix();
  controls.update();
}
new GLTFLoader().load("../../../../../../models/meshesArea/area_01/01_default/area_01.gltf", (gltf) => {
  finalizeModel(gltf.scene, gltf.animations || []);
  log('model loaded\nmeshes=' + clickable.length + '\nclips=' + instance.animations.length);
}, undefined, (error) => {
  const model = makeFallbackModel();
  finalizeModel(model, instance.animations || []);
  log('model load failed, fallback used\n' + (error?.message || error));
});
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
function pick(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(clickable, true);
}
window.__preview = { THREE, scene, camera, renderer, controls, instance, log, MESH_NAMES, clickable, pick };
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
(function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();
function ensureMeshState() { if (!__preview.instance.meshState) applyMeshStateMixin(__preview.instance, {
    colorMap: {
        normal:  0x34d399,
        warning: 0xfbbf24,
        error:   0xf87171,
        offline: 0x6b7280
    }
}); }
function applyState(status) { ensureMeshState(); __preview.instance.meshState.renderData({ response: __preview.MESH_NAMES.map((meshName) => ({ meshName, status })) }); __preview.log('status=' + status); }
document.querySelectorAll('[data-status]').forEach((btn) => btn.addEventListener('click', () => applyState(btn.dataset.status)));
document.querySelector('[data-action="reset"]').addEventListener('click', () => { __preview.clickable.forEach((mesh) => { if (mesh.material?.color) mesh.material.color.setHex(0xffffff); }); __preview.log('reset colors'); });
  </script>
</body>
</html>
