<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>RoomCage — 01_status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #roomcage-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" data-status="normal">Normal</button>
        <button class="demo-btn" data-status="warning">Warning</button>
        <button class="demo-btn" data-status="error">Error</button>
        <button class="demo-btn" data-status="offline">Offline</button>
        <button class="demo-btn" data-status="reset">Reset</button>
    </div>

    <div id="roomcage-pageThreeLayer"></div>

    <!-- Mixin 로드 -->
    <script src="../../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('roomcage-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // RoomCage는 루트 Group에 scale [1000, 1000, 1000]이 적용된 케이스.
    // 원본 bound(X±0.0125 · Y±0.0125 · Z±0.00025)가 업스케일되어
    // 최종 ~25(X) × 25(Y) × 0.5(Z) 단위의 정사각형 얇은 판이 된다.
    // far=200으로 충분하며, 카메라 초기 위치는 바운드 기반 자동 조정 경로에서 재설정.
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 200);
    camera.position.set(40, 30, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // ── Grid ──────────────────────────────────────────────────
    // 모델 최대 크기 ~25(X·Y축)이므로 그리드 60, 분할 12 (~5 간격)로 맞춤.
    scene.add(new THREE.GridHelper(60, 12, 0x2a2a4a, 0x2a2a4a));

    // ── Mock Instance ─────────────────────────────────────────
    const instance = { appendElement: null };

    // ── Load Model ────────────────────────────────────────────
    // RoomCage.gltf:
    //   scene → root (Group, scale [1000, 1000, 1000])
    //             └── cage01 (Mesh Node, mesh 0,
    //                          material "cage01"
    //                           = baseColorTexture textures/cage01_A.png (PNG with alpha),
    //                             metallicFactor 0, alphaMode BLEND)
    //
    // **단일 Mesh 직접 참조** — meshName='cage01'은 리프 Mesh Node 이름.
    // 장비 폴더명(RoomCage)과 meshName(cage01)이 다른 비대칭 명명(RTU 패턴과 동류).
    // getObjectByName('cage01')은 단일 Mesh를 반환하고, MeshStateMixin은
    // obj.material이 단일 객체이므로 Mesh 브랜치로 진입해 material을 clone하고
    // color만 setHex로 치환. BATT·Pump·Chiller·Partition_small·RTU·RoadBlock의 동일 패턴.
    //
    // material이 baseColorTexture(알파 PNG) + alphaMode: BLEND이므로,
    // color setHex가 텍스처 색에 곱해지고, 알파 채널은 그대로 유지되어
    // 투명 영역은 투명하게 남고 불투명 영역(케이지 패턴)만 상태색으로 착색된다.
    // doubleSided 미선언이므로 three.js 기본 FrontSide 렌더가 유지된다.
    const meshName = 'cage01';
    const loader = new GLTFLoader();

    loader.load('../../../../../models/RoomCage/01_default/RoomCage.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin 적용 (register.js와 동일)
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // 카메라 타겟 조정 (바운드 기준 자동 거리 설정)
        // RoomCage는 X·Y축이 동등한 정사각형이므로 maxDim 기준 거리 * 1.5로 전체가 보이게.
        // Z축이 매우 얇아 거의 평면이므로 측면 시점에서는 보이지 않을 수 있어
        // 카메라를 위쪽에서 비스듬히 내려다보는 각도로 배치.
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 1.5;

        controls.target.copy(center);
        camera.position.set(center.x + distance, center.y + distance * 0.8, center.z + distance);
        controls.update();
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Demo: renderData 호출 ─────────────────────────────────
    document.querySelectorAll('.demo-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                // 단일 Mesh 'cage01'의 material을 흰색으로 복귀.
                // MeshStateMixin이 단일 material을 clone했으므로, 여기서도
                // material.color만 setHex(0xffffff)로 복귀.
                // alphaMode: BLEND와 텍스처 알파는 clone 시 보존되므로
                // 투명 영역은 그대로 유지된다.
                const mesh = instance.appendElement.getObjectByName(meshName);
                if (!mesh) return;
                if (Array.isArray(mesh.material)) {
                    mesh.material.forEach(m => m.color && m.color.setHex(0xffffff));
                } else if (mesh.material && mesh.material.color) {
                    mesh.material.color.setHex(0xffffff);
                }
                return;
            }

            // 단일 meshName 'cage01'(리프 Mesh)으로 단일 Mesh 색상 치환.
            // MeshStateMixin이 Mesh 타겟에 대해 Array.isArray 미발동 경로로 진입,
            // material을 clone 후 color만 setHex.
            instance.meshState.renderData({
                response: [{ meshName, status }]
            });
        });
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
