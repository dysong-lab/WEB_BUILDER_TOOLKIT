<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHV_01 вҖ” 01_status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #shv01-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" data-status="normal">Normal</button>
        <button class="demo-btn" data-status="warning">Warning</button>
        <button class="demo-btn" data-status="error">Error</button>
        <button class="demo-btn" data-status="offline">Offline</button>
        <button class="demo-btn" data-status="reset">Reset</button>
    </div>

    <div id="shv01-pageThreeLayer"></div>

    <!-- Mixin лЎңл“ң -->
    <script src="../../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // в”Җв”Җ Three.js Scene Setup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const container = document.getElementById('shv01-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // SHV_01мқҖ лЈЁнҠё scale м—…мҠӨмјҖмқјмқҙ м—ҶлҠ”(1:1 мҠӨмјҖмқј) мјҖмқҙмҠӨ.
    // мӣҗліё лҜён„° мң лӢӣ к·ёлҢҖлЎң мӮ¬мҡ© вҖ” PumpВ·Partitionмқҳ [1000,1000,1000] м—…мҠӨмјҖмқјкіј лҢҖл№„.
    // bound ~1.2(X) Г— 2.65(Y) Г— 3.0(Z) вҶ’ far=50мңјлЎң м¶©л¶„, maxDim=3.0 кё°мӨҖ кұ°лҰ¬ м Ғм Ҳ.
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 50);
    camera.position.set(4, 3, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // в”Җв”Җ Lighting в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // в”Җв”Җ Grid в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // лӘЁлҚё нҒ¬кё° ~3.0(Z)мқҙлҜҖлЎң к·ёлҰ¬л“ң 10, л¶„н•  10 (~1 к°„кІ©)мңјлЎң л§һм¶Ө.
    scene.add(new THREE.GridHelper(10, 10, 0x2a2a4a, 0x2a2a4a));

    // в”Җв”Җ Mock Instance в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const instance = { appendElement: null };

    // в”Җв”Җ Load Model в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // SHV_01.gltf:
    //   scene вҶ’ SHV-1 (Mesh Node, mesh 0,
    //                   rotation [0.0, -1.0, 0.0, 1.19e-08] вү’ Yм¶• ПҖ нҡҢм „,
    //                   material "Material #342540116"
    //                    = baseColorTexture maps/SHV07.jpg,
    //                      metallicFactor 0, roughnessFactor 0, doubleSided true)
    //
    // **лӢЁмқј Mesh м§Ғм ‘ м°ёмЎ°** вҖ” meshName='SHV-1'мқҖ лҰ¬н”„ Mesh Node мқҙлҰ„.
    // мһҘл№„ нҸҙлҚ”лӘ…(SHV_01, м–ёлҚ”мҠӨмҪ”м–ҙ) вү  meshName(SHV-1, н•ҳмқҙн”Ҳ)мқҳ **л№„лҢҖм№ӯ лӘ…лӘ…** мЈјмқҳ.
    // 2025л…„ л№Ңл“ң babylon exporterмқҳ кіөнҶө л№„лҢҖм№ӯ нҢЁн„ҙ
    // (RTU: нҸҙлҚ” `RTU` vs meshName `RTU2`, SC_02: нҸҙлҚ” `SC_02` vs meshName `SC-U1` лҸҷлҘҳ).
    //
    // getObjectByName('SHV-1')мқҖ лӢЁмқј MeshлҘј л°ҳнҷҳн•ҳкі , MeshStateMixinмқҖ
    // obj.materialмқҙ лӢЁмқј к°қмІҙмқҙлҜҖлЎң Mesh лёҢлһңм№ҳлЎң м§„мһ…н•ҙ materialмқ„ cloneн•ҳкі 
    // colorл§Ң setHexлЎң м№ҳнҷҳ. BATTВ·PumpВ·ChillerВ·Partition_smallВ·RTUВ·HV_1P_01мқҳ лҸҷмқј нҢЁн„ҙ.
    //
    // materialмқҙ baseColorTexture мЈјлҸ„мқҙлҜҖлЎң color setHexк°Җ н…ҚмҠӨмІҳм—җ кіұн•ҙм§„лӢӨ(three.js кё°ліё).
    // doubleSided:trueк°Җ clone нӣ„м—җлҸ„ мң м§ҖлҗҳлҜҖлЎң м–‘л©ҙ л ҢлҚ”лҸ„ ліҙмЎҙлҗңлӢӨ.
    const meshName = 'SHV-1';
    const loader = new GLTFLoader();

    loader.load('../../../../../models/SHV_01/01_default/SHV_01.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin м Ғмҡ© (register.jsмҷҖ лҸҷмқј)
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // м№ҙл©”лқј нғҖкІҹ мЎ°м • (л°”мҡҙл“ң кё°мӨҖ мһҗлҸҷ кұ°лҰ¬ м„Өм •)
        // SHV_01мқҖ Zм¶•мқҙ к°ҖмһҘ кёҙ к№Ҡмқҙ л°©н–Ҙ м§ҒмңЎл©ҙмІҙмқҙлҜҖлЎң maxDim=3.0 кё°мӨҖ кұ°лҰ¬ * 1.8лЎң м¶©л¶„.
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 1.8;

        controls.target.copy(center);
        camera.position.set(center.x + distance, center.y + distance * 0.5, center.z + distance);
        controls.update();
    });

    // в”Җв”Җ Render Loop в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // в”Җв”Җ Demo: renderData нҳём¶ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    document.querySelectorAll('.demo-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                // лӢЁмқј Mesh 'SHV-1'мқҳ materialмқ„ нқ°мғүмңјлЎң ліөк·Җ.
                // MeshStateMixinмқҙ лӢЁмқј materialмқ„ cloneн–ҲмңјлҜҖлЎң, м—¬кё°м„ңлҸ„
                // material.colorл§Ң setHex(0xffffff)лЎң ліөк·Җ.
                const mesh = instance.appendElement.getObjectByName(meshName);
                if (!mesh) return;
                if (Array.isArray(mesh.material)) {
                    mesh.material.forEach(m => m.color && m.color.setHex(0xffffff));
                } else if (mesh.material && mesh.material.color) {
                    mesh.material.color.setHex(0xffffff);
                }
                return;
            }

            // лӢЁмқј meshName 'SHV-1'(лҰ¬н”„ Mesh, н•ҳмқҙн”Ҳ н‘ңкё°)мңјлЎң лӢЁмқј Mesh мғүмғҒ м№ҳнҷҳ.
            // MeshStateMixinмқҙ Mesh нғҖкІҹм—җ лҢҖн•ҙ Array.isArray лҜёл°ңлҸҷ кІҪлЎңлЎң м§„мһ…,
            // materialмқ„ clone нӣ„ colorл§Ң setHex.
            instance.meshState.renderData({
                response: [{ meshName, status }]
            });
        });
    });

    // в”Җв”Җ Resize в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
