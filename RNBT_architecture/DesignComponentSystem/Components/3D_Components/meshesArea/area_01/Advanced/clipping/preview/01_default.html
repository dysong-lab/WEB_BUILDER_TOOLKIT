<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>area_01 — Advanced/clipping</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; color: #e5e7eb; font-family: Arial, sans-serif; }
    .demo-shell { width: 760px; margin: 0 auto; padding: 16px 0 24px; }
    .demo-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
    .demo-btn,
    .demo-range,
    .demo-select { border: 0; border-radius: 6px; }
    .demo-btn { padding: 8px 14px; cursor: pointer; font-weight: 600; }
    .demo-btn[data-status="normal"] { background: #34d399; color: #052e16; }
    .demo-btn[data-status="warning"] { background: #fbbf24; color: #422006; }
    .demo-btn[data-status="error"] { background: #f87171; color: #450a0a; }
    .demo-btn[data-status="offline"] { background: #94a3b8; color: #0f172a; }
    .demo-btn[data-action] { background: #374151; color: #f9fafb; }
    .demo-select { padding: 8px 10px; background: #1f2937; color: #f9fafb; }
    .demo-range { width: 180px; }
    .demo-view { width: 760px; height: 520px; overflow: hidden; border-radius: 10px; border: 1px solid #374151; }
    .demo-log { margin-top: 12px; padding: 12px 14px; background: #0f172a; border: 1px solid #1f2937; border-radius: 8px; color: #94a3b8; font: 12px/1.5 ui-monospace, monospace; white-space: pre-wrap; }
    .demo-note { margin-top: 8px; color: #9ca3af; font-size: 12px; text-align: center; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div class="demo-shell">
    <div class="demo-controls">
      <button class="demo-btn" data-status="normal">Normal</button>
      <button class="demo-btn" data-status="warning">Warning</button>
      <button class="demo-btn" data-status="error">Error</button>
      <button class="demo-btn" data-status="offline">Offline</button>
      <select class="demo-select" id="axis-select">
        <option value="y">Y Axis</option>
        <option value="x">X Axis</option>
        <option value="z">Z Axis</option>
      </select>
      <input class="demo-range" id="plane-range" type="range" min="-3" max="3" step="0.1" value="0">
      <button class="demo-btn" data-action="toggle">Toggle Clip</button>
      <button class="demo-btn" data-action="animate">Animate</button>
      <button class="demo-btn" data-action="reset">Reset</button>
    </div>
    <div id="demo-view" class="demo-view"></div>
    <div class="demo-note">축과 위치를 바꾸며 단면 절단을 확인합니다. Animate는 현재 축 기준으로 모델을 가로지르며 절단면을 이동시킵니다.</div>
    <div id="demo-log" class="demo-log">loading...</div>
  </div>

  <script src="../../../../../../../preview_runtime.js"></script>
  <script src="../../../../../../../Mixins/MeshStateMixin.js"></script>
  <script src="../../../../../../../Mixins/ClippingPlaneMixin.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

window.THREE = THREE;

const MESH_NAMES = ['HV-U8-B', 'BLK-HV-01', 'cnsFloorB4f', 'G-1', 'HV-P1-A'];
const container = document.getElementById('demo-view');
const logEl = document.getElementById('demo-log');
const axisSelect = document.getElementById('axis-select');
const planeRange = document.getElementById('plane-range');
const log = (message) => { logEl.textContent = message; };

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111827);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(4, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const mainLight = new THREE.DirectionalLight(0xffffff, 1.1);
mainLight.position.set(4, 8, 5);
scene.add(mainLight);
scene.add(new THREE.GridHelper(12, 24, 0x334155, 0x1f2937));

const instance = { appendElement: null };
let clickable = [];
let statusTick = 0;

const MODEL_CANDIDATES = [
  '../../../../../../../models/meshesArea/area_01/01_default/area_01.gltf',
  '../../../../../../models/meshesArea/area_01/01_default/area_01.gltf'
];

function makeFallbackModel() {
  const group = new THREE.Group();
  MESH_NAMES.forEach((name, index) => {
    const geometry = new THREE.BoxGeometry(0.8, 0.6, 0.8);
    const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.name = name;
    mesh.position.set((index % 4) * 1.4 - 2.1, 0.4, Math.floor(index / 4) * 1.4 - 1.4);
    group.add(mesh);
  });
  return group;
}

function finalizeModel(model) {
  instance.appendElement = model;
  scene.add(model);
  clickable = [];
  model.traverse((obj) => {
    if (obj.isMesh) clickable.push(obj);
  });

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;

  controls.target.copy(center);
  camera.position.set(center.x + maxDim * 2.2, center.y + maxDim * 1.4, center.z + maxDim * 2.2);
  camera.updateProjectionMatrix();
  controls.update();
}

function loadModel(candidateIndex = 0) {
  new GLTFLoader().load(MODEL_CANDIDATES[candidateIndex], (gltf) => {
    finalizeModel(gltf.scene);
    log('model loaded\npath=' + MODEL_CANDIDATES[candidateIndex] + '\nmeshes=' + clickable.length);
  }, undefined, (error) => {
    if (candidateIndex < MODEL_CANDIDATES.length - 1) {
      return loadModel(candidateIndex + 1);
    }
    finalizeModel(makeFallbackModel());
    log('model load failed, fallback used\n' + (error?.message || error));
  });
}

loadModel();

window.addEventListener('resize', () => {
  const width = container.clientWidth;
  const height = container.clientHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

const STATUS_SEQUENCE = ['normal', 'warning', 'error', 'offline'];

// ════════════════════════════════════════════════════════════════
//  [PREVIEW 인프라]  preview 런타임 / Three.js 셋업
// ────────────────────────────────────────────────────────────────
//  scene, camera, renderer, OrbitControls, GLTFLoader, fallback model은
//  preview 동작에만 필요하며 운영 페이지에서는 런타임이 담당합니다.
// ════════════════════════════════════════════════════════════════

// ████████████████████████████████████████████████████████████████
//  [COMPONENT register.js 본문]  — 페이지는 작성하지 않습니다
// ────────────────────────────────────────────────────────────────
//  아래 블록은 scripts/register.js의 내용을 그대로 옮긴 것이며,
//  운영 환경에서는 컴포넌트 등록 시점에 자동으로 적용됩니다.
// ████████████████████████████████████████████████████████████████
applyMeshStateMixin(instance, {
  colorMap: {
    normal:  0x34d399,
    warning: 0xfbbf24,
    error:   0xf87171,
    offline: 0x6b7280
  }
});

applyClippingPlaneMixin(instance, {
  renderer
});
// ████████████████████████████████████████████████████████████████
//  [COMPONENT register.js 본문]  — 끝
// ████████████████████████████████████████████████████████████████

// ════════════════════════════════════════════════════════════════
//  [PAGE]  데이터 발행 — 페이지가 작성하는 영역
// ────────────────────────────────────────────────────────────────
//  운영: this.pageDataMappings = [
//          { topic: 'equipmentStatus', datasetInfo: {...}, refreshInterval: 30000 }
//        ];
//  preview: setInterval + 직접 호출로 시뮬레이션
// ════════════════════════════════════════════════════════════════
function nextStatusData() {
  const data = MESH_NAMES.map((meshName, index) => ({
    meshName,
    status: STATUS_SEQUENCE[(statusTick + index) % STATUS_SEQUENCE.length]
  }));
  statusTick = (statusTick + 1) % STATUS_SEQUENCE.length;
  return data;
}

function fetchAndApplyStatus(reason, data = nextStatusData()) {
  if (!instance.appendElement) return;
  instance.meshState.renderData({ response: data }); // ← subscribe go({equipmentStatus})
  log(
    reason + '\n' +
    'axis=' + axisSelect.value + ', plane=' + Number(planeRange.value).toFixed(1) + ', enabled=' + instance.clipping.isEnabled() + '\n' +
    data.map(({ meshName, status }) => meshName + '=' + status).join('\n')
  );
}

fetchAndApplyStatus('initial status');
setInterval(() => fetchAndApplyStatus('auto refresh (3s)'), 3000);

// ════════════════════════════════════════════════════════════════
//  [PREVIEW 전용]  데모 컨트롤 버튼 — 운영 환경에는 없음
// ════════════════════════════════════════════════════════════════
function updatePlane(reason) {
  if (!instance.appendElement) return;
  instance.clipping.setPlane(axisSelect.value, parseFloat(planeRange.value));
  fetchAndApplyStatus(reason, MESH_NAMES.map((meshName) => ({
    meshName,
    status: instance.meshState.getMeshState(meshName) || 'normal'
  })));
}

document.querySelectorAll('[data-status]').forEach((button) => {
  button.addEventListener('click', () => {
    const status = button.dataset.status;
    fetchAndApplyStatus(
      'manual status=' + status,
      MESH_NAMES.map((meshName) => ({ meshName, status }))
    );
  });
});

axisSelect.addEventListener('change', () => updatePlane('axis changed'));
planeRange.addEventListener('input', () => updatePlane('plane moved'));

document.querySelector('[data-action="toggle"]').addEventListener('click', () => {
  if (!instance.appendElement) return;
  if (instance.clipping.isEnabled()) {
    instance.clipping.disable();
  } else {
    instance.clipping.enable();
    instance.clipping.setPlane(axisSelect.value, parseFloat(planeRange.value));
  }
  fetchAndApplyStatus('toggle clipping');
});

document.querySelector('[data-action="animate"]').addEventListener('click', () => {
  if (!instance.appendElement) return;
  instance.clipping.setPlane(axisSelect.value, -2.5);
  instance.clipping.animate(-2.5, 2.5, 1200);
  fetchAndApplyStatus('animate clipping');
});

document.querySelector('[data-action="reset"]').addEventListener('click', () => {
  if (!instance.appendElement) return;
  planeRange.value = '0';
  axisSelect.value = 'y';
  instance.clipping.disable();
  instance.clipping.setPlane('y', 0);
  fetchAndApplyStatus('reset clipping');
});
  </script>
</body>
</html>
