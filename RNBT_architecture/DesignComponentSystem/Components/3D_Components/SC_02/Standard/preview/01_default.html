<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SC_02 — 01_status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #sc02-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" data-status="normal">Normal</button>
        <button class="demo-btn" data-status="warning">Warning</button>
        <button class="demo-btn" data-status="error">Error</button>
        <button class="demo-btn" data-status="offline">Offline</button>
        <button class="demo-btn" data-status="reset">Reset</button>
    </div>

    <div id="sc02-pageThreeLayer"></div>

    <!-- Mixin 로드 -->
    <script src="../../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('sc02-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // SC_02는 루트 scale 업스케일이 없는(1:1 스케일) 케이스 (SC_01·RTU와 동일한 규약).
    // 원본 미터 유닛 그대로 사용 — Pump·RoomCage·RoomCageSmall의 [1000,1000,1000] 업스케일과 대비.
    // bound ~0.8(X) × 2.55(Y) × 2.2(Z) → far=50으로 충분, 근거리 카메라 적절.
    // SC_01(Y 2.95) 대비 Y축이 약 0.4 단위 짧은 형제 변종.
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 50);
    camera.position.set(4, 2, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // ── Grid ──────────────────────────────────────────────────
    // 모델 최대 크기 ~2.55(Y)이므로 그리드 10, 분할 10 (~1 간격)으로 맞춤.
    scene.add(new THREE.GridHelper(10, 10, 0x2a2a4a, 0x2a2a4a));

    // ── Mock Instance ─────────────────────────────────────────
    const instance = { appendElement: null };

    // ── Load Model ────────────────────────────────────────────
    // SC_02.gltf:
    //   scene → SC-U1 (Mesh Node, mesh 0,
    //                   rotation [0, -1, 0, 1.19e-08] ≒ Y축 π 회전,
    //                   material "Material #342540149"
    //                    = baseColorTexture maps/SC01.jpg (JPG 불투명),
    //                      metallicFactor 0, roughnessFactor 0, doubleSided true)
    //
    // **단일 Mesh 직접 참조** — meshName='SC-U1'은 리프 Mesh Node 이름.
    // 장비 폴더명(SC_02) ≠ meshName(SC-U1)의 **비대칭 명명** 주의.
    // meshName에 하이픈(-)이 포함된 특수 케이스 — 'SC-U1' 문자열을 그대로 사용.
    // (SC_01의 'SC-2U1'과 달리 `2U`가 아닌 단일 `U` 규격)
    // getObjectByName('SC-U1')은 단일 Mesh를 반환하고, MeshStateMixin은
    // obj.material이 단일 객체이므로 Mesh 브랜치로 진입해 material을 clone하고
    // color만 setHex로 치환. BATT·Pump·Chiller·RTU·RoomCage·RoomCageSmall·SC_01과 동일 패턴.
    //
    // material이 baseColorTexture 주도이므로 color setHex가 텍스처에 곱해진다(three.js 기본).
    // doubleSided:true가 clone 후에도 유지되므로 양면 렌더도 보존된다.
    // alphaMode 미선언(OPAQUE)이므로 전체 외장이 단일 상태색으로 균일하게 착색된다.
    const meshName = 'SC-U1';
    const loader = new GLTFLoader();

    loader.load('../../../../../models/SC_02/01_default/SC_02.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin 적용 (register.js와 동일)
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // 카메라 타겟 조정 (바운드 기준 자동 거리 설정)
        // SC_02는 Y축이 가장 긴 세로형 캐비닛이므로 maxDim 기준 거리 * 1.8로 충분.
        // SC_01보다 Y축이 약 0.4 단위 짧은 형제 변종 — 동일한 거리 배율로 무리 없이 수납.
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 1.8;

        controls.target.copy(center);
        camera.position.set(center.x + distance, center.y + distance * 0.5, center.z + distance);
        controls.update();
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Demo: renderData 호출 ─────────────────────────────────
    document.querySelectorAll('.demo-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                // 단일 Mesh 'SC-U1'의 material을 흰색으로 복귀.
                // MeshStateMixin이 단일 material을 clone했으므로, 여기서도
                // material.color만 setHex(0xffffff)로 복귀.
                const mesh = instance.appendElement.getObjectByName(meshName);
                if (!mesh) return;
                if (Array.isArray(mesh.material)) {
                    mesh.material.forEach(m => m.color && m.color.setHex(0xffffff));
                } else if (mesh.material && mesh.material.color) {
                    mesh.material.color.setHex(0xffffff);
                }
                return;
            }

            // 단일 meshName 'SC-U1'(리프 Mesh)으로 단일 Mesh 색상 치환.
            // MeshStateMixin이 Mesh 타겟에 대해 Array.isArray 미발동 경로로 진입,
            // material을 clone 후 color만 setHex.
            instance.meshState.renderData({
                response: [{ meshName, status }]
            });
        });
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
