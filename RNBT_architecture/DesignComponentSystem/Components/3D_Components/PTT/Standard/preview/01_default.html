<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PTT вҖ” 01_status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #ptt-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" data-status="normal">Normal</button>
        <button class="demo-btn" data-status="warning">Warning</button>
        <button class="demo-btn" data-status="error">Error</button>
        <button class="demo-btn" data-status="offline">Offline</button>
        <button class="demo-btn" data-status="reset">Reset</button>
    </div>

    <div id="ptt-pageThreeLayer"></div>

    <!-- Mixin лЎңл“ң -->
    <script src="../../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // в”Җв”Җ Three.js Scene Setup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const container = document.getElementById('ptt-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // PTTлҠ” root scale ліҙм • м—ҶмқҢ вҶ’ мӣҗліё мң лӢӣ мң м§Җ (P300CВ·P2400CHмҷҖ лҸҷмқј нҢЁн„ҙ).
    // л‘җ мһҗмӢқ bound н•©мӮ° кё°мӨҖ мһҘл©ҙ нҒ¬кё° м•Ҫ 0.07 Г— 0.04 Г— 0.07 лӢЁмң„мқҳ мҙҲмҶҢнҳ• мһҘл№„.
    // EarthquakeВ·OHU103В·ElecPadВ·PCSмқҳ root(scale [1000, 1000, 1000]) м—…мҠӨмјҖмқјкіј лҢҖл№„.
    // near=0.001лЎң лӮ®м¶° к°Җк№Ңмҡҙ кұ°лҰ¬м—җм„ңлҸ„ clipлҗҳм§Җ м•ҠлҸ„лЎқ н•ҳкі ,
    // л°”мҡҙл“ң кё°л°ҳ мһҗлҸҷ кұ°лҰ¬лЎң м№ҙл©”лқјлҘј лӘЁлҚё нҒ¬кё°м—җ л§һкІҢ л°°м№ҳ.
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.001, 100);
    camera.position.set(0.15, 0.1, 0.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // в”Җв”Җ Lighting в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // в”Җв”Җ Grid в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // мҙҲмҶҢнҳ• лӘЁлҚё(~0.07 лӢЁмң„)м—җ л§һм¶° к·ёлҰ¬л“ң нҒ¬кё° 0.5, л¶„н•  20 (~0.025 к°„кІ©).
    // P300Cмқҳ мҙҲмҶҢнҳ• к·ёлҰ¬л“ң нҢЁн„ҙкіј мң мӮ¬.
    scene.add(new THREE.GridHelper(0.5, 20, 0x2a2a4a, 0x2a2a4a));

    // в”Җв”Җ Mock Instance в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const instance = { appendElement: null };

    // в”Җв”Җ Load Model в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // PTT.gltf:
    //   scene вҶ’ PTT_033 (Group Node, rotation Y=-90В°, children [1, 2])
    //           в”ңв”Җ PTT_034 (Mesh Node, mesh 0, translation [0.035, 0, 0],
    //           в”Ӯ          material "etc11" = baseColorTexture textures/PTT.jpg + doubleSided)
    //           в””в”Җ PTT_035 (Mesh Node, mesh 1,
    //                      material "MetalNoReflecred" = baseColorFactor м Ғк°Ҳмғү + normal/MR 2K л§ө)
    //
    // **Group-traverse лӢЁмқј м°ёмЎ°** вҖ” meshName='PTT_033'мқҖ Group Node мқҙлҰ„.
    // getObjectByName('PTT_033')мқҖ мһҗмӢқ 2к°ңлҘј к°Җм§„ Groupмқ„ л°ҳнҷҳн•ҳкі , MeshStateMixinмқҖ
    // obj.materialмқҙ м—Ҷм–ҙм„ң traverse лёҢлһңм№ҳлЎң м§„мһ…н•ҙ мһҗмӢқ Meshл“Өмқҳ materialмқ„ к°Ғк°Ғ
    // cloneн•ҳкі  colorл§Ң setHexлЎң м№ҳнҷҳ. Earthquakeмқҳ л°°м—ҙ м—ҙкұ° нҢЁн„ҙ лҢҖмӢ  л¶ҖлӘЁ мқҙлҰ„ н•ҳлӮҳл©ҙ м¶©л¶„.
    //
    // л‘җ materialмқҳ color setHex л°ҳмҳҒ м°Ёмқҙ:
    // - etc11мқҖ baseColorTextureк°Җ мһҲм–ҙ colorк°Җ н…ҚмҠӨмІҳм—җ кіұн•ҙм§ҖлҜҖлЎң мғүмЎ° ліҖнҷ”к°Җ лҚ” мқҖмқҖ.
    // - MetalNoReflecredлҠ” baseColorTextureк°Җ м—Ҷм–ҙ color setHexк°Җ baseColorFactor м—ӯн• мқ„
    //   лҢҖмІҙн•ҙ мғү л°ҳмҳҒмқҙ лҚ” к°•н•ҳкІҢ лӮҳнғҖлӮЁ.
    // л‘җ мһҗмӢқм—җ лҸҷмқј мғҒнғңмғүмқҙ м Ғмҡ©лҗҳлҗҳ мөңмў… л ҢлҚ” мғүмЎ°лҠ” н…ҚмҠӨмІҳ м—¬л¶Җм—җ л”°лқј лӢ¬лқјм§„лӢӨ.
    const meshName = 'PTT_033';
    const loader = new GLTFLoader();

    loader.load('../../../../../models/PTT/01_default/PTT.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin м Ғмҡ© (register.jsмҷҖ лҸҷмқј)
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // м№ҙл©”лқј нғҖкІҹ мЎ°м • (л°”мҡҙл“ң кё°мӨҖ мһҗлҸҷ кұ°лҰ¬ м„Өм •)
        // мҙҲмҶҢнҳ• лӘЁлҚё(~0.07)мқҙлҜҖлЎң distance л°°мңЁмқ„ нҶөн•ҙ нҷ”л©ҙм—җ м Ғм ҲнһҲ мұ„мҡ°кё°.
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 2.5;

        controls.target.copy(center);
        camera.position.set(center.x + distance, center.y + distance * 0.6, center.z + distance);
        controls.update();
    });

    // в”Җв”Җ Render Loop в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // в”Җв”Җ Demo: renderData нҳём¶ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    document.querySelectorAll('.demo-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                // Group 'PTT_033'мқҳ мһҗмӢқ Mesh(PTT_034В·PTT_035) materialмқ„ нқ°мғүмңјлЎң ліөк·Җ.
                // MeshStateMixinмқҙ к°Ғ мһҗмӢқ Mesh лӢЁмң„лЎң cloneн–ҲмңјлҜҖлЎң, м—¬кё°м„ңлҸ„
                // Groupмқ„ traverseн•ҳм—¬ мһҗмӢқ material.colorл§Ң setHex(0xffffff)лЎң ліөк·Җ.
                const group = instance.appendElement.getObjectByName(meshName);
                if (!group) return;
                group.traverse((child) => {
                    if (!child.material) return;
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.color && m.color.setHex(0xffffff));
                    } else if (child.material.color) {
                        child.material.color.setHex(0xffffff);
                    }
                });
                return;
            }

            // лӢЁмқј meshName 'PTT_033'(л¶ҖлӘЁ Group)мңјлЎң мһҗмӢқ 2к°ң мқјкҙ„ мғүмғҒ м№ҳнҷҳ.
            // MeshStateMixinмқҙ Group нғҖкІҹм—җ лҢҖн•ҙ traverse лёҢлһңм№ҳлЎң м§„мһ…,
            // мһҗмӢқ materialмқ„ к°Ғк°Ғ clone нӣ„ colorл§Ң setHex.
            instance.meshState.renderData({
                response: [{ meshName, status }]
            });
        });
    });

    // в”Җв”Җ Resize в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
