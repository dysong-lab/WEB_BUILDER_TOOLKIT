<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3Dpointer — Standard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #pointer-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" data-status="normal">Normal</button>
        <button class="demo-btn" data-status="warning">Warning</button>
        <button class="demo-btn" data-status="error">Error</button>
        <button class="demo-btn" data-status="offline">Offline</button>
        <button class="demo-btn" data-status="reset">Reset</button>
    </div>

    <div id="pointer-pageThreeLayer"></div>

    <script src="../../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const container = document.getElementById('pointer-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
    camera.position.set(1.8, 2.1, 2.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(4, 6, 3);
    scene.add(directionalLight);

    scene.add(new THREE.GridHelper(8, 16, 0x2a2a4a, 0x2a2a4a));

    const instance = { appendElement: null };
    const loader = new GLTFLoader();

    loader.load('../../../../../models/3Dpointer/01_default/3Dpointer.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;

        controls.target.copy(center);
        camera.position.set(
            center.x + maxDim * 1.4,
            center.y + maxDim * 1.2,
            center.z + maxDim * 1.6
        );
        controls.update();
    });

    function renderPointerStatus(status) {
        instance.meshState.setMeshState('geo', status);
        instance.meshState.setMeshState('sphere_A', status);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    document.querySelectorAll('.demo-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState || !instance.appendElement) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                ['geo', 'sphere_A'].forEach((meshName) => {
                    const mesh = instance.appendElement.getObjectByName(meshName);
                    if (mesh?.material?.color) mesh.material.color.setHex(0xffffff);
                });
                return;
            }

            renderPointerStatus(status);
        });
    });

    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
