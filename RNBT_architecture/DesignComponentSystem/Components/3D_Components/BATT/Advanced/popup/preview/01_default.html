<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BATT — 03_status_popup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #batt-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
            position: relative;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-controls-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .demo-label {
            font-size: 11px;
            font-weight: 600;
            color: #8888aa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .demo-separator {
            width: 1px;
            height: 24px;
            background: #2a2a4a;
            margin: 0 8px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
        .demo-btn[data-action="popup"]   { background: #8b5cf6; }

        .demo-log {
            width: 600px;
            margin: 16px auto 0;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #8888aa;
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            max-height: 160px;
            overflow-y: auto;
        }
        .demo-log strong { color: #e2e8f0; }
        .demo-hint {
            width: 600px;
            margin: 8px auto 0;
            text-align: center;
            color: #5a5a7a;
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="demo-controls">
        <div class="demo-controls-group">
            <span class="demo-label">Status</span>
            <button class="demo-btn" data-status="normal">Normal</button>
            <button class="demo-btn" data-status="warning">Warning</button>
            <button class="demo-btn" data-status="error">Error</button>
            <button class="demo-btn" data-status="offline">Offline</button>
            <button class="demo-btn" data-status="reset">Reset</button>
        </div>
        <div class="demo-separator"></div>
        <div class="demo-controls-group">
            <span class="demo-label">Popup</span>
            <button class="demo-btn" data-action="popup">Show Detail</button>
        </div>
    </div>

    <div id="batt-pageThreeLayer"></div>
    <div class="demo-hint">※ 3D 모델을 직접 클릭하면 @battClicked 이벤트가 발행됩니다</div>
    <div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

    <!-- preview_runtime.js: Wkit.bind3DEvents / onEventBusHandlers / Weventbus 시뮬레이션 -->
    <script src="../../../../../../preview_runtime.js"></script>
    <!-- Mixin 로드 -->
    <script src="../../../../../../Mixins/MeshStateMixin.js"></script>
    <script src="../../../../../../Mixins/3DShadowPopupMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Popup HTML/CSS (publishCode 시뮬레이션) ───────────────
    const popupHTML = `
        <div class="popup-overlay">
            <div class="popup-panel">
                <div class="popup-header">
                    <h3 class="popup-name">BATT</h3>
                    <div class="popup-header-right">
                        <span class="popup-status" data-status="normal">normal</span>
                        <button class="popup-close" type="button">&times;</button>
                    </div>
                </div>
                <div class="popup-body">
                    <table class="popup-info-table">
                        <tr><th>Type</th><td>Battery Cabinet</td></tr>
                        <tr><th>Model</th><td>BATT-48V-200AH</td></tr>
                        <tr><th>Location</th><td>DC-1F-R03</td></tr>
                        <tr><th>Status</th><td class="popup-status-cell">-</td></tr>
                    </table>
                </div>
            </div>
        </div>
    `;

    const popupCSS = `
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .popup-panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            width: 320px;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #334155;
        }
        .popup-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }
        .popup-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .popup-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            background: #334155;
            color: #94a3b8;
        }
        .popup-status[data-status="normal"]  { background: #0d3b2e; color: #34d399; }
        .popup-status[data-status="warning"] { background: #3b2e0d; color: #fbbf24; }
        .popup-status[data-status="error"]   { background: #3b0d0d; color: #f87171; }
        .popup-status[data-status="offline"] { background: #1e293b; color: #6b7280; }
        .popup-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .popup-close:hover { background: rgba(255,255,255,0.1); }
        .popup-body { padding: 16px; }
        .popup-info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .popup-info-table th {
            text-align: left;
            color: #94a3b8;
            padding: 6px 0;
            width: 90px;
            font-weight: 500;
        }
        .popup-info-table td {
            padding: 6px 0;
            color: #e2e8f0;
        }
    `;

    // ── Three.js Scene Setup ──────────────────────────────────
    const container = document.getElementById('batt-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
    camera.position.set(4, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // ── Lighting ──────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // ── Grid ──────────────────────────────────────────────────
    scene.add(new THREE.GridHelper(10, 20, 0x2a2a4a, 0x2a2a4a));

    // ── Mock Instance ─────────────────────────────────────────
    const instance = {
        appendElement: null,
        name: 'BATT-01',
        page: { appendElement: container }  // 3D: 페이지 DOM에 팝업 부착
    };

    // ── Load Model ────────────────────────────────────────────
    const loader = new GLTFLoader();

    loader.load('../../../../../../models/BATT/01_default/BATT.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin 적용
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // 3DShadowPopupMixin 적용
        apply3DShadowPopupMixin(instance, {
            getHTML:   () => popupHTML,
            getStyles: () => popupCSS
        });

        // 시연용 정적 이벤트 — show 전 호출 (Mixin이 큐잉 후 첫 show 시 자동 바인딩)
        instance.shadowPopup.bindPopupEvents({
            click: {
                '.popup-close': () => instance.shadowPopup.hide(),
                '.popup-overlay': (e) => {
                    if (e.target.classList.contains('popup-overlay')) {
                        instance.shadowPopup.hide();
                    }
                }
            }
        });

        // ── 3D 이벤트 바인딩 (register.js 재현) ──────────────────
        instance.customEvents = { click: '@battClicked' };
        Wkit.bind3DEvents(instance, instance.customEvents);

        // 카메라 타겟 조정
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        controls.target.copy(center);
        camera.position.set(center.x + 4, center.y + 2, center.z + 5);
        controls.update();
    });

    // ── Raycasting: DOM click → hit test → eventListener 호출 ──
    // 실제 런타임은 Wkit.initThreeRaycasting이 wemb.threeElements에서
    // scene/camera를 읽어 수행하지만, preview에서는 직접 수행한다.
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);
        for (const inter of intersects) {
            let current = inter.object;
            while (current && !current.eventListener) current = current.parent;
            if (current?.eventListener?.click) {
                current.eventListener.click(Object.assign(event, { intersects }));
                break;
            }
        }
    });

    // ── Render Loop ───────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // ── Demo Log ─────────────────────────────────────────────
    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    // ── 이벤트 버스 구독 (페이지 측 반응 재현) ────────────────
    // 실제 런타임에서는 페이지 코드가 @battClicked를 구독하여
    // instance.shadowPopup.show()를 호출한다. preview에서도 동일 경로로 검증.
    Wkit.onEventBusHandlers({
        '@battClicked': ({ event, targetInstance }) => {
            const meshName = event.intersects?.[0]?.object?.name || '(unknown)';
            log(`@battClicked mesh="${meshName}" → shadowPopup.show()`);
            targetInstance.shadowPopup.show();
            const statusEl = targetInstance.shadowPopup.query('.popup-status');
            const statusCell = targetInstance.shadowPopup.query('.popup-status-cell');
            const nameEl = targetInstance.shadowPopup.query('.popup-name');
            if (nameEl) nameEl.textContent = targetInstance.name;
            if (statusEl) {
                statusEl.textContent = currentStatus;
                statusEl.dataset.status = currentStatus;
            }
            if (statusCell) statusCell.textContent = currentStatus;
        }
    });

    // ── Demo: Status (renderData) ─────────────────────────────
    let currentStatus = 'normal';

    document.querySelectorAll('.demo-btn[data-status]').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                const mesh = instance.appendElement.getObjectByName('BATT');
                if (mesh) mesh.material.color.setHex(0xffffff);
                currentStatus = 'normal';
                return;
            }

            instance.meshState.renderData({
                response: [{ meshName: 'BATT', status }]
            });
            currentStatus = status;
        });
    });

    // ── Demo: Popup ───────────────────────────────────────────
    document.querySelector('.demo-btn[data-action="popup"]').addEventListener('click', () => {
        if (!instance.shadowPopup) return;

        instance.shadowPopup.show();

        // 팝업에 현재 상태 반영
        const statusEl = instance.shadowPopup.query('.popup-status');
        const statusCell = instance.shadowPopup.query('.popup-status-cell');
        const nameEl = instance.shadowPopup.query('.popup-name');

        if (nameEl) nameEl.textContent = instance.name;
        if (statusEl) {
            statusEl.textContent = currentStatus;
            statusEl.dataset.status = currentStatus;
        }
        if (statusCell) statusCell.textContent = currentStatus;
    });

    // ── Resize ────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
