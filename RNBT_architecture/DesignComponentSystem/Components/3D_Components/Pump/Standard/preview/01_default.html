<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pump вҖ” 01_status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; }
        #pump-pageThreeLayer {
            width: 600px;
            height: 480px;
            display: block;
            overflow: hidden;
            margin: 40px auto;
        }
        canvas { display: block; }

        .demo-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
        }
        .demo-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s;
        }
        .demo-btn:hover { opacity: 0.8; }
        .demo-btn[data-status="normal"]  { background: #34d399; }
        .demo-btn[data-status="warning"] { background: #fbbf24; color: #1a1a2e; }
        .demo-btn[data-status="error"]   { background: #f87171; }
        .demo-btn[data-status="offline"] { background: #6b7280; }
        .demo-btn[data-status="reset"]   { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="demo-controls">
        <button class="demo-btn" data-status="normal">Normal</button>
        <button class="demo-btn" data-status="warning">Warning</button>
        <button class="demo-btn" data-status="error">Error</button>
        <button class="demo-btn" data-status="offline">Offline</button>
        <button class="demo-btn" data-status="reset">Reset</button>
    </div>

    <div id="pump-pageThreeLayer"></div>

    <!-- Mixin лЎңл“ң -->
    <script src="../../../../../Mixins/MeshStateMixin.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // в”Җв”Җ Three.js Scene Setup в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const container = document.getElementById('pump-pageThreeLayer');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // PumpмқҖ root scale [1000, 1000, 1000] м—…мҠӨмјҖмқј нҢЁн„ҙ (PartitionВ·Partition_smallВ·EarthquakeВ·OHU103В·ElecPadВ·PCSмҷҖ лҸҷмқј).
    // Mesh мӣҗліё bound ~0.00186 Г— 0.00323 Г— 0.00154 вҶ’ м—…мҠӨмјҖмқј нӣ„ 1.86 Г— 3.23 Г— 1.54
    // (Yм¶•мқҙ кёёмқҙ л°©н–Ҙ, м„ё м¶•мқҙ л№„көҗм Ғ к· л“ұн•ң л¶Җн”јмІҙ).
    // Partition_smallмқҳ 13.5(Z)ліҙлӢӨ мөңлҢҖм¶•мқҙ мһ‘мңјлҜҖлЎң far=50мңјлЎң м¶©л¶„.
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 50);
    camera.position.set(5, 3, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);

    // в”Җв”Җ Lighting в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 4);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // в”Җв”Җ Grid в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // м—…мҠӨмјҖмқј нӣ„ лӘЁлҚё нҒ¬кё° ~3.23(Y) Г— 1.86(X) Г— 1.54(Z)м—җ л§һм¶° к·ёлҰ¬л“ң нҒ¬кё° 10, л¶„н•  10 (~1 к°„кІ©).
    scene.add(new THREE.GridHelper(10, 10, 0x2a2a4a, 0x2a2a4a));

    // в”Җв”Җ Mock Instance в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const instance = { appendElement: null };

    // в”Җв”Җ Load Model в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Pump.gltf:
    //   scene вҶ’ root (scale [1000, 1000, 1000])
    //           в””в”Җ Pump (Mesh Node, mesh 0,
    //                    translation [0, 2.98e-08, 0],
    //                    material "Pump" = baseColorTexture textures/Pump.jpg)
    //
    // **лӢЁмқј Mesh м§Ғм ‘ м°ёмЎ°** вҖ” meshName='Pump'мқҖ лҰ¬н”„ Mesh Node мқҙлҰ„.
    // getObjectByName('Pump')мқҖ лӢЁмқј MeshлҘј л°ҳнҷҳн•ҳкі , MeshStateMixinмқҖ
    // obj.materialмқҙ лӢЁмқј к°қмІҙмқҙлҜҖлЎң Mesh лёҢлһңм№ҳлЎң м§„мһ…н•ҙ materialмқ„ cloneн•ҳкі 
    // colorл§Ң setHexлЎң м№ҳнҷҳ. FLIRExВ·BATTВ·ChillerВ·Partition_smallмқҳ лҸҷмқј нҢЁн„ҙ
    // вҖ” Partitionмқҳ Group-traverseмҷҖ лҢҖл№„.
    //
    // materialмқҙ baseColorTexture мЈјлҸ„мқҙлҜҖлЎң color setHexк°Җ н…ҚмҠӨмІҳм—җ кіұн•ҙм§„лӢӨ(three.js кё°ліё).
    const meshName = 'Pump';
    const loader = new GLTFLoader();

    loader.load('../../../../../models/Pump/01_default/Pump.gltf', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        instance.appendElement = model;

        // MeshStateMixin м Ғмҡ© (register.jsмҷҖ лҸҷмқј)
        applyMeshStateMixin(instance, {
            colorMap: {
                normal:  0x34d399,
                warning: 0xfbbf24,
                error:   0xf87171,
                offline: 0x6b7280
            }
        });

        // м№ҙл©”лқј нғҖкІҹ мЎ°м • (л°”мҡҙл“ң кё°мӨҖ мһҗлҸҷ кұ°лҰ¬ м„Өм •)
        // м—…мҠӨмјҖмқј нӣ„ м„ё м¶•мқҙ л№„көҗм Ғ к· л“ұн•ң л¶Җн”јмІҙмқҙлҜҖлЎң max(X, Y, Z) кё°мӨҖмңјлЎң кұ°лҰ¬ мӮ°м •.
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 2.0;

        controls.target.copy(center);
        camera.position.set(center.x + distance, center.y + distance * 0.6, center.z + distance);
        controls.update();
    });

    // в”Җв”Җ Render Loop в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // в”Җв”Җ Demo: renderData нҳём¶ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    document.querySelectorAll('.demo-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!instance.meshState) return;

            const status = btn.dataset.status;

            if (status === 'reset') {
                // лӢЁмқј Mesh 'Pump'мқҳ materialмқ„ нқ°мғүмңјлЎң ліөк·Җ.
                // MeshStateMixinмқҙ лӢЁмқј materialмқ„ cloneн–ҲмңјлҜҖлЎң, м—¬кё°м„ңлҸ„
                // material.colorл§Ң setHex(0xffffff)лЎң ліөк·Җ.
                const mesh = instance.appendElement.getObjectByName(meshName);
                if (!mesh) return;
                if (Array.isArray(mesh.material)) {
                    mesh.material.forEach(m => m.color && m.color.setHex(0xffffff));
                } else if (mesh.material && mesh.material.color) {
                    mesh.material.color.setHex(0xffffff);
                }
                return;
            }

            // лӢЁмқј meshName 'Pump'(лҰ¬н”„ Mesh)мңјлЎң лӢЁмқј Mesh мғүмғҒ м№ҳнҷҳ.
            // MeshStateMixinмқҙ Mesh нғҖкІҹм—җ лҢҖн•ҙ Array.isArray лҜёл°ңлҸҷ кІҪлЎңлЎң м§„мһ…,
            // materialмқ„ clone нӣ„ colorл§Ң setHex.
            instance.meshState.renderData({
                response: [{ meshName, status }]
            });
        });
    });

    // в”Җв”Җ Resize в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(w, h);
    });
    </script>
</body>
</html>
