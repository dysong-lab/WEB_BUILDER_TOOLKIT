<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Search/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 24px;
            padding: 60px 20px;
        }
        .demo-log {
            width: 380px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="search-container"></div>
<div class="demo-log" id="demo-log"><strong>Event Log</strong><br>&mdash;</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/FieldRenderMixin.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('search-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'search', appendElement: document.getElementById('search-container') };

    applyFieldRenderMixin(instance, {
        cssSelectors: {
            searchBar:   '.search__bar',
            leadingIcon: '.search__leading',
            query:       '.search__input',
            placeholder: '.search__input',
            clearBtn:    '.search__clear',
            submitBtn:   '.search__submit'
        },
        elementAttrs: {
            query:       'value',
            placeholder: 'placeholder'
        }
    });

    applyListRenderMixin(instance, {
        cssSelectors: {
            container:    '.search__suggestions',
            template:     '#search-suggestion-template',
            suggestionid: '.search__suggestion-item',
            leading:      '.search__suggestion-leading',
            label:        '.search__suggestion-label',
            supporting:   '.search__suggestion-supporting'
        },
        datasetAttrs: { suggestionid: 'suggestionid' }
    });

    instance.subscriptions = {
        searchBar:         [instance.fieldRender.renderData],
        searchSuggestions: [instance.listRender.renderData]
    };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        input: {
            [instance.fieldRender.cssSelectors.query]:       '@searchInput'
        },
        change: {
            [instance.fieldRender.cssSelectors.query]:       '@searchSubmitted'
        },
        click: {
            [instance.fieldRender.cssSelectors.clearBtn]:    '@searchCleared',
            [instance.fieldRender.cssSelectors.submitBtn]:   '@searchSubmitted',
            [instance.listRender.cssSelectors.suggestionid]: '@suggestionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>Event Log</strong><br>&mdash;';
    const log = (msg) => {
        logHtml = '<strong>Event Log</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@searchInput': ({ event }) => log('searchInput "' + event.target.value + '"'),
        '@searchSubmitted': ({ event, targetInstance }) => {
            const input = targetInstance.appendElement.querySelector(targetInstance.fieldRender.cssSelectors.query);
            log('<strong>searchSubmitted</strong> "' + (input ? input.value : '') + '"');
        },
        '@searchCleared': ({ targetInstance }) => {
            const input = targetInstance.appendElement.querySelector(targetInstance.fieldRender.cssSelectors.query);
            if (input) input.value = '';
            targetInstance.listRender.clear();
            log('searchCleared');
        },
        '@suggestionClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.suggestionid);
            if (!item) return;
            const id = item.getAttribute('data-suggestionid');
            log('suggestionClicked "' + id + '"');
        }
    });

    instance.fieldRender.renderData({
        response: {
            leadingIcon: '\u{1F50D}',
            placeholder: 'Search devices, logs, metrics...',
            query:       ''
        }
    });

    instance.listRender.renderData({
        response: [
            { suggestionid: 'dev-rnbt-01', leading: '\u{1F5A5}', label: 'RNBT-01',        supporting: 'Device' },
            { suggestionid: 'dev-rnbt-02', leading: '\u{1F5A5}', label: 'RNBT-02',        supporting: 'Device' },
            { suggestionid: 'log-err-443', leading: '\u{26A0}',  label: 'Connection failed', supporting: 'Error 443' },
            { suggestionid: 'met-cpu-hot', leading: '\u{1F321}', label: 'CPU overheating',  supporting: 'Metric' },
            { suggestionid: 'usr-kim-jh',  leading: '\u{1F464}', label: 'Kim, J.H.',        supporting: 'User' }
        ]
    });
})();
</script>
</body>
</html>
