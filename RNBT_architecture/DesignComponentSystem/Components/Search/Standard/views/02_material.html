<div class="search">
    <div class="search__bar">
        <span class="search__leading material-symbols-outlined">search</span>
        <input class="search__input" type="text" autocomplete="off" spellcheck="false">
        <button class="search__clear" type="button" aria-label="Clear">
            <span class="material-symbols-outlined">close</span>
        </button>
        <button class="search__submit" type="button" aria-label="Search">
            <span class="material-symbols-outlined">arrow_forward</span>
        </button>
    </div>
    <div class="search__suggestions"></div>

    <template id="search-suggestion-template">
        <div class="search__suggestion-item" data-suggestionid="">
            <span class="search__suggestion-leading material-symbols-outlined"></span>
            <span class="search__suggestion-label"></span>
            <span class="search__suggestion-supporting"></span>
        </div>
    </template>
</div>
