<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Toolbars/Standard — 02_material (Persona B)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F5F5F5;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 24px;
            padding: 40px 20px;
        }
        .demo-log {
            width: 360px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            color: #5f6368;
            font-size: 12px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }
        .demo-log strong { color: #1a73e8; font-weight: 500; }
    </style>
</head>
<body>

<div id="toolbar-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('toolbar-container', '../views/02_material.html', '../styles/02_material.css');

    const instance = { id: 'toolbars', appendElement: document.getElementById('toolbar-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.toolbar__list',
            template:  '#toolbar-action-template',
            actionid:  '.toolbar__action',
            disabled:  '.toolbar__action',
            icon:      '.toolbar__icon',
            label:     '.toolbar__label'
        },
        itemKey: 'actionid',
        datasetAttrs: {
            actionid: 'actionid',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { toolbarActions: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.actionid]: '@toolbarActionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@toolbarActionClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.actionid);
            const actionid = item?.getAttribute('data-actionid');
            const isDisabled = item?.getAttribute('data-disabled') === 'true';
            if (isDisabled) {
                log(`toolbarActionClicked "${actionid}" (disabled)`);
                return;
            }
            log(`toolbarActionClicked "${actionid}" → 커맨드 실행`);
        }
    });

    instance.listRender.renderData({ response: [
        { actionid: 'bold',      icon: 'format_bold',      label: '',       disabled: 'false' },
        { actionid: 'italic',    icon: 'format_italic',    label: '',       disabled: 'false' },
        { actionid: 'underline', icon: 'format_underlined',label: '',       disabled: 'false' },
        { actionid: 'link',      icon: 'link',             label: 'Link',   disabled: 'false' },
        { actionid: 'attach',    icon: 'attach_file',      label: '',       disabled: 'true'  }
    ]});
})();
</script>
</body>
</html>
