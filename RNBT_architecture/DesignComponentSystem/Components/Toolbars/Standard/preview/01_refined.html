<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Toolbars/Standard — 01_refined (Persona A)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12153D;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-height: 100vh;
            gap: 24px;
            padding: 24px;
        }
        .demo-log {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            padding: 12px 16px;
            background: rgba(25, 29, 80, 0.9);
            border: 1px solid #2A2574;
            border-radius: 8px;
            color: #A6B3DE;
            font-family: 'Pretendard', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong { color: #E8EDFF; }
    </style>
</head>
<body>

<div id="toolbar-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('toolbar-container', '../views/01_refined.html', '../styles/01_refined.css');

    const instance = { id: 'toolbars', appendElement: document.getElementById('toolbar-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.toolbar__list',
            template:  '#toolbar-action-template',
            actionid:  '.toolbar__action',
            disabled:  '.toolbar__action',
            icon:      '.toolbar__icon',
            label:     '.toolbar__label'
        },
        itemKey: 'actionid',
        datasetAttrs: {
            actionid: 'actionid',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { toolbarActions: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.actionid]: '@toolbarActionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@toolbarActionClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.actionid);
            const actionid = item?.getAttribute('data-actionid');
            const isDisabled = item?.getAttribute('data-disabled') === 'true';
            if (isDisabled) {
                log(`toolbarActionClicked "${actionid}" (disabled — 무시)`);
                return;
            }
            log(`toolbarActionClicked "${actionid}" → 커맨드 실행`);
        }
    });

    instance.listRender.renderData({ response: [
        { actionid: 'reply',   icon: 'reply',          label: 'Reply',   disabled: 'false' },
        { actionid: 'forward', icon: 'forward',        label: 'Forward', disabled: 'false' },
        { actionid: 'archive', icon: 'archive',        label: 'Archive', disabled: 'false' },
        { actionid: 'delete',  icon: 'delete_outline', label: 'Delete',  disabled: 'false' },
        { actionid: 'more',    icon: 'more_horiz',     label: 'More',    disabled: 'true'  }
    ]});
})();
</script>
</body>
</html>
