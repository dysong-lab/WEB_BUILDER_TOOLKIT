<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Toolbars/Standard — 01_refined</title>
    <script src="../../../../preview_runtime.js"></script>
    <script src="../../../../Mixins/FieldRenderMixin.js"></script>
    <script src="../../../../Mixins/ListRenderMixin.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;
        background: radial-gradient(circle at top, #133452, #08111a 62%);
      }
    </style>
  </head>
  <body>
    <div id="toolbar-refined"></div>
    <script>
      (async () => {
        await loadComponentAssets("toolbar-refined", "../views/01_refined.html", "../styles/01_refined.css");
        const instance = { id: "toolbar-refined", appendElement: document.getElementById("toolbar-refined") };
        applyFieldRenderMixin(instance, { cssSelectors: { root: ".toolbar", title: ".toolbar__title", supportingText: ".toolbar__supporting", overflowButton: ".toolbar__overflow" } });
        applyListRenderMixin(instance, {
          cssSelectors: { container: ".toolbar__actions", template: "#toolbar-action-template", item: ".toolbar__action", id: ".toolbar__action", emphasis: ".toolbar__action", icon: ".toolbar__action-icon", label: ".toolbar__action-label" },
          itemKey: "id",
          datasetAttrs: { id: "id", emphasis: "emphasis" },
        });
        instance.fieldRender.renderData({ response: { title: "Canvas Tools", supportingText: "Arrange, annotate, and export the current selection." } });
        instance.listRender.renderData({ response: [
          { id: "align", label: "Align", icon: "⇄", emphasis: "false" },
          { id: "annotate", label: "Annotate", icon: "✎", emphasis: "true" },
          { id: "export", label: "Export", icon: "↓", emphasis: "false" }
        ] });
        instance.appendElement.addEventListener("click", (event) => {
          const overflow = event.target.closest(".toolbar__overflow");
          if (overflow) {
            const root = instance.appendElement.querySelector(".toolbar");
            root.dataset.overflowOpen = root.dataset.overflowOpen === "true" ? "false" : "true";
            Weventbus.emit("@toolbarOverflowToggled", { event, targetInstance: instance });
            return;
          }
          const action = event.target.closest(".toolbar__action");
          if (!action) return;
          Weventbus.emit("@toolbarActionClicked", { event, targetInstance: instance, itemId: action.dataset.id, response: { id: action.dataset.id } });
        });
      })();
    </script>
  </body>
</html>
