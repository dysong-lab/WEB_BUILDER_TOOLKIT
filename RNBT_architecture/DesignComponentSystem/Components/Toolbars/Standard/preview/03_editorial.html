<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Toolbars/Standard — 03_editorial (Persona C)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FAF8F4;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-height: 100vh;
            gap: 24px;
            padding: 24px;
        }
        .demo-log {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            padding: 14px 18px;
            background: #faf8f3;
            border: 1px solid #d4c9b5;
            border-radius: 2px;
            color: #5c544a;
            font-size: 12px;
            line-height: 1.7;
            max-height: 240px;
            overflow-y: auto;
            z-index: 200;
        }
        .demo-log strong {
            color: #2a2520;
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="toolbar-container"></div>
<div class="demo-log" id="demo-log"><strong>이벤트 로그</strong><br>—</div>

<script src="../../../../preview_runtime.js"></script>
<script src="../../../../Mixins/ListRenderMixin.js"></script>
<script>
(async () => {
    await loadComponentAssets('toolbar-container', '../views/03_editorial.html', '../styles/03_editorial.css');

    const instance = { id: 'toolbars', appendElement: document.getElementById('toolbar-container') };

    applyListRenderMixin(instance, {
        cssSelectors: {
            container: '.toolbar__list',
            template:  '#toolbar-action-template',
            actionid:  '.toolbar__action',
            disabled:  '.toolbar__action',
            icon:      '.toolbar__icon',
            label:     '.toolbar__label'
        },
        itemKey: 'actionid',
        datasetAttrs: {
            actionid: 'actionid',
            disabled: 'disabled'
        }
    });

    instance.subscriptions = { toolbarActions: [instance.listRender.renderData] };
    Object.entries(instance.subscriptions).forEach(([topic, handlers]) =>
        handlers.forEach(handler => GlobalDataPublisher.subscribe(topic, instance, handler))
    );

    instance.customEvents = {
        click: {
            [instance.listRender.cssSelectors.actionid]: '@toolbarActionClicked'
        }
    };
    Wkit.bindEvents(instance, instance.customEvents);

    const logEl = document.getElementById('demo-log');
    let logHtml = '<strong>이벤트 로그</strong><br>—';
    const log = (msg) => {
        logHtml = '<strong>이벤트 로그</strong><br>' + msg + '<br>' + logHtml.split('<br>').slice(1).join('<br>');
        logEl.innerHTML = logHtml;
    };

    Wkit.onEventBusHandlers({
        '@toolbarActionClicked': ({ event, targetInstance }) => {
            const item = event.target.closest(targetInstance.listRender.cssSelectors.actionid);
            const actionid = item?.getAttribute('data-actionid');
            const isDisabled = item?.getAttribute('data-disabled') === 'true';
            if (isDisabled) {
                log(`toolbarActionClicked "${actionid}" (disabled)`);
                return;
            }
            log(`toolbarActionClicked "${actionid}" → 커맨드 실행`);
        }
    });

    instance.listRender.renderData({ response: [
        { actionid: 'share',    icon: 'share',      label: 'Share',    disabled: 'false' },
        { actionid: 'bookmark', icon: 'bookmark',   label: 'Save',     disabled: 'false' },
        { actionid: 'print',    icon: 'print',      label: 'Print',    disabled: 'false' },
        { actionid: 'comment',  icon: 'chat_bubble_outline', label: 'Comment',  disabled: 'true'  }
    ]});
})();
</script>
</body>
</html>
