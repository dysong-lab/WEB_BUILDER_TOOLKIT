<section class="toolbar toolbar--material" data-overflow-open="false">
  <div class="toolbar__meta">
    <p class="toolbar__supporting"></p>
    <h3 class="toolbar__title"></h3>
  </div>
  <div class="toolbar__controls">
    <div class="toolbar__actions"></div>
    <button class="toolbar__overflow" type="button" aria-label="More toolbar actions">⋯</button>
  </div>
  <template id="toolbar-action-template">
    <button class="toolbar__action" type="button">
      <span class="toolbar__action-icon"></span>
      <span class="toolbar__action-label"></span>
    </button>
  </template>
</section>
